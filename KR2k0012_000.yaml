body:
  text: 淳熙三山志目録地理類三都㑹郡縣之屬巻一地里類一叙州巻二地里類二叙縣巻三地里類三叙縣巻四地里類四子城羅城夾城外城城涂子城坊巷羅夾城坊巷内外城壕橋梁巻五地里類五驛鋪渡巻六地里類六江潮海道巻七公廨類一府治轉運行司提㸃刑獄司提舉行司西外宗正司帥屬廨舎通判㕔職官㕔曹官㕔教授㕔駐泊都監監押㕔將官㕔監務廨舎監甲仗庫廨舎巡檢㕔巡轄馬鋪㕔試院都倉鹽倉安撫司鹽倉軍資庫公使庫安撫司公使庫安撫司抵當庫經總制庫作院使院衙院都税務臨河務樓店務修造場抽木場窰務船場灰場炭場巻八公廨類二啟運宫社稷壇廟學祠廟巻九公廨類三諸縣官㕔諸縣社壇諸縣廟學諸縣倉庫諸縣鎮務諸縣祠廟巻十版籍類一墾田户口僧道巻十一版籍類二官莊田巻十二版籍類三贍學田職田沙洲田海田巻十三版籍類四州縣役人巻十四版籍類五州縣役人海船户爐户坑冶巻十五版籍類六水利巻十六版籍類七水利巻十七財賦類嵗収他司應副錢物嵗貢巻十八兵防類一諸廂禁軍巻十九兵防類二諸寨土軍巻二十秩官類一郡守巻二十一秩官類二郡守封君諸使附唐至後周巻二十二秩官類三郡守諸使附本朝巻二十三秩官類四安撫司官州司官安撫司兵官州司武官巻二十四秩官類五十二縣官安撫司使臣州司使臣提刑司使臣歸明等官巻二十五秩官類六啓運宫官西外宗正司提刑司官轉運使副提舉常平茶事提舉學事走馬承受巻二十六人物類一科名唐朝後唐本巻二十七人物類二科名本朝巻二十八人物類三科名本朝巻二十九人物類四科名本朝巻三十人物類五科名本朝巻三十一人物類六科名本朝巻三十二人物類七科名本朝巻三十三寺觀類一僧寺山附巻三十四寺觀類二僧寺山附巻三十五寺觀類三僧寺山附巻三十六寺觀類四僧寺山附巻三十七寺觀類五僧寺山附巻三十八寺觀類六僧寺山附道觀山附巻三十九土俗類一土貢戒諭謡䜟巻四十土俗類二嵗時巻四十一土俗類三物産穀貨絲麻果實菜蓏藥巻四十二土俗類四物産木竹草藤畜擾獸禽族水族蟲臣等謹案淳熙三山志四十二巻宋梁克家撰克家字叔子泉州晉江人紹興三十年廷試第一授平江簽判召為秘書省正字乾道中累官右丞相封儀國公卒諡文靖事迹具宋史本傳史稱其為文渾厚明白自成一家辭命尤温雅多行於世今所作已罕流傳惟此書尚有寫本凡分九門一曰地理二曰公廨三曰版籍四曰財賦五曰兵防六曰秩官七曰人物八曰寺觀九曰土俗朱彝尊曝書亭集有是書跋議其附山川於寺觀未免失倫今觀其人物惟収科第土俗特出謡䜟亦皆於義未安然其志主於紀録掌故而不在誇耀鄉賢侈陳名勝固亦核實之道自成志乗之一體未可以常例繩也其所紀十國之事多有史籍所遺者亦足資攷證視後來何喬逺閩書之類門目猥雜徒溷耳目者其相去逺矣乾隆四十五年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀淳熙三山志原序予領郡暇日訪無諸以來遺跡故俗聞晉太康既置郡之一百一十三年太守陶䕫始有撰記又四百五十六年至唐郡人林諝復増為之皆散逸無存者獨最後一百九十二年至本朝慶厯三年郡人林世程所作傳於世自言視前志頗究悉然不過地里人物土俗物産之大概裒次亦復缺略迄今又一百三十九年興廢増改率非舊制故闕不書者十九夫追惟往昔之事不可復記竊常以為恨至耳目所接謂未遽泯没則又不急於紀録嵗月因循忽莫省意使來者復恨之斯亦守土者之責也乃約諸里居與仕於此者相與纂集討尋㫁簡援據公牘採諸長老所傳得諸閭里所記上窮千載建創之始中閱累朝因革之由而益之以今日之所聞見厥類惟九靡不論載豈惟使四方知是邦於是為盛抑嚮古者有考焉書成為四十巻名曰三山志淳熈九年五月八日丁丑清源梁克家序
