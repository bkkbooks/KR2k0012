body:
  text: 淳熙三山志目録地理類三都會郡縣之屬卷一地里類一敘州卷二地里類二敘縣卷三地里類三敘縣卷四地里類四子城羅城夾城外城城塗子城坊巷羅夾城坊巷內外城壕橋梁卷五地里類五驛鋪渡卷六地里類六江潮海道卷七公廨類一府治轉運行司提點刑獄司提舉行司西外宗正司帥屬廨舍通判廳職官廳曹官廳教授廳駐泊都監監押廳將官廳監務廨舍監甲仗庫廨舍巡檢廳巡轄馬鋪廳試院都倉鹽倉安撫司鹽倉軍資庫公使庫安撫司公使庫安撫司抵當庫經總制庫作院使院衙院都稅務臨河務樓店務修造場抽木場窰務船場灰場炭場卷八公廨類二啓運宫社稷壇廟學祠廟卷九公廨類三諸縣官廳諸縣社壇諸縣廟學諸縣倉庫諸縣鎮務諸縣祠廟卷十版籍類一墾田户口僧道卷十一版籍類二官莊田卷十二版籍類三贍學田職田沙洲田海田卷十三版籍類四州縣役人卷十四版籍類五州縣役人海船户爐户坑冶卷十五版籍類六水利卷十六版籍類七水利卷十七財賦類嵗收他司應副錢物嵗貢卷十八兵防類一諸廂禁軍卷十九兵防類二諸寨土軍卷二十秩官類一郡守卷二十一秩官類二郡守封君諸使附唐至後周卷二十二秩官類三郡守諸使附本朝卷二十三秩官類四安撫司官州司官安撫司兵官州司武官卷二十四秩官類五十二縣官安撫司使臣州司使臣提刑司使臣歸明等官卷二十五秩官類六啓運宫官西外宗正司提刑司官轉運使副提舉常平茶事提舉學事走馬承受卷二十六人物類一科名唐朝後唐本卷二十七人物類二科名本朝卷二十八人物類三科名本朝卷二十九人物類四科名本朝卷三十人物類五科名本朝卷三十一人物類六科名本朝卷三十二人物類七科名本朝卷三十三寺觀類一僧寺山附卷三十四寺觀類二僧寺山附卷三十五寺觀類三僧寺山附卷三十六寺觀類四僧寺山附卷三十七寺觀類五僧寺山附卷三十八寺觀類六僧寺山附道觀山附卷三十九土俗類一土貢戒諭謡讖卷四十土俗類二嵗時卷四十一土俗類三物産穀貨絲麻果實菜蓏藥卷四十二土俗類四物産木竹草藤畜擾獸禽族水族蟲臣等謹案淳熙三山志四十二卷宋梁克家撰克家字叔子泉州晉江人紹興三十年廷試第一授平江簽判召為祕書省正字乾道中纍官右丞相封儀國公卒諡文靖事迹具宋史本傳史稱其為文渾厚明白自成一家辭命尤溫雅多行於世今所作已罕流傳惟此書尚有寫本凡分九門一曰地理二曰公廨三曰版籍四曰財賦五曰兵防六曰秩官七曰人物八曰寺觀九曰土俗朱彝尊曝書亭集有是書跋議其附山川於寺觀未免失倫今觀其人物惟收科第土俗特出謡讖亦皆於義未安然其志主於紀録掌故而不在誇耀鄉賢侈陳名勝固亦核實之道自成志乘之一體未可以常例繩也其所紀十國之事多有史籍所遺者亦足資考證視後來何喬逺閩書之類門目猥雜徒溷耳目者其相去逺矣乾隆四十五年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀淳熙三山志原序豫領郡暇日訪無諸以來遺迹故俗聞晉太康既置郡之一百一十三年太守陶夔始有撰記又四百五十六年至唐郡人林諝復增為之皆散逸無存者獨最後一百九十二年至本朝慶厯三年郡人林世程所作傳於世自言視前志頗究悉然不過地里人物土俗物産之大概裒次亦復缺略迄今又一百三十九年興廢增改率非舊制故闕不書者十九夫追惟往昔之事不可復記竊常以為恨至耳目所接謂未遽泯沒則又不急於紀録嵗月因循忽莫省意使來者復恨之斯亦守土者之責也乃約諸里居與仕於此者相與纂集討尋斷簡援據公牘採諸長老所傳得諸閭里所記上窮千載建創之始中閲纍朝因革之由而益之以今日之所聞見厥類惟九靡不論載豈惟使四方知是邦於是為盛抑嚮古者有考焉書成為四十卷名曰三山志淳熙九年五月八日丁丑清源梁克家序
