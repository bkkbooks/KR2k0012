body:
  text: 淳熙三山志卷九宋梁克家撰公廨類三諸縣官㕔國初諸縣惟有令尉間置主簿後始置丞縣視民最親近去郡逺者至六七舍民望得賢縣官吏束手請命即百里䝉福臨蒞聽决可不先治其所哉自縣立官設㕔事室宇隨備歲久更葺或易地遷創往不可記巳矣見於文籍不可略也閩縣㕔嘉祐七年重建後陳知縣鑿池開軒名曰魚樂有曺偉翁谷陳漸留題長篇熙寧四年知縣吕百能始立題名記仍創主簿廨縣東隅崇寧間始置丞即縣東南故駐泊杭越蘇營地為視事所時崇寧四年也紹興壬申縣丞林亮功始立題名記尉舊治城東今漏澤園地紹聖元年既造浮橋乃移置南臺故城外巡檢㕔蓋今所也宣和甲辰尉丘立之重建候官自唐貞元徙治郡城天聖初大創㕔宇令據西南主簿居其東崇寧中又分取主簿之東以為丞治所縣所梁題天聖元年正月二十八日建主簿及丞㕔梁並是年閏九月二十八日建尉㕔舊出怡山門西建寇焚燼旋為教場至今寓龍山寺今豐樂門外懷安以石岊為縣自咸平始天禧改元才二十一年棟宇傾頽令與簿尉協力畢新之更建勑書樓其南吳延年為記三年新作大門設漏鼓警昏旦陳愷為記政和二年吳與為令易置犴獄於縣西舊在縣東以異天下郡邑之式乃移於西增創宴息之地為十六所舊止熙春堂及東亝而巳至是堂曰日休曰難老曰秋興㕔曰海棠亭曰邃芳曰鍾樂曰正巳閣曰歸雲曰碧蘆軒曰洞隱曰竹軒樓曰清輝齊曰西齊曰清虛禁絶陶竈通道南浦作新亭仙蹟山之巔並見教讀張讀記舊縣門內左簿右尉熙寧中尉方叔完遷廨於邑之東簿始居右崇寧中置丞治於其左建寇之難威爇無遺其明年令黃卓簿唐允創復其舊紹興十七年尉張䕫乃能新之惟丞至今寓靈光寺連江邑廨重建於治平四年其西主簿㕔熙寧辛亥再創崇寧三年增丞職輟居之而更置簿治於縣西南今丞㕔熙寧四年十月建時未有丞知是簿舊㕔也今簿㕔乃崇寧三年三月建尉㕔在縣東南如故改造之日元祐六年八月也長溪四履曠逺縣治廣四十步袤一百一十步元豐改號所建循舊址也縣故有丞其廨大門內之右慶厯六年所重創雖元祐暫省至崇寧復舊簿在東門之內尉在東門之外簿治久廢寓資壽院西廡尉治則慶厯三年再葺也元祐增置一尉曰西尉自始即以西門外西禪院為廨建炎二年六月建寇葉儂攻福州寧德羅源縣皆遭焚蕩時潘中為長溪宰提兵䇿應道遇賊戰死縣治賴以全䝉恩贈五品得朝請大夫與二子恩澤長樂名縣在郡名之先天寶始以州為長樂郡自上元移縣今所始建㕔事於西北隅為燕室皇祐中令吳仲舉創惜隂軒其西熙寧五年令蕭竑即燕室東南作堂曰求誨竑自為記曰古之君子莫不克巳以求天下之善言納之以寬思之以靜擇之以正然後行之以果焉雖其所行有小大所造有逺近而未嘗用明以忽人之是作氣以拒人之忠也孟子曰子路人告之以有過則喜孔門之能是計非一人而孟子獨稱子路然者愛其剛勇過人而自克以從善矣修身且然况治人乎夫治人者心雖無愧而事有未察行雖無失而人或見欺不能師古訓以廣其智資諸人以禆其不逮則毫釐之差有莫大之謬又况自賢以求勝人者乎以豫之愚於修身未能有得而又辱一邑之寄恐懼修省安敢怠遑凡退息是堂庶幾閲圖籍以探聖賢之意接寮友賓客之論以益見聞至於匹夫匹婦辨訟之際其言或中於理而可申與夫悖於理而可戒以退息之靜皆得以謹思而審求之以為愚者之誨元豐中權令施聞於其北作望雲軒元祐二年令袁正規又於㕔堂東西創憩息之所㕔之東盡心軒西絃歌堂求誨堂之東仰止軒西樂古堂西北月臺簿始置自曽孝傑始初建㕔事縣西南隅東為亭曰清心西為閣曰待月時元豐七年也尉舊治縣市今文行坊尉㕔故基也旁有髙隍廟乃昔尉髙氏嘗事神曰髙將軍下車日於廨宇之側立廟今猶存後遷縣東南隅前有吟石大中祥符中尉陳伯孫所立有閒亭熙寧中尉陳師韓所立有攬翠軒又元祐三年立並見元祐縣志元祐初省主簿尉復徙其廨後再置遂即東南為主簿㕔今主簿㕔縣東南尉㕔西南福清雖縣號數易㕔治不改熙寧三年崔宋臣為令始大新之後遷主簿廨於縣門內之東舊在縣右鷲峯路口明年置丞又明年令胡景道為創㕔中門內之右七年重建尉㕔中門外之左古田自唐歸化於環峯復障間得平陸版垣墉三百步立官廨太平興國徙水口端拱復舊景德初李堪為宰在縣墻西甃義井一宣和二年創便坐㕔事之旁曰靜軒曰舫齊曰陽春亭曰飛舄堂乾道初令楊汝南復創齊其東曰不欺自為記云客曰三不欺者皆古之賢令尹公欲兼而有之乎曰豫所謂者不欺於心求在我而已縣初有令尉簿簿廨縣之側淳化中廢詔以尉兼焉後復置尉㕔本縣東南紹興十年移行衙右元豐二年增置西尉建治教場間紹興八年郭昭仲闢所舍之西為堂曰隱史乾道六年遷教場西門外重架㕔事居之崇寧置丞於縣西為廨永福舊令尉二貟止尉㕔縣鼓門內之西元豐二年始置簿㕔即縣東隅四十步創崇寧置丞又拓鼓門內之東為㕔建炎三年火沿縣以東丞簿㕔皆災陳炎為宰趣調二役僅措立縣宇紹興改元王禹同繼之乃建外鼓門樓至二十一年令葉秉彛補葺蓋造乃備是時丞簿寓重光寺二十三年矣吳庭表為丞秉彛仍與創復舊治獨簿至今猶寄重光西廡若尉治則無所改易崇寧三年尉江信攝縣事所重建也閩清以稅場為縣近起乾化草創陋狹大中祥符初史溫為令上事之月守嚴辟疆適至一見而知之於是去宿弊興滯利不一歲稱治縣記云征口之耗登戶輸之損益金榖之逋負辭牒之稽留胥吏之侵漁兼并之驕僣冦壤之聚集巫覡之淫祀緇流之僞濫契劵之欺詐封洫之交爭稱責之倍息俾自陳而改張責伍保而督察又列為簿領制以關防彊則抑之弱則舉之懲之頑惡誨之孝悌戒之游惰勸之播種養生送死莭用知方未踰朞月一境咸格既為之建學立社設市井置射場表分閭巷界定村落陸涂則布石水渡則造舟置越客舟以備迎送又為雙舟名曰仙槎亭亭之行有二小舟從焉民大說之矣大姓者四十四人乃鳩財以願葺公宇為請首新令廨次置勑書樓有臺曰勵俗齊曰無惑閣曰退食樓曰將歸有亭二內曰北堂外曰星徽至於官僚釐務之所靡不修蓋其外則鼓門之右有南昌閣公圃之內有波心亭廓開公庭徹視通路民有訟訴罔有不達時民有訴告令相追究未嘗遣一吏攝一民面自窮理至則遣之以是囹圄多空招擕疲瘵給以曠土寬以租賦樹以室廬因其登榖誨其儲蓄不急之用無或為者秩滿去官所有惟琴書所得惟民謡皆祥符三年溫自為記時主簿已廢壞宇猶在後復建治平改元尉廨以州司户沈安國攝邑乃修復之熙寧元年五月霖雨薦作山谷百水爭出前去數百步大江復漲溢民廬漂沒官舍亦遂蕩然有僧逺思等餘八十人以住院遺積請任其役閲四月為屋五十七楹規模始大於前故獄舍在東南隅逺不可察視遷創於內時知縣徐絳也絳自為記淳熙四年十二月災其明年正月令朱棨視事以二月調役閏六月告成令簿尉廨以次悉復寧德縣本鹽場令簿尉丞舊四㕔建炎二年建冦皆焚之紹興改元令趙詵之更創丞縣西尉又在其西簿二十八年始移治故驛舍地今館驛即舊主簿㕔今縣南羅源自慶厯八年移廨宇縣北時令陳稱也稱延平人開渠以膏民田人號永利渠作亭以來商征且燕息於是人號陳公亭新孔廟以勸民學數年學優而仕知名者衆人曰陳公之門人既去而人思之元豐中守溫陵士人父老越境迎之數十人爭奏酒肴陳詩云壺漿壓境來迎拜猶記溪山舊主人元祐中聞其訃邑人相與聚哭者三日元符改元為立祠堂余太宰深時為太學正為記舊令尉二㕔尉兼簿亦坐建冦建炎三年令吳賢始建縣宇尉猶草創其㕔事淳熙六年尉施炎乃克為之簿自紹興四年初置寓水陸寺淳熙二年災其明年王葵為簿始即寺建㕔事此其諸縣興造廢革之大概也若縣故各有回車院縣官率先後秩滿移此以俟代者懷安天禧初改創古田祥符初以廢簿㕔為之長樂元祐初簿廢尉遷入其廨以所居立斯見於碑志者他可知矣今皆無之諸縣社壇社稷宰邑有之從古然也風伯雨師附社稷壇左右雷師之祭寓雨師壇自唐州縣同制五代干戈蹂踐無禁潔夷繕飾取具臨時皇朝景德祥符以來申戒嚴飭諸縣以次修舉至政和頒降圖式或乃改創焉閩縣故壇南臺尉㕔之西紹興二年始移於西南今法海寺北候官烏石山下於縣亦為西南政和元年始建齊㕔懷安在縣東北舊矣政和二年吳與為宰援據禮典正位西南見教授張讀記長樂福清皆去縣西南一里如故古田壇今縣西南景德二年李堪始立壇二於縣東記云廨垣東趾曰縣學學左顧曰縣社正㕔一祭器房四自初獻至終獻與陪位者齊宿有所祀事畢引鄉老秀民效鄉飲酒歌豐年時人稱之閩清大中祥符二年史溫亦始置社稷壇縣西南隅壇左右風伯雨師壇各一其南植雙表北為亭以待三獻堪溫皆自為文記之寧德自有縣以來建於白鶴巖西政和二年徙西南置惟連江長溪永福各分置壇近縣三所如郡之制連江社稷壇縣西南風伯壇縣西雷雨師壇縣東北長溪社稷壇縣西南惠海山下風伯壇縣西明宗山下雷雨師壇縣東北龍泉山下永福方位如二縣皆政和後作也諸縣廟唐制縣學立孔子廟釋奠以令丞主簿若尉為三獻本州唐以前諸邑故行之矣巢冦之後毁廢殆盡皇朝始漸建廟景德中詔定縣令丞主簿三獻之禮是時令之賢有才者間請於郡自建學然作者尚寡慶厯四年詔諸郡置學二百人以上許更置縣學若民力未給許姑就孔子廟或繫官屋宇於是建學者始衆然教養規約人自為之職事生員大率略具耳崇寧初行舍法乃詔學置學長一人學諭一人學長掌一學之事學諭以經術訓導諸生委州知通教授選老成有行藝為閭里所推服者各給俸祿縣以不繫省雜收錢充諸生在學一年從學長諭考選以報令佐審驗升州學仍置小學擇可為教諭者十歲以上願入學者聽之惟倚郭縣皆不置時學各增建齊宇逮舍法罷重以兵火圯壞者相繼後率更創猶有舊制焉閩候官蓋倚郭縣閩縣以萬歲寺補山下候官以縣治之東為宣聖廟慶厯後皆嘗修完閩縣慶厯中始建治平甲辰重修候官縣先聖神座自熙寧九年正月二十八日縣令方叔完塑像并建廟後崇寧三年知縣莊誼重修舍法行二縣學並寓府學西北後罷今為府學房廊今春秋釋奠即廟行事而巳懷安故有亭北門道南為祭所大中祥符四年主簿陸東乃於縣東隅為廟自為記嘉祐二年知縣樊紀復移於縣西擇地之勝崇建學宫講堂敞嚴齊室閟靜中尊夫子殿配享以十哲圖七十二弟子傳經諸儒於壁塑孟荀揚韓王五賢於堂闢小學祭器庖廪咸具周先生希孟為之記舍法行增至八十一區建炎中建寇焚毁紹興初改創縣東齊二資深日新與小學為三連江嘉祐三年修廟為學政和初廣之凡四十三區有善養堂齊三篤信好信武士及小學軍興久廢紹興七年林覺為縣之三月改作於縣東南背長汀靣雲居邑人林日華率陳元禮林芘林錞等緡錢萬有竒助之重門修廊巍殿中峙有翻經閣駕說堂更為四齊富文能信移忠懷忠邑人李侍即彌遜為記淳熙八年以學與夫子東向非宜改為靣南用邑人鄭侍講鑑之言也陳惇宗率生徒為之長溪學縣東南慶厯中築菱湖地以建元祐二年移東門外以建善寺地為之五年仍舊大觀二年知縣葉安節重創為屋八十八間大風拔毁明年復葺凡四十六區齊四近智養智崇智好智外小學長樂學最古起唐乾符四年建於縣東南皇朝宰董淵吳仲舉蕭竑施聞踵繕治莫能就元祐戊辰袁正規既視事亟議修建邑人林通者作縣圖經命鬻之得錢二十萬縣富民皆相與出力乃仍舊殿新之背殿有堂翼以兩序為齊十二歲種田十二斛更蓋房廊後圃餘十間以佐給費時養士幾一百人見林通圖經及林協學記崇寧初增至五十三區後舍法罷多省廢今齊二依德進德與小學為三福清學縣東元豐元年廣廟地作崇寧初增至八十四區有稽古堂邑宰方叔完市錢塘書籍以儲齊三親仁依仁武士及小學古田舊學廨垣東趾其地也景德二年李堪為宰毁淫祠三百一十五撤佛宫四十九取其材植為縣廟學位先聖列十哲繪七十二子二十一賢及孔伋以下大儒至唐韓愈氏九十六人有亭一曰函丈臺一曰舞雩又閣一曰草𤣥校典一人主緗牘禮生二人主奠謁躡屩贏糧來就學者蓋多國初時視諸邑獨盛堪自為記嘉祐二年陳昌期領邑事復修之昌期自為記崇寧初增至九十一區有九經閣㑹道堂左右序為齊八精義達義遵義思義抱義由義摩義喻義外小學紹興元年建寇盡焚之寓講所於佛屋三年令周彥耀始作創於邑西郊七年諸生林好古陳鬲卓冠與其邑人裒金錢百餘萬請還學景德舊址於令二十四年湯選許之歲終告成像塑繪事講堂齊室祭器庖廪皆備李廣又為記講堂之側有應沙軒林好吉為記永福學在縣東崇寧元年修凡五十二區有養士堂齊三敦行修行武士及小學建炎三年火紹興間復修建有四齊傳文敏行履信懷忠閩清學縣東南令史溫上事之三日謁廟無所即議建禮殿於縣東南廢廪地召鄉之秀民謀之既建塑先聖十哲像其壁畫六十子及大儒乃營樓閣齊室庖廪以來諸生𨽻業講堂一談經樓三閣五續創學舍三十區外又創善養堂祭器庫嚴奉軒大中祥符二年溫自為記紹聖元年祝聖為宰陳公暘初擢制科第邑人同請於令以小學作堂以祀其兄館閣校勘兼太常博士至崇寧二年增為四十一區有養士堂又為齊三教中教和有造淳熙五年火令趙鞏之復創為齊十二教中教和進道經德有造能信移忠敏行㑹文興能升俊養正寧德學縣南嘉祐三年以省地建崇寧二年增為四十二區又建創齊四東富文移忠西敏行能信復於學內省地建小學羅源廟學縣西南慶厯中令陳稱創延鄭先生穆為師以勸民元祐六年令袁符移於縣東為今所崇寧初增至九十九區齊五篤禮彰禮由禮善禮好禮及小學建炎間遭爇建兵後重創諸縣倉庫闕二曰省倉三曰常平倉闕於此其旁置場聽民闕既多隨産科賣無産者謂之闕從多寡於此取給閩侯官懷闕此六縣者由南臺倉搬請以闕連江闕長樂福清此六縣者各地産鹽闕餘運納南臺倉雖海倉逐邑闕納至縣給賣則又各置倉場縣東西連江在縣西南羅源在縣西之側建炎二年知縣吳確重創寧德在縣門內之西亦兵火後重創長溪福清皆縣門內之西長樂縣內天聖六年四縣罷煎漕課猶命鬻縣鹽惟長樂嶺口福清海口二海倉如故嶺口倉去縣東二里舊在臨水渡側熙寧中運使賈青移此海口倉去縣東二十五里嶺口有監倉一貟廨舍在縣尉㕔之西海口倉以監鎮兼管政和中鹽本不給官吏趣辦漕額謂民産浮鹽可米償因仍至今倉場皆在也省倉者咸平四年始置初諸邑輸米悉趨都倉至是大理寺丞馬易從奏諸郡外縣合銷糧草令順便受納於是勑各置倉閩候官懷安以倚郭不置餘九縣皆置連江永福皆縣內之西福清縣門外之右長樂去縣西半里長溪縣之東南羅源寧德皆在縣東建冦焚毁其明年羅源再創寧德至紹興二十八年乃更造古田閩清皆在縣側古田兵火後再創閩清淳熙四年災明年更造其後水口雞菜兩鎮置寨又分兩倉凡十一所隆興二年以連江民赴都倉輸米便自後科撥歲止十倉常平倉者皇祐元年始置初詔州置常平翰林侍讀學士宋祁以為逺縣鄉保力農之家無繇霑被是歲州始以常平都數量戶口多寡分九縣置倉連江縣西廡福清縣門內之左永福在縣東隅去縣四里崇寧三年建長樂縣西長溪縣東寧德縣門內之西紹興元年創六厫乾道七年增創一厫羅源古田閩清與省倉同康定二年復義倉法元祐中許於常平倉别項樁管隆興元年州始撥還逐縣義倉合管數目明年連江既併赴州倉常平獨八縣受納若縣錢庫有省庫國初州縣錢物悉以係省始置有常平庫與倉同置於皇祐元年有免役庫熙寧五年起催免役錢置閩候官省庫各縣㕔西常平免役移丞㕔置餘十縣並縣門內福清縣㕔西街上長樂縣㕔側舊建連江縣東乾道三年重建羅源常平庫在縣㕔西省役庫在縣㕔東建炎三年重建寧德省役庫在縣西紹興元年建淳熙六年併歸省庫以免役庫為架閣庫常平庫舊在縣西紹興二十八年移在縣東古田懷安皆縣㕔西皆建炎兵火後建其後有經制總制扺當米價錢各併就庫眼惟長溪運司免役常平抵當庫縣西經總制米價庫縣東元豐元年重建永福省役常平庫縣東經總制抵當雜交庫縣西建炎三年重建錢庫外各置架閣庫諸縣鎮務祖宗時州城都務臨河務號裏外稅務二務之外惟九縣十務而巳閩清長樂羅源寧德長溪永福連江福清與古田裏外二務是也是時閩安鎮特遣赴臨河務輸稅爾非别立征課也黃崎鎮雖自閩時為稅場實屬長溪縣務海口鎮乃福清主簿兼監西自漁溪地名漁溪徑有徑港東及海口皆入縣額水口鎮即古田外務也自太平興國至明道景祐間州較虧剩只十二務見於文籍如此景祐二年水口鎮始以兼轄馬鋪巡監四年閩安鎮始輪裏外務官兼監治平二年海口鎮始以鍾門巡檢兼監其後或復用縣官或别差官然稅額如故熙寧初乃增置懷安縣務十縣務舊並號茶鹽南稅務後罷科賣茶只號鹽商稅務今雖民産錢鹽不支給其務名及務官帶䘖如故政和八年遂定十縣務及四鎮正額閩安鎮閩縣東南八十里除州輪裏外務官監外黃﨑鎮長溪縣西一百五十里崇寧四年就建市易務以鎮官兼有碑記水口鎮古田縣南八十里海口鎮福清縣東二十五里皆自朝廷差官主之懷安福清以縣官兼古田長溪連江羅源寧德閩清永福長樂嘗專置監務尋罷惟古田閩清連江羅源四縣今存紹興二十六年減併閩安鎮臨河務明年復閩安鎮獨罷臨河務乾道元年州置稅亭河口津淳熙五年併懷安永福寧德福清縣務皆罷明年復四縣務州仍於美化門收河頭稅錢若候官有候官鎮舊縣治懷安有雞菜鎮今五縣寨長溪有峯火鎮今峯火寨莆門鎮今抵溫州界連江有北交鎮三砂鎮皆今縣東永福有永泰鎮今縣郭下羅源有飛泉鎮今飛泉渡舊皆不征商惟長溪白沙務紹興二年置十年以稅額令黃﨑管認罷寧德關𨽻鎮號長境渡口縣故有欄腳巡稅永福辜嶺務元豐三年置登冲務政和三年析辜領稅額置舊在歸義里後移洑口埕渡縣故許百姓買朴紹興二十六年並罷諸縣祠廟縣祠廟率里社自建立歲月深逺一邑或至數百所不可勝載也姑取有事跡姓氏封爵廟額者記之閩縣金﨑廟去縣七十里晉康帝時漁人釣於此得金鎖二尺因詔立廟見舊記詳見海道候官福頂廟縣西南號古靈其山之陽有神居焉唐天復三年始降於義興社後遷於吳嶼巳乃遷此每歲孟春土人競祭以祈福於是以福頂名山政和八年賜額昭惠紹興十九年封普濟侯二十九年加威顯乾道三年又加靈應連江大小亭廟縣東江口晉時有黃助兄弟二人漢黃香之孫也舟回自海南至是遇風兄弟連臂浮於江岸夜則畫沙成字表其履歷復見夢於鄉人曰為我南山作墳北山立廟吾能辟災降福如其言里無虎豹之患建鹽亭獲其利人號其兄廟為大亭弟廟為小亭永隆元年大亭號浮濟將軍小亭號昭逺將軍爐峯廟縣北號東鄉唐景福中王氏入閩淮民隨之始至有桴浮香爐及書硯濶尺餘今存漂於岸側其人異之曰此吾州杜三即故物也因創為祠通文三年號髙義侯永隆元年改稽聖侯保大中升為靈瑞王鄭簽判南鄉為記又靈津侯廟相傳始有物浮波間達境上睨而視之石也衆異之遂立廟今有唐勑誥漫滅不可讀長溪韓將軍廟縣北莆門鎮前漢橫海將軍韓說也見舊記又云陳五官廟馬即廟縣東北晉元帝時司馬浮入閩後為江夏太守溺死鄉人思之為立廟長樂植柱廟縣南唐開元中有神降於察山之隂乘大木泝湍流而上漁者林生負以趨下還不旋踵復泝而至如是者三心異之取而置石室下逺近望之若植柱遂以名廟嘗有洪氏女浣紗其旁見若銀巵浮水中褰裳探之水漸深為蛟所吞其家訴於神不終日雷雨暴作刳蛟於水濱得女尸蛟腹中洪氏感涕虛其居刻所取木為像塑其女配焉景祐中縣尉王侯以禱雨獲應倡里人更立廟宇紹興三年賜額顯應慶厯中潘奎為記通津廟縣東南永隆四年封通津侯有勑牒云惟神禀氣幽𤣥效祥甌冶享惟馨之廟食幾換星霜回不測之隂功動諧舒慘既彰通感是切依慿凡因舟船之去歸皆契威靈之保護今得申舉爰示封崇宜欽優異之恩用著聰明之德事須承制封通津侯福清昭靈廟縣南六十里號余坑其山之陽有神降焉古老相傳昔張仙師乘鐵舟抵浮山海旁古舟痕猶存舍舟而陸憩於磐石石有住舟步履跡陟而北留巨跡鹿蹤於蒼石之上記云步石而成獨跡可尺有二許今在廟中許難詩玉鹿帶符來月苑鐵船擁斾下星河天禧元年邑人髙贇率衆為立廟皇祐中陳良為記熙寧十年封保禧真人言其窒溪流易平岡捍濤致雨護餉弭兵有功在民無德不報紹興八年賜額昭靈三十年加封妙應乾道三年又加普祐有釀酒風歲六月社民集祠其下時熇熱酒善酸敗輒旬日北風以持之號張公釀酒風浙商常候以為便盧焦石髙數丈海濤潄激為龕岩玲瓏之狀或採為池亭玩必致譴怪昭應廟縣南四十五里閩王牙將盧雄也嘗戰沒於漁溪因立廟號通感王紹興二十六年賜今額永福洑口廟縣東南二里姓陳氏居烏石山兄弟九人皆著竒節沒而為神初置永泰之年溪潦暴漲有若枯木泝而上者數四乃洑口祠所刻像也邑人柯氏取之即今廟之址纍石為室奉焉民禱祠或樵牧過者往往石室中獲銅錢開寶中號洑口通靈護境廟嘉祐七年黃彝為記紹興元年賜額威顯九年封靈貺侯古田寧境廟縣西一里唐開元中大姓劉强率其部歸於州始立縣卒之後邑人思之為立廟號寧境景德中李堪為宰毁淫祠數百獨不廢侯祠未幾民請遷之乃更立今所嘉祐中修陳琮張彥博為記崇寧二年賜額惠應政和二年封順寧侯後加正應靈淵廟縣北五里舊號羊角龍王廟紹興十四年賜額水口孚應廟縣南八十里舊號川陸廟紹興二十七年封英濟侯閩清梅川廟縣西舊有之相傳姓陳氏乾德二年鮑修讓以水不傷廟封為侯天聖四年淫雨為沴水橫流民居髙陵皆墊溺廟在其下獨不浸潤五年權縣邵賀為記紹興元年賜額德威三十年封昭顯侯南山德懷廟縣南姓陳氏同年立紹興三十年封英惠靈顯侯龍王廟縣三十五里宣和三年立政和六年賜額顯利鬼神之為德不可掩也而每為巫嫗所纍李堪古田縣記云風俗秕瘁特甚怪誕戾常箕裘於神祟禍福出口巢人怖疑以求所欲浸蔓也乃灰淫祠三百一十五所化其壤成嘉榖二百一十三畒慶厯中蔡公襄為守尤深惡疾家依巫索祟之弊蓋非獨古田然也二公憤惋至矣然不擇貴賤愚者常易惑不問富貧弱者常易欺故風俗至今未能盡革每一鄉率巫嫗十數家姦民與為道地遇有病者相為表裏既共取其貨資又使其不得訪醫問藥以死如是者可痛也夫愚弱者必賴聰明有氣力者救助教誘之仁者不可不知淳熙三山志卷九
