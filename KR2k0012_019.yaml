body:
  text: 淳熙三山志巻十九宋梁克家撰兵防類二諸寨土軍福興化泉漳於一道為控帶山海之國往往依險為守本州四境東南薄海聮絡上下數百里囊冦橐姦少失巡察則相延為盜西北負山窮崖絶嶺一夫執梃莫有誰何則亦將無所不為是以風帆浪舶往來衝集要害之處與夫去城邑為逺地者莫不置寨巡檢牙鉤股附氣勢相犄角一旦有急合以從事葢一郡之藩籬也異時直北四縣競送鹽課販鬻西走淵藪萃焉故警備尤密天聖九年二移福建巡鋪使臣於白沙渡巡捉茶鹽有兵士五十人景祐二年廢寳元二年連江北交頭置巡檢一員差本州屯駐兵級一百人守把慶厯四年廢舊又有北嶺巡鹽寨等十以處巡檢如闗隷寨之類是也差兵級一百二十六人分布巡防景祐三年廢其後運額専責三倉豪黠竊發復多見於東南其置寨之近逺宿兵之多少一隨其時與其事之緩急而已今寨存者十有一因革廢置始末具在觀者亦足以見其故云甘蔗洲巡檢今候官四州同巡檢之名舊矣咸平以後文移多見之慶厯四年二月勅逐州留巡檢一員専管本州界内巡警於要害處安置廨宇時本路同巡檢五員都巡檢二員而漳泉福興同巡檢刁德忠廨宇在甘蔗洲葢其一也嘉祐四年知福州蔡宻學襄奏福泉漳興化各是邊海與外界水路通接其巡檢下兵士多不習舟船緩急不足使今今除已行下逐處修葺刀魚船各取見管數目排籍外其兵級常切教習舟船諳㑹水勢以偹差使其兵額舊管一百八十人熙寧五年更定一百人州差步軍充填元豐三年七月閭邱提刑孝直奏諸巡檢下兵級皆雜攅諸指揮廂禁軍或屯駐客軍其間多西北人與本地分不相諳熟差到年嵗稍能辨認道路山川人物又迫移替至於海道亦不慣習使之相敵終無必勝之理請於逐處令招置土兵以一半招收新人一半許廂禁軍舊人投換庶幾新舊相兼習熟使唤仍就整於廂禁軍内對行除豁時本路八州軍舊管剏添巡檢二十八員兵級三千五百人除四處都巡檢八百人地分濶逺依舊輪差廂禁軍外二十四處二千七百人及續添巡檢四員三百五十人共三千五十人一槩招募土兵以額定人數一半許廂禁軍中舊人投換於本路廂禁軍内豁除消減威果八百人教閱廣節一千二百人併創添招置未到廣節一千五十人除七州軍消減外本州惟廣節減一百五十人於是巡檢下兵級並易以土兵而同巡檢仍置招一百人立都頭副都頭十将将虞候承局各一名押官二人長行九十三人七年三月以五縣巡檢疆界濶逺私鹽透漏用提舉鹽事司奏移廨宇於懐安雞菜鎮仍別差使臣一員充巡捉私鹽依舊駐劄甘蔗洲於同巡檢下一百人内撥與巡捕土兵二十人及差禁軍三十人元祐二年或言招置土兵嵗月既久間多親戚隣里故相遮庇乃以其半復差禁軍俾半年一替政和二年臣寮復言禁軍所至往往一心惟望替期又不諳習彼處道里宜依元豐法一槩招土兵以代之仍於禁軍指揮内就整豁除以替回兵充補時本路巡檢除四處都巡檢及建州崇安専提舉擺鋪合差禁軍其餘舊置及添置巡檢巡鹽寨共三十六處共三千五百十五人内一千五百五十三人係土兵外其一千九百六十二人係差禁軍今並招土兵替禁軍回營仍於本路禁軍二十二指揮計九千三百五十人内就整豁除一千九百六十二人却以替歸禁軍充補此額宣和二年十二月頒下福建格本寨兵額以一百人五年勅土兵許依廂禁軍例於本寨架造營房六年勅巡檢遇小盗與縣尉㑹合捉殺乾道七年三月本路沿海州軍諸寨并巡檢下土兵例行増招人數本州十一寨一千五百五十四人増招四百四十六人為二千人而甘蔗洲除見管五十七人外更招十五人今數同海口巡檢今福清海口去鍾門不逺巡檢廨宇移置不常寳元以前治鍾門從本州抽差屯駐本城軍員兵級一百人皇祐至和嘉祐之間又移海口尋復舊嘉祐四年蔡密學襄奏沿海州軍兵士不習舟船無以備海道福州鍾門巡檢一員掌海上封樁舶船其令出海巡警治平元年議者復謂蕃客多由海外徑入兩浙海隩四畔皆魚業小民不宜使諸卒重擾之於是復歸海口管軍員兵級四十八人仍兼本鎮烟火公事兼沿海巡檢熙寧二年提刑司有請本鎮去鍾門往復二百餘里別無陸路賊盗緩急不能畫時捕捉宜依舊移鍾門時寨兵額一百五人五年見管七十四人尋以七十人為額元豐二年以閭邱提刑孝直之請徙置巡檢於控扼去處遂移止馬門三年九月添招土兵置副都頭十將將虞候承局押官各一名長行六十五人五年巡檢康詵脅所部冦海道既平移蘇澳宣和二年頒下福建格兵數不改紹興三十年揀七分水手六十三人乾道七年又増招土兵以八十四人為額水口巡檢大中祥符五年四月本路王運使贄奏建劍邵武盤鹽南臺倉程路隔逺惟水口嵩溪驛得福州南劍之中創鹽厫為便然舊無寨鋪若監當只委縣官恐無以防守巡察宜差强榦使臣一員専監仍於本州量差屯駐兵級三十人員寮一名巡防一年一替從之景祐二年轉運司奏復鹽倉於南臺以水口路當要衝最為透漏私販地分依舊存留兵級三十人守把仍移福劍州巡馬遞鋪史允元廨宇於水口安泊都大管當來去部轄巡捕元豐元年八月蹇運使周輔措置鹽法利害復水口鹽倉仍舊差巡鹽使臣抽撥兵級七十人與前三十人共一百人為額三年巡檢下例招土兵置都頭副都頭十將將虞候承局各一名押官二名長行九十三人紹聖三年以二十人撥隷五縣巡檢止以八十人為額紹興三十年㨂七分水手七十人乾道七年増招人數見管九十四人再招一十五人今一百十三人外倉峽巡檢係福劍州巡鹽寨有步軍八十額係南劍州差辜嶺巡檢元豐二年十月閭邱提刑孝直奏沿海州軍控扼地分乞添置巡檢防遏盗賊時永泰縣辜嶺都巡檢一員遂移於閩縣地名方山渡北岸置以二百人為額給與舟船往來巡警兩州軍地分却移南臺巡檢一員於辜嶺以七十人為額管認福州永泰縣興化軍興化縣地分巡警宣和二年頒下福建路格本寨七十人今九十二人峯火巡檢今長溪元豐二年詔移長溪等六縣巡檢一員於長溪縣海名峯火澳管長溪寧德海道兼就近陸路賊盗兼本澳公事陸路七十五里至縣先是咸平二年六月指揮長溪縣四嚮最逺去州城或七八百里山川險隘盗賊多竄入温處等州而兩浙州軍盗賊却入長溪縣界雖有都同巡檢不能依時㑹合乃用建州浦城例選差使臣一人充兵馬監押兼知長溪縣事抽兵士七十人給與衣甲在縣把守是嵗九月兵馬監押兼知縣事吕懐謀奏准宣抽撥兵士七十人赴縣今只差到三十八人有㫖令本州疾速發遣不得少着一名至慶厯後始差文臣以知縣兼兵馬監押㑹提刑司奏長溪羅源寧徳連江長樂福清六縣皆邊海盗賊乘船出沒乃添置沿海六縣巡檢一員撥兵級三百人於長溪縣置廨宇仍造刀魚船十隻往來海上收捕是嵗嘉祐八年也熙寧五年更定以一百人為額至是閭邱提刑孝直復奏沿海州軍控扼地分宜添置巡檢及移置廨宇於卓望去處故亦遷焉時兵額復定七十人宣和二年福建増格數同三年閏九月巡檢下例増招土兵乃復熙寧一百人之數元祐七年五月州以寧德寳瑞寳豐場新發集聚千餘家距縣隔逺乃以峯火澳巡檢兼長溪寧德兩縣巡捉私煎販鹽兼管當兩縣盗賊公事紹興三十年八月取七分土兵識水勢者毎月一次同籍募到水手海船出近海港口教閲本寨五十六人乾道七年州増招土兵二千人時見管六十二人遂増招一十五人為七十七人南灣巡檢今羅源元豐二年閭邱提刑孝直奏添置巡檢内一員連江縣海名西洋管連江羅源海道以兵士七十人為額西洋在巨海中四顧驚濤莫知畔岸自亷山駕舟兩潮始達風或逆旬月莫至七年李提刑茂直行部知非便奏移羅源縣海名南灣尋置廨於亷溪徐師文為記紹興九年白劄子南灣巡檢却離十里置廨甚非朝廷設官巡警之意其行下依祖宗舊法仍歸南灣三十年揀七分水手五十六人乾道七年例増招土兵見管九十人再招一十五人今一百八人南匿巡檢今福清元豐二年十月閭邱提刑孝直奏添置巡檢一員初置連江官澳轉運鈐轄司相度以逼西洋閩安遂置南匿嶼以兵士七十人為額管福清縣海道宣和二年頒下福建路格土兵七十人紹興三十年㨂七分水手六十三人乾道七年例増招土兵元管九十三人再招一十五人今一百九人松林巡檢今福清元豐二年七月賈運使青奏添差使臣兩員内一員於海口鹽柵地名松林置管海口福清長樂三處専以巡鹽為名仍於本州廂軍禁軍内差人巡防以五十人為額紹聖五年五月州奏海口鎮居民餘二千户所管官物倉庫浩繁而於海口南匿兩寨各隔大海又二十餘里乃至本縣遇有盗賊不即捕逐唯松林寨相去三里可就巡防請於今巡檢髙士逹銜内添入兼福清縣就近陸路地分巡捕盗賊一十四字仍於本州差撥威果指揮兵士二十四人與舊管兵級共七十五人宣和二年頒下福建格遂以是為額紹興九年安撫司措置海道移寨於地名松下置三十年揀七分水手六十人乾道七年例増招土兵見管七十八人再招一十五人今九十九人兩縣巡檢今寧德元豐三年賈運使青奏乞添使臣兩員内一員於長溪縣邊海鹽柵置立管長溪寧德羅源連江四縣以専切巡捉私煎販鹽公事為名仍差兵士以五十人為額元祐七年寧德兩場銀寳新發聚落既多宜行分布巡防乃以前四縣巡鹽與免羅源連江兩縣巡警治寧德水際里令管長溪寧德兩縣盜賊宣和二年頒下福建格本寨土兵一百人紹興九年以寧德巡鹽寨移管下地名蛇﨑三十年揀取七分水手五十人乾道七年見管六十二人増招一十五人今六十人五縣巡檢今懐安州管界同巡檢一員舊止十二縣水陸巡捕元豐三年移置五處巡檢乃分認長溪寧德羅源連江長樂福清永㤗七縣四年六月以本路提刑之請復以沿江閩候官懐安閩清古田五縣隷焉同巡檢自此始分矣七年提舉鹽事司奏甘蔗洲大江津要下通産鹽之地上抵建劍邵武私販所由散入支路正須據要把截而同巡檢所管五縣疆界濶逺巡捕所不能及其懐安雞菜鎮乃小路凑㑹之處可移彼駐劄舊土軍一百人除二十人分撥甘蔗洲巡鹽外存留八十人紹聖三年増二十人用本路提刑之請也時以古田水口巡檢管一縣地分尚一百人而五縣濶逺乃八十人故増宣和二年十二月頒下福建兵數本寨一百人今一百一十人劉﨑巡檢今閩縣紹聖二年詔添置巡檢一員駐劄劉﨑巡捕長樂連江閩縣私鹽盗賊閩縣東南二百十里先是天聖七年本路轉運司奏閩縣界有閩安鎮枕居海門為舟船往來衝要之地宜用使臣一員監納商稅兼沿海縣分巡檢仍於本城及屯駐駐泊指揮内抽差軍級員寮六十人往彼巡防量給衣甲器械至是本州復請閩安鎮客旅興販廣浙往來經由之處監官毎月三往巡鹽商旅滯留課額虧失始於劉﨑添置巡檢仍以閩安鎮元管兵級六十人盡隷之其鎮官専一收稅却從本州輪差禁軍三十人往本鎮守把宣和二年頒下福建路土兵六十人紹興三十年揀取七分水手五十九人乾道七年三月増招土兵除見管七十九人外招三十一人為一百一十人今一百十六人淳熙三山志巻十九
