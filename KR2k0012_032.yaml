德方夢開張尚德王夢龍丘聞之王以寧陳君寶潘德逺黃秀實楊鼎陳子冲林開先王惠發張廷彥陳照王景曽游明復陳皆董珙陳霆陳與陳塏陳應弼黃士虎黃潮東鄭應大洪應辰林公慶林之泳陳師吕王同叔潘同叟上舍林均上舍黃維鋭陳西應劉元常蕭和潘涇循衢之孫津之弟鄭一鶚曽森陳子祥井之子林昌實林仲仔王㢸伯大之從姪曽士得宗子正奏時鎘公邁之曽孫崇濎善竦之孫汝珇之子掄夫必薪孟愈若璧若清崇雕若珤時侁之子必萐良份時㢋叔闕之五世孫交之之元孫公實之曽孫彥假之孫綰夫之子汝催若銛上舍必諿省元汝珩之孫崇祕之子必諤之弟必裮必薪之弟良佑良侍之兄良侍良佑之弟兩優釋褐方頤孫太學繆幼節武學武舉正奏陳億子狀元儀子之弟林仲穎方南阜南强之弟林起巖黃體仁特奏宗子取應必樘時淄時璆文舉特奏謝石孫陳子翀陳偕黃龔甫襲甫之弟冝任之父陳南叔潘起孫方輿葉熙孫林之子阮康老葉春南仲之曽姪孫觀之姪張天應林士元劉良賢郭士顯徐碩余日嚴陳東程燏孫黃應雷林霆陳子信黃有大周似曽鄧堯煥林夢康任偉伯林宜之黃應琯阮士軫林公頤陳迪陳起渭繆雷奮林藻陸洽王炳王震龍林開祖陳子繼許伯珍林大舉林大成陳天應寶祐元年癸丑姚勉榜文舉正奏吳起龍上舍第五人周應復甲科張錫留甲科濟之之子蘇泰孫甲科上舍鄭得助吳秀發鄭子酉林福翁黃景師夢攸之孫質之子陳立翁彚夫之子馮應及陳用和林孔賢葉木李特昭任豈潛陳剛翁陳秀璋張澤陳懋欽陳垕子上舍樵子之弟林壄秀之孫姚夢兆黃林圓塢東之潘文卿涇之姪林貢子黃明伯和之姪陳中正林公衡孫應髙陳贊吳洪郭時中林孔范王文龍王飛卿陳升周堯咨上舍陳琥震孫之子林友龍應龍之堂兄髙達之髙載上舍霆之子吳元龍陳應選陳琰唐祐之孫唐佐姪孫劉君遇半千之子陳彚夫立翁之父陳夢發毅之六世孫容之子天麟之兄王維新林坤載王霖龍銓魁黃嶽九齡之姪孫柳燮陳夢圓諤之姪髙子之弟炎子之兄姚君元林泳昌言之孫介之曽孫希逸之子宗子正奏與必寓時厯上舍叔近之五世孫交之之元孫公賔之曽孫尊夫之姪彥倪之姪孫必垺世珫之孫崇侯之子時絪與宿與宦之弟必瑫與帝武之子希㵵希子之堂弟與康與寰之堂叔與桁上舍師薛希灝之堂姪武舉正奏黃佑德上舍文若之三世孫林宋衛周中孚阮疇劉囦泉劉應沐劉忠嗣宗子取應必徉若瑰文舉特奏鄭肖老第二人葉一龍王炳謝可貴黃萬卿元之三世孫陳夢符黃逢原君賞之弟葉起龍鄭日千林大舉陳泰卿鄭則俯林大成丁焯陳子繼謝恩鄭有聲籍之孫光增之子烘卓方應辰王震龍御射升第二等陳嚮源魏士泰李特士張鈞阮宗洙常顯伯晞尹挺之兄葉震源之曽姪孫南仲之姪孫觀之從弟賴夢鈴陳茂發陳采邵彌大阮士軫黃魁甲陳平子劉半千君遇之父盧泰父同父之弟壯父之兄常晞尹顯伯之弟挺之兄陳天應陳應甫王思節寶祐四年丙辰文天祥榜文舉正奏陳賞陳俞鄭君薦蘇德載楊琦內舍次鄭之姪孫叔濟夢斗之兄終太學博士陳邜東子冲之曽姪孫紘績棐彚夫之姪孫立翁之姪林元復翁仲德張泳之濟之清之堂弟楊次鄭琦叔濟夢斗之叔祖許自內舍王應龍上舍林鏜內舍李斌上舍陳明同劉午道內舍劉木潤李光大上舍李振祖內舍皇臣之元孫昭之姪孫郭陳庚福清人字子長許一鳴古田人楊夢斗上舍次鄭之姪孫琦叔濟之兄陳若䝉上舍雄之孫歐宬林春一栗之孫公慶之子段舜咨吳之選內舍林伯介內優任汝賢洪子夀卓震振龍之姪林椿內全黃應辰吳之道上全林堯龍上全黃必大上全陳錫榮黃遂景亮之姪倪洪上舍永福人陳懿伯章贄內舍王良翁林孟磁楊叔濟上舍次鄭之姪孫琦之弟夢斗之兄淳熙三山志卷三十二
