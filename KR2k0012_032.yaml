body:
  text: 淳熙三山志卷三十二宋梁克家撰人物類七科名宋朝嘉定十三年至淳祐七年嘉定十三年庚辰劉渭榜任友龍探花字震卿貫建昌居閩縣文薦之孫本族文茂匯一鶚一龍應龍一震士寧歷太學博士終婺州倅陳煃甲科字孟明長溪人居嘉興瓘之裔歷宗丞見知邵武軍兄燁姚鏞字夢應長溪人陳子誠字若虛長邑人本族樞圭子愚鄭頤孫字正卿閩縣人黃若鳳字沖父永福人祖毅姪灝林子陽字德剛閩縣人黃起渭字濱叔永福人終富陽宰何守約字宗臣永福人林應運字泰卿閩縣人林公演字寅之閩縣人黃士革字從伯貫閩縣居長溪黃師參字子魯閩清人父景說弟師雍終國子正南劍州倅周角字子闕長邑人徐夢得字宗說閩清人陳如晦字景明閩縣人本族誘甲餘慶夢偉億元衡王振父字宗起候官人陳寅亮字恭甫懷安人林叔震字廷發閩縣人寄居泉州周說字夢得閩縣人曽祖毅父鼎來本族偉宜老掄擢震霖千里林公慶字子仁閩縣人楊時升字季美閩縣人李公縉字舜臣貫平江居懷安叔起岩起渭士煒梁綱中字應叔寧德人盧壯父詞科字武子候官人見大府少卿兼直學士院兄同父池洙字元魯閩清人陳子直字剛中閩縣人曽齡字公夀候官人叔韶縝弟噩陸聞雷字震逺長溪人父伯正本族藻雋卿彭爚字明之候官人公永之孫歷架閣終奉議郎南外宗院王振字岩起懷安人王庭字簡夫閩縣人黃亮字功甫閩縣人連少嘉字亨父閩縣人南夫六代孫林瞻龍字士攀長溪人林應龍字驤伯長溪人叔煥王泰定字光甫懷安人子必張弟震定履定徐敏功字德新閩縣人寄居慶元府陳澄子字景深懷安人姚德輝字夢得長溪人徐漢章字清之長邑人叔長卿弟鏌葉一新字惟一候官人曽祖能報從姪柟棠黃履字子卿閩縣人居長溪曽韶顯字子紹候官人伉之孫本族夢𫝊應甫噩齡柯亨宗字衣開貫紹興居候官曽祖梁父端卿弟謙宗煥宗陳光大字髙叔閩縣人叔畦魏復亨字景陽閩縣人林階字舜咨長邑人梁夢庚字季明閩縣人潘可叔字君獻閩縣人髙祖衢曽祖門本族飛英冠英循皓伯景伯繼伯潛子儀子真子震子京子寓官至宣教郎淮西運幹陳景明字仲晦福清人吳易簡字敬甫候官人居永福父元衡叔元美林敏字正父古田人省試賦第二郭宗儀字致夫長溪人寄居婺州姚遇字欽叔長溪人兄洽叔瀛終泰寧宰張卨字唐老長溪人寄居羅源祖翮父牧兄庠磻宗子正奏崇瑒字伯玉本族善珏汝忠汝闕崇璟崇玠紃夫字季履父彥蘷兄紡夫縝夫綖夫弟夫崇倣字叔似寄居連江本族汝固汝臣崇卓崇阜見朝奉郎通判安吉州崇能字君舉綯夫字季直兄紡夫縝夫綖夫紃夫父彥蘷崇侯字萬里前淮東提舉崇栗字景周寄居連江父汝固兄崇櫜見糧料院希平字次仲本族師同希魏希梁與枳子與顯崇葸字恭叔與灦字清臣父希平本族師同希魏希梁與枳汝清字仲夷汝仇字公之崇性字仁夫兄崇恪弟崇莘崇保崇璮字君玉居長溪父汝似文舉特奏潘唯陳行申盧垕永福人父鎮叔鑄葉應辰黃閌字叔髙永福人陳曽之興龍之叔陳士驥字良孺童子舉子有之黃古心字魯子弟古學曽祖大名鄭瑩中字清叔閩清人陳衡材林國英字俊甫長邑人弟時英陳應求張暄林介卿字勉求寧德人鄭光定陳士龍字士珍羅源人葉林字景森閩縣人黃祁字季有姪夢髙黃林聳字文叔長邑人龔郯字曇伯梅卿從姪林逢午長邑人程少杜字景明祖嘉德張早字及父長邑人鄒昞字叔明長邑人武舉正奏曹翥第二人字元叔盧德宣上舍字孝本永福人莫應辰鄭天翼陳湜字以清長人斌之子黃元吉嘉定十六年癸未蔣重珍榜陳夢庚甲科字景長襄之八代從孫家世報禾炳本族祐克瑄瑢垓垌石同伯元之鑄夢建伯圭彭㝱牛後改名耕道父寅家世元達文嗣本族嵩演渙爚闕永公立謝觀國字賓之閩縣人本族藻謙之正卿奉議郎前知廣州新㑹縣姚㢸字夢良長溪人德輝之兄林桷字景長懷安人本族穎秀叔秀楫坰樞終通直郎建寧教官黃萬字成大羅源人張如愚字亦發閩縣人終潮陽宰子宗𫝊林炎法科字起晦福清人申之孫前大理丞陳端年字君亮長溪人父絲陳元鳳字儀叔候官人陳逢寅字必發長邑人林琥字君玉福清人郭嶽字伯喬長邑人陳良驥字千里長溪人王公廙字子敬古田人林輔良字㢸老閩縣人寄居羅源鄭清子字景夷閩縣人曽必大字萬子候官人曽公益字誠叔閩縣人戴翼字汝諧閩縣人居懷安雍州太守梁柱字君佐候官人馮惟說字起巖閩縣人李任字之逺貫平江遜之曽孫闕琪兄寧之韶鑑終朝請郎雲臺闕尚書珏之子黃修字誠之貫候官父革本族順卿桂楊夢龍字成之長溪人陳應龍字景雲候官人歷太博見廣德軍添倅劉天乙字伯應懷安人林明之字濟甫福清人祖仲堪桷棣之姪振清之煒炎之弟任一鳴字登卿閩縣人一龍應龍一震之兄匯惟明一鶚友龍之弟游繼榮字華甫候官人省試賦第二人蘇士洪字闕人古田林善鳴字闕孟懷安人上官公舉字良闕長溪人林宋偉上舍字力叟永福人闕之叔終廣東提刑陳瑄字宏父閩縣人家世報禾父大亨叔炳弟瑢垓坰姪鑄本族祐克同伯元之夢闕伯圭夢庚密學襄之六世從孫葉及新字洪闕候官人陳棐字伯起福清人吳行可字見父長溪人寓江隂軍昉之曽孫竿之子當可之兄終㑹稽宰薛士囦字養浩長溪人葛崇節字陶翁閩清人從龍之姪鑄之叔歷大理寺正廣東運判見朝請郎陳著字居誨侯官人士表之姪陳大章字章之長溪人億之子任惟明字章卿閩縣人匯一鳴一鶚友龍一龍應龍一震之兄髙遷字景善長溪人齡之弟陳士修字敬卿閩縣人誠之之孫峴之姪士表之弟信之叔鄭德起字功父閩清人父元樞性之歷太社令前知興化軍黃炳字闕州貫泰鄭公孫字仲闕閩縣人卓杰陳子闕縣人子直之弟堅之前知吉州永豐人廖闕宗子正奏汝僁崇闕噩夫彥偶闕賓兄祖交之父公彥假彥伯彥仞彥阡弟彥傈叔璱夫希豐汝僙汝僁親弟彥傈字烈叔祖交之父公賓本族彥假彥闕彥仞彥阡彥偶璱夫崇﨣字公輔必英字子俊父崇玠叔崇瑒崇沆兄必廣必漸字子進父崇宇兄必偲弟必臨贍夫字闕洽居永福敵夫之兄崇璦字伯玉弟崇璱本族不紿善踐善漴汝朴汝億汝橫汝戀汝惓汝涌夫字闕叔之之兄希綬字節夫居長溪崇璱字闕親崇璦之弟必偲􅪅夫文舉特奏周寧甫陳孝儼黃信字子厚連江人陳則厚字能載長溪人林伯大字貫夫長溪人林昉鄭澥字闕夫長邑人葉端亮宋方寅本族時可疇岩起岡寀夢申禹錫機翀卿鄭衎黃鞏林疇陳梓字國材羅源人陳溥字淵甫長邑人子植之父多福武子之叔張子華鄭江陳槩陳夢良字君遂長邑人李端行字正叔長溪人潘逵劉叔侃字子如懷安人楊夢春楊夢𫝊麥國用黃夢起字士龍懷安人陳井程若中古田人本州解魁武舉正奏鄭自奪林以禮劉垕徐國英林霆繆元龍何士龍林一新王奉程夢湜吳逢丑永福人官至知縣林嵩黃超叔字穎叟寧德人闕之姪起叔之兄終修武郎知辰州林元學曽子浩韶顯應甫之弟武舉特奏方機任午寶陳森黃復丘必先髙夢月字惟明連江人教授泰州終知處州太常少卿吏部郎中軍器王羣鄭起濱楊文煥長溪人終道州教授陳夢龍寶慶二年丙戌王會龍榜上官翼卿林子文甲科字元闕長溪人類試第湛若甲科字自然閩縣人歷校書郎潘津字公登長邑人衢循整鯁潛之孫必勝之姪黃夢應字汝大閩清人端之子見承議郎雍州通判終知禮州林宗邁字冲逺福清人陸祺老字翼翁貫臨安元候官人林孟冶字叔良長溪人寄居溫州湜之孫田元煥字和卿懷安人兄質頤元晉徐天騏字退之福清人長卿之姪鏌漢章之弟孫楙德字叔文連江人沈膺字多福閩縣人觀之姪孫康之弟鄭概字應鼎候官人籍之子光增之弟黃君賞連江人陳應龍字震之懷安人陳翥字翔叔長溪人林夢龍字仲攀長邑人髙嚞字潛文長溪人今居溫之平陽鄭濬字必大閩清人李角字定國懷安人居長邑鼎之姪林勵字勉夫候官人居長邑教授廣州乞致仕除知縣不就林洪源字汝濟福清人别院賦魁萬之姪良顯之子俊源之兄陳斗應字上建候官人璡之曽孫終朝奉大夫黃復字乾叟貫南劍居永福歷知興化軍又居候官殁于王事封忠壯侯林􅩈字季山長邑人居候官陳紱字若晦貫汀州居長邑祖樞叔景年兄子愚弟子真終惠安宰陳一震字文夫閩縣人公益之姪盧同父闕判泉候官人為大學博士通州終知汀州弟壯父鄭宅闕府節正永福人知常德推終淮西闕管葛炎阮國寶闕闕寄閩縣人文子之叔馮端榮鄭申字縣人閩王震定字東父候官人泰定之弟通判漳州陳駿之字景聲閩縣人誥之曽孫定之孫用之震之從弟鄭師申字景嵩福清人居連江昭先之弟鄭夢登字少用長溪人居羅源應龍之弟余冲字雲翼羅源人又迪之子及之姪陳又新字德益長邑人實之父黃師雍字子敬閩清人景說之子師參之弟見起居舍人兼侍講黃起碩字膚叔閩縣人居永福林翀子字應之閩縣人居永福陳鑄字鼎臣閩縣人寄居嘉興報之元孫禾之曽孫炳之孫瑄瑢垓坰之姪本族祐克石同伯元之夢建伯圭夢庚夢龍存夫密學襄之七世從孫闕鄉帥闕之子見朝請郎主管玉局觀林桂字闕人懷安陳士晉字進闕士復人凡士泰士䝉闕鼐然本族宗古倬然嘉宗了堅次公武公梁應庚字本仁閩縣人夢庚之兄王維字魯山長溪人參政伯大之姪萬修之姪孫萬全之孫除國録見西外宗教陳樵子字楚老貫興化軍候官人洪升字平叔懷安人應宣之叔池師曽字通伯閩清人商景春字熙叔貫衡州朱日炎字汝明閩清人林充國字伯充福清人鄭唐舉字堯臣閩縣人公望之父鄭公望字孔璋閩縣人唐舉之子宗子正奏必臨字子陽必漸之弟崇字之子與珗字仲玉希平之姪與灦之兄與疆字安卿希誧希侮希祕希􅒷之姪崇淏字清卿本族善諆善然汝固汝珇汝闕汝鋒崇阜崇卓崇倣崇栗希藎字忠卿希裕之弟與宗與侔之叔彥崝字宗嶸彥嶓彥增之弟希僘必逾字登甫父崇瑒叔崇玠崇沆兄必廣必英弟必莘汝柳字聖和崇􅑤字國永時斌字維翰耆夫忍夫之姪彥嶒字宗嶽桷夫字仲領寄居連江彥曄之子楹夫檖夫挺夫之堂兄崇沐字君仁必莘字子君崇鑅字君選時枡字體仁寄居長邑豐夫之姪時鑄之兄希珆字宗瑞希之弟必諭字伯達崇峙之子必請之兄必詠之弟崇玭字德玉汝請汝竣汝松汝騰汝檖汝竬汝腴之姪崇棠之弟慨夫字達道悌夫之弟崇賞字達慶本族汝汝悉汝嗣崇思崇能崇儲崇侯時藇字子厚曽祖公輔本族公至公夀彥信彥逾珉大峙來時藝時藩璀夫字闕叔彥侗之子彥𫝊彥侯彥儔彥徭之姪喻夫􅸍夫之兄希叔字國叟希誧字闕大父師騵叔師驪師騤師塞闕俙希侮弟希絪姪與强汝墇字通叟希禕字成美寧德人希龔之弟希蕙字國瑞汝鏘字和卿必豫字謙之崇臯之子崇節崇願之姪滭夫字源叔崇博字德溥本族汝孚崇祐崇洽崇莘崇警崇仰崇儷必興必取汝珇字溫叔父善竦本族善諆善然汝固汝臣汝㻬汝鋒崇阜崇卓崇闕崇栗崇淏崇􅥚字至伯寄居連江崇倣之兄見朝奉郎前通判南劍州敢夫字進夫崇警字德有本族汝孚崇祐崇洽崇博崇莘崇仰崇儷必興必取時邇字舜言與審字仲學汝攣字有孚尊夫字謙闕曽祖交之祖公賓本族彥侯彥倪彥仞彥偶彥傈璱夫瑻夫時倯字同卿俞夫闕夫之姪瑻夫字闕賓曽祖交之祖公父彥侯譜同尊夫前知南劍州崇夷字清卿汝堅之子崇夙之兄崇熹字元福汝字清叟楹夫字仲居寄居連江彥曦之子桷夫之弟時