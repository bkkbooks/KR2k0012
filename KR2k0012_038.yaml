body:
  text: 淳熙三山志卷三十八宋梁克家撰寺觀類六僧寺羅源縣六十一所慶厯舊記六十六所內十所有寺額曽師建記六十七所鍾世明根括寬剩六十三所今州縣道觀一所外六十一所並有起置年代靈應院梅溪里唐長慶二年置舊産錢七百七十一文曽記七百七十七文神光院徐公里同年置舊産錢二百九十三文信安院拜井里咸通元年置舊産錢一百四十一文曽記一百四十文觀音院安金里同年置背太白峯舊産錢二百六十九文曽記二百四十九文安善院臨濟里三年置景德元年賜額舊産錢九百三十七文護國院徐公里六年置景福元年賜額慶厯初重建舊産錢二貫六百六十七文曽記二貫六百一十一文龍興院羅平里十三年置舊産錢六百二十六文曽記六百二十一文仙苑院徐公里乾符三年置以山為名舊産錢一貫九百五十五文曽記一貫九百五十文報恩院新順里廣明元年置舊産錢一貫五百六十四文曽記一貫五百九十文縣申一貫五百七十四文旃檀院黃重里同年置舊産錢二百九十四文曾記三百九十六文白馬院招賢里中和二年置舊産錢一貫三百六十六文興王院梅溪里大順二年置舊産錢三貫九百八十四文曽記三貫九百一十三文小雲峯院新順里同年置舊産錢二貫八百六十二文資壽院安金里同年置舊産錢四百二十九文慶田院同里乾寧元年置光化二年賜額舊産錢七百三十文曽記七十三文清泉院羅平里光化二年置舊産錢五百三十二文崇勝院析豐里天復二年置舊産錢六百四十九文大雲峯院黃重里同年置舊産錢三貫三百二十文曽記五貫三百四文南峯院霍同里同年置舊産錢五十五文鳳山院同里梁開平元年置舊産錢二貫九百四十九文翠峯院徐公里乾化元年置舊産錢六百三十二文光化院梅溪里二年置舊産錢三貫一百六十三文崇壽院新豐里天成二年置有放生池舊産錢七百一十六文聖壽院羅平里三年置舊産錢三貫四百四十二文資福院新豐里五年置舊産錢一貫七百六十九文福興院臨濟里長興二年置舊産錢四百四十四文龍華院徐公里同年置舊産錢三百八十一文東林尼院臨濟里清泰二年置舊産錢二百五十三文金粟院同里同年置舊産錢八百四十四文龍際院拜井里同年置或云寶勝元年舊産錢一百三文西雲院招賢里同年置舊産錢二百八十文應德院新順里同年置偽閩永和元年也舊産錢六貫八十文觀音院臨濟里晉天福六年置舊産錢五百七十二文慈恩院梅溪里七年置舊産錢一貫九十文靈山院同里開運二年置舊産錢九百五十四文慈氏院徐公里周顯德二年置舊産錢一百八文曽記一百一文集雲尼院安金里三年置舊産錢二百四十四文曹山尼院黃重里同年置舊産錢一百八十八文水陸院安金里四年置舊産錢四百六十二文曽記四百四十二文明安院臨濟里六年置舊産錢一百三十三文曽記一百二十八文縣申一百二十三文淨明院梅溪里皇朝建隆元年置舊産錢二百八十文曽記二百八十八文靈泉院臨濟里二年置舊産錢二百九十三文觀音院霍口里乾德三年置舊産錢六百四文四明院安金里同年置舊産錢五百九十四文報國院羅平里開寶元年置舊産錢四百一十文白塔院安金里二年置舊産錢二百三十文西峯院霍口里三年置舊産錢四百九十三文白雲院安金里太平興國元年置舊産錢五百三十一文祥雲院臨濟里雍熙三年置舊産錢三百三十四文泗洲院同里淳化三年置舊産錢四百三十文洪福院羅平里咸平二年置舊産錢八百一十三文香林尼院徐公里大中祥符二年置舊産錢二百二十文棲林尼院同里二年置舊産錢二百七十三文靈巖院新順里四年置舊産錢三百六十六文靈峯尼院臨濟里皇祐五年置舊産錢九十二文薦福院新順里同年置舊産錢一百八文普明院善化里嘉祐元年置舊産錢二百一十八文翠巖院善化里二年置舊産錢六百九十四文三學院招賢里治平元年置舊無産錢泗洲菴安金里紹聖三年置舊産錢四文仙巖院新順里元符二年置舊産錢七百九文懷安縣一百五十四所并在城十八所共一百七十三所慶厯記一百八十六所內十二所有寺額附郭一十一寺有起置年代曽師建記一百六十五所鍾世明根括寬剩一百七十二所州籍見管數同今縣申增一所除一十八所在城外一百十五所會到有起置年代四十所未詳升山靈巖寺州北懷賢里陳天嘉三年置舊號飛山世傳越王勾踐時自會稽一夕飛來鑑湖即其址也山有寺經始於天嘉三年以其西巖石間時聞鐘磬之音故曰靈巖唐天寶中任敦輕舉於此乃號升山周朴詩升山往古道飛來此是神功不可猜氣色雖然離禹穴峯巒猶自接天台巖邊折樹泉衝落頂上浮雲日照開南望閩城塵世界千秋萬古卷塵埃興元初僧雅操居之觀察使孟皥因請于朝為立額舊記云皥始移今所乃任公上升處操嘗與談經於此今寢堂榜曰紫雲其遺迹也國初錢昱詩杉松法寺廊欄檻倚高岡郡郭曉雲漠禪齋春草長澗青連竹色山靜帶茶香更有名僧在茅菴住上方則當時卜宇可知矣任仙公臺上升處祠堂陶隱居登真注訣云玉溜山在海中子謂之地肺肺門晉太元中任敦自茅山往居之十餘年乃自玉溜來居此其後又往玉笥山後復來居於王霸壇得金版仙訣丹成上升因號升山今臺及洗藥池存運使石賡詩衰年腳手倦躋攀今日憑高一解顔驅得江山來目下化將樓殿出雲間真人煉藥仙都近釋子焚香佛界間事數來寧易得后歌須盡夕陽還程守師孟詩行處松蘿深似幄望中城郭細如棋清泉可惜藏巖下不作先生洗藥池陳先生襄詩雲中直有三清路塵外都如一局碁聞欲引泉添洗藥未應奪我鳳凰池通判陳鑄詩任公何代此升仙萬仭仙臺倚翠巔石徑層層封緑蘚松蘿步步拂青煙海中島嶼分諸國野外雲霞萃一川賢守乘秋縱登賞不妨吟到夕陽天舊産錢六貫三百四十七文石泉院州北觀風里越王山之北石壁峭直泉出其下元和中僧紹先表請建院於泉側敕號石泉舊産錢二貫七十六文芙蓉院稷下里山如芙蓉大和七年僧僧訓創咸通八年以咸通延慶禪院為額皇朝改太平興國禪院芙蓉洞洞口可丈許縈紆十餘里遊人篝燈束炬以往巖石互鎖乍隘乍廓紺乳時滴隂氣逼人火色青閃五里至開山堂坐可百人有石牀石鼓石盆過此益凜凜故莫窮其源舊産錢一十二貫七文九峯院興城里以山峭拔若筆格名與芙蓉壽山號曰三山大中二年僧僧賢創咸通二年號九峯鎮國禪院栁公權書大順元年賜僧慈惠禪師并紫衣舊産錢一十貫五十一文曽記九貫三百文清流院接下里三年置舊産錢一貫七百六十三文洪福院欽德里同年置舊産錢九百九十文曽記九百八十二文翠林院高遷里同年置舊産錢二貫三十四文曽記二貫二百三十四文鷲峯院長壽里八年置舊産錢三百九十九文南山院恭順里十年置舊産錢三貫八百四十二文東林院興城里咸通三年置舊産錢二貫二十文吉祥院高陽里六年置舊産錢三百六十六文幽居院施化里廣明元年置舊産錢二貫一百二十六文廣明鬱林院德風里同年置舊産錢一貫八百四十二文曽記一貫七百四十二文清涼院施化里光啓元年置舊産錢三貫四百五文縣申三貫四百文壽山廣應院稷下里三年置開山僧號妙覺龍紀元年改今額壽山石潔淨如玉大者可一二尺詐潤而易攻蓋珉類五花石坑相距十數里紅者髹者緗者紫者惟艾緑者難得正若登山視罅鑿之僅容身乃側肩入盡柿而後見或竟不值終莫窮取今益深逺矣舊産錢一十二貫九百四文蓮華院寧碁里大順二年置有銅鑄閩王像一軀相傳三鑄而後成舊産錢五貫八十五文曽記五貫七十五文金峯院越城里三年置舊産錢一百三文安國寺忠信里始曰龍邱會昌例廢乾寧二年忠懿王復之光化初僧師備自雪峯來居焉館徒常千人高麗日本諸僧亦有至者師備閩縣江南人也號宗一禪師長興元年閩王延鈞所立碑文節度副使延稟捨石刻今存晉開運中淮兵入冦蹂為荒墟皇朝祥符四年仍故址新之臥龍山石刻三字程公師孟詩聞説林泉便訪尋平田一徑上孤岑榕隂落處宜千客荔子生時直萬金盡放遲回官舍近不妨間坐石門深四邊稻熟正租了稍愜儂家出郭心時陳先生襄劉先生􅉓湛郎中俞同遊各有和詩舊記云陳寶應時此山有巨石無故自移箋經臺祥符四年僧可度即院之北臺箋楞嚴經景祐四年夏英公竦記其事愛亭元公絳詩朱轓何事獨來頻不為溪山只為民最愛年年禾稻熟時豐自有壤歌人放生池舊産錢一十三貫五百一十三文曽記一十二貫九百六十一文小資福院興城里同年置舊産錢六十五文曽記六十三文五臺院同里光化三年置舊産錢五十二文興國院施化里天復二年置舊産錢二百九十四文曽記二百六十文廣平院同里縣申蕉溪屯天祐四年置舊産錢一貫八百五十二文賢沙寺懷賢里升山之下梁開平元年置本安國宗一禪師塔院也宗一碑云開平二年十二月靈龕歸于懷賢里飛山之原即此謝三郎者閩縣人釣魚江上年三十投釣翻舟入芙蓉山為頭陀行後居焉晉開運三年淮兵冦閩焚掠幾盡皇朝天禧二年僧戒珠始葺而新之紹興三十一年朱丞相倬奏請為功德院敕賜教忠崇報為額飛來山在寺前寺門有飛山二字劉提刑嶠書按察使安稹詩升山遊罷到賢沙松檜隂中一境賖自愧簮纓趨仕路翻憐泉石屬僧家尋窮越國真仙迹見盡閩封好物華幸接憑熊擁千騎紅旌歸去照殘霞太守葉棣詩亂山深處欵禪扃十里松隂步障行翠竹黃花幾開發南星北斗自高明樓臺日轉天邊影鐘磬風回地底聲為問閩江船釣客謝家誰更未知名靜遊亭崖南百步有運使龎公籍留題長篇後劉待制夔詩云題詩人巳貴衮路冠三台程公師孟詩石磴高軒榜靜遊度年紅葉少驚秋使君會得山僧意不放笙歌到上頭熙春臺亭之西不溢泉臺東十步鬼磨石仙升崖朵芝巖息龜池寒巖覽秀亭小隱舊産錢六貫四百五十七文白泉院長壽里二年置舊産錢五百五十九文隱峯院施化里同年置舊産錢一貫四百一十九文曽記一貫八百四十一文縣申一貫四百四十九文資聖院稷下里四年置舊産錢五百八十六文曽記五百六十文嵩山院江陽里乾化元年置舊産錢一貫五百三十九文偃峯院太平里二年置舊産錢七十六文瀑布院稷下里同年置舊産錢二百六十四文保安淨居萬定尼院太平里三年置偽閩齊國夫人孟氏建册禮副使翁承贊記舊産錢八百四十九文曽記八百五十一文靈峯院興城里後唐同光三年置舊産錢五百七十八文香燈資福崇壽院太平里同年置閩王以國夫人塋郭之西因置是寺顯德四年加今額命以高祖母齊國夫人墳西所種雜果充祭薦舊無産錢太平山地藏院同里四年置舊産錢一百一十文泗洲院恭順里天成元年置舊産錢二貫八文翠微院興城里同年置至和三年重建舊産錢二貫二百二十三文香溪石峯院德風里同年置舊名崇壽乾寧二年改今額舊産錢一貫二百四十七文林賜院曽記作林洋瑞峯遵化里長興二年置舊産錢三貫七百二十三文縣申二貫七百二十三文靈溪尼院高陽里同年置舊産錢一貫二百六十文曽記一貫二百六文縣申一貫一百六十文白龍院太平里晉元福元年置舊産錢四百二十二文曽記二百二十二文大林洋院施化里同年置通文元年舊産錢二貫五百五十文曽記二貫五百五十五文資國院溫泉里三年置舊産