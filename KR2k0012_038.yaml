十年置舊産錢二百六十三文曽記二百五十有竒資福院遵化里舊産錢二貫四百五十五文曽記二貫四百六十四文靈峯院同里舊産錢二百七十八文資國院欽德里舊産錢二貫三百八十五文興福院興城里舊産錢一貫三百四十文崇福院同里蕉溪屯舊産錢六百六十四文報恩尼院同里舊産錢三百九十一文翠雲院同里舊産錢一百三十一文保福院同里舊産錢一百一十一文靈石尼院同里舊産錢九十二文觀寂院欽德里舊産錢三百六十文建瑞院恭順里舊産錢一百八十二文新興院高遷里舊産錢五文觀音院順安里舊産錢九百三十文資福院太平里舊産錢六百九十七文北天王院同里舊産錢二百六十四文曽記作保聖天王二百四文新興尼院同里舊産錢八十文報先院北平里舊産錢六百四十四文泗洲院稷下里舊産錢五百九十五文前觀音院同里舊産錢五百七十二文後觀音院同里舊産錢四百五文五雲院同里舊産錢三百五十二文秀峯院同里舊産錢二百七十四文資福院同里舊産錢二百一十六文中興院同里舊産錢一百六十一文慈峯院越城里舊産錢四百二十三文大善院長壽里舊産錢三百九十一文西峯院溫泉里舊産錢一百二十五文慶安院高遷里舊産錢三百九十一文鳯山院忠信里舊産錢一百一十三文香林尼院江陽里舊産錢一百七十五文曽記一百一十五文縣申二百九十九文淨安院德風里舊産錢一百五十六文西靈院江陽里舊産錢八十六文西林尼院同里舊産錢六文􅼌山院觀風里舊産錢一百四十三文林殆庶記五代時創白蓮院寧碁里舊産錢一百九文觀音院崇福里舊無産錢石泉院楊﨑里舊産錢九十二文寶峯院懷安里舊産錢八十八文曽記八十九文泗洲院西安里舊産錢八十三文以上州籍香燈地藏院楊﨑里舊産無縣申新産十四文已上田十所未會起置子粒道觀山附山川勝槩神仙之所棲宅餐霞飲水與世迥隔故耳目不至者率常以為荒誕吾州東郭外榴洞南山間甘果與城東南突兀號九仙者此固杳漠亡所追據至升山怡山福山霍童高蓋洞宮石竹則悉有遺迹可驗自後漢徐登吳董奉梁王霸林玄光唐法權法羣皆家世吾郡踵相繼見記傳者巖岫深秀泉石清古是以任敦又自臨梅鄧伯元自吳郡王玄甫自沛國褚伯玉自鹽官咸不逺數千里而至學成名著後人間即其地慕求之於是有道觀焉惟道家以清淨求不死為術彼安分委命來鄉者寡矣非若釋氏以死後禍福恐動驚怖故寺院無數而道觀至今才有其九自非時代好尚祠宮齋宇亦庳隘亡足言者唐祖混元帝始廣所建皇朝祥符間奉天書崇觀後尊道學故於近郡興置特偉今天慶光孝觀紫極宮是也其首冠他所以朝謁或焚修與祈禳之地故靈迹古怪又非六者所能盡云閩縣天慶觀州東七里皇朝大中祥符六年置先是後唐長興中閩王建東華宮時王璘方信道士陳守元既建寶皇宮又建東華宮大中祥符元年詔以正月三日天書降為天慶節二年令天下建天慶觀五年聖祖降復令建殿是嵗正月州乃以東華宮為之時張鄧公為廣東轉運使會詔建觀因請即舊為之以紓天下土木之勞十一月建殿崇奉聖祖八年郎簡為記云元正三日改元天禧特立令節廣建靈宮簡自帝心咸稱天慶然後東封岱宗西睢上致神人叶夢語揚天意乃設位延恩端圭清夜祥雲飄然以紛郁聖祖倐爾而來格仙官肅侍列位惟六皇帝欽承明訓撫育黎庶復詔列藩嚴祠立像蓋尊尊而敦孝也六年春敕賜為天慶觀旁倚翠巘雅為逍遙之墟杳隔紅塵宛是清淨之奧云云嵗時長吏率官屬朝謁有金寶牌大中祥符六年有進燒金法以鐵為之凡百餘兩為一餅每餅幅解為八片謂之鴉觜金真宗令上方鑄為金牌數百天禧元年玉清昭應宮成遂頒天尊萬夀金寶牌鎮天下名山福地舊産錢二貫九百七十九文閩縣報恩光孝觀崇寧三年建先是二年十月詔天下建崇寧觀或謂州南東西兩山左弱右強乃建觀九仙山之巔號天寧萬壽樓閣巋然遂與烏石相峙為一州之勝紹興七年改為報恩光孝觀十三年改廣為光九仙山本名于山高一百十五步周回三百一步相傳何氏兄弟九人仙於此因號九仙山古閩中記云其山越王無諸九日燕此亦號九日山四徹亭在山上舊名九仙唐元和中元錫造慶厯中沈邈修更名蔡公襄有登四徹亭詩偶爾尋幽上翠微遊人啼鳥似前期花間行印露沾紙山下放衙雲滿旗艷艷舞衣朝日處飄飄商櫓落潮時傳杯且與乘春醉身世悠然兩自遺後建觀亭始廢政和萬壽道藏政和四年黃尚書裳奏請建飛天法藏藏天下道書五百四十函賜今名以鏤板進于京淳熙二年令以所藏經文送于行在所聖上萬壽二樓左玉虛右金名殿前政和五年黃尚書裳建自為記九天採訪應元保運真君閣殿南政和六年黃尚書裳建自為記舊産錢九百九十七文候官紫極宮聚英坊之北唐天寶元年田同秀言老子降于丹鳯門以錫靈符因置混元皇帝廟二年改廟為宮三年以在京為太清宮東宮為太微宮諸州為紫極宮今梁題云昭宗乾寧五年九月二日蓋再建也偽閩録云光化三年創舊産錢一貫三百三文寧德鶴林宮縣北七十里梁大通二年置霍童山下即洞天記所謂霍林洞天是也其峯最高者曰大童次曰小童二童之旁一峯如香爐曰金剛源唐貞觀六年為第六洞天武后時司馬煉師於此修煉後駕鶴升天道士王玄甫等以聞遂賜額號鶴林天寶六年改曰仙遊山貞元中鍾臺危側忽一夕風雨震電鄉人聞鐘聲謂傾圯矣遲明視之則端然無恙後嘗為支提廨院尋復為觀霍童山高約七里頂平可坐百人昔吳郡人鄧元鹽官人禇伯玉沛國王玄甫於此授青精飯餐白霞丹景之法見五藏夜中能書僧法權法羣及其童子亦于此得道上有泉名甘露服之延年有石行廊三十餘步石室頗深廣石橋橫跨半空有石臼石盆石盂皆天成石壇旁生竹一枝遇風則能自掃壇上西北有玉鏡碧色鵲尾香爐在焉桃花洲去合林一里唐初始有此洲今轉高大桃木日盛故以名洲午日巖巖高數百丈瀑布直下程公端午日嘗採藥於此故名舊産錢二百三十文羅源洞宮天慶觀縣北六里唐天寶七年五月十三日始建朱梁時王氏尚佛遂廢皇朝建隆元年邑人林瑞復創殿一間大中祥符二年詔置天慶觀縣令和惲挂額於殿門有叟余成請大建堂宇至天聖七年乃備有余成自為記今存政和八年以觀徐真人舊宅嵗久頽損其鄰仙苑寺久據其地可併歸之洞宮山高三百八十步原出建州武夷山真誥云洞宮山七十二福地此其一也村有神姥石舊記云昔有神姥來自羅源所踐之迹入於盤石仙苑山去洞宮四里徐真人煉苑根之所後於永福高蓋山上升八仙亭開成中創舊産錢七十六文曽記三十六文候官沖虛宮西禪寺之南梁王霸父增自齊朝渡江入閩今西禪其宅也善黃老術霸幼好之每登怡山經宿乃返年三十遊武夷山十六年還舊居乃於山南鑿井有白龜吐泉煉藥既成點瓦為金是嵗閩中斗米千錢乃鬻金運米以濟貧民後以所餘藥服之旬日如醉忽於所居皂策木下蟬蛻而去林嵩記云梁時三月三日也周朴詩云王君上升處信首故居前皂策即須朽白龜應亦全雲間猶一日洞裏已千年碧色壇如黛今時誰可仙唐貞元中觀察使李若初嘗登樓西望有五色雲當其宅遂以為沖虛宮塑任敦董奉徐登及霸像為四仙祠偽閩王延翰重創其木與壇井今存林嵩為記云壇竈基址猶存井有白龜時或遊泳水能祛疾初王霸云壇壞不用修木枯不用伐皂木不結子結子人得道西南白龜井吾乘之去來龜歸吾亦歸慶厯中皂策再生王守逵詩修煉曽君些傳聞固異常壇留皂策樹人去白雲鄉龜向胎中息神藏肘後方遼東鶴未返華表夜蒼蒼林安道白龜井詩古甃千齡在寒泉味最醇皂策木詩海外蟠桃同永久月中丹桂共參差紹興中皂策復生然未見其異也惟靜號真君濟貧金猶有之舊陳植詩鼎邊雞犬知何在雲外龍鸞去巳賖惟有黃金如瓦礫貧民時復得些些今每風雨後數里間耕者或得遺金紫磨色半瓦印文宛然重不過三四銖景真堂東軒孫逢吉吳拭有詩舊産錢三貫五百五十九文曽記三貫六百文福清福真觀在海口鎮元祐七年道士林知源創政和八年賜今額殿西隅有丹井飲之愈疾側有宣聖廟號丹井書堂舊無産錢福清靈寶觀縣南一里者有林真君玄光於石竹山煉丹丹成騎虎上升今有虎巖溪右有井旱不涸或曰煉丹水後為觀紹聖二年移於水南玉融山之隂宣和三年為靈寶道院曹績書額乾道九年史丞相浩重修舊産錢二百二十九文長樂佑聖堂舊有之紹興初縣令題今額招道士住持遂著州籍其邑人自言大中祥符六年既改東華宮為觀始以上相青童君香火於今所蓋造奉安宣和間知神霄宮劉靜一增創殿宇淳熙七年邑人有請欲以舊東華廣德宮額於此張挂舊無産錢淳熙三山志卷三十八
