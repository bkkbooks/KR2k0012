body:
  text: 淳熙三山志卷二十七宋梁克家撰人物類二科名本朝元祐二年至政和八年元祐三年戊辰李常寧榜劉介山若沖之孫升之子終朝奉大夫陸恂廙之孫字周仲終宣教郎韓筠闕字仲禮終侍御史葉聲字彥聞侯官人終朝議大夫知新州崔國寅登之從兄字世傳終朝請郎知邵武軍湛存俞之孫字公中終建州司理劉綬鄭侃暈之子闕書郎祕書省校特奏名劉康夫奕之子黃豫蕭規李誠鄒異經明行修陸望宣之弟六年辛未馬涓榜是年兼詩賦人第一場經三道専治經人經義各二道第三場各䇿二道鄭邦彥字公佐長樂人終朝散郎知建州林虛希之子字季野後試宏詞第一人歷起居舍人終朝請大夫祕閣修撰林豈字厚之長溪人終朝散郎通判安肅軍柯逺字臻道懷安人終奉議郎知南漳縣王勳字伯逹候官人元豐七年為舉首林天若字稽道閩縣人林辨棐之子字載中終朝請大夫南京少尹蕭昞闢之兄字文叔歷職方員外郎知朝奉郎知袁州方甸字南功福清人終承奉郎湖北運幹陳噩固之子字子文歷中書舍人知和州終正議大夫徽猷閣待制贈少師李諭圗南之弟字義翁終朝奉大夫魏需字君舉古田人終朝奉大夫陳公器字國珍懷安人提舉本路常平終朝請大夫林瑋字仲璞閩縣人終奉議郎李師回字潛聖閩縣人終建浦令盧彥逹字義行福清人歷成都路提舉學事終朝奉郎湖南提刑制科陳㿩祥道之弟字晉之是年九月應賢良方正能直言極諫科授節度推官簽判順昌府終禮部侍郎顯謨閣侍制二年乙亥宏詞科林虡時為開封縣主簿詳定軍馬司勑例修官爵里見前四年丁丑何昌言榜葉源聲之兄字彥中歷太學博士京西提學移提舉本路常平終承議郎兩浙提舉學事甲科陸藴宣之子字惇信歷大司成御史中丞知福州建州泉州終大中大夫顯謨閣直學士鄭崈字志天寧德人歷四川提舉學事以朝奉郎未七十乞致仕王濤晦之子字微明終朝散大夫李圗南敷之子字彥逺終述古殿直學士贈宣奉大夫開府儀同三司葉闢字師聖候官人終承奉郎黃逺敏之子選之弟字明仲終文林郎知莆田縣葉正臣源之侄字致一終南劔州司理李康字彥侯閩縣人終朝散郎辟雍司業林虙旦之子字德祖終朝請郎提舉淮東學事陳天常闕陳公格公器之從弟字仲承終朝請大夫知漳州韓逺舉丙之曽孫字陟明終宣教郎劉震字亨伯懷安人終朝散大夫卓元規元龜之兄字大正終宣教郎杭州教授柯廷堅字誠季候官人終朝奉大夫黃唐佐字堯臣閩縣人終奉議郎澶州教授林亨字亞元閩縣人林敏元字夢協懷安人終朝議大夫知通州潘潛衢之孫字彥淵終朝請大夫知南雄州陳義夫景參之從兄字汝權終中大夫湖南提刑陳之邵字才仲候官人終朝奉大夫宗正少卿陳天與字夢逹閩縣人終朝散大夫蔡鞏字信道福清人終宣教郎饒州教授特奏名鄭祖仁翁希愈莊幾元符三年庚辰李釡榜林遹格之子字述中殿試第三人提舉本路常平歷中書舍人以徽猷閣待制知本州進寶文閣待制知廣州終大中大夫陳材字幹伯鄭修洙之孫侯官人字季常終承議郎司門員外郎兼定王嘉王記室以上甲科陸愷恂之弟字強仲歷太常少卿直祕閣知泉州髙公瓛字君贄閩縣人終朝請郎知邵武軍辛炳琮之子字如晦為辟雍博士除京西北路提學陛對擢監察御史攝殿中侍御史論直達綱虧數責監南劒新豐場紹興初以侍御史召彈逐大臣五人擢御史中丞以病請去除顯謨閣直學士知漳州終贈通議大夫林登罕之侄字即道終承議郎知漣水軍黃唐俊唐佐之弟字堯章終鴻臚少卿倪登字彥及福清人終朝請大夫以收燕雲奉使沒於王事特贈中大夫鄭楫崈之姪孫字渙之終朝奉郎兩浙西路提舉學事丘允字執中長溪人終朝議大夫宋汝弼闕曾經字與權閩縣人終鄆州教授陳鍔字弱翁候官人終直袐閣余忱利賔之子字孚中候官人歷諸王府翊善終朝請大夫王賔字元將閩縣人元符二年為舉首歷諫議大夫御史中丞刑部尚書終龍圖閣學士大中大夫髙臨字潛智懷安人終朝散郎直龍圖閣知衢州贈待制陳侁清之曽孫字浚之終宣教郎洪州録事丘朝俊字叔文福清人終朝奉大夫知肇慶府張勸肩孟之子勵勔之弟字閎道歷中書舍人給事中御史中丞除述古殿學士知本州陛辭除工部尚書終大中大夫陳適道景參從姪字彥正終朝散郎知肇慶府林仲堪字大任福清人歷本路提舉終朝議大夫知惠州陳抱字夢得連江人終朝議大夫曾汝霖字商闕懷安人終文林郎特奏名陳諝黃待舉待問之弟黃適選之兄韓火老丙之孫逺舉之父崇寧二年癸未霍端友榜陸藻宣之子藴之弟字惇禮政和間藴為大司成藻為國子司業遷給事中宣和初藴知建州藻知泉州尋入為吏部侍郎終顯謨閣直學士知福州許份將之子字子大終龍圖閣學士通議大夫以上甲科陳禹叟字彥繇閩縣人黃唐傅唐佐之弟字堯翁崇寧元年開封府解首歷國子司業宗正少卿中書舍人給事中以徽猷閣待制朝議大夫致仕劉詢處約之子字信仲終承直郎太學博士陳天禧時之孫字百順終闕黃懋字德敏閩縣人終朝請郎通判開德府曾晏伉之子字叔陽終宣教郎知泰興縣陳公彥公器之弟字國英終中大夫集英殿修撰卓毅夫元龜之侄孫字彥仁終承直郎知將樂縣徐楫合之侄字升可終惠安令葉預聲之從弟字晉卿終承議郎太學博士方時可字亨仲候官人歷江東西路提舉知吉州終中奉大夫林作乂字彥從閩縣人終闕鄭南卿字仲升連江人終朝奉郎陳亨衢字彥逺候官人終宣教郎知仙逰縣特奏名繆昌道假承務張致麟京府助教張伯立陳夀朋鄭震洙之子陳濟陳中鄭孚陳兼陳從義以上諸州文學三年甲申是嵗建辟雍以待天下每嵗貢士試中者釋褐三試不中退歸本貫外三嵗鄉貢謂之大比幸太學上舍釋褐是年上舍一十六人並與釋褐本州三人鄭南崔瑤林徽之免解二十八人與免省本州三人柯棐楊惇禮李邁內舍一百一十六人與免解本州六十餘人鄭南崈之從侄字明仲釋褐第一人歷辟雍司業以直袐閣知泉州移本路提刑兩浙提刑以朝散大夫袐閣修撰致仕九十七而終崔瑤登之子字夢祥歷江東江西提舉學事為職方左司員外郎終朝奉郎林徽之字天和閩縣人終朝請大夫提舉江西學事五年丙戌蔡薿榜柯棐字季忱閩縣人殿試第二人歷祕書少監太常少卿除右文殿修撰太子舍人知德安府宣州終朝請大夫陸震愷之子字允敷大觀四年試中學魁歷太常博士禮部郎官召為右正言不拜再被召卒鄭強字南美候官人終朝請大夫廣東提舉以上甲科陳靚字文煥閩縣人終迪功郎黃龜年選之子字德邵歷殿中侍御史中書舍人終給事中劉登稱之侄孫字升道歷禮部員外郎知興化軍終朝奉大夫廣東提刑周思字上逹候官人終闕鄭畋字武子候官人終朝議大夫陳國材字公選福清人終諸王府直講楊惇禮字穆仲長溪人歷太學博士通判秀州乞致仕除司勳員外郎冉乞致仕除監察御史力辭時年未六十終朝請郎黃薦可字宋翰長溪人終朝議大夫劉方翼會元之子字夢弼終朝奉大夫太學博士李邁字志逺候官人歷考功員外郎知蔡虔封潮四州終朝議大夫黃文仲字元實閩縣人終闕潘闢衢之子字廓如閩縣人歷知汀州韶州廣東運判終朝散大夫劉彥適詵之子字立道省試别頭第一人歷校書郎除直祕閣廣西經略使再知徐州韓兼丙之孫字彥和終承議郎西京國子司業李隲字天升閩縣人終辟雍司業李彌大撰之子字似矩為吏部尚書顯謨閣直學士終中大夫黃邦光字觀國懷安人終朝奉郎陳天申公器再從侄字仲益終朝請大夫知惠川卓獻夫毅夫之兄字彥翼終宣教郎知瑞安縣李撰適之姪字德修終朝議大夫朱庭傑鼎臣之侄字世英沒于王事終朝請大夫李宋臣頎之子字希傑初名漢臣後凡以前代名者更從國號遂改今名終中大夫纍贈特進特奏名江漸庶之子陳復黃廙許難鄭汝石陳文伯大觀二年丁亥八行李諤字彥忠閩縣人以孝悌行能賜上舍及第授文林郎國子録除祕書省校書郎遷職方員外郎終承議郎直祕閣淮東提舉學事三年已丑賈安宅榜黃夏卿字楊錫永福人終給事中陳尹字孝恭閩縣人舉八行終通直郎越州教授以上甲科柯翊逺之侄字仲舉終將仕郎興仁府教授崔瑀登之子字彥寬終承務郎九域志所編修官王朝俊字元遇閩縣人終宣教郎林介卿字同甫長溪人終承奉郎太學博士潘師兒潛之姪字聖時終宣義郎建州教授黃邦光逺之子字宋顯朝散郎通判徽州吳暇開之子字彥終朝議大夫洪元夀浩之侄字彥仁終承事郎林雲字公澤閩縣人終闕張穆字應和候官人嘗中上舍出身中書右正字知邵武興化軍召為左司郎官建炎初為本路轉運副使移司本州主一路類省試終朝議郎葉搏字元舉懷安人終承議郎樊繹字伯成懷安人終朝請郎陳璡字景玉閩縣人終朝請大夫藩轂字載道候官人終德州教授卓駿字君驥福清人終朝奉大夫知興化軍林天申字昭道閩縣人終迪功郎漳州司理陳安上字彥禮閩縣人終朝奉大夫黃惟深字仲默福清人終漳浦令鄭存字誠中閩縣人終陳州教授鄭祖德存之兄字彥循終朝奉大夫通判袁州陳彥卿字君翰寧德人終闕曾履字德基懷安人終朝請郎余琮字君寶福清人終朝奉郎黃大名字茂實永福人大觀二年解首政和中試教官魁終朝奉大夫提舉廣東市舶吳昉開之子字彥昭建炎中權知荆南軍與妖賊戰沒于陳陜西宣撫司以忠義死王事聞贈兩官升朝請大夫官其子朱俊敏中之侄字聖求終從政郎李彌遜撰之子字似之上舍魁歷中書舍人户部侍郎以徽猷閣直學士知漳州終左朝議大夫韓岊兼之子字知剛知饒州漳州建州終朝奉大夫陳雄字強用長溪人終朝奉大夫知象州彭元逹字宣仲候官人終朝散郎關韶字舜美候官人終安丘簿陳公衮公格之弟字朝章終宣教郎李芘康之姪字積仁靖康初待次提舉兩浙常平州禁卒害帥栁述古以叛徒步諭以禍福卒感動釋仗請勤王擢直祕閣建炎初葉濃叛除本路提刑賊至自古田攻子城豐樂門冒矢石登陴説諭賊急退道羅源寧德由政和以歸四年范汝為反聲言東下其鄉民張毅乘亂嘯聚襲古田帥程待制邁請往招之單車入毅壘諭使捕汝為自效賊平除知泉州尋罷終左中奉大夫余恂利賓之子字允中侯官人終朝散大夫余光庭字朝美羅源人時余公深為中書侍郎以親牒試唱名靣奏非緦麻親駮放後再登科林公選字君章閩清人終朝請大夫陳懷古字公明閩清人終闕劉實靖之孫字明可終從政郎嶽州兵曹崔宛登之姪字彥正終從事郎河陽教授黃邦逹字兼善長樂人終朝請郎提舉本路市舶李謙字闕終闕候官人特奏名樊權余丰葉開繆剛李唐英黃託唐佐唐俊唐傳之父林積微韓彰明昌國之子林孝孫黃理陳報閩縣人終迪功郎嶽州教授曹汝礪林晛陳希劉擅陳冝朱祖揚四年庚寅釋褐陳葵字伯嚮閩縣人入太學崇寧初試上舍入優等應免省試恩命未下復試中南省第三人是歲徽宗初臨軒䇿士擢甲科蔡京預籍元符上書姓名得黃定等十八人奏乞編置葵其一也居衡州三年星文變異雷震元祐黨碑乃得放還至是詔有司許依元考定甲分注官張商英為相除太學博士給事中蔡嶷封還葵徑赴銓授樂清尉再調建州儀曹太守以為陳瓘門人劾罷紹興初訪求元祐黨人胡世將孟庾宣諭福建以蔡應詔授承事郎將作監丞尋召對除諸王宫教授踰年以趙鼎黨罷歸林安上真思之八世孫宇民瞻歷國子博士監察御史廣東轉運副使成都提刑司農少卿起居郎知本州終朝奉大夫祕閣修撰政和二年壬辰莫儔榜許登字公進閩清人終宣教郎知盈川縣黃圭字元功候官人歷監察御史刑部員外郎終朝請郎陳汝仕景參之族字信之終承議郎盧光前字嗣宗永福人終從政郎南劒州録參謝良翰字朝侍候官人省試第二人終宣教郎辟雍博士黃邦俊逺之子字宋英歷大理寺丞終知賀州鄭勵字勉仲閩縣人終朝請大夫知循州盧楚光前之叔字叔翹終朝請大夫知南雄州郭茂字秀實閩縣人終朝請郎陸綬長愈之姪字叔華終吳江尉林摯棐之孫字執禮終儀曹崔實登之姪字彥輝終汀州録參林晨天申之叔字子㿩初名晨御筆改名暾終朝散郎提舉利州路學事余光庭係再登科歷司農丞以朝奉郎知乘氏縣沒于王事髙遹字觀成閩縣人終知夀昌縣柯森棐之弟字積仁大觀四年貢首終從政郎王與權字彥思懷安人終闕余嗣字德紹羅源人朝散郎致仕鄭甸字畯夫閩縣人舉八行終朝奉郎親賢宅直講陸守衍之子字仲約舉八行歷尚書郎中廣東提刑知興化軍湛剛中字柔濟侯官人終宣教郎李廣文字夢授古田人修潮陽志終左承議郎廣州簽判朝散大夫知潮州李接字晉侯福清人終承議郎廣州簽判王俊字邦俊長溪人終通直郎知蒲陽縣朱庭佐敏修之子字良肱政和元年貢首終從政郎太學博士黃覲字德光閩縣人終闕劉宇實之弟字閎仲終文林郎京畿運管髙若虛字仲實福清人終朝請郎通判靜江府王行已字恭夫永福人石亷字子之福清人終朝請大夫知潮州陳炳字若蒙懷安人終朝奉郎黃文若字元篔閩縣人終文林郎江東運幹劉溫伯字春卿寧德人終朝散大夫劉逹夫若仲之孫字宣子舉八行終宣教郎越州教授劉綱綬之弟字君舉歷籍田令終承議郎王南夫彬之後字搏仲長樂人終朝奉郎監行在左藏庫陳天益公器之再從侄字帝錫終迪功郎宿州司理陳之美之邵之兄字才伯終朝奉大夫林大聲字谹仲侯官人歷太府少卿淮東總領知鎮江府以朝請大夫直祕閣致仕陳浩然國材之族弟字彥章終承議郎通判台州特奏名王宕陳謨湛諝凌琰許沖逺潘夀王朴張睍栁珙陳牧陳擴姚能舉陳報林其麟陳介陳祖武三年癸已釋褐黃覿覲之兄字德純政和二年貢首終奉議郎薛鋭字季敏候官人終奉議郎通判衢州四年甲午釋褐洪綽浩之姪字裕叔大觀二年貢首終承議郎劉絪綬之弟字夢亨終朝請郎通判衢州五年乙未何栗榜陳昂字直孫長溪人以釋褐授承事郎歷檢詳終朝請郎直顯謨閣郭中行字聖與候官人終從政郎陳曦字景初懷安人終海豐尉李友直字端叔候官人終知建安縣張觷字柔直懷安人建炎初以建寇葉濃叛守南劒有勞召為國子監丞遷樞密院編修紹興初知興化以范汝為反改知南劒就除本路運判賊平召為考功郎遷左司以楊么雷德進等反出知嶽州鼎州直龍圖閣知虔州卒贈祕閣修撰後南劒民為立廟乞奏入祀典詔賜號英顯公鄭昻穆之孫字尚明崇寧元年舉首為詳定九域志所纂修乞致仕轉承事郎陳遇復之子字亨仲長溪人紹興初以犯太上嫌名更今名終宣教郎湖南提舉司幹官徐登字彥升閩縣人終知縣劉正稱之孫字道純終朝請大夫柯宗孟字伯醇永福人終通判廣州曾屐履之弟字夢登終宣教郎林慶老字昌孺古田人政和四年貢首唱名上顧曰少年臣子何以老稱因御筆塗老字終迪功郎陳亨道亨衢之弟字彥通終朝奉郎通判建州陳熊字毅然羅源人終奉議郎劍浦丞潘宗孟字飬浩懷安人終建州教授吳天駟字君任永福人終宣教郎林深字叔厚閩縣人鄭載文字煥之福清人終南城丞陳積中㿩之子字彥載歷監察御史終梁汝霖字允濟後改名岩老永福人終朝議大夫闕祕闕知泉州陳傑字仲才羅源人終承事郎通判真州陳洪字秀頴候官人終通直郎葉庭芬字天茂閩縣人終迪功郎國子録陳丕顯字揚休福清人終通直郎興化軍教授林沖字子和閩清人終奉議郎特奏名林瑄王朴王宋臣吳默之杲卿之子柯亨道林侃張希參張洵武劉約張挺王旌薛遘林康臣劉愈葉中林確葉龔陳公才陳涇余思忠林括林協陳之逺唐循道林代工許君用陳景先鄭邦倫六年丙申釋褐胡震字東伯閩縣人終蔡州教授王元鼎字大受連江人知建州移本路提刑終朝請大夫醫學釋褐吳宗大七年丁酉釋褐林頴字褒然連江人終文林郎知松溪縣八年戊戌王升榜黃大知字守愚夏之邵臻之子字潛夫終闕黃祖堯豫之子字宗道福清人終楚州刑曹張大卞字憲仲福清人終承議郎知漳浦縣陳溫卿字天和候官人終從政郎柯若褆棐之子字安上終朝奉郎諸王宫大小學教授黃紳字存道候官人終宣義郎夏之文臻之子之邵之弟字蒙夫歷太常博士提舉浙西常平都官户部吏部郎中江西提刑終朝請郎施禹功字彥成懷安人終從政郎興化令丘逹字學仲長溪人梁宗範字世則永福人終朝請郎通判信州鄭鬲南之弟字才仲上舍釋褐歷二部郎官廣東漕知建州終朝請大夫劉侯亞綬之姪字彥亦終朝請郎余伯逵字周臣閩縣人林實字彥輝閩縣人周開迪字聖傳古田人葉大任字莘老終朝議大夫劉滂字啇霖閩清人梁國賔字景賢閩縣人終朝散郎陳允功字仲斌福清人林永字仲思候官人鄭彥敏宇俊德終從政郎黃琳字元振湛亨字彥嘉終太學正黃傳康字夢得閩縣人陳向字民瞻候官人髙預字覺先懷安人終宣教郎泉州教授葉庭傑字彥英閩縣人林聰字嘉謀福清人終朝奉郎林求字得益候官人陳杲字亨明候官人特奏名柯梁元祐五年解首徐明湛仔林端葉寬陳受王志道林先民陳暹王世輔王時發王戒方志道遊天與武學林汝弼黃定國淳熙三山志卷二十七
