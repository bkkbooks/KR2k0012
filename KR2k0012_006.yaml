  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0012_WYG_006-1a, image: WYG0484/WYG0484-0162a.png}
body:
  text: 淳熙三山志巻六宋梁克家撰地里類六江潮水路視潮次停泊猶驛鋪也循州境東出漲海萬里潮隨月長晝夜至如符契道閩安而上江面澄濶别為西峡逾于南臺皆㑹於懐安進而至湯背止以與溪流接自愛津東下縈紆數百里危陘狭道行者繭足輕舟朝發乃一夕可至南望交廣北睨淮浙渺渺之塵乗風轉柁顧不過三數日偽閩時蠻那放椿且次江岸國初六縣鹽舸徑輸州倉以達于四方郡今福清長樂涵頭嵗運未嘗停民無酤其来醸作兩溪糯粒舳艫相銜嵗小儉榖價海涌南北艦囷載歘至城外其諸貨寳回往不可名計浮于海達于江以入于河莫不有潮次云初一十六午初二十七午初三十八未初四十九未初五二十申初六二十一申初七二十二酉初八二十三酉初九二十四夘初十二十五夘十一二十六辰十二二十七辰十三二十八巳十四二十九巳十五三十已末午初此潮入州城内河之候也江潮常緩海潮三刻至入河則又少遲耳海道自迎仙至莆門平行用退潮十有五海不計里一潮迎仙港乘半退里碧頭迎仙港源自興化三百里合桃源水為大溪過迎仙市為子魚潭三百步歴福清黄茅墩墩南江上三千餘家屬興化人煙如海口鎮其墩溪漲海湧皆不能沒合蒜溪東流過浮山三里合徑江入海潮至子魚潭徑港源出興化縣界金支大澤至裏洋合黄蘖山南水十里名漁溪過應天院一源出黄蘖山北過鐵場邊北流東折合漁溪入徑港南至綿亭東出烏嶼門又南至雙嶼頭為二東出白嶼西出後嶼合於昭靈廟前㑹迎仙港入海潮至應天院前東南匿草嶼塘嶼昭靈廟下光風霽日窮目力而東有碧拳然乃琉球國也每風暴作釣船多為所漂一日夜至其界其水東流而不返莎蔓錯織不容轉柁漂者必至而後已其國人得之以藤串其踵令作山間蓋其國刳木為盂乃能周旋莎蔓間今海中大姨山夜忌舉火慮其國望之而至也二潮過洛化洋牛頭門泊寄沙多水劫三潮至燕錫泊婆弄澚一名暴露聲相近東草嶼四潮半退至銀盞舷乗半漲取錢藏出止馬門為過淺溯潮不克所以必持半漲也元豐二年甞移海口巡檢於此西海口鎮海口源出興化縣界流為百丈溪二百餘里至假面為横路溪即無患溪也東流二十里合石堘溪至水陸院合東溪經福清縣河頭瀦為琵琶洋十八里至海口入海潮至水陸院西鹽埕嵗管納海口倉七百萬斤經南交輸懐安倉葉􅒉珪記埕有三等沙埕為上夾沙次之泥埕為下沙埕喜受潮信退則昜乾實漏坵則昜淋故為上半沙半泥故為次泥溼距潮且難乾淋故為下大埕一二畆小者半畆大水取信小水暴乾蓋海水鹹鹵過埕則鹵歸土中日暴則鹹乃凝白花取海水淋之煉為鹽亦猶膽水浸鐵水中自有銅性遇鐵澁住故烹鐵而得銅也一月之間大水六日初一至初三十六至十八晴明則土信可収雨濯則土信敗矣一年之間惟五六七八月土信特厚蓋烈日之功也故舊法六月起火八月住火東鹽嶼蘇嶼鐘門昔人没鐘於此潮退蒲牢微見五潮半退過石帆洋狀如帆泊大小練二練門相去十里無便風停留或踰月西北松林塞六潮出練門至東西洛止雖近過此無泊所七潮泊慈澚勑號慈孝洋西長樂㯍過港長樂溪源極微大槩瀦為陂湖溢則洩而入海八潮轉南交山峙海中港内沙淺大潮二丈六尺小潮丈有九尺最為險阨舟人多於慈澚候便及晨潮方挾櫓而濟便風則自外洋縱繂偽閩時蠻舶至福州城下至國朝以南交之險遂置司温陸時有飄風入港者嶺口鹽埕于歴嶼頭永豐石馬砂坑鄭胡閭山嵗納二百四十二萬斤舊三百萬斤陸運二十里避南交之險輸長樂倉西梅花澚閩安鎮港源出處州龍泉東流經松溪政和一出建寜之浦城一出于崇安其間小溪數十匯於建城出南劒之東曰東溪一出邵武之光澤北流經順昌至沙溪北一出汀州之寜化西至清流沙縣之西合流至南劒與東溪合百八十里至水口左合古田縣源出建寜界東南流號横溪至上生院南合薦溪潭水數里合桃溪東流至縣東北隅龍津橋合東北溪知縣李堪名曰潤澤南經戴星洲鳴玉灘磨劒石下百丈漈入大溪故曰水口過大小滛乃無灘平流至猴山右納閩清水源自蓋平里合仁壽孝順金沙等里小溪土人多以小艇力勝至江口瞻於巨舟乃浮江而下小溪有三橋良石普賢寳山通尤溪黄洋諸場尤小者土民堰以溉田次黿溪唐大厯中有女子浣紗溪次為黿所食其父哭之哀既而得黿乃烹以釋憤名士多為記述其山源深險多不逞民盜販茗鹵官莫誰何俗號七村黿裏次左納大目溪次右小目溪源出閩清界六七十里入江次螺女江候官縣西北三十里搜神記閩人謝端江濵得大螺一蓄之家每出歸盤飱必具乃密伺見一姝麗甚遂突入問之曰我天漢中白水素女也帝哀卿少孤遣為卿具今已悉不可止卿宜以居糧可使盡而更盈言訖化去端如其言資給數世今足跡尚存或曰江形如螺至甘蔗北分數里復合至石門南分赤岸山尾與溈山尾相迎如門水中有石閾過石門為馬瀆江中流至洪塘岐為二北行者為南臺江納北山衆流桑溪自鵞鼻嶺經大坑嶺出東峯後至茶焙浦通潮鱔溪至浦東橋通潮過鼓山南行者合馬瀆江納永福溪源自南劒尤溪縣西流至泉州徳化縣南流至永福洑口埕㑹溪流行七十里合興化縣游洋青桐溪至重光寺前六十里合閩清縣界水至大章六十里合福清縣界十八溪入江縣以西有師姑等六灘東有太原等十灘不為害潮至保安里泝三十里至縣金﨑江閩縣東西南七十里昔漁者此釣得金鏁因見金牛急挽至岸俄而鏁絶猶得二尺許因名金崎江寰宇記晉康帝詔於此立廟螺洲洲形也在大義西北納龍泉坑溪合大義江瀨江出西峡門合琅琦江西浦溪出福清縣界經泥嶼至琅琦接潮一星溪出長樂界至白田接琅琦潮㑹鼓山之𣲖經石馬鷄嶼洋中有石號師子對方山巨浸未甞没俗謂水浸方山鼻不到師子耳抵東峡二十里入海潮由西峡上者先至洪塘由南臺上者差逢大潮至大若南臺江中有洲數里潮至鼔山分為二南廣而北狹由北上者入直瀆浦由南上者涉洲尾反東流而與之遇諺謂南臺江水顛倒流以此東劉﨑王峬湖江九潮至埕角每嵗二月烏頭數萬至自東海萃于此泊闗澚西萩蘆連江東南四十里有九龍江根連鼓山相傳秦始皇以東南氣王自江而南秀㧞者皆鑿之至是得蘆根長可數丈朝劚暮合終不殊執役者夢有告曰鍬鉢可夕置勿収乃如其言血流而絶通水成峡蛤沙萬海小港赤﨑連江港源出古田林洋界至七猴渡之北合小溪南流至潘渡橋一出羅源界號曰巖溪南至朱令橋合寳山院前丹陽溪西南流至興寜廟前與潘渡溪合西南流合參溪水至峽口鎮入海東鄭﨑官嶼雙髻焦土花鹽場今廢十潮轉北交聚石為灘連接海岸比南交差昜泊東西洛西羅源港源自蔣山溪經白塔院至四明橋合龍潭溪過務前合古弄溪至欄頭鋪入江又下倪南北溪經觀前橋至欄頭鋪前與蔣山溪合入松﨑江入海潮過四明觀亷灣俗呼林為亷中多林姓南灣寨東黄土山十一潮至水澚西官井洋港西源出處州龍泉界首溪東流百里至斜灘過載首合松潭溪白沙鎮紹興初廢至亷首村一出政和縣界經麻嶺至繆洋三十里至亷村㑹龍泉溪南流為江過甘棠港舊有巨石屹立波間舟多溺覆唐寳祐元年琅琊王審知具牢禮禱于神將刋之其夕雷雨暴作石皆柹觧遲明安流如砥昭宗詔奬之賜號甘棠神曰顯靈侯三年賜徳政碑五代史謂閩人私號誤黄﨑嶺潮東至白沙西至亷首各距四十里舟行一潮至由鎮陸行各百里白沙溪船至斜灘亷首溪船至繆洋北源出政和界至外渺程家渡南合甘露溪甆溪經深浦渡至長境平水分為二潮至金垂一出古田山谷合周仙湖東流為穹窿溪又東為晡溪又東為淀尾經赤鑑門一出古田至游溪合羅源山溪至溪口村同出于三嶼寨之左一出羅源飛泉渡出于三嶼之右滙于官井洋風濤險惡號三港口東入于海東浮膺山十二潮轉驢頭山泊斗米近有大小金澚鹽埕寜徳縣納十三潮泊桃門䈥竹山西松山港古松山沙徑合朱紫出其間西源號長汀溪自白巖十五里經建善寺至沙塘北源自赤岸澚村龍潭至大橋經鹽埕合沙塘而東入海潮北行者至大橋西行者至斗門次西烏﨑港源出西鄉蔗洋八十里至七溪南流七十里至飯溪出烏﨑向峯火入海小船至飯溪大船至楊門潭東三沙峯火寨十四潮泊圓塘西歛港出吉坑十里入海怯港俗謂惡為怯合小溪水至上洋五里靈峯十里至圓塘入海船至圓塘止東榆山十五潮至錢夯頭諺云錢夯頭無風自毬流言蕩漾也白露門或曰即白水江也白水即停船之處泊莆門寨前西南沙埕港源出温州界至桐山東入海船至桐山白水江舊記縣東北百七十里寰宇記白水即夷户也亦曰遊艇干或曰盧循餘種散居海上唐武徳中王義童招其首領周造麥細陵等授騎都尉以船為居寓廬海旁船首尾尖髙中平闊衝波逆浪略無懼怛名了鳥乾符間有陳蓬者駕舟從海來家于後﨑號白水仙有詩云水籬踈見浦茅屋漏通星又云石頭犖确髙低踏竹户彭亨左右聞甞留䜟曰東去無邊海西来萬頃田松山沙徑合朱紫出其間蔡學士雜記福唐水居船舉家聚止一舟寒暑食飲疾病昏婭未始去所謂白水郎者其斯人之徒歟淳熙三山志巻六
