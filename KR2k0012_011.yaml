body:
  text: 淳熙三山志卷十一宋梁克家撰版籍類二官莊田官莊田一頃九十畝三角四十六步租課錢一十貫二百文足官莊園林山地池塘陂堰等一千五百七十頃八十四畝二角二十四步租課錢五十五貫五百四十七文閩縣園地四十畝三十六步租課錢一十七貫六百四十一文足懷安縣田八畝二十四步租課錢三貫文足園地一頃二角四步租課錢三貫八百七十九文足福清縣園地二十二頃八十七畝三角二十步租課錢四貫八百四十文足大麥三斗一升六長溪縣田十八頃一十八畝二十步租課米三石斗園地一頃三十畝二角四十四步租課錢一貫六十五文足古田縣田九十四畝五十五步租課錢三貫二百文足米一斗園地一十六頃七十一畝三角一步租課錢六貫五百二十文足連江縣園地六百四頃四十九畝二角五步租課錢一十貫八百五十文足長樂縣園地九百二十頃三十六畝三角二十七步租課錢一貫一百一十文足角羅源縣田二畝二角五十六步園地七十五頃三一十六步各無人承佃文寧德縣田六十七畝三角一十一步租課錢二貫足米七石三斗五升園地二頃六十五畝一角四十一步租課錢五貫六十文足初僞閩時官莊田地一千一百一十頃八十二畝配納人戶租米八萬一千二百四十八石有奇太平興國五年雖詔與私産均作中下定稅是時尚給戶帖未許為永業租米數見墾田淳化五年李偉請鬻官田乃遣張延熙赴州估賣尋已之令佃者仍舊佃蒔輸租大中祥符六年轉運使王贄言建劒漳泉汀邵興化七郡官田皆課租惟福州止同私産輸稅請依漳泉例課一色斛斗上田畝九斗中田上園畝六斗下田中園畝四斗五升歲總羡米度可得五萬餘石明年王平奏福州舊𨽻兩浙與漳泉事體不同租課自太平興國五年巳經朝省均定漳泉僞閩日徴科歸屬本朝未經均檢今王贄請輸二稅外益納租米乃是額外增稅且州官私田園總一萬五千餘頃年徴米一十萬二千餘石其間輸送尚恐不前若將官莊一千二百餘頃改徴租米五萬九千餘石其田比之都額頃畝才十分之一而徵收之重六倍科輸伏惟軫念逺方矜其重賦許從舊貫詔可之天禧四年轉運使方伸荀言福州官莊田自來給與人戶主佃止納夏秋二稅更不他輸物色元夏稅錢五百二十五貫二百八十一文足秋稅米九千四百九十八石有奇鄉雖經朝省均定緣百姓私産並用資買既輸稅又充色役佃官莊戶乃是請射成熟田地耕作復免隨例差徭深見虧官請估價許元佃者承買與限二年償所得估直度可三十萬緡不從既而復委尚書屯田貟外即張希顔依漳泉例均租總得米六萬五千一百二十石有奇尋下詔國家無急蒸黎常輕賦斂豈令逺俗重此科輸宜特與以推恩且並從於舊貫可令福州佃官莊戶依舊佃蒔更不課租五年前福建提刑王文震奏福州佃官田戶雖係屯田名目只依二稅催科産錢不計少多例免門役差遣臣管見屯田戶既特免租課又不追田價即與平産人戶田業無殊欲乞削去屯田名目割歸稅簿催科止當門役省司議名目依舊屯田不得充為永業其差遣宜依平産人例有㫖依天聖三年張希顔請福建七州官莊並各輸租惟福州獨依私産復免差徭豈非幸民乞依臣先來均定租米胡則奏當州官田巳奉勑均定與私産雷同催科已經四十六年若依張希顔所奏改納租米且官田鹹蒸瘠薄者多肥濃浚壤者少地臨巨海夏秋之間海潮颭風漂蕩流落州縣難於催督乞仍納二稅不輸租課於是朝廷更令方仲荀分析利害仲荀遂申前請乃令屯田貟外郎辛慶忌復括十二縣官莊屯田一百四所成熟田園一千三百七十三頃八十四畝一角三十八步佃者二萬二千三百二十七人元無正田先定二稅止有閩侯懷安閩清永福古田寧德七縣田園十分中內五分下長樂福清連江羅源長溪五縣皆下品十分中內三分中七分下估直可三十五萬二千一百餘緡省司議佃戶二稅外更納所買田價恐難以依限督納乞减所估分數仍展年償明年有㫖與减三分之一償限三年六年章頻奏福州官田估計價錢三十五萬餘以餘一分錢一十一萬七千三百餘緡减放外有二分合納錢二十三萬四千七百餘緡隨三年夏秋二稅作六限催科錢數浩大督輸嚴峻有佃戶九百餘人訴稱貧乏無可輸償願還田别召買者內五百餘戶已納過二限錢為次限急迫願以所佃田及已輸錢併入還官計今年官田巳納緡錢一十萬六千三百有奇尚有未納一十二萬八千四百望賜蠲除則二萬餘家庶獲存濟詔州具納缺五等數目以聞州奏前已納一十萬九千五百六十六緡有奇願退不買田四千七百五十緡歲終又納四萬二千七百九十三緡有奇未納錢尚七萬七千八百餘緡有㫖並與除破明年州奏頃所鬻田巳輸錢足人合給契與執為永業其退還官及後來承買未曽償直等欲仍舊拘籍歲輸二稅省司議令巳納外缺人並與除放出給戶帖其退還田土及全未納戶仍舊理納租課於是轉運司盡括諸縣退佃并不納價錢白腳戶六百六十九田園五十九頃六十畝計輸米二千九百一十二石有奇除五百四十石所納二稅元額總合輸租米二千三百七十二石十年鄭載奏本州官莊肥濃地土各有承買其退納田土並是枕海鹹蒸瘠薄之地年收夏秋二稅尚憂不辦以此人情退納還官今復輸租米不惟數目至多兼窮民的難了納但有虛數繫簿枉行科較乞賜蠲免詔可之於是國初以來官莊巳鬻及退納田土並為民永業不復議輸租矣至天聖之後沒納田産入官浸多率為豪戶冒占慶厯三年前轉運使吕紹寧上言福州官田多為豪户蓄弊乞根檢重估别定稅數當增賦不少仍可入資十萬餘緡明年三司戶部奏福泉漳州興化軍莊田歲輸米一十二萬一百餘石從來增助諸州逐歲軍儲今若依紹寧所請歲總輸米止可四萬四千餘石深虧官數乞仍舊租佃輸課從之嘉祐二年詔沒官戶絶田土輸課别儲一倉名曰廣惠以備賑濟熙寧二年住撥入廣惠倉十年以沒官莊産出賣崇寧三年住賣拘收租課充外學支費五年拘學費田産入常平司尋令召賣政和元年臣寮言天下繫官田産在常平司有出賣法如折納抵當戶絶之類是也在轉運司有請佃法如天荒逃田省莊之類是也自餘閒田名類非一雖間有出鬻請佃多為豪戶侵冒望命官總領除贍學給賜沿邉州縣官田外悉召承買令戶部侍即范坦措置總領明年言者謂繫官田業法度具在有司治之若禁令修而斂取以時則其利為無窮今不修禁令不督有司一旦盡鬻之俾膏腴土田為有力者締結收置而荒田瘠薄無用之産徒費帳籍且張官置吏召賣田宅有傷國體竊聞福建等處皆以為非便既致煩擾减落上供又易租為稅其失數倍福建路嘗言屯田官莊出租一十九萬七千餘石居一路賦稅六分之一如悉估鬻必誤軍儲乞寢之遂降御筆其略云祖宗以來田之公者為屯田為官莊養民兵居佃戶於以資助經費藩衛邊部乃者有司建言繫官田宅一切賣鬻茍目前之利廢長久之䇿豪彊兼并佃戶失業昨范坦所出賣官田宅畫一更不施行總領措置官吏並罷巳買田宅給還元納價錢其田宅却拘入官元佃賃人願依舊佃賃者聽餘依元豐法元豐令諸田宅入常平司者召人承買其省莊退田並不出賣紹興二年復議出賣尋寢五年朝廷以謂發兵費不資或請賣官田不特濟用度而於民亦不為無補且産錢舊額以沒納銷落雖官自常産之外得佃戶年租而課利悉歸豪戶科料特促貧弱今出沒納田散賣民間得田優産以補舊額且示國家抑兼并行寬恤之意於是遂以繫官田舍及不繫出賣者並委逐路提刑總領措置出賣淳熙三山志卷十一
