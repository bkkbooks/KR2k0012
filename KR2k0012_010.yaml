body:
  text: 淳熈三山志巻十宋梁克家撰版籍類一墾田園林山地池塘陂堰等附州境分畫自蕭梁始前望建安後抵南安則今郡界也時莆田属南安異時地曠民稀事簡役少在隋猶以為一閩縣耳唐初撫定遂復以州名之豈丁甿日滋庸調寖繁不可以縣治耶世運推移迄今又五百餘年廢興相環制度不知幾變矣田苗之隱核戸版之登耗簡稽之詳略吏傔之衆寡欲循初至末悉言之未能也姑取其籍於今者而繋其說於後云墾田四萬二千六百三十三頃一十八畆二角三十三歩民戸三萬五千三百八頃七十二畒一十三歩寺觀戸十千三百二十四頃四十六畝二角二十歩園林山地池塘陂堰等六萬二千五百八十八頃五十一畝二角四十五歩民户四萬六千七百八十七頃九十二畝一角二十歩寺觀戸一萬五千八百頃五十九畝一角二十五歩閩縣田三千三百五十八頃二十五畝一角一十四歩民戸二千五百四十六頃六十畝三角三十五歩寺觀八百一十一頃六十四畆一角三十九歩園地等三千三百五十二頃三十二畝一角五十七歩民户一千七百二十五頃三十三畝二角二十三歩寺觀一千六百二十六頃九十八畝三角三十四歩候官縣田二千九百九頃九十三畝二角九歩民户一千九百二十九頃二十六畝一角五十五歩寺觀九百八十頃六十七畝一角一十四歩園地等八千二十四頃九十六畝一角三十五歩民戸四千九百四十六頃二十三畒四十三歩寺觀三千七十八頃七十三畝五十二歩懐安縣田二千六百三十四頃五十一畝一角一十六歩民戸一千八百四十八頃八十畝三角五十四歩寺觀七百八十五頃七十畒一角二十二歩園地等四千八百五十二頃七十畒二角四十四歩民户二千八百二十七頃六十一畒一角三十八歩寺觀二千二十五頃九畒一角六歩福清縣田五千三百三十頃八十七畒三角一十三歩民户四千六百五十一頃一十八畒三角三十五歩寺觀六百七十九頃六十八畒三角三十八歩園地等五千三百二頃七十九畒二角一十三歩民户四千九十八頃九十畒一角五十九歩寺觀一千二百三頃頃十九畒一十四歩戸長溪縣田八千二百六十八三十四畒九歩民七千七百一十四頃七十二畒一角五十二歩寺觀五百五十三頃六十一畒二角一十七歩園地等七千八百三十六頃三十九畒一十八歩民户七千三百七十五頃八十三畒三十九歩寺觀四百六十頃五十五畒三角三十九歩五古田縣田六千九十頃四十一畒五十三歩民户千四十三頃八十二畆二角一十六歩寺觀一千四十六頃五十八畆三角三十七歩園地等七千二百二十九頃一十七畒一角五十九歩民户四千九百一十六頃六十畆三角五十八歩寺觀二千三百二頃五十六畆二角一歩連江縣田二千五百五十七頃五十六畆二角三十五歩民户二千二百六十五頃九十九畒二角四十三歩寺觀二百九十一頃二十六畆三角五十二歩園地等三千三百九十三頃一十五畆二十歩民户二千九百四十九頃三十三畆五十九歩寺觀四百四十二頃八十一畆三角二十一歩長樂縣田二千四頃一十一畆二十四歩民户一千八百一十二頃四畆一角寺觀一百九十二頃六畆三角二十四歩園地等一千六百三十五頃九十九畆三角三十二歩民戸一千三百九頃二十六畆二角四十九歩寺觀三百二十六頃七十三畆四十三歩歩永福縣田二千八百二十八頃三十五畆二十六民戸二千三百八十九頃七十八畆四十歩寺觀四百三十八頃五十六畒三角四十六歩園地等八千六百九十三頃五十四畆二角一十九歩民户四千一百四頃七十七畆四十九歩寺觀一千九百八十三頃七十七畆一角三十歩二閩清縣田二千一百一十頃一十五畆一角三十歩民户一千七百四十九頃二十五畆二角三十三歩寺觀三百六十頃八十九畆二角五十九歩園地等五千四百六十二頃四十九畆二角三十歩民戸四千三百七十九頃七十五畆二角二十七歩寺觀一千八十二頃七十四畆三歩羅源縣田一千六百九十一頃七十五畆三角三十九歩民户一千四百二十三頃九十九畆二角三歩寺觀二百六十七頃七十六畆一角三十六歩園地等三千四百六十二頃一十九畆一角二十三歩民戸二千六百八十四頃八十畆三角三十二歩寺觀七百七十七頃三十八畆一角五十一歩寧徳縣田二千八百四十八頃九十一畆三三頃二十二畆二角七歩寺民户一千九百三十九百一十五頃六十八畆一角五十六歩園地等五千三百四十三頃七十六畆三角五十四歩民户四千八百三十四頃四十五畆三角二十四歩寺觀四百八十九頃二十一畆三十歩初偽閩時墾田一萬四千一百四十三頃一十六畆有奇白配錢二萬三百八十四貫四百有奇斛㪷九萬二千七百餘石外官莊田不輸夏稅惟徴租米八萬一千三百四十八石有奇皇朝太平興國五年有言兩浙大戸租賦反輕貧下之家輸納則重是時本州𨽻兩浙乃詔朝臣王永髙象先赴州相度於是官私田産槩命弓量以偽閩時沿徴白配錢米滚為租額均定總夏稅錢二萬三百八十四貫有奇苗米十七萬三千九百四十餘石咸平初始分折科未幾復詔著作佐郎李妥再至始蠲異時諸雜沿徴物色更以官私田産均為中下兩等定稅中田畮産錢四文四分米八升下田畮三文七分米七升四勺園畮一十文丁人輸錢百總為夏稅錢一萬五千六十三貫二百六文米一十萬二千五百二十八石四斗六升八合沈存中筆談載兩浙錢氏時田畮米三斗太平興國六年遣王方贄定稅悉令畮出一斗謂不可循偽國法惟福建猶循舊額蓋當時無人論列遂為永式豈存中未之攷乎咸平初夏稅及身丁錢總二萬九千七百四十四貫有奇大中祥符四年詔放身丁錢獨夏稅七千六十九貫有奇自後苗米一十萬七千餘石慶厯中見元祐中産錢八千五十九貫二百一文三分三釐米一十一萬一百五十五石三斗四升三合建炎以來夏稅僅増舊額七千有奇米仍舊紹興十九年行經界法田以名色定等鄉以舊額敷稅列邑之地各有髙下肥磽一鄉之中土色亦異於是或釐九等或七等或六等或三等雜地則或五等或三等多者錢五文米一斗五升今獨閩縣晉安西鄉産錢五文七分三釐七毫候官石門鄉米二斗五升七合如他邑皆錢自四文以下米自一斗以下有差最少者錢一分米僅合勺以今墾田若園林山地等頃畮較之國初殆増十倍夏稅比祥符後加一千餘緡苗米比慶厯後加四千餘石戸口祖額主客戸二十五萬九千二百九十主戸一十七萬一百三十七客戸八萬九千一百五十三主客丁三十八萬六千五百六十二主丁二十五萬八千五百九十一客丁一十二萬八千五百七十一今額主客戸三十二萬一千二百八十四主戸二十一萬一千五百九十客戸一十萬九千六百九十二主客丁五十七萬九千一百七十七主丁三十九萬二千三百二十七客丁一十八萬六千八百五十閩縣主戸二萬二千二百三十二口四千一百八十三客戸一萬五百一十三口一萬八千五百一十三二候官縣主戸一萬九千三百七十一口四萬四千百五十五客戸七千五百四十五口一萬四千九百三十五八懐安縣主戸一萬六千三百七十三口四萬九千百六客戸六千九百三十七口一萬六千五百七十五六福清縣主戸三萬七千八百九十一口一萬四千百四十七客戸一萬六百二十一口一萬四千四十七七長溪縣主尸一萬九千九百八十九口六萬一千百一十九客戸二萬六千三百三十五口三萬四千七百七十四七古田縣主戸闕萬四千一百四十三口六萬二千百六十三百二十八客戸九千四百八十二口二萬一千八連江縣主戸一萬三千八百八十四口闕萬九千四百一十四長客戸四千八百三十口一萬二千二百三十九樂縣主戸九千一百五十六口四萬七千二百一十九主客戸四千一百八口一萬八百三十八永福縣戸九千五百八十一口一萬一千二百七十六十客戸一萬一千七百八十六口一萬六千三百六八閩清縣主戸七千八百四十六口一萬五千二百七十七七百一十二口一萬一千一百九十七客戸六千羅源縣主戸九千一百三十三口一萬三千二百五十六德客戸三千二百五十六口五千五百四十四寧縣主戸一萬一千八百四十九口二萬三千六百四十三客戸七千四百口一萬五千五百三十二七閩人民自周職方巳有其數矣經秦歴漢徙寘江淮道亡巖谷其存有幾呉永安三年始属建安郡是時戸僅二千四十二口一萬七千六百八暨晉太康分置晉安州戸始三千八百四十三口一萬九千八百三十五林世程志永嘉之亂衣冠南渡時如閩者八族其後増四千三百至隋一萬二千四百二十並舊志唐開元三萬一千六十七元和郡國志富庶蓋如是矣建中之世戸十二萬九千五百二十二口二十一萬七千八百七十七通典元和戸口消减至一萬九千四百九十四元和郡國志百闕謂元和中供歳賦者浙西東福建八道戸較建中纔四之一志書戸三萬四千九十四口七萬五千八百七十六此又是開元以後盛時之數也豈藩鎭擾亂吾閩雖無與其還定安集亦不能如徃時耶皇朝德澤深厚邦民皓首不識兵革以故生齒繁毓國初主客戸凢九萬四千五百一十景德一十一萬四千八百六十二九域圖治平一十九萬七千一百七十六治平圖志元豐二十一萬一千五百四十六九域志建炎以來戸主二十七萬二百有一口四十萬七千三百四十四建炎圖志以今較之戸加建炎五之一口加三之一按吏部格式建隆元年勑應天下縣據見管主戸重升降地望取四千戸以上為望三千戸以上為𦂳二千戸以上一千戸以下為中下又開寳六年勑五百戸以下為下縣自今後三年一度取諸道州府見管戸口升降景德農田勑諸州每年申奏丁口文帳仰旨揮諸縣差本村三大戸長就門通抄毎年造帳本縣據户數収落仍春季終聞奏大中祥符二年升降數目閩縣八千三百五十二戸候官七千五百二十九戸懐安七千七百九十三户福清八千四百七十六戸古田六千八百五十户連江五千二百二十戸以上係望縣長溪三千八百四十戸永福三千六十七户長樂三千六百三十五户以上係𦂳縣閩清一千八百三十一户羅源一千四百七十一户寧德一千四百六十户以上係中縣景祐四年重行升降等第地望閩縣八千三百五十二戸候官七千六百四十六戸懐安七千七百九十三戸古田六千九百二十二戸連江五千二百二十二戸福清八千四百七十六戸已上元是望縣不該升降依舊為望縣永福三千六十七户長樂三千六百三十戸長溪三千八百四十戸元是𦂳縣不該升降依舊為𦂳縣閩清一千八百二十一戸羅源一千四百七十一戸寧德一千四百六十戸巳上是中縣不該升降依舊為中縣而官戸二千四百四十三閩縣六百三十戸官六百八十四户候懐安三百四十七戸二福清一百四十四戸八戸古田三十戸連江八十一戸長溪三十長樂一百四十戸十一戸永福一百三十六戸德閩清一百一羅源五十三户寧三十六户寺觀戸一千四百七十四閩縣一百七十八户産錢二百三十三貫四百六文候官一百二户産錢三百一十四貫四百四十三文戸産錢二百二十四貫七百二文懐安一百六十九福清一百九十四戸産錢一百六十三貫五百五十六文十四戸産錢七十九貫六百八十一文長溪一百三古田一百六十一戸産錢一百二貫四百八文七連江九十五户産錢九十貫四百八十六文長樂十三戸産錢五十二貫三百三文八永福七十戸産錢七十九貫七百八十四文閩清十八戸産錢六十貫八百三十五文十羅源六十一戸産錢五十六貫二十八文共寧德四九戸産錢五十一貫四百四十六文巳上為産錢一千五百九貫七十八文並係舊産除無名寺觀外上件可謂盛也巳僧道舊記繫帳僧三萬二千七百九十五人童行一萬八千五百四十八人今繫帳僧一萬一千五百三十人童行二千九百一十五人道士一百七十人閩縣僧一千八百八人童行四百八十八人候官縣僧一千九百五十人童行五百七人懐安縣僧八百七十一人三縣道士共一百五十人福清縣僧一千四百人道士七人長溪縣僧一千二百五十七人道士一人古田縣僧一千一百一十二人童行八百七十八人連江縣僧五百八十六人長樂縣僧四百九十四人童行一十二人道士三人永福縣僧五百三十二人童行二百七十八人閩清縣僧五百六十六人童行一百六十七人羅源縣僧四百九十二人童行一百四十八人道士八人寧德縣僧七百六十四人童行三百一十一人道士一人舊記謂僧戸與民參半以今籍較之直民田五之一今民田若地八萬二千餘頃食民五十七萬九千黄中小老不計浮屠氏田若地二千餘頃食僧徒一萬四千餘人是民七人共百畮而僧以二人食之民産錢八千緡有奇僧寺一千五百不啻當民八之一以故州常賦外一切取給於僧寺有以也夫淳熈三山志巻十
