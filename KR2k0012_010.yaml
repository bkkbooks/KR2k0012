body:
  text: 淳熙三山志卷十宋梁克家撰版籍類一墾田園林山地池塘陂堰等附州境分畫自蕭梁始前望建安後抵南安則今郡界也時莆田屬南安異時地曠民稀事簡役少在隋猶以為一閩縣耳唐初撫定遂復以州名之豈丁氓日滋庸調寖繁不可以縣治耶世運推移迄今又五百餘年廢興相環制度不知幾變矣田苗之隱核戶版之登耗簡稽之詳略吏傔之衆寡欲循初至末悉言之未能也姑取其籍於今者而繫其説於後云墾田四萬二千六百三十三頃一十八畝二角三十三步民戶三萬五千三百八頃七十二畒一十三步寺觀戶十千三百二十四頃四十六畝二角二十步園林山地池塘陂堰等六萬二千五百八十八頃五十一畝二角四十五步民户四萬六千七百八十七頃九十二畝一角二十步寺觀戶一萬五千八百頃五十九畝一角二十五步閩縣田三千三百五十八頃二十五畝一角一十四步民戶二千五百四十六頃六十畝三角三十五步寺觀八百一十一頃六十四畝一角三十九步園地等三千三百五十二頃三十二畝一角五十七步民户一千七百二十五頃三十三畝二角二十三步寺觀一千六百二十六頃九十八畝三角三十四步候官縣田二千九百九頃九十三畝二角九步民户一千九百二十九頃二十六畝一角五十五步寺觀九百八十頃六十七畝一角一十四步園地等八千二十四頃九十六畝一角三十五步民戶四千九百四十六頃二十三畒四十三步寺觀三千七十八頃七十三畝五十二步懷安縣田二千六百三十四頃五十一畝一角一十六步民戶一千八百四十八頃八十畝三角五十四步寺觀七百八十五頃七十畒一角二十二步園地等四千八百五十二頃七十畒二角四十四步民户二千八百二十七頃六十一畒一角三十八步寺觀二千二十五頃九畒一角六步福清縣田五千三百三十頃八十七畒三角一十三步民户四千六百五十一頃一十八畒三角三十五步寺觀六百七十九頃六十八畒三角三十八步園地等五千三百二頃七十九畒二角一十三步民户四千九十八頃九十畒一角五十九步寺觀一千二百三頃頃十九畒一十四步戶長溪縣田八千二百六十八三十四畒九步民七千七百一十四頃七十二畒一角五十二步寺觀五百五十三頃六十一畒二角一十七步園地等七千八百三十六頃三十九畒一十八步民户七千三百七十五頃八十三畒三十九步寺觀四百六十頃五十五畒三角三十九步五古田縣田六千九十頃四十一畒五十三步民户千四十三頃八十二畝二角一十六步寺觀一千四十六頃五十八畝三角三十七步園地等七千二百二十九頃一十七畒一角五十九步民户四千九百一十六頃六十畝三角五十八步寺觀二千三百二頃五十六畝二角一步連江縣田二千五百五十七頃五十六畝二角三十五步民户二千二百六十五頃九十九畒二角四十三步寺觀二百九十一頃二十六畝三角五十二步園地等三千三百九十三頃一十五畝二十步民户二千九百四十九頃三十三畝五十九步寺觀四百四十二頃八十一畝三角二十一步長樂縣田二千四頃一十一畝二十四步民户一千八百一十二頃四畝一角寺觀一百九十二頃六畝三角二十四步園地等一千六百三十五頃九十九畝三角三十二步民戶一千三百九頃二十六畝二角四十九步寺觀三百二十六頃七十三畝四十三步步永福縣田二千八百二十八頃三十五畝二十六民戶二千三百八十九頃七十八畝四十步寺觀四百三十八頃五十六畒三角四十六步園地等八千六百九十三頃五十四畝二角一十九步民户四千一百四頃七十七畝四十九步寺觀一千九百八十三頃七十七畝一角三十步二閩清縣田二千一百一十頃一十五畝一角三十步民户一千七百四十九頃二十五畝二角三十三步寺觀三百六十頃八十九畝二角五十九步園地等五千四百六十二頃四十九畝二角三十步民戶四千三百七十九頃七十五畝二角二十七步寺觀一千八十二頃七十四畝三步羅源縣田一千六百九十一頃七十五畝三角三十九步民户一千四百二十三頃九十九畝二角三步寺觀二百六十七頃七十六畝一角三十六步園地等三千四百六十二頃一十九畝一角二十三步民戶二千六百八十四頃八十畝三角三十二步寺觀七百七十七頃三十八畝一角五十一步寧德縣田二千八百四十八頃九十一畝三三頃二十二畝二角七步寺民户一千九百三十九百一十五頃六十八畝一角五十六步園地等五千三百四十三頃七十六畝三角五十四步民户四千八百三十四頃四十五畝三角二十四步寺觀四百八十九頃二十一畝三十步初偽閩時墾田一萬四千一百四十三頃一十六畝有奇白配錢二萬三百八十四貫四百有奇斛斗九萬二千七百餘石外官莊田不輸夏稅惟徴租米八萬一千三百四十八石有奇皇朝太平興國五年有言兩浙大戶租賦反輕貧下之家輸納則重是時本州𨽻兩浙乃詔朝臣王永髙象先赴州相度於是官私田産槩命弓量以偽閩時沿徴白配錢米滚為租額均定總夏稅錢二萬三百八十四貫有奇苗米十七萬三千九百四十餘石咸平初始分折科未幾復詔著作佐郎李妥再至始蠲異時諸雜沿徴物色更以官私田産均為中下兩等定稅中田畝産錢四文四分米八升下田畝三文七分米七升四勺園畝一十文丁人輸錢百總為夏稅錢一萬五千六十三貫二百六文米一十萬二千五百二十八石四斗六升八合沈存中筆談載兩浙錢氏時田畝米三斗太平興國六年遣王方贄定稅悉令畝出一斗謂不可循偽國法惟福建猶循舊額蓋當時無人論列遂為永式豈存中未之考乎咸平初夏稅及身丁錢總二萬九千七百四十四貫有奇大中祥符四年詔放身丁錢獨夏稅七千六十九貫有奇自後苗米一十萬七千餘石慶厯中見元祐中産錢八千五十九貫二百一文三分三釐米一十一萬一百五十五石三斗四升三合建炎以來夏稅僅增舊額七千有奇米仍舊紹興十九年行經界法田以名色定等鄉以舊額敷稅列邑之地各有髙下肥磽一鄉之中土色亦異於是或釐九等或七等或六等或三等雜地則或五等或三等多者錢五文米一斗五升今獨閩縣晉安西鄉産錢五文七分三釐七毫候官石門鄉米二斗五升七合如他邑皆錢自四文以下米自一斗以下有差最少者錢一分米僅合勺以今墾田若園林山地等頃畝較之國初殆增十倍夏稅比祥符後加一千餘緡苗米比慶厯後加四千餘石戶口祖額主客戶二十五萬九千二百九十主戶一十七萬一百三十七客戶八萬九千一百五十三主客丁三十八萬六千五百六十二主丁二十五萬八千五百九十一客丁一十二萬八千五百七十一今額主客戶三十二萬一千二百八十四主戶二十一萬一千五百九十客戶一十萬九千六百九十二主客丁五十七萬九千一百七十七主丁三十九萬二千三百二十七客丁一十八萬六千八百五十閩縣主戶二萬二千二百三十二口四千一百八十三客戶一萬五百一十三口一萬八千五百一十三二候官縣主戶一萬九千三百七十一口四萬四千百五十五客戶七千五百四十五口一萬四千九百三十五八懷安縣主戶一萬六千三百七十三口四萬九千百六客戶六千九百三十七口一萬六千五百七十五六福清縣主戶三萬七千八百九十一口一萬四千百四十七客戶一萬六百二十一口一萬四千四十七七長溪縣主尸一萬九千九百八十九口六萬一千百一十九客戶二萬六千三百三十五口三萬四千七百七十四七古田縣主戶闕萬四千一百四十三口六萬二千百六十三百二十八客戶九千四百八十二口二萬一千八連江縣主戶一萬三千八百八十四口闕萬九千四百一十四長客戶四千八百三十口一萬二千二百三十九樂縣主戶九千一百五十六口四萬七千二百一十九主客戶四千一百八口一萬八百三十八永福縣戶九千五百八十一口一萬一千二百七十六十客戶一萬一千七百八十六口一萬六千三百六八閩清縣主戶七千八百四十六口一萬五千二百七十七七百一十二口一萬一千一百九十七客戶六千羅源縣主戶九千一百三十三口一萬三千二百五十六德客戶三千二百五十六口五千五百四十四寧縣主戶一萬一千八百四十九口二萬三千六百四十三客戶七千四百口一萬五千五百三十二七閩人民自周職方巳有其數矣經秦歷漢徙置江淮道亡巖谷其存有幾吳永安三年始屬建安郡是時戶僅二千四十二口一萬七千六百八暨晉太康分置晉安州戶始三千八百四十三口一萬九千八百三十五林世程志永嘉之亂衣冠南渡時如閩者八族其後增四千三百至隋一萬二千四百二十並舊志唐開元三萬一千六十七元和郡國志富庶蓋如是矣建中之世戶十二萬九千五百二十二口二十一萬七千八百七十七通典元和戶口消減至一萬九千四百九十四元和郡國志百闕謂元和中供歲賦者浙西東福建八道戶較建中才四之一志書戶三萬四千九十四口七萬五千八百七十六此又是開元以後盛時之數也豈藩鎮擾亂吾閩雖無與其還定安集亦不能如往時耶皇朝德澤深厚邦民皓首不識兵革以故生齒繁育國初主客戶凡九萬四千五百一十景德一十一萬四千八百六十二九域圖治平一十九萬七千一百七十六治平圖志元豐二十一萬一千五百四十六九域志建炎以來戶主二十七萬二百有一口四十萬七千三百四十四建炎圖志以今較之戶加建炎五之一口加三之一按吏部格式建隆元年勑應天下縣據見管主戶重升降地望取四千戶以上為望三千戶以上為緊二千戶以上一千戶以下為中下又開寶六年勑五百戶以下為下縣自今後三年一度取諸道州府見管戶口升降景德農田勑諸州每年申奏丁口文帳仰旨揮諸縣差本村三大戶長就門通抄每年造帳本縣據户數收落仍春季終聞奏大中祥符二年升降數目閩縣八千三百五十二戶候官七千五百二十九戶懷安七千七百九十三户福清八千四百七十六戶古田六千八百五十户連江五千二百二十戶以上係望縣長溪三千八百四十戶永福三千六十七户長樂三千六百三十五户以上係緊縣閩清一千八百三十一户羅源一千四百七十一户寧德一千四百六十户以上係中縣景祐四年重行升降等第地望閩縣八千三百五十二戶候官七千六百四十六戶懷安七千七百九十三戶古田六千九百二十二戶連江五千二百二十二戶福清八千四百七十六戶已上元是望縣不該升降依舊為望縣永福三千六十七户長樂三千六百三十戶長溪三千八百四十戶元是緊縣不該升降依舊為緊縣閩清一千八百二十一戶羅源一千四百七十一戶寧德一千四百六十戶巳上是中縣不該升降依舊為中縣而官戶二千四百四十三閩縣六百三十戶官六百八十四户候懷安三百四十七戶二福清一百四十四戶八戶古田三十戶連江八十一戶長溪三十長樂一百四十戶十一戶永福一百三十六戶德閩清一百一羅源五十三户寧三十六户寺觀戶一千四百七十四閩縣一百七十八户産錢二百三十三貫四百六文候官一百二户産錢三百一十四貫四百四十三文戶産錢二百二十四貫七百二文懷安一百六十九福清一百九十四戶産錢一百六十三貫五百五十六文十四戶産錢七十九貫六百八十一文長溪一百三古田一百六十一戶産錢一百二貫四百八文七連江九十五户産錢九十貫四百八十六文長樂十三戶産錢五十二貫三百三文八永福七十戶産錢七十九貫七百八十四文閩清十八戶産錢六十貫八百三十五文十羅源六十一戶産錢五十六貫二十八文共寧德四九戶産錢五十一貫四百四十六文巳上為産錢一千五百九貫七十八文並係舊産除無名寺觀外上件可謂盛也巳僧道舊記繫帳僧三萬二千七百九十五人童行一萬八千五百四十八人今繫帳僧一萬一千五百三十人童行二千九百一十五人道士一百七十人閩縣僧一千八百八人童行四百八十八人候官縣僧一千九百五十人童行五百七人懷安縣僧八百七十一人三縣道士共一百五十人福清縣僧一千四百人道士七人長溪縣僧一千二百五十七人道士一人古田縣僧一千一百一十二人童行八百七十八人連江縣僧五百八十六人長樂縣僧四百九十四人童行一十二人道士三人永福縣僧五百三十二人童行二百七十八人閩清縣僧五百六十六人童行一百六十七人羅源縣僧四百九十二人童行一百四十八人道士八人寧德縣僧七百六十四人童行三百一十一人道士一人舊記謂僧戶與民參半以今籍較之直民田五之一今民田若地八萬二千餘頃食民五十七萬九千黃中小老不計浮屠氏田若地二千餘頃食僧徒一萬四千餘人是民七人共百畝而僧以二人食之民産錢八千緡有奇僧寺一千五百不啻當民八之一以故州常賦外一切取給於僧寺有以也夫淳熙三山志卷十
