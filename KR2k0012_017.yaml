body:
  text: 淳熙三山志卷十七宋梁克家撰財賦類嵗收國初財賦二稅之外惟商稅鹽課牙契房租而已官稍兵給與正供之額既寡故取之甚簡而用常有餘熙豐之後更歷崇觀至軍興事起調度寖廣斂算亦增因仍迄今蓋非其舊也今州之官吏宗子諸軍俸料賞給與凡州之費嵗為緡錢至七十萬不可勝具矣其貢發之目又復不資而嵗之所收以歸州用者數止於是具列於左方云二稅鹽役夏稅産錢十二縣總八千一百四十八貫三百二十六文閩縣産錢九百四十三貫三百二十三文連江縣産錢七百二十五貫八百五文長候官縣産錢一千二十五貫七百七十文溪縣産錢七百七十五貫九百一十二文長樂縣産錢五百二貫一百二十二文文福清縣産錢一千四百八十貫三百二十四古田縣産錢五百六十三貫九百五十三文閩永福縣産錢四百四十四貫七百五十文清縣産錢三百三十七貫八百六十一文源寧德縣産錢三百二十五貫六十七文羅縣産錢二百八十五貫五百二十七文文懷安縣産錢七百四十七貫九百三久例以三千六百九十貫折科納一千匹裨布一萬匹小麥一千五百石紬每匹元折産錢六百五十文禆布每匹元折産錢二百四十四文小麥每斗元折産錢四十七遞年分拋下十二縣仰據數於五等人户産錢上科折取令公平內匹闔縣紬一百一十六匹禆布一千一百四十小麥一百七十三石連江縣紬九十一匹禆布八百九十五匹小麥一百三十六石候官紬一百二十七匹禆布一千二百六十匹小麥一百九十一石一長溪紬九十六匹禆布九百六十四匹小麥百四十七石長樂紬六十匹禆布六百一十匹小麥九十二石福清紬一百八十一匹禆布一千八百二十五匹小麥二百七十五石百古田紬七十匹禆布六百九十九匹小麥一一石永福紬五十六匹禆布五百五十匹小麥八十四石十閩清紬三十九匹禆布四百十五匹小麥五三石十寧德紬三十九匹禆布三百九十匹小麥五八石羅源紬三十三匹禆布三百三十九匹小麥五十二石麥懷安紬九十二匹禆布九百十三匹小一百三十八石皆估納月中價令人户輸納計錢二萬六千七百五十貫文足見納中價每匹紬四貫布一貫六百文小麥每斗四百三十文外四千四百五十八貫三百二十六文係諸縣除科折紬布麥外餘産錢納銅鐡中半錢謂如産錢二百文內一百文納銅錢更一半一百文元納鐡錢已准敕不行每百文令將銅錢四十八文折納之類計錢三千二百九十九貫一百六十一文秋稅苗米十二縣總催一千一萬一千二石二升五合閩縣苗米一萬四千七百八十三石七升田隨鄉上中下分九等定稅連江苗米一萬三百六十二石二斗四升田隨鄉分六等定稅候官苗米一萬二千四百七十七石三斗六升田隨鄉分六等定稅隨長溪苗米一萬四百四十六石九斗四升田鄉分上中下九等定稅長樂米六千七百四十一石七斗一升田隨鄉上中下分九等定稅園屋山林等分三等福清苗米一萬三千七十三石六斗六升田隨鄉上中下分九等定稅闕第一等古田苗米九千二百八十一石一斗四升田隨鄉分上中下九等定稅永福苗米六千九百四十九石三斗二升田隨鄉分七等定稅屋宇園地分五等山林分三等閩清苗米五千七百二十五石九斗八升田隨鄉分上中下九等定稅隨寧德苗米四千七百三十九石二斗九升田鄉上中下分九等定稅隨羅源苗米四千四百七十五石八斗二升田鄉分六等定稅懷安米一萬一千六百四十五石五升田隨鄉分三等定稅久例以一萬八百四十三石八斗估納月中價令下戶納錢閩縣一千八百三十二石三升八連江七百六十七石二斗二合候官一千百五十八石六斗三升長溪一千七百四十石七斗五升五合五長樂五百一十四石三升七合福清一千十四石五古田六百一十七石九斗二升四合百永福百九十石一斗四升六合閩清四七十九石七斗九升三合十寧德三百五十石四斗一合羅源二百六三石一斗七升一合懷安一千四百一十石三斗四升二合見每斗連義倉押耗等估納月中價四百六十文足計四萬九千八百八十一貫四百八十文足外一十萬一百五十八石二斗二升五合於內科本色白米四萬六千五百四十一石五斗九升五合餘碾糙米六萬七千二十石八斗三升分州縣倉送納支官兵糧俸及椿充義倉用閩縣八千二百二十一石五斗五升展糙米一萬二百七十六石九斗四升外四千七百二十九石科白並州倉納六連江六千九十一石三升八合展糙米七千百一十三石八斗外三千五百四石科白並州倉納千候官六千七百四十石七斗三升展糙米八四百二十五石九斗一升外三千八百七十八石科白展州倉納倉長溪五百八十一石六斗一升二合白米縣納支縣官并峯火寨官兵六百二十九石五斗五升縣納樁比義倉五千七百五十九石三升三合展糙七千一百九十八石七斗九升及二千六百八十二石科白並州倉納長樂一千四百七十石二升白米縣倉納支縣官四百石一斗六升白米縣納樁充義倉二千七百六十六石四斗四升三合展糙三千四百五十八石一斗及一千五百九十一石科白並州倉納福清三千三百七十六石八斗九升科白縣倉納支縣寨官并松林等三寨土兵七百七十二石二斗六升白米縣納樁充義倉四千七百四十一石六斗五升一合展糙五千九百三十七石七升及二千七百二十八石科白米並州倉納支古田一百三十九石二斗四升白米縣倉納縣官二千二百七十三石六斗九升白米水口倉納支鎮寨官兵五百五十六石六斗四升白米縣納樁充義倉三千二百十四石六斗四升六合展糙四千十八石三斗一升及二千四百七十九石科白並州倉納官永福七十一石一斗三升科白縣倉納支縣四百八石六斗三升白米縣納樁充義倉三千七百三十二石四斗一升四合展糙米四千六百六十五石五斗二升及二千一百四十六石科白並州倉納三閩清一百六十石四斗三合縣倉納支縣官百三十七石八升科白縣納樁充義倉三千四十九石七斗四合展糙二千八百一十二石一斗三升及一千七百五十三石科白並州倉納寧德八百五十七石六斗四升白米縣倉納支縣官并兩縣寨官兵二百八十二石白米縣納樁充義倉二千六十二石二斗四升九合展糙米二千五百七十七石八斗二升及一千一百八十七石科白並州倉納羅源一千四百二十三石七斗六升白米縣倉納支縣官并南闕寨官兵二百七十石六斗八升白米縣納樁充義倉一千五百九十八石二斗九合展糙一千九百九十七石七斗六升及九百二十石科白並州倉納錢懷安一千三百五十三石二斗科白下雞菜受納支五縣寨官兵五千六百三十八石九斗三升八合碾糙米七千四十八石六斗八升及三千二百四十三石科白並州倉納以上總計白米一萬二千五十四石五斗九升五合科下古田郡縣鎮共十倉受納支遣官兵三千六百四十七石縣倉納充義倉三萬八百四十石本色白米并五萬三千六百一十六石六斗九升白米碾糙並州倉納其所科米年例於受納前期用按月支産佳約一全年合支米先科與外縣錢倉支遣充足又隨縣以所管苗米總數豁除折納價錢外餘合得義倉之數州納更外縣受納樁管閩候官懷安附郭義倉連江因人户及寨兵各乞上州受納支給其義倉隨苗赴州受納寄樁納倉除科撥外餘盡赴州倉納州倉有闕或行計置上件科與縣鎮倉受納未並准正數仍別納收和糴義倉押耗等科下如遇科撥時諸縣更有未催足州倉米亦准與逐縣徑催理為當年拋科之數自科撥後諸縣或有官員增支軍兵事故之類並聽通融免役物力錢一十一萬三千六百三十二貫七十三文免役隨縣以産錢均敷不等閩候官縣每産錢一文兩料共敷二十四文閩縣年計一萬三千二百六貫五百三十六足候官年計一萬四千三百六十貫八百二十二文足連江每産一文敷一十二文六釐年計九千五百二十貫九百七十八文長溪每産一文敷一十六文一分四釐年計一萬二千四百六十四貫五百二十八文長樂每産一文敷一十二文八分六釐年計六千四百七十八貫六百六十四文福清每産一文山鄉敷一十一文四分八釐海鄉敷一十文四分八釐年計一萬六千二百六十二貫九百五十八文古田每産一文敷一十五文八分二釐年計八千四百四十二貫三百五十三文永福每産一文敷十三文七分年計六千八十七貫九百四十三文七閩清産錢一文敷一十四文二分年計四千百九十七貫六百五十四文三寧德産錢一文敷一十五文五分年計五千十八貫五百三十五文三羅源每産一文敷一十五文年計四千一百十二貫九百六文懷安每産錢一文敷一十四文四分年計一萬一千六百九貫九百二十六文已上十二縣産錢年計總敷錢一十一萬二千三百三貫八百三文物力每直一貫兩料共敷六文今每年見敷內閩縣五百五十五貫六百六十六文十連江一百一十四貫三百文候官一百七貫長溪三十九貫七百五文九長樂一十六貫七百六十五文福清四十貫百五十五文古田一百五貫七百三十六文五永福二十二貫七百九十九文閩清六十貫四百一十八文寧德七十二貫六羅源七十六貫百懷安四十八貫九百二十文總計一千三二十八貫二百七十文足隨夏秋二料催科內一萬三千三百八貫六百四十八文足解州支本州并鹽司投人雇食等餘錢縣支雇役并樁發朝廷窠名其減人吏雇錢在京吏祿錢在京官員雇人錢減罷重祿食錢减罷監司吏祿錢米並在內産鹽十二縣以産錢等第均賣嵗額二百六十九萬六千四百五十三斤閩縣三十一萬七千九百九十四斤連江二十四萬三百七十五斤二候官三十三萬二千七百五十一斤長溪十九萬三千二百一十八斤十長樂一十七萬三千八百七十斤一福清四四萬八千二百一十六斤古田十六萬二千一百六十斤萬永福一十四萬八千五百八斤閩清一十九千七百八十五斤寧德一十一萬一千九百二十四斤五羅源九萬九千九百八十一斤懷安二十萬八千九百二十五斤隨夏秋二稅催驅共計錢五萬六千八百二十三貫九百七十三文足內本州所得舊價錢每斤古田十四文閩清十三文永福十一文餘各九文足二萬五千八百一十四貫七百六十三足以此數展省合計三萬三千五百一十五貫六百七十文今財賦司見催錢共管三萬三千九百六十六貫七百一十三文省內閩縣三千七百一十四貫四百七十五文三連江二千八百九貫五百七十八文候官千八百八十九貫二百八十六文千長樂二千三十二貫二百四十文寧德一三百八貫二百四文長古田二千九百四十七貫三百八十三文溪三千四百二十七貫二百二十三文七縣錢價與前鹽同外永福見額管錢二千一百六十貫三百一十六文准鹽合計一十五萬一千二百二十二斤文閩清額錢一千八百六十三貫五百二十四准鹽合計一十一萬三百七十八斤鹽福清額錢五千六百二十九貫三百一文准合計四千八萬一千六百一十八斤文羅源額錢一千一百九十二貫九百八十六准鹽合計一十萬二千一百五十三斤今四縣帳檢租額鹽少而見納錢多懷安一縣見納錢二千九百九十一貫九十七文准鹽只管二十五萬五千九百五斤又鹽額多而納錢少不知何年重立此數係省窠名錢一十一萬三千三百七十八貫六百八十八文省係以諸縣鎮務商稅五分錢增稅三分千契五分錢浮鹽舊價錢砂地錢契紙息錢取一年收數