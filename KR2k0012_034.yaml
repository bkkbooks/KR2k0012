body:
  text: 淳熙三山志巻三十四宋梁克家撰寺觀類二僧寺山附連江縣九十八所慶厯舊記一百四所内一十所有寺額曽師建記一百五所鍾世明根括寛剰一百一所今州籍九十八所内八十三所㑹到有起置年代十五所未詳淨安院安德里古曰祇洹寺梁大通六年置唐咸通間始改今額皇朝大中祥符六年改律為禪舊産錢二貫一百四十五文大中玉泉寺光化里隋大業元年置泉出兩峰之間色味澄甘唐天寶中浮屠為草庵依闍棃以棲者百餘引泉自給其人筋强骨堅音語鏗然而眸子碧色壽命彌長太守奏之賜名玉泉至宣宗時乃錫今額皇朝開寶二年始為十方唐周朴有詩有玉泉巖明月軒清風閣流桮亭擁秀堂清澗閣舊産錢五貫九百八十四文曽記六貫一百九十五文龍卧院欽平下里仁壽三年置舊産錢二貫五百七十二文峽山䕶國觀音院集政里唐元和四年林琮建閩王時僧行通大創殿宇乾符三年賜今額院東北有海坡地十里曰彭山築為田天禧中為十方舊産錢三貫一十三文曽記三貫六十一文䕶國天王院欽平上里本㑹昌中竹林廢寺大中初復之咸通中改今額皇朝慶厯中陞為禪寺有放生池舊産錢二貫二百九文賢沙院安德里大中元年置舊産錢二百九十四文逍遙院安仁里同年置舊産錢九百六十七文西招慶院中鵠里三年置舊産錢二百七十九文寶林院中鵠里四年置雷移石縣西北三里有獨覺巖僧銓唐宣宗時人與黄湟槃怡山大溈二老為法空友寺絶峯有巨石如覆盆銓雅好之欲移其室而未能因指之曰人實無力神乃有功俄而風雷雨詰旦石移山下儼成一室乃坐禪其中凡四十年既死十數年容貌如生髮長至頂削之復生降虎峰曽有猛虎為獵矢所傷至獨覺庵前若有所訴法銓為抜其箭拊摩良久去數日瘡愈復來由此出入常相隨號降虎峯政和元年勑賜慧慈塔林臯詩云寶爐香穗遶松筠瞻想遺蹤二百春幽石移時雷雹設孤峯坐處虎狼馴李侍郎彌遜詩云喚起田公趂曉耕香雲巳帶瀉簷聲如何乞取摩空手為挽天河洗甲兵舊産錢四貫四百九十五文曽記四貫四百六十八文陀嶺院清河里咸通二年僧道堅剏花松千株以䕃行人尋移洋門嶺又創雲際院亦植松八百後又創爐山光化院舊産錢九十三文西靈應院安定里乾符三年置舊産錢二百一十七文東靈應院建興里五年置初僧志勤參溈山觀桃花而悟咸通初開懐安靈雲山乾符元年開羅源僊苑是歲創此僧號源寂居二十年異時雲遊竹笠杖履猶存夘塔先是四明有一僧以福州靈應院欲造開山塔行化得錢因買夘石附海舟歸及境語舟人曰少需于此吾往院趣役者挈之越二日不至舟人詣寺蹤跡無之既而過開山堂見所塑像則儼然行化僧也衆異其事遂以其石為塔至今民遇水旱禱之必應舊産錢二貫二百三文興善尼院新安里同年置舊産錢三百七十二文涌泉院保安里廣明元年置大順二年賜今額舊産錢六百六十六文曽記六百六十文南峰石門院新安里中和元年謝諝建光化三年僧道遇繪山圖以進詔翰林書今額賜之以南峰之麓有巨石雙植道出其中曰石門故名玉華洞玉人峰石鼓半月池灋隂洞覆釡山鬭牛石石魚澗五臺石舊産錢二貫一百七十九文西保安院歸仁里同年置舊名永安有景祐三年陳彛作永安院建殿記曽記亦作西永安舊産錢一貫九百四十五文寶山院安義里光啟二年置舊産錢七百九十七文月峰院安德里大順三年置見舊記今院建殿記云天寶改廣德為月峯誤舊産錢二貫八百八十六文曽記一貫八百八十七文義安院曽記作䕶國義安清河里大順中置舊産錢一貫二百四十八文靈山院中鵠里景福元年置舊産錢一貫二十七文曽記一貫二百七十文資聖院建興里二年置乾道九年八月有龍自海起過山麓雨暴作院宇漂壊淳熙二年更置舊産錢一貫一百八十九文曽記一貫三百四十文光化寺保安里乾寧元年置舊有章僊壇唐開元中有勑書碑碣記其事政和尚道教寺僧恐更為道宫乃盡毁而棄之今山中僅有殘斷字漫不可考香爐山雲笈七籖以為第七十一福地謝真人治之以其形似香爐故名唐開元中里人章壽學道盡得僊術嘗過延平津值蛟為害因斬之今絶頂壇址宛然天寶六載禁樵採東西各二十五步南北各二十步壇側有石井每旱暵汲水歸而禱之必兩傍有童井尤清冽山南一峯峭秀石上有章僊峯三大字精神頗異不志書者及歲月鄭侍講鑑詩云峙立交輝紫翠間疎簾半捲鎮長閒神僊自有祈年術一縷青烟起博山舊産錢二貫八百六文廣化院敦賢里同年置鳯凰山或曰昔有朱雀翔集又曰以其形似故名舊産錢二貫一百四十七文曽記二貫一百七十七文龍漈報恩院安義里同年置丹陽驛道紀武陵谿徑龍漈潭昔有龍孕其間樵採因不入者若干年僧宗珝誅茅其上衆異之始剏屋宇表聞乃賜今額舊産錢三貫九十文廣應院加賢上里三年置舊産錢一貫九百八十文寶應院歸仁里同年置鄭事道記張瑩聞山中鐘鼔音創政和四年災宣和重創舊産錢三貫二百一十八文靈峰院中鵠里梁貞明二年置舊産錢八十九文長生院清河里同年置舊産錢四百三文瑞雲院建興里後唐同光元年置舊産錢四百九文東保安院永貴里三年置舊名永安曽記作東永安舊産錢一貫一百五十一文僊宗院保安里四年置舊産錢一貫八十三文寶峰院安仁里天成元年置舊産錢二百七十五文大明院臨江里晉天福四年置舊産錢三貫五百二十六文崇慶尼院欽平下里同年置舊産錢一百七十一文西林尼院欽平下里五年置永隆二年舊産錢二百四十四文藥師院敦賢里六年置舊産錢八百三十五文寶巖院清河里周廣順元年置舊産錢一百五十一文清洋院進賢里同年置舊産錢六百二十文興慶院光化里同年置舊産錢三十九文北天王院欽平上里顯德三年置舊産錢二百八十四文西興慶院清河里皇朝建隆元年置先在小灣山大中祥符五年移白石山重建舊産錢二百七十二文南白蓮院安慶里同年置舊産錢三十一文龍興院加賢下里建隆初建初為尼居慶厯二年更創元豐後修楊朏為記舊産錢五百二十一文西瑞巖院安義里乾德四年置舊産錢一貫五百五十七文保福院保安里同年置舊産錢五百一十八文羅漢院保安里開寶元年置舊産錢四百三十六文彌勒院集政里三年置舊産錢八百六十一文隠峰院集政里同年置舊産錢八百六十四文資壽院欽平下里同年置舊産錢二貫七十三文東招慶院加賢上里五年置舊産錢二百八十七文廣順院光化里太平興國元年置舊産錢一百九十六文興教院安慶里同年置舊産錢三百五十九文大拓院崇德里九年置舊産錢四百三十三文翠林院敦賢里雍熙三年置舊産錢二貫二百九十四文龍泉院新安里景德四年置舊産錢二百二十四文澄巖院安慶里天禧三年置舊産錢一百一十八文北禪寺欽平上里同年置舊産錢六百六十三文曽記六百三十三文瑞峰院光化里四年置舊産錢八百八文清涼院臨江里天聖元年置舊産錢二貫六百一十二文石橋院清河里同年置舊産錢一貫一百七十三文崇壽院欽平上里四年置舊産錢一貫五十五文薦福院新安里六年置舊産錢八百文瑞林塔尼院安義里同年置舊無産錢南瑞巖院新安里八年置舊産錢三百五十文五峰院敦賢里明道二年置舊産錢五百七十五文靈果院安仁里康定元年置舊産錢八十文國興院安仁里慶厯元年創庵治平元年改今額舊産錢一貫三百五十文西白蓮院清河里同年置舊産錢一百九十一文報慈院安德里同年置舊産錢六百一文小洄院臨江里四年置舊産錢五百三十七文寶壽院加賢下里皇祐元年置舊産錢四百六十七文淨居院安仁里舊號白巖嘉祐二年改今額舊産錢八十一文寶積院崇德里同年置舊産錢一文永寧院崇德里同年置舊無産錢彌陁院欽平下里舊産錢二百七十一文慈雲院安慶里舊産錢二百七十九文東禪林尼院加賢下里舊産錢二百一十七文感應院臨江里舊産錢二百一十二文灋林院安義里舊産錢一百六十八文保福院曽記作承宣保福崇德里舊産錢一百一十二文瑞光堂闕里舊産錢一十八文獨覺堂闕里舊産錢四文瑞雲堂闕里舊産錢二文以上十所並未㑹到起置年代西林寺舊記大業二年曽記寧善鄉産錢二百七十文今州籍無安善寺舊記陳至德元年置建寧寺舊記大同二年置地藏寺舊記天嘉六年置雙林寺舊記仁壽元年置已上四所曽記及今州籍並無候官縣一百八十六所并在城十九所共二百五所慶厯舊記二百一十所内二十八所有寺額附郭十所有起置年代曽師建記二百一十二所鍾世明根括寛剰除道觀一所外二百五所今州籍數同除在城外一百四十一所㑹到起置年代四十五所延安院安慶里舊號崇福院嘉祐二年勑改今額舊産錢二百三十文曽記二百三十七文寶相院欽平下里同年置舊産錢二百五十四文龍際院加賢下里同年置舊産錢三百四十五文天宫院進賢里元豐元年置舊産錢一百六文雲峰院臨江里元祐二年置舊産錢三百八十六文東禪莊院歸仁里七年置舊産錢八百四文長明院歸仁里建中靖國元年置舊産錢五百二十八文寶月院進賢里政和二年置舊産錢二百八文地藏院崇德里三年置舊無産錢曽記産錢四百七十二文報國寺保安里舊産錢一貫二百一十八文永興院同里舊産錢八百八十八文金砂院光化里舊産錢七百六十六文北山院安仁里舊産錢六百八十六文灋華院同里舊産錢四百五十九文西禪林尼院欽平上里舊産錢三百七文靈塔臺永寧里舊記靈塔寺晉太康三年置武德二年賜額舊産錢一百九十九文象峰院齊禮里梁太清元年置舊産錢一貫一百九十五文唐安寺九功里陳天嘉二年置舊産錢六貫四百五十文藥山院齊禮里太建元年置舊産錢三貫五百五十八文尋山庵舊記作寺閩光里同年置舊産錢六十六文龍泉院馴翬里唐麟德元年置舊産錢六百七十三文楞伽寺美宅里大厯六年置舊産錢一百六十七文雲峰院招賢里建中初僧義延開山㑹昌毁法大中中鄭氏黄氏復之有碑舊産錢三貫六百一十六文安德院新興里大中初置舊産錢一貫一百五十三文石松院靈鳯里大中三年置舊産錢三貫二十二文龍龕院志節里七年置龍龕井或傳昔有龍攫井甃而上今跡猶存舊産錢二貫一百一十八文資聖院靈鳳里十一年置先在城西號雙峰䕶聖禪院乾寧元年以其地易舊南澗寺地建遂改今額舊産錢二貫六百四十八文羅漢功德院方樂里十三年置咸通六年賜今額舊産錢一貫六百四十九文靈隠院新興里咸通二年置舊産錢四貫八十四文三峰永寧院馴翬里同年置舊産錢一貫二百八十文雙峰院綏平里五年置初僧師復與林衮同業儒因同入闗至楊子渡口師復有出塵之興賦詩曰君自成龍我成道浩然而歸卜築雙髻峰下山形險峻政和間士人姓張者樵於此山遇人飲之泉以笋食之遂絶粒識字號張道人後削髮為僧名圓覺累住名刹久之移建今所主峰峭秀巖谷幽逺危巒四靣繚繞囘抱蓋水西之勝處也六年以觀察使李瓉請錫號䕶聖禪院紹興三十一年以富樞密直柔功德院號崇因薦福張丞相浚先謫福州遊此富公亦以居福州日愛之子孫以其遺意請為其功德院四悅堂後人像瓉衮師復及周社以其同遊且同趣也山堂堂前一峰秀拔下有小溪宛如臨安靈隠寺前飛來峰之狀舊産錢三貫五百七十