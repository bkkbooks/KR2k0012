body:
  text: 淳熙三山志卷四十宋梁克家撰土俗類二嵗時嵗時古有之四方習尚不能無異郡人曽師建記閩事效荆楚秦中紀嵗時閭里禮節行樂尤悉今掇其可載者其未備者增修之人情之醇薄物態之紓急先後遷變畢見乎此因俗設教者庶有觀焉元日祈年自五鼓後戶無貴賤貧富皆嚴潔㕔宇設上中下三位陳列酒果茶湯焚金銀楮錢冀承靈貺以保年齡蓋用道家之說飲屠酥除日以藥劑入絳囊置井中元旦出之漬酒東向而飲自幼至長以為序可辟瘟疫蓋用華他與魏武帝方也序拜閩俗諸節最重元日冬至次之是日享祀畢序拜稱觴祝夀于尊者出見親族鄰里更相慶賀間亦團拜雖閭閻委巷舉手相祝往反還謁盡節假乃止自縉紳而下士人富民胥吏商賈皂𨽻衣服遞有等級不敢略相陵躐士人冠帶或褐寵衫富民胥吏皂衫農販下戶白布襴衫婦人非命婦不敢用霞帔非大姓不敢戴冠用背子自三十年以前風俗如此不敢少變又其稱呼士人非實讀書不稱秀才豪門大户爹呼父娘呼母其婢僕及在已下呼之曰郎君曰娘農販下户罷呼父妳呼母其黨類及在巳下呼之曰叔伯曰嫂錙銖甚嚴雖驟富驟貧不可移易故其名分素定嵗時揖遜俯伏井井可觀三十年來漸失等威近嵗尤甚農販細民至用道服背子紫衫者其婦女至用背子霞帔稱呼亦反是非舊俗也却葷食以嵗首率食素一日紹興辛亥程待制邁以冦盜未平榜諭部民先是日禁屠上冢州人墳塋盡在四郊嵗節之二三日華門大姓率携家拜掃雖貧賤市販亦盛服靚粧競出城闉東西北郊之外冠蓋填塞故自節內酒亭食肆凡諸之家垂帷下箔優游歌笑至開假乃止近數嵗乃有節內列市如故者入學每嵗節既五日各遣子弟入學或須十則以寅申己亥吉亦不過三二日止凡鄉里各有書社嵗前一二月父兄相與議求衆所譽學識髙行藝全可以師表後進者某人即一二有力者自號為糾首以學生姓名若干人具關子敬以謁請曰敢屈某人先生來嵗為子弟矜式幸甚既肯可乃以是日備禮延致諸子弟迎謁再拜惟恐後逺近聞之挈篋就舍多至數百人少亦數十人間有年四五十不以老為恥月率米錢若干送為司計為掌膳給瞻飲食先生升堂揭立規矩有輕重罰至屏斥凡五等曰不率者視此諸生欲授何經乃日就講席唱解敷說旬遇九日覆問之常以嵗通一經若三日八日則習詩賦若經義與論䇿講題命意有未達㸃削塗改俾自入繩墨風俗如是蓋舊矣龍昌期詠福州詩云是處人家愛讀書程守師孟詩云城裏人家半讀書又云學校未嘗虛里巷自周希孟陳烈先生以來以德行經術警悟後學自是鄉邑有所推擇莫不尊敬畏服近三十年以前尚然也故知有父兄師友琢磨淬厲縱不為世用亦有成德三十年之後生以趨試上庠率遊學四方而先生亦各開明以待來者事師之禮衰教人之禮甚略非舊俗也立春土牛以占農耕之早晚與嵗之豐瘠是日舁置府前閩侯官倚郭縣不别造蔬餅閩俗立春以為節物蔡公襄立春寄福州燕司封詩春盤食菜思三九又羅源林迥詩青韭供盤餅面圓上元燈毬燃燈弛門禁自唐先天始本州准假令三日舊例官府及在城乾元萬嵗大中慶成神光仁王諸大剎皆掛燈毬蓮花燈百花燈琉璃屏及列置盆燎惟左右二院燈各三或五並徑丈餘簇百花其上燃蠟燭十餘炬對結綵樓爭靡鬬熖又為紙偶人作緣竿履索飛龍戲獅之像縱士民觀賞朱門華族設看位東西衙廊外通衢大路比屋臨觀仍弛門禁逺鄉下邑來遊者通夕不絶綵山州向譙門設立巍峩突兀中架棚臺集俳優娼妓大合樂其上渡江後停寢紹興九年張丞相浚為帥復作自是不廢觀燈舊例太守以三元㑹監司命僚屬招郡寄居者置酒臨賞既夕太守以燈炬千百羣妓雜戲迎注一大剎登臨覽勝州人士女却立跋望排衆爭覩以為樂本州司理王子獻詩春燈絶勝百花芳元夕紛華盛福唐銀燭燒空棑麗景鼇山聳處現祥光管絃喧夜千秋嵗羅綺填街百和香欲識使君行樂意姑循前哲事祈禳又司理方孝能詩街頭如火山紅酒靣生鱗錦障風佳客醉醒春色裏新粧歌舞月明中薄薄春衫新縷金樽前風細怯輕隂酒香隱約生紅粉正與桃花共淺深又燈外風搖沽酒斾月中人數買花錢少年心緒如飛絮爭逐遺香拾墜鈿元豐中劉待制瑾為守元夕不問富貧每户科燈十盞陳先生烈以詩題鼓門大燈籠云富家一盞燈太倉一粒粟貧家一盞燈父子相聚哭風流太守知不知惟恨笙歌無妙曲瑾聞而謝之寒食開花園州園在牙門之西所謂春臺館是也嵗二月啓鑰縱民遊賞常閲一月與民同樂也蔡密學襄為郡日有開州園詩風物朝來好園林雨後清魚遊知水樂蝶戲識春晴草軟迷行迹花深隱笑聲觀民聊自適不用管絃迎又詩云節候近清明遊人巳踏青插花穿戲户酤酒似旗亭日向林光潤風回海氣腥未知何處樂歸路巳嚴扄程大卿師孟春風亭詩為報尋芳沽酒客年年到此且徘徊鞦韆古清明詩萬里鞦韆習俗同州設于春臺館內外遊山州民踏青東郊尤盛多拾野菜煮臛謂之煮菜臛亦唐人杏粥榆羮之意也太守以假日拉寮屬登臨蔡密學襄有寒食遊西湖詩山前雨氣曉才收水際風光翠欲流盡處旌旗停曲岸滿潭䋊鼓競飛舟浮來煙島疑相就引去沙禽好自由歸騎不歌吹歇萬校燈燭度花樓是時西湖競渡可知也程大卿師孟寒食遊九仙烏石山詩城中無事喜尋山千里提封並海寬賓客相從筵既冷士民同出食猶寒芳園病葉堆何限古院開花落幾般誰道異鄉多感慨登臨遲却十年官通判馬益和云屬吏參陪宴二山金杯滿沃酒觴寬公私不禁三朝火風雨都無一日寒花引遊蜂香四座人穿蕭寺景千般清明休假歡心洽飽德咸知有上官是日早登烏石晚遊九仙墓祭士庶不合廟祭冝許上墓自唐明皇始栁宗元文近世禮重拜掃五代史曰野祭而焚紙錢謂此也州人寒食春祀必拜墳下富室大姓有贍塋田産祭畢合族多至數百人少數十人因是燕集序列欵眤尊祖睦族之道也上巳褉飲舊記桑溪在閩縣東乃越王無諸于此為流杯宴集之地國朝以來太守褉飲之地有三一曰南湖褉遊亭政和乙未黃尚書裳更名洞霄堂宣和五年俞憲向攝郡仍舊名二曰東禪肖蘭堂宣和中俞憲向立今廢三曰聖泉曲水亭亦向立今更名聚星維之春祓除之日率羣僚惟意所適王祠部逵有上巳遊東禪詩紫陌破清晨雕鞍映畫輪因修洛陽褉重憶永和春錦繡荀香度樓臺梵宇新忙中得閒暇來見解空人程大卿師孟上巳遊東禪詩出城林徑起蒼煙白馬遺蹤俗尚傳第一僧居蘭若處幾畨身醉荔枝前百年騷客來題寺三月遊人作樂天愛堂頭迎太守路旁先墜碧雲編競渡政和宣和中自黃尚書裳至陸侍郎藻為守皆登褉遊亭臨南湖令民競渡時徽宗御製上巳詩云韶光三月恰芬芳褉飲池邊泛羽觴畫舫翩翩戲龍虎一湖風景類江鄉青飯南柷木冬夏常青取其葉搗碎漬米為飯染成紺青之色日進一合可以延年本草云吳越多有之今上巳青飯以此舊記任教仙去取柷葉染飯閩俗效之三月草八東嶽焚香州民以是日為嶽帝生日結社薦獻觀者如堵俚詩有三月草八出郭東之句蓋其來舊矣四月八慶佛生日是日州民所在與僧寺共為慶讚道場蔡密學襄為州日有四月八日西湖觀民放生詩此風蓋久矣元豐五年住東禪僧沖真始合為慶讚大㑹于城東報國寺齊僧尼等至一萬餘人探􅍐分施衣巾扇藥之屬迄建炎四年為㑹四十有九而罷紹興三年復就萬嵗寺作第一㑹是日緇黃至一萬六千餘人凡㑹僧俗號勸首數十人分路抄題户無富貧作如意袋散俵聽所施與無免者真僞莫考至乾道四年嵗大飢榖價騰湧成市㑹首有取至三千餘緡王參政之望為帥聞之諭令糴穀賑濟不服乃命根治盡拘其錢入官自是遂絶然所至鄉社亡業之民猶有自為之者鄉衆似斯之類借是為利嵗無時節率旬以三二日或集民居或聚社廟閭閻翁嫗輟食誶語來赴者亦數百人此近嵗之俗也端午插艾午日天未明採艾插戶上以禳毒氣亦有結艾為人者與荆楚同鄉村或採楝木葉插之父老相傳可以禁蚊繫五絲線舊傳三閭大夫語人五色絲蛟龍所畏故是日長幼志以五色綵繫臂一名長命縷一名續命縷父老相傳可以辟蛇至七夕始解棄之簮榴花婦女競插花榴花為多亦喜梧桐花飲菖蒲酒李彤四序總要云五日婦禮上續夀菖蒲酒以本草云菖蒲可以延年今州人是日飲之名曰飲續角黍楚人是日以竹筒貯米祭屈原名筒棕四方相傳皆以為節物今州人以大竹葉裹米為角黍亦有為方粽以相餽遺舊俗婦禮是日上續壽衣服鞋履團糭扇子菖蒲酒今鮮行之競渡楚人以弔屈原後四方以為故事是日競渡以為戲州南臺江沿內諸河皆龍舟鼓楫鉦鼓喧鳴綵服鮮衣共鬬輕駛士女觀者或乘潮解絆或置酒臨流或緣堤夾岸駢首爭覩竟日乃歸程大卿師孟端午出遊詩三山縹眇藹蓬瀛一望青天十里平千騎臨流搴翠幄萬人擁道出重城參差螮蝀橫波闊飛躍鯨鯢鬬楫輕且醉樽前金㶑灧笙歌歸道月華明蓋出南臺觀競渡也紹興中因鄉村爭鬬殺傷遂一切拘納分諸院修浮橋船後稍稍復造採藥是日採藥用之多以為驗寧德縣安逺里有午日巖昔有邑人程公于是日入巖採藥忽然輕舉因以為名七夕乞巧閩令應廓詩烏鵲成橋架碧空人間天上此歡同仙槎逐浪浮銀漢青鳥傳音到帝宫牛女佳期情不斷古今遺恨意難窮綵樓乞巧知多少直至更漏欲終今州人率以是夕㑹集中元盂蘭盆㑹州人以是日嚴潔㕔宇排設祖考齊筵逐位薦獻貧者率就寺院摽題先世位號供設焚紙衣前中元一二日具酒饌享祭逐位為紙衣焚獻遊神光寺寺有佛涅槃像傍列十弟子有捫心按趾哭泣劈踊出涕失聲之類是日盂蘭盆㑹因怪像以招遊人遂成墟市相傳謂之看死佛舊記閩王于薛老峯西作百道喈每嵗中元閩人盛遊于此王祠部逵中元燕百文小樓詩薛老峯南更近西小樓髙閣與雲齊中山酒熟中元節歸去從他醉似泥近三十年來人亦厭之此遊遂息重陽登髙飲菊花可以延年茱萸以辟惡氣州人率以是日登髙臨賞舊記九仙山亦名九日山無諸王是日于此鑿石樽以泛菊石樽可盛三㪷猶存天聖中陳工部絳重陽遊此山閏月九日遊越山縣尉黃虛舟獻詩賡和者至四十三篇綘詩云勸君莫辭滿酌酒瑶林瓊木皆良友就中此㑹難暫忘一年兩經九月九茱萸含香又滿頭黃菊飄英再盈手清歡未見玉山頺髙空任待金烏走落帽聲名何足取孟嘉一㑹登龍首梅仙耳熱遺我詩詩如椽膽如斗後程大卿師孟遊道山亭宴蕃宣樓陳尚書軒遊萬嵗平逺臺各有詩曾師建云福州東南一都㑹跨巨海負髙山號泉石清觀連峯萬仭綿屬雲霄晴嵐朝開癡靄四面錦屏繡障周圍環合不知幾千載也城郭繚繞鼎立三山飛閣層樓架空聳漢得泉石之勝不可殫紀郡人風物熙和沖融故名長樂昔參政元公詩云可惜閘州風物好一生魂夢逸三山中書溫公詩云夢寐常思山水國登臨今到鳯凰池張司封詩云金銀佛地三千界風月人居十萬家黃尚書詩云照萬事時惟是道賞三山處最冝秋莫不以是邦為山水之勝九日登髙于此于彼惟其所之皆足以盡眺臨之異冬至序拜州人重此節節前鄰里族戚更相餽遺上冢祭享至節日則序拜如獻嵗之儀嵗除驅儺鄉人儺古有之今州人以為打夜狐曾師建云南史載曹景宗為人好樂在揚州日至臘月則使人邪呼逐除遍往人家乞酒食以為戲迄今閩俗乃曰打夜狐蓋唐敬宗夜捕狐狸為樂謂之打夜狐閩俗豈以作邪呼逐除之戲與夜捕狐之戲同故云抑亦作邪呼之語訛而為打夜狐歟餽嵗别嵗守嵗嵗晚相餽酒食相邀達旦不眠蓋閩蜀同風火爆荆楚嵗時記云山臊惡鬼犯人則病惡爆竹之聲李彤云元日爆竹于庭辟山臊鬼惡今州人除夕以竹著火燒爆于庭中兒童當街燒爆相望戲呼達旦謂之燒火爆張丞相浚為帥日除夕莆人鄭樵客郡中與觀火爆丞相命賦詩給竿字為韻樵口占云駒隙光隂嵗巳殘門門竹爆共團樂燒成熖熖丹砂塊碎盡琅琅碧玉竿喚轉韶光新景煥辟除惡味舊寒酸主人從此占佳瑞再入為霖灑旱乾宿嵗荆楚嵗時記云嵗莫家家具肴饌為宿嵗之儲以迎新年相聚酣飲俗亦然又于除夕留宿嵗飯謂之隔年飯為節假內之備桃符鍾馗書桃符置户間掛鍾馗門上禳厭邪魅今州人嵗莫畫工市之淳熙三山志卷四十
