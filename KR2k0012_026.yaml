body:
  text: 淳熙三山志巻二十六宋梁克家撰人物類一科名唐自神龍迄後唐天成二百二十有三年州擢進士者三十六人何才之難耶豈其出有時將山川風土使然抑教化涵養之未至也爰自永嘉之末南渡者率入閩陳鄭林黄詹丘何胡昔實先之閲五朝隋唐户口既蕃衣冠始集神龍中薛令之首登科諸彥繼踵而陳詡之父子侯固之叔侄歐陽玭之兄弟皆有聲於世猶以為盛矣熙朝崇尚儒雅人物彬然進士之外或以制舉或以詞科或以舍選或以八行或以武舉或以童子莫不並進豈惟父子叔侄兄弟同歲收擢或綿屬數世不墜而已其名冠禮部籍與廷對占天下第一若兩優釋褐皆世所謂希濶者比盖數見之坐廟堂登嚴近足相躡為逹官又歲不乏人抑何其盛歟由太平興國五年至今淳熙八年凡二百有二年以科目進者一千三百三十有九人内元符以前一百二十二年纔三百二人爾外㤙科有八十一人而建中靖國至今正八十二年乃一千三十有七人外恩科有四百八十一人醫學釋褐一人又何其日盛一日也元祐間柯守述始作題名記於州學取神龍以來進士編次以刻石元祐止自後每舉聴進士同年相率自識之其間寓籍逺郡或續還科名猶有漏逸不載者至族系近逺頃歲題注間有舛誤今増其所未書者其可訪者是正之唐神龍元年丙午姚仲豫榜薛令之字珍君長溪人終左補闕太子侍讀貞元十年甲戍李程榜陳通方字闕陵閩縣人終南院官十三年丁丑鄭巨源榜陳詡字載物閩縣人終户部員外郎知制誥十五年巳夘封孟紳榜邵楚萇字待翰閩縣人終校書郎元和五年庚寅李顧行榜陳彥博字朝英閩縣人終貴溪令十四年已亥韋諶榜陳去疾字文醫候官人終邕府副使寳厯元年乙已栁璟榜歐陽衮字希甫閩縣人終侍御史太和四年庚戌宋邧榜林簡言字欲訥福清人終漳州軍事判官九年乙夘鄭榜侯固字子重閩縣人累官鄜坊靈武易定節度使開成三年戊午裴思謙榜蕭膺字次元候官終大理司直李滂字注善閩縣人終大理評事㑹昌二年壬戌鄭顥榜鄭誠字申虞閩縣人歴刑部郎中郢安鄧三州刺史三年癸亥盧肇榜林滋字後象閩縣人歴金部郎中後王鐸辟為判官四年甲子鄭言榜陳納詡之子字廣譽終大同軍副使大中元年丁夘盧深榜陳鏞字希聲候官人復應史科終鄂州刺史五年辛未李郜榜林朂字公懋閩縣人大中五年開元禮登科終吉州刺史十二年戊寅李億榜侯嶽固之侄字公祝未仕終咸通二年壬午薛邁榜王棨字輔之福清人歴水部郎中薛承裕字饒中閩縣人終國子四門博士七年丙戌韓衮榜歐陽琳衮之子字瑞卿再中宏詞授袐書省正字累遷侍御史九年戊子趙峻榜連摠字㑹川閩縣人終嶧陽尉十年已丑歸仁紹榜歐陽玭衮之子字中終書記林思字䖍中長樂人終水部郎中萬年令乾符二年乙未鄭合敬榜陳讜字昌言候官人終韶州刺史鄭𨼆字伯超福清人林嵩字降臣長溪人終金州刺史五年戊戌孫渥榜陳蜀字文都中和五年乙巳許祐孫榜倪曙字孟㬢候官人仕劉𨼆為工部侍郎平章事大順元年庚戌楊贊禹榜張瑩字昭文連江人終禮部尚書知延州林衮字讜言閩縣人終袐書省校書郎二年辛亥崔昭矩榜陳鼎福清人黄璞字徳温唐藝文志作字紹山候官人後遷莆官至崇文館校書郎當昭宗之世杜門不仕黄巢入閩過其居曰此儒者家也滅炬勒軍而去自號霧居子有集二十巻景福二年癸丑曹愚字古直長溪人乾寧二年乙夘黄詵字仁澤登拔萃科璞之子終左宣義郎節度巡察判官始遷長溪白林有二子長慕華自白林遷翁潭官至水部員外郎次慕風自白林遷候官官至給事中三年丙辰翁承贊字文堯福清人居蒜嶺四年中博學宏詞科官至諫議大夫四年丁巳楊贊圗榜卓雲字闕後唐天歲三年戊子郭晙榜陳保極字天錫閩縣人終禮部倉部員外郎賜金紫本朝太平興國五年至元豐八年太平興國五年庚辰蘇易簡榜吕奉天字闕人閩縣八年癸未王世則榜是榜賜同出身分為三甲殿試分甲自此始林倓字闕人閩縣端拱元年戊子葉齊榜雍熙二年進士始唱名本州登第人預唱名自是歲始閩中記云周希古於是年馬國祥榜及第先是南省下第舉人詣登聞院乞再試五月太宗親試馬國祥等七百人命樞宻院給牒以試中為名令權知縣簿周希古時預選又進士葉齊等打鼔論榜六月再試放三十一人李亞荀預選周希古字闕外長溪人終職方員郎上䕶軍李亞荀字宗卿連江人終度支員外郎䕫路轉運使淳化三年壬辰孫何榜是榜糊名考校分五等上三等賜及第餘賜出身即賜儒行篇李坦然字平仲長樂人終朝奉郎大理評事兼水部員外郎林殆庻字闕郎閩縣人累官度支員外祕閣校理知明州余貫之字闕人閩縣王彬係髙麗賓貢長樂人初挈族奔髙麗以外國生賓貢入太學至是登第授校書郎放歸尋歸正省墓知汀州撫州終太常少卿咸平元年戊戌孫僅榜是榜始為小錄用綾為之金花貼於巻首載知舉年甲行第家諱私忌登科人大書姓小書名吴千仭字儀之候官人終太常博士知處州二年乙亥孫榜連作磚字闕人閩縣三年庚子陳堯咨榜是年分六甲第四甲同進士出身第五甲同三傳出身第六甲同學究出身時休復名在六甲賜别科出身自此始也林介字子然候官人黄誥字簡之候官人陳易則字簡之閩縣人終袐書省校書郎沈厚載字元興閩縣人歴潮劔歸三州終屯田郎中林休復字仲正閩縣人同學究歴知邵武軍漳州終闕部員外郎五年壬寅王曾榜劉若虚字叔陽閩縣人終屯田貟外郎知邵武軍景徳二年乙巳李迪榜翁緯承贊之孫終新㑹令甲科張翼字闕人候官四年林陶字仲謨閩縣人中㨗詞科特賜同出身終比部員外郎大中祥符元年戊申姚曄榜賜袍笏自此始林敦復休復之弟字子重終太常博士潘衢字子莊長樂人歴屯田郎中林太素殆庻之弟歴相州節度推官並甲科陳曄字䝉之閩縣人終冝興主簿劉天錫字成之福清人終宣徳郎大理寺丞並第三甲同三禮出身陳莊字仲容閩縣人終贊善大夫陳宗奭字亞公閩縣人終理寺丞知惠安縣潘徵衢之兄改名循字先之終著作郎陳清易則兄字晦之為蘄州司理恵州歸善令張黄裳字叔文羅源人林祥字子通閩縣人終石城縣並第四甲學究五年壬子徐奭榜劉栻字闕官閩縣人歴都員外郎陳簡能字知柔閩縣人歴潮建漳泉四州推官林咸徳字闕闕閩縣人終屯田郎中以上並及第劉若冲若虚之弟字叔謙歴祕書丞林太㣲殆庻之弟字闕進歴殿中丞以上同士八年乙夘蔡齊榜林髙字子羽福清人終屯田員外郎王甲字闕人侯官童頴字蔵之閩縣人父居明没於王事詔賜一子出身令本州訪其子以聞登第終職方員外郎童子舉黄鼇連江人六歲應童子舉賜出身九年童子舉蔡伯俙福清人四歲應童子舉賜出身除東宫伴讀歴司門郎中天禧三年已未王整榜鮑稷字闕於閩縣人終賓幕王平甲之弟字保衡終侍御史諸科沈兆字冠卿閩縣人天聖二年甲子宋郊榜陸廣字彦博候官人終朝奉郎司封員外郎集賢校理提㸃京東刑獄甲科張沃字闕州永福人終饒都曹許忱字先閩縣人五年丁夘王堯臣榜李平字泰符閩縣人為都官員外郎致仕周輔字藎臣長樂人終都官員外郎知華州黄賁閩縣人歴庫部郎中江階候官人同學究歴虞部員外郎八年庚午王拱辰榜劉奕若虚之子字象伯終屯田員外郎通判潤州韓丙字夀先閩縣人終袐書省校書郎梧州推官劉異若虚之子字成伯終屯田員外郎李述平之子字公明終袐書丞知韶州景祐元年甲戌張唐卿榜林槩髙之子字瑞甫省試第二人終太常博士集賢校理甲科林慥字闕之閩縣人終太常少卿卓祐之字長吉閩縣人歴秀州判官陳誥字伯倫後改名謨閩縣人終朝散大夫知連州通判林嗣復休復之弟字延叔終太常博士鄭同文字從周閩縣人諸科林孟同學究五年戊寅吕溱榜是年改寳元元年翁彦升字元卿福清人終職方郎中知歸州林肇敦復之子字公權終屯田郎中湛俞字仲謨閩縣人知安丘縣治平中召以屯田郎中為本路轉運判官後遂休致𨼆居宿猿洞朱鼎臣字希夫永泰人終大理丞陳序簡能之子字次公終承忠郎李惟肖字夢得閩縣人後改名肖知秀州户曹諸科鄭洙同三禮慶厯二年壬午楊寘榜李處厚亞荀之子字載之歴屯田員外郎終朝奉郎提舉淮南等六路茶税陳襄象之子事見府學先賢堂蕭汝霖字岩夫閩縣人蘇畋字閲之閩縣人終朝官員外郎王綸閩縣人終都官員外郎諸科林温陸廙並長史劉昇若冲之子終祕書丞六年丁亥賈黯榜林琪殆庻之孫終朝奉郎甲科劉偁字伯可懐安人終朝請大夫劉易簡偁之兄終著作郎陳固字道夫終祕書丞張澤沃之弟字闕終朝奉郎劉彛若虚之闕事見府學先賢堂江震字孟仁候官人通判通州朝請郎致仕陳預字伯㡬閩縣人林世矩休復之子字子儀終楚州教授黄子春字闕郎終朝散諸科王茂先字仲昌閩縣人以殿中丞致仕黄質林國華並同三禮皇祐元年巳丑馮京榜李敷字昌言福清人終奉議郎謝宋臣字君俞連江人終歸安主簿趙谷字道卿連江人終承事郎試大理評事知浦城縣蕭傑字闕人閩縣陳中庸字道復閩縣人李川坦然之子字郎終吏部員外孫奕字景山閩縣人歴知南陵海陵吴縣吕誨知開封薦知封丘縣誨拜御史中丞薦為臺推遷監察御史論新法為鄧綰劾奏出監陳州酒陳襄知杭州辟為簽判移監泗州轉般倉元祐初除本路轉運使卒黄稹字幾叔閩清人歴知循惠潮汀漳五州終朝請大夫林誼字徳元閩縣人終漢川令劉靖字闕迪侯官人終功郎丁士衡字闕廣閩縣人終州掾魏昂字闕郎古田人終朝請大理評事柯伯華字闕人永福蕭開字忠叔閩清人承議郎致仕劉處約天錫再從之姪字景仁終通直郎殿中丞林罕字闕州長樂人終廣司理劉延之字闕林卞字公美闕縣人歴知山陽縣吳元瑜字闕人閩縣制科劉絳字宅中閩清人應茂才異等科特授將仕郎終推官五年癸已鄭獬榜始改四歲一舉為間歲陳君章襄之弟字時發終朝議大夫林揄字公美知山隂縣潘整字孟文長樂人終迪功郎湛庸俞之侄字伯遇終恵州司理吴君瑜元瑜之兄字終興化尉吴周卿字憲甫閩縣人終大理評事知黄梅縣黄嘉㑹字伯通候官人終朝奉郎張肩孟字醇叟永福人終朝散郎通判歙州許原字原古福清人終承事郎知政和縣曾伉字公立候官人終朝散郎左司員外郎鄭穆事見府學先賢堂許叔達林彭年字君直連江人終儒林郎真州郎曹嘉祐二年丁酉章衡榜林開髙之孫字道甫終祕書省校書郎陸長倩廣之子字才仲終朝散大夫曾黙字識之候官人以太子中允為本路運使張宗閔字遵道閩縣人終從政郎建陽令林密慎思曽孫字伯通終知潮州陸衍廣之從弟字道源終朝請郎通判鄆州林旦槩之子字次中歴監察御史終朝議郎直袐閣河東運使李皇臣字道夫閩縣人終朝議大夫知婺州林希槩之子字子中别頭省試第一人歴同知樞宻院事終資政殿學士金紫光禄大夫諡文節王向平之子字子直終峽石主簿林棐髙之侄字信甫終新昌令陳格字元規古田人終袐書丞王囘平之子向之兄字深甫終忠武軍節度推官知南頓縣陸憲元廙之子字道祖終知祥符縣諸科張應許齊並同五經黄彦陳奕並同學究四年巳亥劉煇榜陸宣廣之姪字潛甫後改名畸終朝散郎知潮州王伯虎字炳之福清人終朝請郎樞密院檢詳林邵槩之子字寸中終寳文閣直學士金紫光禄大夫陳嚮字景通閩縣人終祕書省校書郎朱敏中字仲有閩縣人終儒林郎林顔槩之子字仲和終中奉大夫直袐閣諸科鄭暈同五經六年辛丑王俊民榜時試中禮部及御試下第者四人本州陳傳其一也傳字商老候官人著甄冶遺事吴卞字道卿候官人陳敦夫襄之姪字中裕提舉本路常平終朝散大夫泰鳯路提刑鄭适字正之閩縣人終朝請郎大宗正丞吴杲卿周卿之弟字仲明終試祕書省校書郎守興化軍録事參軍王冏平之子囘向之弟終新蔡主簿兄弟皆有文集曽子固為序曰其兄弟俱名聞天下八年癸夘許將榜許將字冲元閩縣人除集賢校理改右正言直學士院判吏部流内銓尋知制誥知蘄揚鄆三州召為兵部侍郎守尚書右丞出知定州入為吏部尚書左丞遷中書侍郎改門下侍郎出知河南頴昌府終奉國軍節度使諡文定宋鈞字成叔羅源人終迪功郎倪箴字闕人福清游冠卿字子忠福清人歴提舉江西常平就移本路終朝散大夫王俞字用之永福人張俗字孟仁候官人倪材字長民閩縣人終温州推官林動字逢吉闕州人終奉議郎建教授治平二年乙已彭汝礪榜李譚字廷老閩縣人甲科池鄂字須文候官人王祖道字若愚閩縣人歴知本州移本路提刑再知本州後為兵部尚書終端明殿學士大中大夫陳毅字子忠長樂人終朝散郎知賀州劉儼偁之弟字公表終承議郎知南恩州辛琮字華國閩縣人終朝奉大夫本路轉運判官陳曄字復之閩縣人四年丁未許安世榜鄭俠暈之子事見府學先賢堂甲科江通階之姪字濟道終朝散郎知黄州鄭及字闕朝閩縣人終奉郎李處道亞荀之姪處厚之弟字深之終興國軍知録朱敏元敏中之弟字光道終朝請大夫陳時字權濟閩縣人終奉議郎陳祥道字祐之事見府學先賢堂陳㡬字道甫閩縣人終朝奉郎通判除州王晦字明逺閩縣人終朝請大夫知饒州黄康民字掞平閩縣人終宣教郎知尤溪縣謝黨字廷公長溪人林璋字國器閩縣人終朝散郎通判温州熙寧三年辛亥葉祖洽榜是年御試䇿一道至七年以進士既罷詞賦所試䇿即與制舉無異時政闕失已許人上封事逐罷賢良等科江庻階之子字希顔侯官人終於知縣李適字彦正閩縣人終朝議大夫朱功敏中之弟後改闕功字彦仁終中大夫陳植格之兄字表民歴萊州司理參軍陸長愈廣之子字季謙終宣教郎宣州簽判黄羣字文中候官人終文林郎利州路三泉縣丞諸科朱稷臣同三禮王礪同學究鄭瑜鄭表並將作監簿張顥李倚並試助教李頎試文學六年癸丑余中榜是年第一第二甲賜及第第三甲出身第四甲同出身第五甲同學究出身張勵肩孟之子字深道以集賢殿修撰知本州移知廣州加集英殿修撰知洪州建州終中大夫吴干周卿之子字無求終承議郎余清字夷老羅源人終大中大夫徽猷閣待制知泉州陳景參序之子字子孝終奉議郎知陽信縣夏臻字㡬道福清人終朝奉郎知梧州季撰處厚之侄字子約終朝奉大夫贈少部林安道字文父閩縣人終文林郎諸科是歲特奏名進士明經諸科人今三司依例支給長史文學料錢月七貫文全折到州公參日起支三年滿日住支進歴納省韓昌國林格並試監簿林樞柯闢並長史林誥鄭玠並文學九年丁已徐鐸榜是年詔自第一名以下並試律義斷案賜官錢印小録廢明經科林敷字錫逺候官人終奉議郎知同安縣張勔肩孟之子勵之弟字臻道終朝散郎林汴劉會元字天常政和中臣庻名字避天字改次常候官人歴湖南江西運判終中奉大夫吳洪字闕奉閩縣人終議郎劉詵處約之子字人伯終中大夫太常少卿林暕字闕鄭邦直字闕人閩縣姚世舉字之才長溪人終承奉郎林祖誼諸科潘鯁衢之孫字谷永終宣義郎知石康縣元豐二年巳未時彦榜是歲免試刑法第一第二甲賜及第第三甲第四甲賜出身第五甲賜同出身陳邈字彦逺闕學人元豐元年為舉首終太博士甲科黄選字闕奉永福人終中大夫王璵林積仁字闕鄧長溪人歴城令陳舉字得任閩縣人終龍圖閣學士廣東經畧唐最字夢得懐安人終朝散大夫吴開字伯通侯官人終宣徳郎知寧化縣林介陳郊字闕闕歴崇崔登字仲誠候官人終朝請郎通判汀州諸科周石同三禮林程卓士龍並同學究林迥吴閲並試監簿卓鈞四門助教五年壬戌黄裳榜余深清之弟字原仲歴吏部尚書以尚書左丞遷門下侍郎除太宰兼中書侍郎以少傅鎮西軍節度使知本州終衛國公孫大亷字少夷候官人終通直郎陳安道祥道之弟字請之終宣徳郎黄國才字公傑候官人李移忠字孝卿閩縣人終宣教郎知新昌縣特奏名是歲府學題名始書冩特奏名翁縝王震林瑜林任元黄彦博余利仁清深之叔祖陳翃林勲吴君元君瑜之弟林贄許倫黄敏選之父八年乙亥焦蹈榜王昭明髙崇字峻卿長溪人劉公摰洪浩字元卿候官人終朝奉大夫左司員外郎張翺卓元龜字大年懐安人朝奉郎致仕潘震韓用章丙之孫字俊民終承議郎宗子博士劉知至奕之孫字伯時終朝請郎知西外敦宗院沈觀陸如岡憲元之子字稚山終奉議郎提舉成都府常平劉及字闕儀閩縣人終曹王詢闕信州候官人終推官特奏名盧禹臣李勉林謐朱敏修敏中之弟余孟堅清深之父卓士安黄緒鄭亨王庚黄待問何總盧周臣禹臣之弟黄伯厚劉价黄元夫陳傳淳熙三山志巻二十六
