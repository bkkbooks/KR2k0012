body:
  text: 淳熙三山志巻十二宋梁克家撰版籍類三贍學田舊管田七十六頃七十八畝一角一十四歩園地山林屋基埕池塘坂等一百二十五頃四十五畝二角三十二歩房廊屋六十八間屋地基一十二所續添田園沙洲地一十七頃五十畝三角三十八歩屋一十八所菴基地一所租課錢四千二百七十七貫六百二十九文足房廊屋地基錢四百二十九貫二百六十文足白米二千四十三石五合糙米二百九十九石八斗八升九合豆麥雜子一百三十四石五斗八升閩縣田一十四頃二畝三角五十九歩園地等二十八頃六十一畝二角租課錢一千四百五十九貫二十九文足白米四百六十五石四斗七升分候官縣田一十四頃一十九畝一角五十一歩三園地三十二頃四十六畝一角五十八歩七分九釐租課錢一千三百九十六貫三百六十文足白米六百六十五石八升三合糙米二十二石六斗十懐安縣田四頃三十五畝一角三分一釐園地二三頃六十三畝一十七歩四分一釐屋基地一所租課錢一百三貫九百三十九文白米二百二十石三斗糙米二十四石四斗九升二合穀五十五石六斗小麥一石七斗六升六合紅豆八斗八升八合福清縣田二頃七十畝五十歩園地三頃二十畝一角三十一歩租課錢一十九貫二十六文足白米一百四石四斗一升糙米一斗大麥占榖黒豆共五十三石九斗六升七合長溪縣田四頃二十六畝一角一十八歩園地二十二頃八十三畝二角四十一歩五分二釐租課錢六十二貫八百七文足白米八十七石三斗三升二合十古田縣田二十八畝四十二歩四分園地一角五四歩九分租課錢二十五貫二百八十文足白米一十一石二斗九升畝連江縣田八十八畝三角三十五歩園地一頃四三角三十三歩租課錢四貫一百八十文足白米三十九石一斗六升二合七勺長樂縣田一十六頃三十七畝一角一十一歩四分八釐園地一十三頃六十畝三角四十二歩二分四釐租課錢九百六貫九百八十八文足麥豆榖一十九石八斗七升二合二勺糙米一百六十一石九斗六升七合上草二千六百五十二束麻皮一十八斤四永福縣田二頃九十畝四十二歩園地七頃七十畝二角五十八歩租課錢三貫七百三十七文足白米一百三石七斗一升地閩清縣田九十九畝三角五十三歩九分五釐園五頃二十四畝二角三十六歩八分租課錢一貫六百一十三文足白米二十四石一斗九升八合油麻青豆粟榖大麥芋共一石九斗四升茭草三束一羅源縣園地一頃五十畝三角四十一歩租課錢貫九十二文寧德縣田一十三頃九十六畝三角三十八歩園地一十四頃八十四畝一角一十四歩租課錢八十九貫二百一十四文足白米一百四十五石芋稜穀共五斗五升本學舊房廊屋六十八間屋地一十所屋簷地一片火巷地一段新収住屋一十八所年抽地課錢四百二十九貫二百六十文足皇朝景祐四年通判謝微攝州事始表建州學仍請賜田五頃詔下微尋罷去康定二年沈都官邈遂増田充所賜數熙寧三年詔列郡修闢學館其都府置學官者給公田十頃著為令元豐初孫司諫覺守是邦㑹安福寺僧犯法籍沒其田請於朝以資養士凡田古閩候官懐安永福長樂五縣収租凡一千二百斛緡崇寧三年行三舍法合一千二百餘人詔撥諸繫官田宅常平戸絶等田以充學費五年罷尋復政和中田一千三頃三十畮房廊三百一十四區錢一萬七千四十四貫一百二十五文米四千九百二十九石五斗八升宣和二年復科舉取士除舊贍學田産存留外餘増置者並拘入常平紹興九年張丞相浚始至以福唐儒學最盛之地三歲應詔蓋八千餘人而以春秋求補入學者幾半所給生貟乃不滿二百人舊所賜田多濵海徃徃數為水漂沒舊贍學田不足以稱朝廷加惠學者之意願以今之在官者増給之奏入未報明年復上言寧德有浮屠氏田十三頃六十有二畝籍沒歳乆乞以其田為學田從之㑹朝廷用兵有㫖鬻官田以給軍食復以帥司錢二百萬易閩縣鼓山里洲田二頃九十畮有奇入於學於是増養生貟二百四十人歳月滋乆學田寖虧庖廪不繼乾道改元有以侵田二十三條告王叅政之望者公按圖籍復舊疆許民實封増佃歳獲租三千緡以公帑之餘復貿閩候官懷安三邑官田六頃屋一十八所閩之民有盗買舊學田一頃六畮者檄本學以其直取之及先籍黄冠私田幾六十畝歳獲通千緡併歸於學乃益養士至三百人教授馮攄以新舊産若租之數總為一籍上於郡而以其副一留於學一藏之以授代者使相授受又䟽其凡刻於碑隂云一諸縣舊管田七十三頃二畝三角三十八歩塘田三頃七十五畝一角三十六歩未經起租園地六頃六十三畝二角二十三歩山林八十九頃四十五畝二角二十二歩屋井屋地基六十三亩三角四十六歩地并土地二十三頃一十八畝四十二歩草地草埕三頃九十五畝二角一十歩池塘一十八畝三角二十歩泉坂荒坂三頃三十九畝二角四十六歩水坍水浹一角三歩已上元舊管租課錢一千二百一十貫四百五十文足白米一千九百二十九石八斗八升七合糙米二百四十五石九斗八升九合豆麥雜子七十八石九斗三升増管租課錢一千九百三十四貫二百五十九文足白米一百一十三石一斗一升八合糙米五十三石九斗一本學額管房廊屋六十八間屋基一十二所已上年管租錢二百六貫九百文足十一紹興三十年沒納道士施紹達私置田園屋地五六畆三角六歩年納錢七貫九百文足榖五十五石六斗一一乾道二年根復到林冲楊寅之等冒占本學田園頃三十歩草地五頃八十五畝三角三十九歩白泥沙地三頃一角一十五歩已上増復到租課錢四百六十四貫元舊只係林冲納錢一十五貫七十文今來増根復到上項錢數一乾道二年使府給錢置待任里洲地一頃六畆二角四十歩年納租課錢一百六十八貫三百八十二文足平湖洲官地五畝二十八歩田六畝二角一十二歩年納租課錢二百四十貫文足盛宏田園五十九畝一角四十八歩及屋一十八所菴基地一所年納租課錢三百七十五貫文足巳上新置三頃共管租課錢七百八十三貫三百八十文呉越八年民有妄訟於漕臺冐占呉肇洲地呉肇洲者即前林冲等冐占田先是呉肇請佃因名漕檄懐安尉檢視尉受吏欺以洲既落江告漕憑尉狀給地與妄訟者未幾吕提刑企中攝漕事按知呉肇洲舊為學田異時尉鹵莾視乃究極本原擇能吏核得實由是洲復𨽻學寘妄訟者於罰吏之受賕誣㒺者倂加罪又䟽其斷之之由聞於朝士論快之教授喻良能記其事職田職田二十一頃九十畝一歩園九百四頃九十四畝一角五十三歩田舊二十二頃六十六畝一角二十七歩今係淳熙五年提刑衙提制到數園舊九百五頃七十九畝一角五十五歩今係淳熙五年數知府衙田一頃八畝五十四歩山地等八百七十頃四十八畝二角四十歩運使東衙田二十一畝一角五十九歩園地一十六頃六十八畝二十九歩運使西衙田一頃二十四畝九歩園地一頃七十二畝一角三十歩運使東衙西衙田一頃八十四畝三角八歩園地六頃四十九畝三角二十二歩提舉常平茶事衙田三頃八十二畝一角四歩園地五頃八十八畝一角二十歩提舉市舶衙田三頃一十九畝一角一十九歩東通判田一頃七十九畝一十一歩園地一十六畝二角一歩西通判田三頃二畝二角二十二歩園地一頃四畝二十歩運管衙田五十五畝三角一十五歩園地二畆二角五十歩運幹田一頃七十一畝三角三十三歩園地八十畝一角一歩帳管地一十五畝一角一十三歩常平提幹田七十六畝三角三十八歩茶提幹田一頃四十一畝一角三十二歩簽判園地五十七畝三角五十一歩節推田二十二畝一角七歩園地九十畝二角六歩租課錢一千二百二十四貫五百八十文足米四百二十一石四斗三升六合外大麥占榖三十九石六斗七升九合芋二斗稜米粟米各五斗麻皮一十三斤歩閩縣知府衙田二畝三十歩地四畝一角二十一運使東衙西衙田一頃五十二畝一角三十一歩地六頃三十三畝三角二十二歩提舉衙田二畝一角地三畝一角三十歩東通判㕔田一頃七十九畝一十一歩地一十六畝二角一歩西通判㕔田二頃一十四畝一角六歩地六十四畝二角五十二歩帳管㕔地一十五畝一角一十三歩運幹㕔地一十七畝二角一十九歩計田五頃五十畝一十八歩地七頃五十五畝二角二十八歩每年租課錢七百六貫九百一十五文足米二十石六十三升青麻皮一十三斤頃候官縣提舉衙田一頃九十六畝一角九歩地一五十六畝二角二十三歩運使東衙地一十四頃七十五畝三角一十二歩運使西衙田一頃二十四畝九歩地一頃二十七畝三十歩西通判田八十八畝一角一十六歩地三十九畝一角二十八歩簽判地三十三畝三角五十一歩節推田二十二畝一角七歩地九十畝一角六歩計田四頃三十畝三角四十一歩地一十九頃二十三畝三十歩每年租課錢二百九十二貫三百一十六文足米四十二石一斗八升一合麥一十石六斗七懐安縣運使東衙田九畆三角三十一歩地一頃十四畝三角五歩運幹田一頃四畝一角二十三歩總計田二頃八十八畝三角五十九歩地上頃每年租課錢一十一貫八百文足米六十石三斗二升八合十福清縣知府衙田六十一畝一角二十二歩地三六畝三角四十四歩運使東西衙田二十畝三角一十五歩提舉田一頃一十五畝二角一十八歩地四十四畝四十五歩提舉市舶衙田二頃二十三畝二角四十六歩運管㕔田四十五畝四十五歩運幹田三十四畝一十歩簽判地二十四畝計田五頃二角三十六歩地一頃五畝二十九歩毎年租課錢二貫六百二十七文足米一百一十二石九斗九升五合榖麥二十六石八斗八升三長溪縣知府衙田一十二畝三角五十歩地一頃十二畝二角五歩運使東衙田一畝地一十畝三角運使西衙地四十五畝一角提舉衙田四十五畝二角三十歩地一頃七十二畝二角三十三歩提舶田四畝六角三十六歩常平提幹田四十三畝六角四十七歩計田七十八畝四十三歩地三頃六十三畝一角三十八歩每年租課錢二十六貫六百六十二文足米一十七石七斗七升一合十古田縣知府衙田二十六畝三角一十三歩地五五畝七歩運使東衙田一十畝四歩地六畝三角一十二歩運幹田一十五畝三角三歩常平提幹田四十二畝九歩計田九十四畝一角二十七歩地六十一畝三角一十九歩每年租課錢七貫二百八十五文足米二十八石四斗六升畝連江縣知府衙田一畝二角五十二歩提舉田八三角一十五歩運使東西衙田二畝二角二十四歩運幹田及地基一十七畝二角四十八歩地六十三畝六角四十二歩計田三十畝三角三十九歩地六十二畝二角四十三歩每年租課錢一十四貫一百七十七文足米一十三石七斗六升九合長樂縣知府衙地六畝三角四十三歩提舶田九十畝三角五十七歩運管田六畝三十七歩常平提幹田地二十一畝四十二歩茶幹田二頃四十一畝一角三十二歩計田三頃五十九畝二角五十一歩地六畝三角四十三歩每年租課錢五百八十五文足米一百石六斗七升大麥一石五斗九升九合永福縣知府衙田一畝二角二歩地八百六十八頃一十一畝二角四十歩每年租課錢一十九貫五百六十文足米六斗四升八合三閩清縣知府衙田一畝三角五歩提舉衙田一十畝一角五十六歩地一頃三十八畝五十八歩計田一十五畝一