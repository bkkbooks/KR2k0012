body:
  text: 淳熙三山志卷二十八宋梁克家撰人物類三科名本朝宣和元年至紹興二十四年宣和元年己亥釋褐張元禮字安上閩縣人提舉本路常平終朝請大夫二年庚子釋褐陳才輔洪之子字元佐元在十六名奉御筆陳才輔書義文意俱善升作第二終文林郎建州節推曾榮字仁仲長邑人初授從事郎終承議郎李彌正撰之子彌大彌遜之弟字似表終朝奉大夫吏部郎中陸竑恂之子字公度終承議郎知龍溪縣吳舜鄰字元愷福清人終從政郎三年辛丑何渙榜陳祚字慶長羅源人終宣義郎黃光庭字庭烈古田人終迪功郎劉顓字公益懷安人終承事郎何彬森之弟字季文終文林郎陳最字季常長溪人終朝奉郎知興國軍鄭昌齡楫之子字夢錫歷太常寺簿本路機冝終承議郎劉國鎮易簡之侄孫字文鼎終朝請郎周孝嗣字世延候官人舉八行終興化軍知録葉南仲源之姪字晉明終朝奉郎知新州劉彥和靖之族孫字元豫陳賔字承之閩縣人終從政郎陳允文字昭德閩縣人終從政郎林朝俊字闕求閩縣人終朝奉大夫知惠州鄭季夫邦倫之子字功叔終知蒲田縣林獻材字廷翰閩縣人終宣教郎鄭秀頴字光逺永福人終迪功郎崔發字懷吳懷安人終承議郎知甌寧縣陳翁榮之弟字仲人終朝散郎廣州通判林安行代工之子字彥由長樂人終從事郎晉江丞彭文嗣元逹之侄孫字仲懷安人終迪功郎王寧賔之弟字元瞻終宣教郎衛尉寺丞陳定國誥之孫字維翰閩縣人終朝散大夫知連州惠州吳昭字彥融古田人政和八年貢首終朝奉郎通判歸州陳亞卿字次仲閩縣人終朝請郎通判汀州盧榕楚之兄字叔材為從政郎衡州安仁令建炎初賊曹成犯安仁躬率民兵轉戰以沒贈宣教郎特官其子李茂則師向之子字叔憲終迪功郎楊彥字邦傑候官人終迪功郎王普賔之子字伯照歷太常少卿工部侍郎終中奉大夫贈敷文閣待制特奏名王粹劉照王覯王時陳嶽劉時升林繼曉瑄之子陳彥啓卓回黃南老潘敏修曾表正林彥明張章林稷林大東余獵六年甲辰沈晦榜以貢士人衆特添省額一百人賜御製詩黃匪躬字昌朝閩縣人終朝請大夫知建昌軍年八十九吳元美字仲實永福人宣和二年貢首五年國子監元紹興中歷太常寺簿出為本路機冝以忤時相貶容州卒後五年楊椿洪遵等為言於朝特旨官其子朱作敏中之孫字岩起終儒林郎劉衡稱之侄字仲鈞終迪功郎劉察字昭逺長溪人終通判漳州陳卓然字昭叔候官人終文林郎李邦光坦然之元孫字明甫終朝散郎太常寺簿洪元英浩之侄字仲傑終朝散郎鄭文經字國賓候官人終蕪湖尉劉知已字仲常候官人終從政郎泉州録參陸祐衍之孫事具府學先賢堂李冀字堯封古田人終宣教郎本路提刑司幹官朱倬庭佐之子字漢章歷國子監丞擢右正言侍御史遷御史中丞除參知政事拜右僕射終觀文殿學士贈太師永國公陳致一毅之從姪字貫通終朝請郎提舉廣東鹽茶江逵震之曾姪孫字上逹終迪功郎永新簿張安節字介夫懷安人黃祖舜祖堯之弟字繼道自給事中同知樞密院事知潭州終資政殿學士通奉大夫林升字彥明連江人終迪功郎興寧簿吳元衡元美之弟字季公終通直郎廣東運幹黃鮪字獻可懷安人終知龍溪縣連康時字良弼懷安人終朝奉郎林彥逹字叔通閩縣人終奉議郎通判永州葉顓大任之兄字端卿終迪功郎陳祖禮君章之孫字元範終朝散郎通判鄂州陳遷復之子遇之弟字安仲終修職郎劍浦縣丞林遵善字適可長樂人終迪功郎南劍州司法陳宗禮字夢昌長樂人終迪功郎李軫字德載懷安人終承議郎特奏名林向勳之子京府助教朱庭資陳武仲黃廷俊劉俊民劉國鈞林大麟建炎二年戊申李易榜詔分省額於諸路令類試計臺時以建冦移於本州胡文炳震之再從弟字仲虎終文林郎甄寧丞甲科謝邦彥字朝美長溪人終浙西提刑林安宅敷之侄字居仁歷檢正户部侍郎右諫議大夫同知樞密院事兼權參知政事終端明殿學士陳宗古字述之候官人類省試中第一終朝奉郎楊幹字之才懷安人終朝奉郎通判韶州張嘉賓肩孟之從姪孫字朝美終朝奉郎通判宣州洪清臣字直侯長溪人終知邵武軍王玠字元圭閩縣人終興化軍司法鄭知剛字季和永福人終太府寺丞知嚴州陳逺復之子遇之弟字彥明終宣教郎知武寧縣胡文煒文炳之弟字德華終政和簿陳文昌字夢發古田人歷宣教郎宜黃丞陳剛中祥道之侄字彥柔終江隂軍簽判陳南美字冠卿閩縣人終奉議郎陽山縣嚴褒字華仲閩縣人終朝請郎孫夢良大亷之子字宋傳終朝奉郎知平陽縣陳節字仲和終闕寧尉王聿元量之從弟字朝聘終奉議郎知光澤縣張登字明終永福人林茂字才美閩縣人終朝奉郎通判泉州陳顔公闕之從姪字聖闕終通直郎余教義特奏名卓顯天登仕郎劉元京闕闕教孫趙彥陳渙劉詡林字勳之子連希尹張知倪本材之子陳思江勃林大榮曾世昌經之子字良佐以舊太學生特與開州文學附特奏名第四等紹興二年壬子張九成榜是舉初復詩賦仍額試鄭公明祖闕之子字仲逺終宣教郎知新昌縣黃溥唐佐之子字時儒終泉州司户陳肅易則之姪孫字雍之終奉議郎石城縣陸承休憲元之曾孫字慶中終汀州司户上官徽字洵美閩縣人終迪功郎南恩州司户潘飛英師孔之子字元傑終朝奉郎知肇慶府梁國林字德俊閩縣人終興化軍通判李簡能皇臣之孫字從易歷監察御史浙西提刑終朝散郎直祕閣胡彥逹文炳之從弟字仲通終文林郎洪州司理陳若沖字德用福清人終承議郎通判廣州陳叔嘉倬然之從弟字仲亨終承議郎黃廷瑞字舜軒閩縣人終朝散郎通判泉州林聿字德修長樂人終奉議郎知瑞安縣吳忠孺字孝卿閩縣人終迪功郎黃世昌字繩斯永福人終闕劉安世下州文學特奏名洪元康京府助教劉發崇寧四年解貢王旁陳行中祥道之子陳適黃純姚祖虞陳嘉會陳端仁鄭良臣暈之孫髙選陳時仲程嘉德五年乙卯汪應辰榜是年賜御書每舉賜御書自此始任文薦字逺流閩縣人授監察御史出為江西提舉浙東提刑入為太常少卿出為浙西提刑本路都運副使終祕閣簽書知建寧府王觀國字建侯候官人終從政郎知平陽縣陳從易公器之姪孫字和夫終從政郎處州教授謝鳳字子儀閩縣人終建昌軍教授曾質經之姪字德明終泰州教授林聳字彥孜閩縣人文林郎終縣丞洪毅字幾乍閩縣人終迪功郎周芹輔之四世孫字菁材終朝請郎宗正寺簿林上逹字逺夫福清人終建州司户薛召字夢亨閩縣人終朝散大夫知韶州陳宋霖字元雩長樂人歷國子博士終朝散郎提舉廣東常平劉凱滂之子宇角不終朝奉大夫湖北提刑劉藻稱之姪孫字昭信宣和五年解首終宣教郎祠部員外郎贈祕閣修撰李格芘之姪字文叔終文林郎知四會縣劉詮處約之從弟字宋衡福清人終廣州教授卓庶元規之子字幾仲終迪功郎浦城尉王元量元時之從弟字大同終朝奉郎廣東經略司機冝葛延年字少格閩清人終朝奉郎知惠州陳佐堯致一之從弟字朝弼終朝散郎通判廣州薛槐召之族字時歷授文林郎平海軍節度推官鄭必明祖德之侄字南仲終知於潛縣黃究字先致候官人終迪功郎曾旺字範填候官人歷軍器少監吏部郎中知潮州廣東運判以直敷文閣知廣州終朝請大夫周偉字景長閩縣人終解主簿劉師亮兹顛之侄孫字希武終從政郎龍溪丞特奏名林長孺登仕郎陸文昌憲充之孫魏康太昂之侄陳瑞梵禹俞禹功之翁邦彥陳祖堯鄭甄吳閎陳凱林項蒲穀八年戊午黃公度榜是歲免殿試林孔彰肇之元孫字嘉言終南外宗學教授甲科林寅字叔華閩縣人紹興四年解首終宣教郎知寧化縣髙澐若虛之子字伯逺終潮州教授黃毅字德雋永福人終朝奉郎通判欽州陳長方侁之子字齊之終宣教郎江隂軍教授朱介卿字介夫閩縣人終教授黃瑜稹之曽孫字潤夫陳嘉猷字道美閩清人終迪功郎龍泉簿翁之章字士頴閩縣人終從政郎陳彌作字季若閩縣人歷福建兩浙運判提舉四川都大茶馬召為大理少卿除兵部侍郎遷吏部侍郎兼權尚書知潭州泉州終敷文閣直學士大中大夫彭公永元達之侄字景修終奉議郎陳休烈字昌闕懷安人終迪功郎周宜未偉之侄字充彥終從政郎本路帳管陳升卿字舜臣閩縣人終朝請郎通判泰州黃宋翰字元侯長樂人終通判封州黃瑀字德藻閩縣人歷監察御史江東提刑終朝散郎特奏名周彥時劉侯圭侯亞之弟王元龜陳堯問朱峴張元老蕭宗顔業問范桂韶謝美中林元圭徐彬衛介石陳祺陳弼韓嶨屺之兄李坦夫劉汴陳烜蕭稷臣孫雋夢良之兄丘遇陳時升王維陳安國李撝黃亢十二年壬戌陳誠之榜陳誠之字景明閩縣人歷祕書省正字祠部員外郎國子司業禮部侍郎知泉州召為翰林學士同知樞密院事遷知院終端明殿學士李楶芘之侄字承叔歷泉州通判知饒州衡州終朝奉大夫尚元鼎字次公候官人終朝請郎通判林栗字寬夫福清人陳秉哲冝之子字體明閩縣人終通直郎陳鋭字頤仲閩縣人終宣義郎知金華縣劉師贄師亮之弟字景宣終迪功郎冝黃尉李椆楶之弟字常季終文林郎漳州教授鄭景衡字潛尹閩縣人終袁州教授黃康國字必濟古田人終松溪簿黃公廙康國之子字恭臣鄭煒字榮季羅源人終順昌簿陳禾報之子字文秀閩縣人歷國子丞權倉部郎官提舉廣東市舶提刑江西運使湖北參議終朝請大夫林安國安宅之弟字邦翰終承議郎監建康府𣙜貨務陳千雲字大舉懷安人終迪功郎南劍州司理王祥字襲休福清人後歸莆田許氏改名公葉珒字君璧羅源人終循州教授張雲翼林玠字介玉福清人特奏名張元佐陳嘉績黃知新梁顯韓師孔徐鋭合之姪陳賓莊鳴道林日華林俊民陳南強公彥之侄陳時可湛嶢存之子陳琮林翊張尚智陳昭美髙灌林宋卿繆朝選十五年乙丑劉章榜是舉復經義通詩賦論䇿為三場鄭丙字少融長樂人陳師尹字民瞻閩縣人紹興十四年該特奏名以係舊太學四人之數特與赴殿試終迪功郎潘冠英師孔之姪字仲舉黃希文字夢章長樂人終奉議郎湖南提刑司檢法何元達字顯夫懷安人宣和三年貢首終承事郎林仰豈之子字少瞻終朝奉郎李應隲之姪字慶和閩縣人終新州推官黃亞仲字幾叟永福人終迪功郎陳溉把之子字仲博終清湘簿陳師孔景先之子字寶道永福人終迪功郎特奏名黃元陳世材江洵直陳昭謝大亨陳蕃陳才弼洪之子陳向陳任侁之弟鄭球繆朝選林宏夏寅林偉陳修輔劉忱鄭霖陳彥寧張尚德陳逹韓嵤屺之兄劉詳黃枸黃邦佐黃甸黃級陳光表楊孝傑林公邁十八年戊辰王佐榜是嵗經義詩賦復分兩科劉季裴發之子字少度長溪人歷祕書丞監察御史起居郎兼太子佐庶子終朝散郎祕閣修撰王亮功字舜咨長溪人終文林郎漳州教授吳瓊字景玉閩縣人終宣教郎陳大方字少廣長樂人終髙州教授曾賁昌之子字子文蒲堯仁轂之姪字彥性陳經國字世顯懷安人終迪功郎陳伯山公器之姪孫字仁叔終從政郎上髙丞蒲堯章堯仁之兄字彥成終迪功郎葉翔鳳闕鳳之弟字子翔終朝奉郎通判黃州梁汝昌字大任永福人終迪功郎蕭田尉林次融字仲舉長樂人初應童子舉林錞字仲和連江人終迪功郎曲江尉王堯臣字唐弼長樂人終松溪簿劉公特溫伯之姪字明甫終知龍溪縣陳思文字公煥長樂人終承議郎峽州簽判陳秀實秀頴之兄字光華終宣教郎知興國軍朱江字朝宗候官人李升字上逹閩縣人終大冶尉王傑字才特永福人終宣義郎東莞丞劉煥稱之姪