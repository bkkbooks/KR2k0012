body:
  text: 淳熙三山志卷四十二宋梁克家撰土俗類四物産山海天地之藏郡封所至林煙蓊薆横屬數百里滄波瀰漫下極無涯物産萬殊可得而盡名耶鳥獸草木要欲多識矧屬吾境亦恥一物之不知姑以所聞見纂其可書者附于篇木松四時不改柯易葉史記曰松柏者百木之長也蔡密學襄知州日令諸邑道傍皆植之又自大義渡夾道達于泉漳人稱頌之詩曰夾道松夾道松問誰栽之我蔡公行人六月不知暑千古萬古摇清風樹既老愚民多穴取其松明以燒以至枯折尉司雖嘗籍記或令補種未能禁絶舊𨽻憲司近亦申嚴云又元祐中道士顔象還自東門植松抵鐵塔康山之巔陳𫝊贈詩初與田蔬一様平一千年後插天青行人息䕃凉風下應説栽松道士名栢葉匾生而香相思木堅有文堪作器用几案碁局書筒拍板之屬子冬實名紅豆呉都賦云相思之樹欓木高大枝有刺子似茱萸而香味辛如椒殺腥物椒木有刺子朶生而熱味辛生蜀都名蜀椒西戎名胡椒本土者名土椒樟高大葉似柟葉而尖長彌辛烈者佳為大舟多用之檜栢葉而松身詩曰檜楫者此金荆木堅有文彩可為牀榻黄楊葉細皮薄嵗長三寸至閏年則縮一寸東坡詩惟有黄楊厄閏年木堅實可為器用蘖木枝葉與石榴無辨皮黄子赤如枸把子兩頭尖枝可剉以染黄生山石間檟爾雅曰苦荼也注云似梔子木槵葉如㒈欖而小實可以浣衣子可貫為數珠佛經貫木槵木一百八箇是也槦州以南為多至劍建則無之以其擁腫不中繩墨名以槦或曰其䕃覆寛廣宜以榕名慶厯中王守詩云清隂隨日逺翠影共煙浮廣䕃均榮賤安人異品流幄帷臨大道冠葢俯高樓避暑疑無夏當風别得秋熙寧中程大卿師孟多命植此自為詩三樓相望枕城隅臨去重栽木萬株試問國人行往處不知還憶使君無桂葉似枇杷花白叢生巖嶺間冬夏常青唐太和四年夏天降桂子散落人家芬馥異香圓如珠顆朴葉如加條差小其皮粗故名柟材堪棟梁根生瘤呉賦云楠瘤之木楮皮有斑花其皮可以為布亦可擣以為紙實如楊梅練高丈餘葉宻如槐而長三四月開花紅紫色實如彈丸熟則黄即金鈴子也椿葉似橄欖芽香可噉樗木形幹類椿葉脱處闕匠者不顧故名然無用莊子所謂梓似桐而葉小花紫爾雅云椅梓郭璞云即楸也陸璣云梓者楸之疏理白色而生子者橡高可三二丈三四月開黄花八九月結實名皂斗其殻可以染皂即爾雅云櫟其實梂邢昺疏曰梂盛實之房孫炎云其實橡也石南葉如枇杷有刺凌冬不凋人多植庭中間隂翳可愛不透日氣其木堅硬可為斧柯桄榔木似棕櫚有節葉亦如之外堅中虚内有麫大者數斛紫黒色有文理可以制器櫸栁皮似檀槐葉如拚正生溪旁檉爾雅䟽曰檉一名西河栁郭璞云今河傍赤莖小楊也陸璣云皮赤如綘一名雨師枝葉似松榝木生山中葉子似茱萸加條葉似朴磨犀角象牙用之青剛葉似石南木紋如黄楊堪作鞍橋椶櫚亦曰栟櫚高一二丈傍舞枝條葉尺餘中包如魚子鵞黄色然根浮土人植時先磐石其下檀葉似槐可以為床榻器用楓似白楊葉圓而岐有三角二月花色白取其脂可以為香杉木類松而勁直葉附枝生若刺鍼桐有四種青桐皮青赤桐皮赤梧桐皮微青俱有子白桐有花無子一名椅桐又名華桐岡桐惟白桐無子可為琴瑟槐葉細而青花子黄有葉大而黒者名椶皂莢有雌雄雄者不實鑿木榦方寸以雌木填之乃實櫧郭璞云此木似柞子可食為柱不腐白牙最白潔可為器玩水楊葉圓而濶枝條短硬多生水岸栁柯條與北土無異但飛絮者稀桑與柘為二種皆可以飼蠶亦可為鞍橋竹慈竹叢生任昉所謂子母竹蔡公襄嘗賦之斑竹生永福縣鶴洋及湘江者又有紫竹今山邑皆有之鶴膝竹生古田縣似靈夀藤不須琢削自合杖制箭竹可為箭榦生長在古田山中苦竹笋味甚苦又有苦伏竹笋冬生掘而食之味尤珍淡竹肉薄節間有粉南人以燒竹􅅹者石竹連江等縣為多節疎而平可為器用麻竹大至經七八寸葉亦大笋夏生江南竹粗大而堅直秋竹甚小以為篾用蟲竹叢生如蘆每節生蟲如新蟬之未翼者中無竅隙隨節而長竹將枯乃穴其傍而出豁竹節長細可為笛材笋味最美䈥竹肉厚而竅小可為弓弩材草萱詩曰焉得諼草埤雅謂一名鹿葱草之可以忘憂者夏開者梗高葉大秋開者短而葉細别有鞓紅而百葉者有鵞黄而香者非一種也蘭一名水香顔師古云即澤蘭也生水傍葉光潤尖長花蠟色六出三椏敷瓣聳若䑕耳一卷而紫暈檀心氣清逺葢國香也春秋兩種楚詞云春蘭兮秋菊又云秋蘭兮青青或云一榦一花而香䑆者蘭一幹五七花而香薄者蕙剪刀股葉如剪刀苗甚軟嫩色深青綠每叢十餘莖内一莖之分枝開小白花瓊田春生苗葉無花三月採根葉焙乾土人用治風建水枝葉似桑四時常有土人取其葉焙乾碾末治走疰風雞項葉紅花葉上刺青色亦名千鍼草根似小蘿蔔枝條直上三四月苗上生紫花八月葉凋十月採根火杴春生苗葉似紫蘇大而尖長白花州人呼其葉為火杴草馬藍葉類苦蕒菜土人連根採之即爾雅所謂箴馬藍是也治䲅魚毒石龍蒭叢生俗名龍鬚草今人以為席莎草根名香附子燈心生澤地叢生莖圓細而長直人以為席雞腸一名蘩􅘚葉似荇菜而小其莖梗作蔓斷之有綠縷細而中虚似雞腸因名鱧腸即蓮子草也一種葉似栁而光澤莖似馬齒莧花細而白其實如小蓮房一種苗直頗似蓮花而黄色實亦作房而圓可以止血方言謂之斷血草羊蹄禿菜也葉狹長色深莖節間紫赤採根醋磨塗癬速效蓪草一名通脱木葉如草麻中虚有軟白可為輕花出長溪紫背解一切蛇毒佛甲多附石向陽而生似馬齒莧細小而長仙人掌多于石壁上貼而生如人掌故名治腸痔㵼血蒲生陂湖中嫩者可食漢嘗以裹輪蕢生有三稜爾雅謂之望江生者為淡蕢近海者為鹹蕢土人以為纜為席為屨芒似茅可以為繩索履屨虎杖草爾雅曰似紅草而大可染赤煎以為飲色如琥珀戒火草人家用瓦缶植之以警火獨掃草爾雅曰馬箒注云可以為箒篲茭生泥浦中葉如蒲葦人縛為薦蓆誚之菰又有白色者其根可食謂之茭鬱子中有黒㸃嵗久有白臺如小兒臂謂之茭手藤丁公藤生依南樹故號南藤莖如馬鞭有節紫褐色南史解叔謙母有疾夜于庭中祈告聞空中云取丁公藤治即瘥即此藤也千金藤主一切血症生南土者黄赤而細辛紫金藤生山中初春生葉青色至冬凋落其藤似枯條採其皮曬乾治腎氣石南藤其苗蔓延木上四時不凋含春藤其苖蔓延木上冬夏長青治風感藤如雞卵大味甘美如蜜生研傅蛇蟲咬瘡一名甘藤甘感聲近耳又名甜藤吉釣藤亦名美龍藤色紫老者可帖雙陸局道家呼其根為降真香或以為簡金剛藤方言謂之頡根赤色可以染鴨子薜茘藤緣木而生香藤緣木而生其氣馨香又有南藤人取以醸酒王孫藤可供作纜畜擾馬海壇舊諸牧有之但駑蹶駻突須久服習乃堪乘驢騾亦同牛黄牛角縮而短悍水牛豐碩而重遲出福清以南水牛新孳下其乳為團出城東松嶼羊嵗兩生息出福清長溪猪犬猫雞鴨鵞獸虎山深處有之異時或忽至城邑豹尾赤而文黒為赤豹又有黒豹文圓者為錢文豹豺季秋之月攫獸以祭天方言呼為豺犬狼似虎而小性主貪熊猪身而圓有爪如鉤麂麞類也其肉堅韌不及之其皮可為履鞹麞味甘無毒有牙而不能噬猴詩謂之猱大厯中有數百集古田杉林中里人欲伐木殺之有一老者飛下縱火爇樹傍家于是人走救火遂得脱去猿居山林巖石間渇則連臂下飲人或射殺其子必自投而死剖視之腸皆寸斷亦名猿父爾雅曰猿善援玃似猿而蒼色爾雅曰玃父兎嵗中秋感月精而生閩中近亦有之香狸口鋭身長似猫過山則草木皆香猩猩連江五峯山勢高逺林深茂有之刺蝟狀類猯㹠脚短多刺尾長寸餘近人則縮能捕蠱毒野猪如豚毛黒如錐名曰豪彘野狐似狗而小尾如長箒能媚人為妖皮白可製裘鯪鯉似鼉而短小色黒又似鯉魚四足能陸能水日中出岸開鱗甲仆臥令蟻入滿趨水中蟻浮出食之山犬狀類家犬赤蒼色山羊有筋力善走其角觥觥然獺水獸也似狸而毛細入水不濡主魚鯁不下者取其足項下爬之即愈竹䶉蒼色如䑕食蘆葦根鄉人亦謂之芉豚䑕狼生山野中似猫能捕䑕鼯䑕似小蝙蝠膏療耳瞶􅴉􅤜䑕似兎而小尾多毳善緣藤蘿而走王右軍取其鬚以為筆鼴䑕身似牛而小鼻似猪而足短貪飲溪水若恐不足故曰飲河不過滿腹禽族鸛白者似鵠黒者曲頭其巢中為池含水滿池中養魚及蛇以哺其子鸕鷀水鄉有之從口中吐雛鵠似鶴而白鷗臆白翅青南越志隨潮上下鴻雁寒露來賓至長溪止及春北嚮黄雀秋稻將熟自西北來多至數千閩連江等縣有之魚狗紅觜翠羽腹背間微赤戲于苕間俟魚則穿波取之葢翡翠之一種也鵁鶄水鳥人家養之可厭火災似鶩綠衣馴擾不去􅡝溪禽也似鶩而黒色鳬水鳥也飛甚速今賈販者以鳬血㸃錢欲取利如飛也鸂鵣文若繡畫尾有毛如琵琶撥小于鴨對浮溪谷間鷺鷥爾雅鷺舂鉏郭璞云白鷺也頂有長翰如絲鵜鶘頤下有袋容二升物展縮由袋其中盛水以飬魚一名淘河鳩方言謂之鷦鷰亦名𤣥鳥紫胸輕小者為越鷰胷斑黒而聲大者為胡鷰黄鸝亦謂之倉庚俗呼為黄鸎竹雞白蟻聞其聲盡化為水山林中多有之其聲自呼為泥滑滑亦名越鳥選曰越鳥巢南枝白鷴似山雞而色白西京雜記曰閩越王以獻漢高帝山雞尾長而小可蓄之樊中所謂翟山雉也雉可充庖㕑閩越王嘗以白雉獻漢武帝鷓鴣形似母雞而小有白圓㸃背間有紫色聴其鳴若云鈎輈格磔開翅之始必先南翥喜鵲嵗十一月乾鵲始巢及春乃或營巢之户知避太嵗南人喜鵲聲而惡鵶聲故俗號為喜鵲信鵲類鵲而小能為百禽聲忽鳴而過庭簷間其占為有喜亦名進鳥鷁水鳥蒼色方言謂之盧鷁鶼鶼爾雅曰比翼鳥似鳬青赤色鶗鴂方言謂之孤雞鳴則草衰鶡有冠似雞好鬬鷦方言為扛鼓于小枝間以草為窠尤纎巧又名巧婦慈鴉義烏也能反哺方言呼為射烏郭公頭尾黒而身赤一名赤烏鶻鷙禽蒼色翅梢深黒直上千尺乃凝然不動洞見淵魚擘波而歛攫之鷹稟瑶光之精而生蒼黒色亦名鷙鳥以其勇鋭能執搏也七月則取禽以祭天鸇蒼褐色似鴟而小一名隼亦名晨風鳶鴟也鷂啁哳而聲悲紅娘丹觜翠身似鸚鵡白頭公似雀而大頭有白㸃啄木雌褐而雄斑啄利如錐索蠧木間竟日軒輊其聲剝啄然䳺鶉莊子謂田䑕所化淮南子謂蝦蟇化也舶鴿似鳩而差小諺謂千鳩不如一鴿言美也編角如笙繫其尾高飛雲端聲似鳴鏑而委蛇善識主人之居舶人籠以泛海有故繫書放之以歸鵙詩曰七月鳴鵙方言謂之伯勞謝豹狀如鵙以聲名之也舊記以為子規鴝鵒今人畜其雛以竹刀剔其舌教之則能言一種白者似鵙而亦有幘呼潮色蒼似鴿潮至即鳴風雨弗渝也雀一名嘉賓言栖宿人家如賓客也綵囊似雞而小頂上有五色囊雷舞蒼赤色聞雷聲即舞鴞似鵩而小一名梟一名鵂鶹夜飛晝伏又名夜遊女又名鬼車遇隂晦則飛鳴惡聲鳥也周禮覆夭鳥之巢注謂鴞鵂也方言謂之訓狐水族鯉魚埤雅一名鱣鯉無大小其脊中鱗皆三十六鱗有黒㸃子爾雅以之冠篇陶隱居謂為魚王形致可愛且能神變鯋魚數種胡鯋青色背上有沙長可四五大鼻如鋸皮可剪為鱠縷曝其肉為脩可作方物鮫鯋鼻長似蛟皮堪飾劍一名錦魟出入鯋初生隨母浮遊見大魚乃入母口中須臾復出故曰指頭鯋腮兩邊有皮形似戴帽又有時鯋犬鯋之類鯔魚似鯉身圓口小骨軟生江海淺澤中呉王論魚以鯔為上鱸魚似鯔而有黒子肉白斫膾不腥隋煬帝謂金韲玉膾東南之佳味鱖魚口目大而鱗細有黒子味美亦名鱖豚水豚惟狸脚鱖最佳鯿魚板身口鋭項縮孟浩然果得縮項鯿謂此魚也白魚生江中大者六七尺色白頭昻可膾石首魚頭中有石如碁子遯齊閒覽南海有石首葢魚之極美者取其石治以為器載飲食如遇蠱毒器必曝裂土人以製作尤精明瑩如琥珀人但愛玩其色鮮能識其用比目魚嶺表錄異記南人謂之泥鞋魚江淮謂之拖沙魚鱗細色紫一眼兩相比乃行鰣魚一名鮒魚鱗如淡墨傳金骨軟子飽者佳鏘魚板身而鋭狀若鏘刀肥腴極佳其子有䲅毒有金㸃而差厚者謂之黄蠟樟鰈沙魚形扁性温浙人呼為箬魚淮泗謂之鞋底魚以江中者為美海鷰魚黒色肉翅飛走泥上鰻魚似蛇而無鱗口齒尤銛利色青黄海出者比江鰻差大一名慈鰻亦名狗魚鱓魚似鰻而細長生水岸泥窟中人云是荇芩根所化又以為人髮所化今腹中有子未必盡是化生也鱧魚陶隠居謂公蠣蛇所變至難死頗有蛇性諸魚膽苦惟此膽味甘可食為異即俗所謂黒鯉魚者夜必北向望斗烏魚色黒江海皆有之鯯魚板身多鯁鮆魚身狹長有鬚一名刀魚時魚月長一寸至十月盈尺者佳此魚以不腥為異子魚身圓鬛小冬深盈腹皆子者皆作醎肥美可充方物黄梅魚似金鱗魚而小骨少而口朱長可七八寸銀魚口尖身鋭如銀條作鮓尤美章鮌魚色青斑無鱗亦名為馬鮫詶制魚爾雅謂之當魱肥美而多鯁黄賴魚一名䱀䰲無鱗似鮎而小腮其腮邊有刺能螫人其聲䱀䰲然鮎魚爾雅謂之鯷大者長尺餘無鱗方言呼為池魚誗魚池塘有之亦名甜魚䱠魚長可尺餘骨柔而無鱗唐李柔入閩謂為銀羮謂水母為玉膾䲅魚肝及子有毒一名鶘夷河㹠或謂之鯸鮐魚芚以藍煮令過熟則可以無毒鱅魚色青無鱗魴鮃魚大如母指有五色鰌魚大如船舟人遇之則鳴金鼓以怖之布米以厭之則倐然而没不然則害舟間有斃者必梯而臠之刳其脂以為油可灰船魟魚團扇形色紫尾長于身能刺人彈塗魚大如母指鬚鬛青斑生泥水中水母本草謂之姹亦謂之乍魚言其隨年乍有乍無也大如覆㡌小者如盌腹下如垂絮石鏡塊然凝結瑩若水精有足無目慿蝦而行本草名為摴蒲魚過臘身濶可丈許食蚶蚌白爵浮而影伏或六眸或六甲或似魟其甲精光為蠀蛦亦曰白濯鼈魚頭軟骨謂之醜食當去之不可與莧菜同食魚池中多畜之令魚不隨霧起故陶朱公謂之神守石拒一名八帶刺居石穴中人或捕取之以脚粘石拒人故名章魚似石拒而極小連江羅源寜德福清諸邑俱有章舉似章魚而差大脚短烏賊鷃鳥所化能噀墨溷水以自衛性嗜烏每浮水上伺烏啄其腹卷取而食之故名柔魚似烏賊而小色紫俗呼為鎖管鱟足下有二殻厚掩身尾長有刺子如菉豆韓退之詩鱟實如惠文雌雄常相附雖風濤不解謂之媚鱟海人用葦索兩雨編為一甲以鬻焉蝦有數種梅蝦梅雨中有之白蝦生江浦城南有白蝦浦是也其大者為蝦魁頭殻攅刺可為杯亦名蝦杯鬚長一二尺大如指上有細芒肉雪白出福清其甜者為蘆蝦或傳蘆葦所化閩縣長樂近江有之又有蝦姑狀如蜈蚣能食蝦見開元遺事蟹八足二螯大者箱角兩出足節屈曲行則旁横故曰旁蟹蝤蛑俗呼為蟳扁而大後兩足薄濶謂之撥棹飽膏者曰赤蟹蠘殻鋭而膏黄螯銛利斷截如翦彭螖音滑似蟹而小呉人語訛呼為彭越今海畔有盧禽似之彭蜞似蟹而小似彭螖而大掲哺子似彭蜞一螯甚大一螯細一名擁劍亦名桀步千人擘狀如小蟹壯者擘之不能開故名車螯大者如槃小者如拳沈存中云即本草所謂魁蛤也蛤蜊止消渇開胃氣解酒毒以萊菔煮之則其柱易脱蚌肉内有珠胎江賦曰瓊蚌晞曜而瑩珠蜆方言謂之蟟蟶生海泥中長可二三寸大如指而頭開淡菜亦謂之殻菜烏黏狀似淡菜而絶小生石上叢剗取之故名海月形圓如月亦謂之蠣鏡土人刮磨其表以通明者鱗次以葢天牕石華方言謂之石雹選曰挂席拾海月揚帆採石華石榼形圓色紫有刺見人則刺動搖沙蛤出長樂殻黒而薄中有沙焉故名俗呼西施舌石決明即鰒魚也狀如蛤惟一殻無對大如手小者如兩三指海人噉其肉取其殻清水洗乳瓦屋子嶺表錄異記蛤類南中呼為蚶子亦名瓦屋子以其殻上有稜如瓦壠故名文蛤有文理者唐時常充上貢亦名海蛤其殻皆為風濤所洗則自然圓淨龜脚以形名㘭中肉美大者如掌螺有數種狀若鸚鵡堪作酒杯者為鸚鵡螺色紫而斑㸃者為紫背螺俗謂之砑螺大如拇指有刺而味辛如蓼者為蓼螺生海中而色紅可為神盃肉可作醬者為紅螺磨令尖平可以酌水其可為鮓者為香螺牡蠣海旁皆有之附石而生磈礧相連如房故名蠣房韓退之詩蠔相粘為山謂此晉安石澚為佳莆州多出荻蘆東沙關嶺一種草鞋蠣生海中大如杯漁者以繩繫腰跏足屏息入水中取之少間振繩乃舉蟲蛇有數種蝮蛇胎化腹裂子生最毒青竹蛇與竹同色小而不可犯花蛇好入人家捕䑕食之惟烏蛇不螫人醫家用之絶大者曰蚺蛇膽可和藥他又有白花白頸黄頷之類鼃背青綠色方言謂之青蠖其聲然亦有背作黄文者名金線蛙黽名蝦蟇爾雅曰在水為黽腹大脊青俗名土鴨其鳴甚壯色黒者呼為蛤子亦名水雞蟾蜍爾雅曰似蝦蟇居陸地下濕處身大背黒行遲其腹下有丹書八字者真蟾蜍也抱朴子云蟾蜍萬嵗生角畫地流水蜜蜂在巖石間作房色黒在人家窠檻中作房甚小而微黄内必有大者身稍長呼為蜂王外有黄蜂土蜂之類其種不一皆有螫毒寒螿二月鳴者名䗿女音寗似寒螿而小七月鳴者名蛁蟟音彫寮色青九月十月中鳴甚悽急者乃寒螿也舊記入秋鳴者名促織曽師建云有數種通名蟋蟀有尾者為雌無尾者為雄雄者能鳴北地寒惟秋始鳴冬則蟄南地暖往往鳴聲不絶蜩詩五月鳴蜩本生土中至夏則登木而蛻秋鳴者為蟬有象鼻蟬紅翠相間好登茘枝木而不能鳴又有碧玉蟬翠色可噯韻如軋箏或曰閏年蟬多蝸郭璞謂頭有小角莊子所謂戰于蝸角是也南方積雨蝸涎書畫屋壁悉成銀迹蜥蜴似蛇而四足尾青碧以五色者為雄而不備者為雌一㮔喜緑籬壁形小而黒名蝘蜓亦名蛇師以其常在屋壁故名守宫一種形小尾長見人不動名龍子在草澤大者名蠑螈蝱數種皆能啗牛馬血木蝱木大而綠色幾若蜩蟬蜚蝱狀如蜜蜂黄色蒼蝱大如蠅大抵能治血五月採腹有血者蜈蚣能制蛇莊子稱蝍蛆是也淮南子云騰蛇殆于蝍蛆即此蝙蝠一曰飛䑕能噉茘支五百嵗變白體重螟蛉桑蟲蜻蜓一曰絳騶一曰赤衣使者又曰赤弁丈人俗呼青鵶娘蛷螋似促織隠牆壁中溺人影令生瘡蜘蛛空中結網取蚊蝱食之小者南呼為喜子螳蜋青色長臂蚯蚓淮南子曰食上者無心下恵蜚方言謂之石蜚爾雅曰廬蜰蝴蝶有黄色白色一名野織蒼蠅蒼色赤首者呼為景迹歐陽公賦云白蟻禮謂之蚍蜉梅雨時化為飛蛾又有黄蟻出入有序淳熙三山志卷四十二
