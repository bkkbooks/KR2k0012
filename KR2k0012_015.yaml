body:
  text: 淳熙三山志卷十五宋梁克家撰版籍類六水利西北土厚而腴潤故五穀皆宜東南土薄而善燥故所種惟芒種周禮稻人掌稼下地稻田以水為命於是有瀦畜溝蕩之制閩山多於田人率危耕側種塍級滿山宛若繆篆而水泉自來迂絶崖谷輪吸筒游忽至其所瀕江善地梁瀆橫從淡潮四達而龍骨之聲犖確如語惟是並海之鄉斥鹵不字飲天之地寸澤如金然而得水獲必三倍詩人謂一掬清流一杯飯蓋歌水難得也大瀦小遏今取其見於記載者著于此云閩縣嘉祐二年十二月蔡密學襄命三縣疏導渠浦權閩縣朱定知連江開淘負城河浦百七十六計二萬一千九百七十四丈均用民力凡八萬九千溉田三千六百餘頃崇賢里浦州車頭二十條康山浦九百五十丈三等開四分廣三丈三分二丈七尺二分半二丈鎖港邊浦七十丈二等開四分二丈三尺三分二丈石浦橋浦百六十丈二等開六分五丈四分二丈八尺又二分半同上一分半二丈二分二丈一尺西石浦小橋四百丈五等開十分二丈五尺八分一丈九尺九分一丈八尺十一分一丈六尺二分一丈四尺後王浦七十丈二等開四分二丈五尺二分二丈後浦六百七十丈五等開十五分三丈又十二分同上十三分二丈三尺十一分一丈八尺十六分一丈六尺湯門外浦七十丈三等開三分半二丈二分半一丈五尺二分一丈茶焙浦三百十一丈濶丈二尺深六尺石浦南浦八十丈深四尺五寸三分濶一丈五尺八寸官河北頭小浦九十丈濶八尺深三尺南頭小浦二十丈濶五尺深二尺五寸稅務前浦一百三十丈濶八尺深三尺茶焙浦車頭三十二丈濶一丈深四尺第二小車頭五十丈濶四尺深二尺後浦四石車頭四十丈濶四尺深三尺古山車頭四十八丈濶六尺深二尺石浦小橋車頭四十丈濶八尺深二尺康山浦車頭九十五丈濶七尺深二尺又車頭三十丈濶五尺深一尺城外官河六百十八丈濶三丈深六尺易俗里二十七條石浦橋浦接崇賢里界至臺頭八百二十丈三等開五分半二丈五尺一分半二丈一分半弱二丈八尺深六尺石浦橋裏第一小港至牛路二百三十丈二等開十三分一丈八尺十分一丈二尺深六尺第二小港七十三丈二等開二分七尺五分六尺深五尺五寸無量夀院前第三港浦四百三十丈三等開十九分一丈八尺十一分一丈五尺十分一丈深六尺第四小港至嶽前四十丈二等開二分半一丈八尺一分半一丈二尺深五尺五寸寶月院前浦三百一十丈二等開弱半一丈五尺强半一丈二尺深五尺五寸寶月院前洋中湖塘一百五丈二等開半分一丈二尺十分九尺深五尺統軍塘浦一百五十丈三等開一分二丈一分二丈五尺一分一丈二尺深五尺中間接曲五十五丈二等開二分一丈二分半一丈四尺深五尺二寸圳乾浦百三十丈三等開五分二丈五尺五分二丈四尺三分一丈一尺深六尺塘尾浦百二十丈三等開五分二丈一尺四分一丈五尺三分二丈五尺深五尺湖塘浦五假開一橋外瑞聖里十丈開濶十七丈一橋內七丈濶如之二假共四十丈濶九尺一假十六丈濶二丈五尺林娘塘四十五丈濶六尺西塘二十丈濶八尺寶月油車浦道頭及小浦七條一長五丈一四丈一五丈三尺二二丈一一丈一三丈林太博車頭二十一丈牛路口車頭并圳五條十六丈浦西圳四十丈浦東圳二十五丈五尺十四丈大圳三十丈大浦畔二十五丈濶四尺華嚴牆角圳二十三丈濶四尺統軍塘地大圳十六丈濶四尺嶽邊洋中圳三丈濶五尺嶽邊大圳十五丈濶五尺嶽邊圳三十一丈濶五尺塘尾金家車頭九尺濶四尺古山圳三十五丈濶八尺王家車頭八丈濶五尺東浦尾吳勝官車頭三十五丈濶五尺鄭家車頭十丈濶五尺瑞聖里二十八條南塘浦一百五丈二等開七分一丈三分半七尺深五尺五寸塘浦二百三十丈二等開十六分半一丈六分半九尺深四尺五寸潘洋浦九百五十丈六等開四分半二丈八尺六分半二丈十七分半一丈八尺十六分一丈六尺二十一分一丈五尺二十九分半一丈四尺深七尺前洋浦北面二百五十丈五等濶四分一丈五尺四分半三丈三分半二丈三尺一分一丈八尺三分半一丈五尺深六尺小橋浦七十丈二等開三分二丈四分五尺深四尺五寸前洋浦北薛陳車頭三丈五尺濶一丈前洋東頭四十丈濶八尺陳稔車頭十一丈濶六尺車口車頭十二丈濶六尺寶月車頭一丈五尺濶八尺王車頭四丈濶七尺四石車頭十二丈濶八尺陳興車頭三丈濶九尺潘洋浦及塘頭車頭十九丈濶七尺茆舍前車頭五丈濶五尺經院車頭十一丈濶六尺李宗車頭十六丈濶七尺任日新車頭一丈五尺濶六尺陳保陳元宗車頭八丈濶五尺孫九車頭六丈濶五尺黃贄車頭五丈濶七尺張石保車頭六丈濶五尺小橋浦車頭林贇車頭二丈濶一丈經院車頭三丈濶八尺車頭八丈濶一丈經院田下土草湖三車頭一丈五尺西浦尾周欣車頭十一丈濶六尺孝義里三條懷安界上浦四百四十丈本縣開東南開西北四等開二分二丈十三分二丈六尺十分三丈三尺十分二丈深六尺三寸湯洋王志頭三十四丈濶四尺陳司徒等車頭十八丈濶四尺桑溪里葉嶼古下浦六百四十丈四等開十分丈八尺九分一丈八尺千一丈五尺濶一丈七尺深五尺湖西浦三百三十丈四十三分一丈一分九尺六分一丈二尺十二分八尺深四尺五寸湖塘浦百二濶八南塘浦二百一十丈深四尺二等開十分一丈十一分八尺湖井百三十丈濶九尺林都衙小插浦二百一十丈濶八尺吳石小浦七十丈濶七尺圳尾插浦五十丈濶一丈湖塘二十丈濶七尺王絃車頭十二丈濶八尺陳濶車頭十濶彌勒車頭三丈濶七尺啇伴兄車頭一丈八濶八尺慶觀車頭六丈陳勝車頭八丈並濶五尺大乘二丈張