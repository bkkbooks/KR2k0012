body:
  text: 淳熙三山志卷二十三宋梁克家撰秩官類四安撫司官叅議官一員紹興十一年置隆興二年省乾道五年復置隆興二年臣寮奏乞減罷諸路帥臣叅議官遂令除京西江東湖北四川暫許依舊外其浙東西福建江西湖南䕫州等路應有叅議官並罷乾道五年安撫司奏本司舊管叅議官二員主管機宜文字二員榦辦公事三員措置招捉盜賊一員准備差遣差使一十二員通計二十員節次准朝廷指揮裁减外今存主管機宜文字榦辦公事各一員餘外别無官屬欲置一两員有㫖權復叅議官一員添差叅議官一貟紹興十一年置釐務隆興二年省乾道九年復置不釐務主管機宜文字一員大觀元年置四年併帥府罷建炎三年復置時升帥府後榦辦公事書寫機宜同紹興十年増一員張丞相浚除安撫大使奏増辟一員二十七年省一員先是二十六年中書門下省以見任及己注選知縣今人往往干求舉辟以圖辟免今後不許諸處差辟榦辦公事一員建炎三年置紹興八年於准備差遣五員内将一員改作榦辦公事折樞密彦質乞辟五員十年又増置一員張丞相浚乞増辟二十七年省一員隆興二年又省一員主管書寫機宜文字建炎三年置一員辟差親屬隆興二年省准備差遣紹興元年置五員係奏從本司差五年闕武差過文臣闕滿日差臣六年張待制致逺奏福建闕從全藉闕武使闕本司有准備差遣五員請依員數本司時暫選辟八年折樞宻彦質請依張致逺辟五員九年張丞相浚奏彦質所辟官滿依員數再辟十一年程顯學邁十三年葉觀學夢得並依例差辟八年改一員作榦辦公事二十七年留二員隆興二年盡省乾道八年復置二員淳熙二年又省准備差使紹興元年置五員紹興二十七年省二員隆興二年盡省乾道八年置三員淳熙二年盡省措置招捉盜賊官紹興十五年置一員七月莫尚書將請依江西從本司辟一員九月薛殿撰弼以莫將改除其所辟官今隨府罷乞别辟一員二十七年省州司官通判軍州事二員乾徳中上州置一員紹興五年増置一員淳熙五年添差一員釐務乾徳初藝祖下湖南始置諸州通判乾徳三年命刑部郎中賈玭等充湖南道諸州通判大藩或置两員小郡或不置建炎三年令諸路添差限日下咸罷内福州添差通判宇文師爰以其父虛中逺使不罷簽書節度判官㕔公事節度推官觀察推官各一員唐大厯六年福州刺史兼都團練觀察等使觀察使有支使判官掌書記推官巡官團練使有副使支使判官掌書記推官巡官元和八年判官武自和觀察判官朝請郎試大理評事楊邵伯觀察支使試秘書省校書郎盧昂觀察推官試秘書省校書郎馮審團練巡官登仕郎前率府倉曹叅軍權幼公見毬場山亭記大和初團練副使李貽孫觀察判官侯勣團練判官李敬彛見聖泉寺碑㑹昌五年福建路判官止留五員團練副使判官觀察判官支使推官乾寜三年改威武軍節度有節度使幕國朝两使各置判官推官一員節度置掌書記觀察置支使咸平元年觀察推官曾觀察支使杜見碑誌皆失其名景徳元年有觀察推官節度推官節度掌書記見碑誌天聖二年案籍載職官止三員蓋其後六員亦不並置天聖中有知節度判官權發遣本㕔公事王珪見題記猶未有以簽書繋銜者慶厯記惟言本府幕官三嘉祐三年董汶簽署節度判官㕔公事八年避御諱改署為書治平四年簽判陳公琰觀察判官沈唐觀察推官李思義見治平圖記大觀二年簽判改司録節推改户曹兼兵曹察推改刑曹兼工曹並叅軍政和三年分曹建掾改正官名司録叅軍改司録事户曹刑曹叅軍改為司户曹刑曹事建炎元年詔司録依舊為簽判曹官依舊為推判官録事左右司理司户司法叅軍各一員州在唐為中都督府唐職官志中都督府録事叅軍一員録事二員功倉户兵法士六曹叅軍各一員國朝諸州有録事司法司户司士司理叅軍當時置立增省闕備未能詳也慶厯記惟言有六曹官及左右司理院治平圖具注知録左右司理司户司法廨宇所在即與今所置員數無異大觀二年録事改士曹兼儀曹並叅軍司户改治獄叅軍管州獄司法改議刑叅軍左司理改左獄叅軍右司理改右獄叅軍政和三年以叅軍名稱未正改正之分曹建椽大藩七員八員處置十員司録司士曹户曹儀曹兵曹刑曹工曹事各一員士曹儀曹刑曹各置掾一員士曹掾主左推勘儀曹掾主右推勘刑曹掾主檢法議刑又改左右司理院為左右獄福州置十員宣和三年詔福州省工曺以刑曹兼建炎元年詔依舊為録事司理司户司法叅軍州學教授一員皇祐中詔陳烈教授本州嘉祐二年復詔以周希孟為教授元豐元年福建路惟建州置教授一員中書備對二年州奏乞置教授乃令州舉曹官或職官一員兼三年孫覺奏差司法王裕元祐二年復授陳烈是時特使掌教未為員闕崇寜元年詔大郡或舉人多處置二員五年教授二人荘柔正張讀尋减一員大觀元年詔東南州郡養士至六七百人處添置一員既而提學司以福州養士至千人請添置一員為三員政和學制福州教授兩員弓馬教諭一員宣和减罷留一員紹興十四年州乞特添差陸祐時郡人鄭南等請於郡從之十八年添差一員二十六年省安撫司兵官福建路兵馬副總管一員建炎四年置以路分鈐轄為之後罷路分鈐轄紹興五年復置惟添差一員自十二年馬秦後不除人時馬秦乞辟差随行指使二員乾道九年添差蕭鷓巴時賜錢造宅今羅漢寺後福建路兵馬鈐轄一員大觀元年置建炎四年改為副總管後復以副總管為路分鈐轄紹興十二年始置添差自魚澤李貴始至十三年黄庠後不差人福建路兵馬都監慶厯四年詔置一員元豐二年轉運使蹇周輔奏本路鈐轄司及路分都監並在福州欲乞移那一員建州駐劄乃令福建各立路分都監一員周輔元申請不曽載路分二員字元祐三年路分周士隆申明却檢㑹前奏有福建路分二員並在福州字紹興十三年葉夢得奏本路兵馬都監欲移汀州駐劄有旨依東南路第十將副各一員元豐間置福州駐劄紹興九年移副將建州駐劄准備將領一員紹興九年詔於邵武軍置管汀州邵武軍不係將兵隊將二員紹興十年置一員福州一員建州駐劄押隊三員一員福州一員建寜府一員泉州駐劄訓練官三員一員泉州一員南劍州一員興化軍駐劄於逐州軍見任都監内差兼延祥塞水軍正副統領各一員紹興六年置准備將二員提轄官二員訓練官二員指教官二員錢糧官二員萩蘆寨水軍統領兼福州興化軍都檢巡使一員紹興八年置緝捕官一員紹興十一年張丞相浚乞辟差一員充福州興化軍沿海緝捕准備將領二員紹興元年置州司武官福州兵馬鈐轄一員建炎四年嘗差廖虞弼充任滿更不差人紹興十年復置駐泊兵馬都監一員景徳二年始置以右司御率劉文質為之提舉本路諸州軍兵馬檢巡公事四年西頭供奉官閣門祗候張舜臣為之提舉福建路諸州軍都同檢巡捉賊兵馬司公事時太守袁逢吉銜帶此同見閩光門合沙石橋記慶厯記載主佐府侯總甲卒若漢都尉唐監軍蓋任一道兵事也其後州各置就糧禁軍元豐分路置將至紹聖罷戍卒駐泊之職始廢矣元符初創馬軍指揮詔置一員福州駐泊兵馬都監主州禁卒一營而已紹興十九年至三十二年添差凡五人元符元年置雄畧第十指揮駐泊一員紹興八年兵馬司乞與駐泊通領以是軍元以在京虎翼軍置乆𨽻駐泊遂不與通領時安撫張給事後有換授離軍大使臣乞添一員差駐泊一員并正官為二員紹興三十二年後止正官兵馬都監四員兼在城巡檢小使臣為監押景徳二年詔本州署舊二員四年一左班殿直一三班奉職並監押兼在城巡檢見閩光門合沙石橋記建炎三年添差小使臣宗室一員充監押紹興四年添差大使臣宗室一員充都監天禧中嘗令南臺監倉兼管四城門外巡檢公事後廢監裏外鹽稅務三員舊監在城茶鹽商稅務二員見天聖中案籍舊惟有都稅務臨河務天聖七年置監閩安鎮稅兼沿海地分巡檢一員熙寜中用嘉祐勑鈐轄司奏舉選人使臣各一員監福州裏外務後止今合屬官司選差紹聖二年置劉﨑巡檢於是閩安鎮監官更不兼管巡鹽獨與在城都稅務臨河務監官分輪管榦紹興十年本州奏三處止䝉朝廷差到大小使臣三員欲各增置文臣一員更不分輪不行監作院三員内添差二人作院舊係本州都監兼管宣和二年置一員差小使臣添差二員係用紹興三年指揮依元豐法一州十縣以上通縣下共差經監當宗室不得過五員監甲仗庫一員天聖編勑諸州甲仗庫並令知州同判都監監押同管榦不得委幕職官政和八年二月指揮甲仗庫未置監官處専置一員福劍州巡轄馬遞鋪一員天聖九年運使俞獻卿移廨舍於閩安鎮西北三十里白日渡巡捉茶鹽有兵士五十人景祐二年既廢水口鹽倉乃移於木口安泊仍鈐轄一帶水路巡捉茶鹽後移横山鋪前淳熙三山志巻二十三
