body:
  text: 淳熙三山志卷三十一宋梁克家撰人物類六科名宋朝紹熙元年至嘉定十年紹熙元年庚戌余復榜余復狀元字子叔寧德人官至校書郎特㫖與一子恩澤洪摶甲科字舉之候官人元康之孫本族鑄紱春卿格杞公巽綽元夀元英元芳叔莊浩毅潘景伯甲科字仰之閩縣人師孔之曽孫弟皓伯顯伯同榜官至中大夫淮東提刑卓石甲科字起甫福清人黃謐甲科字子靖永福人子武舉良箕葉宗魯甲科字士詹羅源人黃瑄字漢珍羅源人兄謙子備同榜髙惟月字明之懷安人見中奉大夫前知處州姚有容字君介候官人終朝散郎房州倅黃千里上舍字及之永福人終承議郎建陽知縣陳朴字叔厚羅源人終朝請大夫雍管安撫潘梅上舍字子調福清人王旦上舍字子周候官人弟亘林迪字順卿閩縣人終朝奉大夫廣東提舶邢必學字良嗣長溪人父炳然陳槱字宜之閩縣人幾之孫郊之姪孫鮑字表之福清人林灼字俊之福清人張牧字逸叟羅源人父翮叔翰梁發字亨甫永福人陳擬字及之羅源人父與行同榜終通直郎錢易直字敬子長溪人見居溫州庚戌省元終著作佐郎知池州陳德進字安行羅源人林億字益之閩縣人千之兄張從之字子擇羅源人父翮叔翰終大理丞廣東運判張任國字師聖永福人潘文煥字季章懷安人林挺秀字君實閩縣人李熹字晉老懷安人姪仲淹薛將字景方寧德人陳儀之字士麟永福人李昭字晉甫閩縣人曽祖皇臣叔簡能柯萬卿字通老永福人柯峕中字伯䝉閩縣人居永福李元輔字俊卿閩縣人陳沖字南翼連江人陳士表字正叔閩縣人終朝請郎廣州倅盧鎮字伯真永福人祖榕本族楚垕林翥字叔軒長邑人忠輔之從姪黃相字周士長溪人終麗水宰黃備字仲該羅源人父瑄同榜黃廣字炳文閩縣人鄭垕字載叔懷安人髙松字國楹長溪人父融祖籛本州解元陳與行字叔達羅源人子擬同榜終朝請大夫知興化軍劉植字直之福清人張益之字子善候官人曽準字正叔懷安人椿之弟省試賦魁終朝奉郎廣東提舉陳子堅字子正候官人父倬然本族偉然叔嘉次公潘皓伯字肅之閩縣人兄顯伯同榜弟景伯終朝散大夫徽倅潘顯伯字隱之閩縣人弟景伯皓伯黃勻字鈞可閩縣人馮欽字龔仲福清人林振字宗玉福清人曽祖沖湛本族煒清之炎明之棣桷官至朝奉郎知雍州鄭牧之字闕人福清林演字宣子古田人徐次鐸字叔文福清人陳涇字正仲寄居長樂叔萬可行台州鄭行可字闕人閩縣黃甲字仁叔永福人王元應字聖初閩縣人祖堯臣官至朝請郎大理寺丞余天迪字惠叔羅源人陳桂字景仙寄居湖州許俊第字用之閩縣人丁慤字闕人長樂上舍釋褐黃舜俞上舍字咨之閩清人謝升上舍字元夫宗子正奏附進士題名始于此崇祉甲科字伯厚終南劍守善岐字民先善峙之弟彥字伯侔希錫字景純善然字褎之寄居連江善佳字庭瑞善牧字咨卿文舉特奏名楊霓第三名字次雲羅源人魯之子陳錡卿字仲玉連江人祖當姪舜申陳惟中陳剛字謙叔閩清人林槐卿陳旦劉嶽林袤韓正蕭劉靖林夢欽黃世德阮大用李溥陳適正字夢良連江人陳友直連江人王東老字興仲長溪人王炎古田人林煒寧德人確之姪柯杞柯若谷王子俊字仲𫝊長溪人林日休翁章古田人葛有成字可大閩清人王仲應長溪人張仲昴歐陽實何既濟黃子强柯端卿祖梁父謙宗叔祖棐陳粲章王萬侯字子建長溪人詹紱張時敏林虞蔣具贍字德徽長溪人子衡髙癸王以澤陳寅陳侃林栥陳樞王叔介長溪人杜張維林元明黃洽閩清人林廷英劉三顧古田人韓縞林岊古田人黃文仲長溪人黃旃武舉正奏陳昕字子野長溪人闕時林淮祖太微叔公嗣弟譽李若水字善甫永福人父傑姪伯垕林宋興林泰定字清宇寧德人居平江知象州周用亨字通父寧德人知循州卓孝恭黃時字景仁寧德人超叔起叔之伯劉八威絶倫省元字朝右福清人兄八成之邵叔龎黃天瑞鄭肅行可之姪劉溪臣韓椿岊之姪陳雲字瞻叔永福人兄表臣端臣子教授士登知昌化軍徐珏陳時林昴林髙鄭縉髙栖紹熙四年博學宏詞陳宗召子貴謙貴誼皆中正科紹熙四年癸丑陳亮榜林復之甲科字幾叟懷安人終奉議郎知潮州陳怡字子如候官人曽祖襄章兄朴任一鶚字沖卿閩縣人祖文薦本族文茂匯終中奉大夫黃守字問之永福人林獻字仲可貫湖州居永福陳伯震字震之長邑人襄之八世孫官歷監丞終廣東漕龍圖閣學士陳典字公雅候官人祖之邵叔祖之美林昱字明中貫泉州林仲龍字學之羅源人李宗申字之翰閩縣人黃士特字仲誼羅源人父儒本族槐掄士清說終鎮江倅曽噩字子肅閩縣人植之子終大理寺正廣東漕馮多福字季求寄居常州父田歷司農少卿將憲卿部權州事奉祠終闕衆林師臯字右之古田人岊之姪終贑州瑞金宰黃說字仲宜羅源人父櫺本族槐掄士清士特林子沖字詹叔候官人之竒之姪朱荀字景荀閩縣人敏元四世孫終奉議郎宣城宰陳忠字議之候官人曽祖夀叔祖嚮連士登字元龍閩縣人祖康時陳從字謙夫長溪人寄居慶元府陳景年字通卿長邑人佐堯之孫本族樞年陳惟和字伯溫閩縣人蘇興甫字起宗貫興仁府蘇端準字則平閩縣人韓桷字廷碩閩縣人寄居嚴州本族岊椿陳克字復之閩縣人家世報禾炳本族祐瑄瑢垓埛石同伯元之鑄夢建伯圭夢庚劉之邵字仲美福清人曽祖國均本族龎八成終通直郎六合知縣王沖用字用之長邑人黃士清字仲通羅源人槐之子本族櫺掄士特說終朝議大夫知賀州陳武公字子文候官人兄子堅次公陳奕字伯衍寄居臨安長溪人父驥陳夢緯字文之貫漳州叔伯山兄介石陳德一試中教官字長明連江人父舜申終朝請郎知宜州任匯字㑹卿懷安人本族文薦文茂一鶚陳至和字季清閩縣人父鋭黃民表字儀可閩縣人陳萬頃字夢應閩清人吳功亮字汝咨懷安人時亮之弟吳時亮字汝弼懷安人功亮之兄宗子正奏師睿甲科字叔思兄師棠師懿汝朴字子野父善漴師棠字伯和弟師懿師睿彥延叔公嘏文舉特奏方岡狀元字平甫候官人本族時可疇襄巖起寀審陳炳梁召盧琳劉季雲字少揚長溪人洪信臣字天錫連江人吳尤禮劉慨陳縝字致公長樂人弟纘林擇善林巖劉毅字元度長樂人劉八成福清人弟之邵八威子龎己丑進士繆翥王廷秀一作之秀郭東美曽顔林嶽字獻臣長樂人林沖之徐師臣字國賓寧德人余昊字春卿寧德人兄復之鄭夢承連江人趙昱武舉正奏許應辰郭欽王三錫字子萬長溪人方審兄岡寀危伯熊姜必大字信之連江人終知萬安軍黃樞林宜之林翹潘子寓字闕州終知復陳誠伯字伯著連江人弟大用程元鼎字和甫連江人終知髙州陳遇祖亨衢叔安仁叔祖亨道姚灼字然仲改名克俊長溪人劉漢臣字少度長樂人慶元二年丙辰鄒應龍榜鄭拱字恭甫候官人擢之弟林清之字直甫福清人父桷祖仲堪弟煒本族棣振炎明之終中奉大夫直華文閣湖南漕邵應祥字子百閩縣人弟應瑞鄭孝純字士穎閩縣人王溆字叔觀貫紹興余畟字良叔古田人宋興之姪復之弟李應辰字震卿寧德人興時之姪林僖字景伯福清人本族聰文潛嚴林關字伯啓貫漳州居長樂立之之姪陳鑑字明之閩縣人葉子髙中法科字安仲貫慶元府終大理評事陳同伯字升父閩縣人家世報禾炳親伯祐本族克瑄瑢垓坰石元之鑄夢建伯圭夢庚陳權叔字楙立連江人楊景商字子起閩縣人祖大猷本族敏中嘉績應陳泳字季汪長邑人祖彥啓本族端友桂鄭唐臣字師稷閩縣人父易本族鍔行可陳京字景大閩縣人林景達字泰叔閩縣人邵應瑞字子至閩縣人兄應祥葉觀字應求貫興化軍本族源南仲洪杲字昭叔懷安人父公翼本族浩毅綽元英元濤元芳叔莊相格鑄紱搏張士炳字煥然候官人鄭益字子友長邑人任一龍字驤卿閩縣人祖文薦本族文茂匯一鶚余亮字虞咨古田人光庭之姪孫阮幡字君聘閩縣人王益祺字頤叔長邑人弟益祥張可大字子功閩縣人劉宜之字行可貫興化軍劉三益字巽大永福人王輿字履敬長溪人卓之孫成之姪終將作監簿知南劍州鄭沆字深之閩縣人本族禺湜天麟韓同字耕道候官人丙之裔髙祖昌國曽祖彰明叔桷柯必卿字茂之閩縣人棐之姪孫林景申字及甫閩縣人林應龍字升之閩縣人陳季修字復之貫泰州安卿之子潘剛字維剛懷安人陳諤字士行閩縣人柯龍受字用之閩縣人棐之姪孫周申字及甫長邑人朱景筌字伯魚閩縣人葉莫字實之候官人世美觀之姪發之弟歷吏部郎中江西憲漕終中奉大夫方隆字景盛候官人時可之曽孫本族疇巖起岡寀審黃沐之字士澄長溪人楫之子終知麗水縣陳一清字秀父羅源人安之子遇之弟林起莘字任之閩縣人終湖南倉歐質字少葉閩縣人賡之弟葉發字定叔候官人本族儀鳳翔鳳終奉議郎余經國字伯文懷安人深之元孫本族清之觀國震之終奉議郎凌沖字和仲候官人琰之姪孫鄭天麟字仁父閩縣人昺之孫湜之子沆之姪宗子正奏善蓬字道山善彬之弟汝鉞之叔彥假字闕之交之元孫公賔子公家之姪希梁字正臣希魏之弟崇恪字端夫彥搢字大圭彥拯之弟彥挺之兄彥翿字伯羽兄彥代彥侗彥傳彥侯汝悉字明之汝孝之弟希灝字商卿師莘之姪師董之子洵夫字深卿彥括之姪沂夫之兄文舉特奏林槩第二人字量夫候官人大聲之孫來之弟終朝奉郎徽州通判林更嚴肅周申木崈字子山連江人林元鼎鄭谷商倬陳弼陳淑陳淵字侣之長樂人張維詹驥鄭鈞陳士顯字元昭長樂人陳旦字闕祖長樂人曽夀朋李沐溥泳之兄公升之子陳鼎任鄭起莘髙震之商伉倬之兄程喜髙實王沂長溪人湛衍許仲宏林士器林登之林用中陳戌字闕人古田林沖武舉正奏林仲虎第二人字景瞻寧德人本族弟仲熊仲虎士夔祖慈廣州觀察使三使敵廷終安慶知府游叔昌黃困字闕闕寧德人鉞之子之孫陳大用字闕行連江人兄闕伯終江東路分姚洺父俊之本族闕之浩之黃昌辰字闕時寧德人林實之繆德綏趙萬年柯國良黃季鷹陳著字闕驥闕永福人本族士終殿前闕議黃宣陳萬石許應辰字拱之長樂人上舍釋褐鄭擢拱之兄李琪字夢開連江人撰之曽孫彌遜之孫終國子司業黃膚卿字必大連江人終架閣慶元五年己未曽從龍榜俞汝益甲科字伯虞寧德人梁丙甲科字南叟候官人終朝奉郎知泉州林孝聞字質父福清人終大理寺丞知撫州陳貴誼宏詞字正甫福清人父宗召兄貴謙官至參知政事陳經字正父長溪人終奉議郎王天言字惟謹懷安人蘇大璋省元字顒之閩縣貫古田人終著作郎知吉州子士穆已丑登科林冠英字伯實長樂人弇之弟岊之兄終于倅黃岦字季立長邑人終朝請郎潭州簽判薛君用字良佐長溪人寄居溫州李沖字道卿候官人祖葵子遇本族㮞桐泳公升終承議郎國子監簿蒲開宗字先之候官人父堯章本族堯仁毅蕭杞字南甫候官人終朝奉郎林字伯申貫閩縣冠英岊之兄湯震字子春閩縣人江公宜字行之候官人祖洵直父文叔叔立叔終承議郎傅起巖字用卿閩縣人李大有字景溫綱之孫夔之曽孫經之姪孫終奉議郎鄭碩字膚叟閩縣人鄭駿字逸之閩縣人驤之弟孝純之姪李德立字應卿懷安人陳孔夙字寅伯寄居平江貫候官孔碩之兄韡之叔林時英字華卿寧德人煒之姪李起渭字少望閩縣人本族倫岡嵗陳大雅字德純福清人林襲字充美侯官人自之姪髙頥字元齡寧德人從叔處仁項夢開字啓叔閩縣人官至奉議郎楊譽詢字誠叔候官人兄梅卿姪宜中宏中劉泳字光大懷安人若虛