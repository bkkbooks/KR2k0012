夢中審終奉議郎趙豐亨字仲謙寄居平江闕之子焯之闕黄翼字子羽長溪人許澡宗子正奏時儴汝戀字明甫檖夫字叔茂寄居連江彦曦之子本族楹夫櫛夫汝惓字義叔崇儷字徳儷本族汝孚崇祉崇洽崇萃必興必取與奕字梁夫希䢤之子與璂之從兄希䢤字汝明與奕之父與璂之伯彦字衞夫闕之之孫公賓之子本族公寀彦假彦仞汝檖字豐甫不敵之孫汝竣之弟希沇字導卿希洵之弟崇思字敬父本族汝珫汝悉崇儲璱夫字伯玉彦行之姪崇祉字時發文舉特奏張澈狀元字若水寄居揚州澤之兄王軒軺之兄榕之弟曹渭黄鍔蔡襃字子章懐安人張煥竑之弟卓應字熊寂羅源人林夔孫古田人阮亨謙古田人曽華本族春貢禹準鼎林睎吕髙祖琪父譽叔淮林仲麟字景沖本族仲虎仲彪士夔祖惹王惟月方夢申本族時可疇襄巖起崗寀髙邃李大壯曽祖夔祖綱本族經大有楊勲鄭安夫字仲修長樂人呉騰字㑹卿長樂人陳合鄭潛字良翰希純之兄蕭萬里武舉正奏陳孝嚴字致叔福清人歴閤門舍人知光州終汀州劉益珙之弟浩之兄王介柯夢旂永福人子沖之兄國良之姪官至知雷州柯子沖永福人省試第一人夢旂之弟國良之姪試中教官陳雲嘉定十年丁丑呉潛榜方起甲科字振之古田人歴武博終處州倅羅雲中字汝䝉長溪人楊公羽字雲翁候官人唐璘字伯玉古田人最之孫歴監察御史廣東經畧林紘字統之候官人尹煥字惟曉長溪人寄居紹興府歴少卿見江西運判黄之望字岩瞻羅源人茂材之姪終奉議郎王維祺字萬卿閩縣人林珪字介卿福清人仲湛之孫本族棣桷振清之煒炎承議郎新潮州倅黄鑑字景明長溪人鄭良臣字堯叟閩縣人省試賦第二人欽之兄歴常博林少嘉字子嘉長溪人余㝱賜字公玉古田人宋興之子陳興龍字雲叟永福人陳士撝字謙仲閩縣人㡬之曽孫本族郊槱振連世榮字仁逺侯官人康時之孫士登之子黄辰顯字遇卿閩縣人陳光逺字景先長溪人奉議郎致仕吳丙字景南永福人見通判恵州李仲淹字行可懐安人曽祖撝之本族順適之宋臣撰熹李潤之字富徳長溪人解魁陳調一字兼善連江人父舜申兄徳一終朝奉郎知新州潘繼伯字逺摹閩縣人本族潛闢師孔飛英冠英顥伯景伯子儀子直子震子京子㝢王萬字光大侯官人旦亘之姪同之弟黄夢雷字震夫寧徳人秦文煥字章叟貫袁州居懐安劉勺字盛叔閩縣人林士宗字伯逺閩縣人士衡之弟李公伉字清父貫閩縣居長樂中之姪梁子强字莊叔永福人子張之兄終承議郎陳垓省試賦魁字經甫永福人居長樂見左司諫兼侍讀陳栗字莊叔閩縣人涇之子梁庭蘭上舍字聲甫永福人連嶸字清父閩縣人梁琮字闕孫閩縣人大任之本族臨大亮甫之召方應祥字有嘉候官人時可之元孫隆之子本族疇襄巖起崗寀夢申審子宣翀卿禹錫陳徳遇字顯仲閩縣人鄭應龍字春卿候官人鄭清卿字子直閩縣人李鑑字汝明連江人終廣東提舉林應辰字義夫閩縣人本族誼先氏士衡仁伯呉文龍字㑹之候官人均之姪孫應龍之兄鄭士龍字舜俞貫長溪黄孳字晞舜髙祖稹祖度父瑾本族珪燮瑜琯景説桷洽池昇字東叟閩縣人包榮父字景仁連江人終奉議郎方禹錫字文瑞本族時可疇襄巖起崗寀夢申審隆子宣翀卿應祥余伯泰字吉父懐安人陳道夫字子敬長溪人林觀過字自知閩縣人夙之迪從姪終科院鄧䕫字景韶閩縣人陳士介字正父閩縣人潘觀字正父閩縣人剛之姪陳伯鼎字元鎮福清人林公慶宗子正奏汝竬字立父與官字清叟彦𫝊字伯是本族彦代彦侗彦侯彦翿彦譟彦傜彦備彦嶓字源叔喻夫字義叔彦代之子譜同彦𫝊與琳字仲琅與玖之弟與璣與環之兄與玖字仲瑛與璣與環與琳之兄汝腴字味道不敵之孫汝騰汝穟之弟本族汝竣汝竬崇棠歴編修見知南劒州汝佩字振叔不闕之孫以夫字用父寄居長邑父彦括見吏部尚書兼侍讀時銿字君韶居長溪彦倪字和甫交之元孫公賓之子與侍字正叟本族師章帝錫與官汝登字文舉古田人善之子終贑州石城宰與枳字淮卿與環字仲循師弁字冠卿與宰字宗臣崇棠字公召時鑄字士鼎汝晃字明叟文舉特奏陳珏狀元字君寶柯煥宗曽祖梁父闕卿兄謙宗張夔字子韶長邑人陳絲字子大長溪人子端年萬搏陳子瑜叔伯山兄夢緯余游劉從龍鄭籍陳公升林正諤謝自信字堅甫長邑人陳應時劉孝友林士瞻字仲飛曽祖抃祖穎叔撝蘇盛甫曽復本族春貢禹準華鼎葉伯秀連江人張參永福人武舉北海之兄陳士䝉父次公本族偉然倬然叔嘉子堅武公馮典字盛甫長邑人武舉正奏黄子儀永福人朱夢得陳聿甫字齊吉連江人陳端淳熙三山志巻三十一
