  text: 淳熙三山志卷十四宋梁克家撰版籍類五州縣役人解子二十五人初州公事有文移府望解子腳力等賫以下縣從鄉户差不立替期咸平四年州請依驛子例一年替先是輸納州帑縣各以手力赴郡揀鈔景祐五年罷差亦令解子傳鈔以下因婺州之請也治平元年相度減九縣解子十三人存留十四人熙寧諸縣總二十八人元祐三十二人紹聖復募二十八人今二十五人醫人州三人縣各一人嘉祐六年州縣號當旬醫人者許於郭下輪差其外縣醫人聽側近村抽取各不限主客户仍不得影占州色役熙寧四年本州相度諸縣醫人如無願祗應處量給傭錢募人充應諸縣各一人內七人給雇錢元祐初以第四等户輪給與免身丁紹聖閩侯官各增一人今縣各一人餘雜職以下悉附見于後解子醫人雜職欄頭斗子鹽倉子所由閩縣熙寧一人三人元祐一人紹聖二人今一人三人連江熙寧嘉祐四人三人一人支雇錢三人六人一人二人士花場二人元豐罷四人元祐三人一人二人六人一人二人紹聖三人一人二人六人一人二人今三人一人四人四人一人候官熙寧一人三人元祐一人紹聖二人今一人三人長溪熙寧嘉祐四人五人一人三人五人五人十人元祐五人一人三人六人二人十七人紹聖五人一人三人五人二人今五人一人五人五人三人長樂熙寧嘉祐三人一人二人四人二人二人四人元祐三人一人二人四人二人紹聖三人一人二人四人二人今二人一人三人四人二人福清熙寧嘉祐四人二人一人三人五人四人一人海口倉二人元豐減稱子二人改正元祐四人一人三人五人四人一人縣倉二人海口倉紹聖二人一人三人五人四人一人縣倉二人海口倉今二人一人四人五人四人一人紹興初廢二人古田熙寧嘉祐五人三人三人三人一人二人十二人元祐三人一人三人一人三人十二人紹聖三人一人三人一人三人今三人一人五人一人一人永福熙寧嘉祐五人四人一人支雇錢二人元三人人一人一人二元四人元祐四人一人二人二人一人紹聖四人一人二人二人一人今四人一人二人三人二人閩清熙寧嘉祐四人一人支雇錢二人六人一人一人八人元祐一人二人五人一人紹聖一人二人五人一人今一人二人四人一人寧德熙寧嘉祐五人一人五人六人二人七人元祐四人一人二人七人二人十四人紹聖四人一人二人七人二人今四人六人四人四人二人二人羅源熙寧嘉祐四人四人一人二人四人三人五人元祐四人一人二人四人二人紹聖四人一人二人四人二人今五人一人五人四人二人懷安熙寧一人支雇錢三人葛﨑倉一人四人元祐二人一人三人雞菜鎮一人四人紹聖一人三人今一人六人三人一人渡子熙豐法不載連江熙寧江亭渡六人羅崙渡二人東岸渡七猴渡船浦頭渡潘渡萩蘆渡各一人並七年紹聖萩蘆渡廢今六人候官熙寧小若一人安仁溪口一人大目渡十五人置並八年紹聖移小若安仁二渡併於湯背前置仍舊三人今二人長溪熙寧鹽田渡十三人飯溪渡二人年置並八元豐黃﨑鎮渡四人深浦渡二人年置減鹽田渡二人並四元祐八年移鹽田渡於浙埭渡置仍舊一十三人今二人福清熙寧城頭渡二人益﨑渡二人柯嶼渡一人年置並七今無古田熙寧清潭渡二人今無永福熙寧溪東渡越峯渡五十渡洪面渡各一人重光寺前渡二人年置並七元豐越峯渡四年罷雇閩清熙寧白塔頭渡三人天王渡二人置七年今四人寧德熙寧飛泉渡十五人西碧渡程黨渡西溪渡金溪渡峬溪渡金垂渡各一人置並七年元豐深浦渡二人赤鑑門渡二人置是年飛泉渡減四人四年元祐八年移飛泉渡於蕉門頰置十一人安樂渡一人今深浦渡一人耆户長保正副國初里正户長掌課輸鄉書手𨽻里正里正於第一等户長於第二等差鄉書手天聖以來以上户多占色役於第四等差耆長掌盜賊煙火之事其屬有壯丁耆長差第一第二等户壯丁差第四第五等户至和元年罷里正增差户長熙寧二年募耆長壯丁四年仍舊於本等人户輪充五年罷户長六年行保甲法始置保正副大小保長機察盜賊七年輪保丁充甲頭催稅是嵗本州總括諸縣耆長四百四十四人壯丁一千五百九十二人鄉書手六十二人等第給雇錢尋罷募壯丁八年罷耆長令保正大保長管幹量立傭直别召承帖人𨽻其下元豐八年復募耆户長壯丁其舊以保正代耆長催稅甲頭代户長承帖人代壯丁並罷元祐元年復令户長催稅凡一百三十人差耆壯依保正長法耆長四百四十三人壯丁一千六百一十四人二年罷保甲猶三年一造簿紹聖元年耆户長壯丁復雇募法不許以保正長保丁充代尋復保正長法諸縣募雇保正副凡八百三十四人大保長三千五百五十五人催稅甲頭五千二百一十一人承帖人八百二十九人明年罷甲頭以大保長催稅其保正長不願就雇者仍舊法募稅户充耆户長壯丁建炎元年罷户長催稅復甲頭紹興初拘收耆户長錢等罷七年大保長仍舊催科九年令保正長專管煙火盜賊不得承受文帖及課輸事十年以耆户長雇錢充總制窠名又明年復拘壯丁錢充三十一年令甲頭催稅乾道二年罷四年復八年罷至今耆壯並募投名惟保正長差稅户如故户長鄉書手耆長壯丁保正副大保長小保長閩縣熙寧二十一人一十人三十七人一百五十四人六十七人元祐二十一人一十人三十七人一百五十四人紹聖六十人今十人三十七人連江熙寧一十一人五人四十九人一百四十八人元祐一十一人五人四十九人一百三十六人紹聖六十六人今五人三十二人六十人三百二人一千五百二十人候官熙寧二十八人九人四十四人二百一人元祐二十八人九人四十四人二百一人紹聖七