body:
  text: 淳熙三山志卷二十九宋梁克家撰人物類四科名本朝紹興二十七年至乾道五年紹興二十七年丁酉王十朋榜江文叔洵直之子字清之黃輔之字成德永福人陸琰愷之孫字倫琬終宣教郎知南昌縣何若士貴之弟字知白終汀州教授陳峴誠之之子字改仁周邦弼字直卿羅源人終從政郎容州教授朱英字秀實福清人終南雄州教授吳三傑字季輔懷安人張春字景陽永福人終迪功郎潮州司户陳元禮字欽季長溪人終肇慶府教授張廣字行儉永福人蔣康國字彥禮古田人終從政郎饒州司法陳確字德固閩縣人終承議郎知長沙縣邵德一字長卿閩縣人陳昭嗣字子晉候官人陳端友字士會長樂人終鄂州司户林宋顯字孝揚候官人終宣義郎江西安撫司機冝黃啓宗匪躬之子字肇之陳許國肅之侄字忠卿終承議郎江東撫幹陳餘慶顔之孫字昭善省試第三人終從政郎泉州教授張柟字元幹福清人終太學録林介昌言之子字幾叟林秀字元實懷安人終宣教郎黃掄槐之弟字公擇吳丙成字德瑞羅源人終從政郎馬平令陳阜字夢應閩縣人終宣教郎宜州教授詹元鼎字實夫閩縣人終從事郎秀州教授王宗已亮功之族字子由陳駿雄之侄孫字敏之周直亮字全翁長溪人終邵武軍知録鄭昞字學明閩縣人歷樞密院編修官知南恩州京西運判終承議即鄭之奇甸之三從姪字律然卓慶集長溪人紹興七年解首終迪功郎黃崇字元闕侯官人終溫州教授黃文度字萬頃永福人試中教官陳芷字伯彥閩縣人特奏名李三英第一人終衡州教授崔宗佐陳琦王栗郭南金鄭光朝張師旦陸雋卿鄭東卿穆之曾姪孫昻之侄字少梅明易學終溫州永嘉簿莫朋陳起説林浹陳黃中魏康國楊大猷陳詡林師孔盧璨吳漢臣潘德裕陳杰陳車衛康承武舉趙應熊榜吳茹字汝弼長溪人鄭易字簡之閩縣人三十年庚辰梁克家榜是舉經義詩賦兼行馮田字宗易閩縣人歷府學諭祕書省正字終知瓊州鄭永年汝石之孫宇夀卿陳善祚之從弟字子兼終太學録林湜周之姪字正甫楊興宗惇禮之孫字似之髙曇字子雲長溪人以上甲科陳嶠巘之弟字次山終迪功郎漳州司户王成字誠之長溪人林仁夀字元齡候官人陳唐佑字佑之懷安人終寧國府教授余宗字伯宗閩縣人終從政郎建寧府教授徐夀字體仁閩縣人林譽琪之曾孫字茂實終建昌軍教授林良字世美長溪人繆夢弼字岩起長溪人王明弼字共臣懷安人終知龍南縣黃橒槐之弟掄之兄字公材陳伯震肅之子字景敷試中教官終授宣教郎邵州教授姚俊之字克明侯官人終分冝尉鄭鍔甸之再從姪字剛中黃果瑀之子字升卿終宣教郎陳謐字靜之寧德人陳公紹字興宗周擢偉之子字芳彥阮先字夢得寧德人朱用亨稷臣之曾孫字闕公陳元應字景陽寧德人終迪功郎陳明章字煥然閩清人髙衡夫字正叔福清人解梓字少良候官人商份字元質福清人張竑字大明懷安人終承務郎特奏名梁大任國寶之侄陳制中薛鎬陳文翁羅輝李岡楊遵陳坦然崔時亨周召楊俠杜恭先李武子武舉樊仁逺榜樊仁逺仁達之弟後再登進士徐鍈字器之長樂人陳煜字叔英長溪人林起莘字之任福清人陳正已字敦仁林嘉謀起莘之兄字仲猷張發字伯和永福人楊璵字國佐長溪人三十二年壬午登極恩上舍釋褐陳義字剛伯長溪人陳簡字士亷福清人終主管架閣隆興元年癸未木待問榜是舉經義詩賦復分兩科仍免殿試黃治充之姪字德潤第二何萬總之曾姪孫字一之陳申字景伯羅源人以上甲科吳拱辰字望之永福人終迪功郎崑山尉商侑份之弟字元佐陳宋鼐宗古之姪字元用楊翼之字獻臣閩縣人再試中終教授陳敦修果之孫字伯厚紹興二十六解首劉更生字炎弼長溪人樊仁逺前武舉第一人字少從陳渥字叔陽長溪人終迪功郎林師莘同之弟字子野莫子震朋之從姪字震卿侯官人黃子張字調叔長溪人闕黼字子雲長溪人王瀛字士登長溪人終饒州教授張可速字伯永福清人林淳湜之兄字質甫終朝陽尉程澤字仲逺候官人終迪功郎韓必大字萬卿長溪人姚瀛字子山長溪人林桷仲堪之孫字子長黃缶沖逺之從弟字子大李顒年字世舉羅源人終迪功郎吳會字致堯永福人終從政郎玉山丞林虎國之子字伯威終宣教郎知保昌縣王褎字子沖懷安人俞直方字行父寧德人王唐朝俊之侄字宗堯終從政郎陳夢齡字彭年長樂人終從事郎南外宗教張淵字叔潛永福人柴子春字震叔候官人林頴秀字實之懷安人再試中教官陳文卿字功祖長溪人終迪功郎李煥字觀復長溪人終迪功郎平陽尉余席珍字待聘羅源人鄭嗣誠楫之姪字明叔黃惟孝字公友閩縣人終興國軍教授楊秀實字茂材羅源人陳德明字光宗寧德人卓迪庶之姪字郭義終迪功郎吉州贍軍酒庫林炳然機之侄字蒙甫終從政郎鄭瑞知剛之侄字景符王仁字俊夫福安人終迪功郎丁尚友字友善長溪人劉已立字宋昂閩清人終迪功郎陳言應元應之兄字景孚林光祖字忱叔長溪人鄭椿年永年之兄字春卿特奏名鄭文融周興亮林光大王嗣宗連斗文林芘倪公佐陳堯佐林迪林問禮黃度植之孫陳向陳嘉運卓詠楊逌劉侯度耿憲詹羽陳九齡李文髦黃髤蕭宗旦稷臣之子陳譽彭公袤元逹之子陳公衡黃圭瑜之兄武舉孫顯祖榜阮瑀字季野長溪人林堯臣字安民福清人終閣門舍人陳萬字得一福清人終縣尉黃確字少明閩縣人連驤字德稱寧德人陳閲字秀卿懷安人蕭確字俊卿閩縣人陳贊字子襄長溪人黃庚字子西福清人姚筠俊之之從弟字大節林輔世字成才福清人鄭覺造之姪孫字民先閩縣人終提舉雍州永平寨乾道二年丙戌蕭國梁榜蕭國梁字挺之永福人歷著作郎太子侍講兼禮部郎中終朝奉郎廣東運判趙煜字景明閩縣人殿試第三名陳孔光字德溥長樂人彭演公永之子字子山周文擢直亮之姪字升伯以上甲科張翰翮之兄字雲卿王推宗巳之從弟字伯準陳説字彥安閩縣人終從政郎崇安丞蕭必豫盤之姪孫字伯謙劉潮彥適之姪孫字伯時陳僖國林之從侄字武仲終溫州司户余稱利賓之曾孫字子揚楊沖幹之姪字飛卿歷國子録終宣教郎寧國府簽判張可宗可逮之弟字因叔何圭字公瑞羅源人吳景辰拱辰之從兄字應之陳少英字仲明連江人終蕭山尉許仲客字必達閩縣人曾植字元幹閩縣人林嶽字山甫候官人終縣令張曄裔之侄字去華閩縣人李宗甫字嵩老文定公之後今為候官人終朝奉郎幹辦行在諸司糧料院王靜唐之姪字子仁終縣令田質字文伯候官人章次郇字弼之福清人楊梅卿彥之姪孫字子和再試中教官朱大寶字元龜長溪人陳以字用亨長樂人陳所得字子有長溪人連逢辰字叔達閩縣人江司直字惟清永福人終宣教郎知萍鄉縣周掄偉之子擢之兄字聖擇終東陽尉鄭煥字文伯福清人陳朝老字元舉長溪人陳祐字子仁閩縣人黃孔光字晦叔閩縣人林資深字居安福清人南朝英字進之閩縣人黃朋舉字無黨福清人陳滂字宋霖劉去病字泰夫長溪人米煥字尋蒙永福人陳德銘字盤叔候官人梁京字京夫永福人李橺康之孫字伯廣黃公槐字仲炎永福人終迪功郎鄭棠字公逺福清人終迪功郎張叔振字振之長溪人鄭頴字仲實寧德人池覆字叔大閩清人終迪功郎保昌尉張少英字叔俊閩縣人楊謙之興宗之姪字叔厚終迪功郎郭夢濟字邦傑終迪功郎王浩唐之侄字飬真終迪功郎林米字伯玉長樂人劉確字元覃長溪人鄭獲字必先福清人終迪功郎麗水簿鄭湜禹之子字溥之林中字執中福清人劉嶽字鎮甫閩清人黃士宏字時用閩清人特奏名李傑永福人紹興二十年解首作李顔名林炳然張丕憲吳筠張維宋陳彌楊摶丞之弟陳芘洪春卿元康之姪張世昌張申卿蕭祐之林碩黃宋翰黃鼐侯邁武舉蔡必勝榜林桂字景詵候官人陳䇿字子欽候官人薛偉字豐之長溪人劉師古字子述候官人蕭綬字子若閩縣人劉驤已立之子字伯揚陳仲堅字秀實閩縣人林槩字元公長樂人終欽州沿海巡檢陳表臣字正角永福人黃如文字元振長樂人熊飛字雲翼閩縣人施夢樞字宋卿長溪人趙宋昌字奕之永福人鄭恭字子安福清人終惠州巡檢李國輔字必強閩縣人終沅州巡檢林偉字伯英候官人四年戊子太學兩優釋褐黃倫字尋卿閩縣人渡江以來釋褐自此始授左承務郎大學録五年己丑鄭僑榜洪把浩之姪孫字季實終從政郎建寧府教授黃景説功之姪字岩老杜申字景嵩永福人乾道四年解首陳樞才南羡之姪孫字元卿乾道元年解首馬字公寶候官人莫子春子震之兄字春卿張觀字達之長溪人盧南金字聲伯閩縣人終中奉大夫知欽州嶽牧字朝咨候官人楊應嘉績之從姪字定夫黃師尹龜年之姪孫字瞻叔王深仁字元之閩縣人陳嘉運字景炎候官人終南恩州教授繆仲虎夢弼之姪字用之洪格杞之從兄字伯正終承務郎知瑞金縣髙融曇之從侄字光仲陳震之字長大福清人李宗允國輔之族姪字興摧林可行字用之閩縣人陳茂英字季實長樂人髙南夀澐之姪陳涇字景清閩縣人陳孝錫字純仲閩縣人鄭舜卿邦彥之孫字虞任林棣仲堪之孫字子華張伯宗字應叔候官人李宗元宗允之弟字與善林叔秀頴秀之弟字文之林廷瑞字端甫林萬字瞻卿福清人鄭鈞字平國長溪人林褎字秀實懷安人黃揆字端甫永福人陳堯佐字元翁閩縣人上舍魁殿試犯廟諱學究出身後再登科林汝能同之從弟字季簡終東嘉簿林之懿之奇之從弟字少淵終化州教授王基字履之候官人徐長卿鍈之父字元公終迪功郎英州教授林昂字敷卿連江人余宋興字輔之黃楫字汝濟長溪人陳山甫字次仲候官人陳駿字敏仲羅源人特奏名盧大猷黃作羣之姪陳擢陳光宣陳夏卿陳夢兆字元吉長樂人紹興十七年解首陳襲林光方襄時可之侄張夢祐武舉趙鼐榜葉良臣字君翕閩縣人黃越字子授寧德人終邵陽尉許祖道字伯廣懷安人潘元震字子春福清人後進士登科魏有聲字谹甫閩縣人林襲字子述連江人陳謀表臣之從弟字深甫終石門尉張時用字庭實閩縣人林几字汝玉閩縣人陳昭德字士紘閩縣人終縣尉黃夢攸字伯茍長溪人陳端臣表臣之弟字莊文林惟揚字季卿福清人鄭應衡之姪字剛沖淳熙三山志卷二十九
