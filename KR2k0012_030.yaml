body:
  text: 淳熙三山志卷三十宋梁克家撰人物類五科名本朝乾道八年至淳熙八年乾道八年壬辰黃定榜黃定字泰之永福人俞言字昌老懷安人李泳葵之孫字深卿以上甲科楊繼祖興宗之族字光景黃旦字升叔長樂人邵觀字明卿閩縣人趙焯煜之兄字景昭陳晃國字子華長溪人邵景之字季山古田人張時舉字文實閩縣人林致字覺之閩縣人陳鼎才樞才之兄字卿終鼎州闕鄭少魏字良臣長溪人陳公亮字欽甫長樂人張煥然維宋之子字孟文陳炳禾之子字冝之終朝請郎提轄文思院乃擢自户部侍郎除顯謨閣待制出帥鄉邦也蕭說國梁之從兄字巖起梁甫大任之子字仲將終保昌丞陳百昌致一之子字汝京陳億才輔之孫字億年終鄂州司法髙安世字景長洪叔莊元芳之弟字端卿謝時舉字子野長溪人翁韶字伯紹長樂人蕭誠意字正甫閩清人葉明之字伯晦懷安人黃嶽師尹之弟字魯瞻陳嗣明字子文閩縣人陳百揆致一之子百昌之兄字汝宅林行可安宅之族姪字可叔劉邵字德翁長溪人髙介卿安世之父字元節終迪功郎鄭晞璹字介之候官人陳繹字景如長溪人黃方開字必先永福人陳桂字豈詵長樂人劉文禮師亮之子字季誠終同進士出身李歲字景清候官人陳仲禮才輔之子字和叔秦膺剛字和仲寧德人林輝字煥然閩縣人游士衡字宋衡福清人鄭遹修之孫字聲之潘元震乾道五年中武舉特奏名朱箕夀王藻韓待聘周師尹倪圭葛少微余思聰鄭揆之陳敦厚黃景梁林槩葉元鳳劉師衡師亮之族弟林從黃中行楊維則陳馨王之鐸林頴中李巖起陳鐸孫邵林奉先曽丕烈默之孫陳介樊文懋繹之姪葉望之髙煥章郭夢俊夢濟之弟李倫歲之叔曾首賁之從兄曾元夫質之侄王伸之王時中陳恭武舉林宗臣榜黃章字元吉長溪人終權知萬安軍楊文志字思武長溪人何說字悅道閩縣人許國字宋卿懷安人鄭霆字希聲連江人王三俊字周士閩縣人許宗道祖道之兄字伯陽黃玠字介玉永福人吳子儀字伯䕫閩縣人終承信郎髙石字趙臣福清人張湊字㑹卿閩縣人章次郭字似之閩縣人淳熙元年甲午太學兩優釋褐鄭鑑南卿之孫字自明自興太學始再見釋褐授左承務郎國子正召試除校書郎遷著作佐郎兼史院官太子侍講除著作郎權郎官終宣教郎知台州二年乙未詹騤榜淳熙元年詔將來殿試候唱名了别擇日御親按試上二甲人射藝其的中絶者臨時取㫖時劉商衡射六箭一貼一的三垜係第一名依賞格循修職郎朱士挺字冠卿閩縣人江立叔洵直之子文叔之弟字權卿以上甲科陳孔碩字膚仲候官人陳萬字亮功長樂人吳桂字子芳福清人許誠字子成長溪人潘必勝字孟武長樂人謝逵字景安長溪人王得遇字時卿羅源人省試第二名程翼字子進長溪人終迪功郎郴州教授楊敏中應之從叔字俊之彭嵩文嗣之姪字伯嶽陳少臯字舜卿福清人林頴字叔喜福清人翁頤字正之閩縣人吳節字直卿長樂人陳升景三之曾孫字士平劉公豫正之孫字君鍚楊掀字潜叔福清人終迪功郎和州教授劉烈字挺之長溪人關文通韶之曾姪孫字叔介陳接字景先長溪人陸伯正雋卿之子字景端劉商衡靖之族字紹美范文夀字元龜候官人姚宗虞字晉叔福清人林涇楫字子載長溪人栁東字春卿閩縣人余伯寬稱之從姪字景仁陳宗召字景南福清人彭渙公永之子演之兄字子舟陳次公叔嘉之子字子容王廓唐之弟字彥容李中字叔初長樂人張斗南字唐英羅源人王軺字公佐閩縣人陳樞佐堯之姪字周之林立之安上之姪字闕立林夙几之兄字子特閩縣人葉楠儀鳳之姪孫字叔特王子陽字茂之長溪人倪民獻字翼周鄭應辰字伯時侯官人王萬全萬修之從弟字子辨葛騑字伯逺長溪人楊夢惠丞之子字彥仁陳聰字士逹福清人髙邁融之族弟字德逺林文仲公選之孫字次章鄭肇之祖德之孫字子仁張叔向字子政長樂人解渙梓之姪字述之童子舉何致逺羅源人特賜將仕郎特奏名林時中劉升梁大臨國寶之子林牧周光宗姚知默黃芹謝章李逌林祥陳復之陳津張偉張普林舜舉陳正中楊强陳孔鑄黃斗南黃𠂻韓頴黃光度張甲元武舉蔣介榜張鵬甲元之弟字博卿李國勳國輔之弟字必大林應趾希之姪孫字麟之鄭震霆之叔字景東林叔起字儀父福清人邵應辰字觀光閩縣人劉興宗字闕昂長樂人王節字景大長溪人林漢輔字公佐閩縣人終襄陽府三縣巡檢蕭必勝許鳳字季翔長樂人張時修時用之弟字及之黃裳字元吉寧德人黃鳳字士中閩縣人四年丁酉車駕幸太學上舍釋褐楊範翼之之從兄字天錫陳允升字晉卿閩縣人太學兩優釋褐黃唐字信厚閩清人授承務郎太學淳熙五年戊戌姚頴榜姚祖賡瀛之弟字子復陳公顯祚之孫字叔晦以上甲科湛循嶢之孫字復之鄭應申適之族字景嵩閩縣人楊楫興宗之從弟字通老王宗浩宗已之從弟字元直方疇時可之族字仲和潘鳳字儀仲羅源人卓杰字梁父長樂人卓珣字士直長樂人鄧林字楚材福清人潘麟鳳之兄字信仲梁大亮國寶之子字明叟陳自强僴之姪字勉之陳宋輔字公弼寧德人柯才聳字雅才永福人終迪功郎德化簿陳絢思文之姪孫字寶卿曾春字子仁懷安人陳子擇字庸甫連江人劉嶽季裴之子字公輔陳明作字用晦永福人余及字企和羅源人陳介卿字通叟閩縣人張若霖字佐之李鼎字文瑞長樂人彭夢賜字德寬柯甲字德初謝鼎字新伯永福人陳覺先字次公張皓字東卿孫晞甫字周翰閩縣人陳丰字道卿黃泰字茹之候官人張古心字惟中長溪人鄭鑄字陶叔福清人朱木字仁叔福清人劉允成字允長樂人吳竽字允成鄭禧字天錫羅源人陳椿年字元老林劉舉同之姪字漢士薛七頴字子淳長溪人林采大聲之孫字質夫陳石字潤甫閩縣人陳震字魏卿福清人黃序惟則之子字子申陳用之誥之孫字景亨鄭瓚鍔之弟字黃中蕭國馨國梁之從弟字隱之任煜字仲章福清人蕭國均國馨之兄字秉之陳綱字文紀候官人特奏名黃元質林誼陳敏修敦修之弟崔俊馮異李次膺鄭千成黃樞王經仲陳唐佐唐佑之兄繆守愚方與權髙嶽王夢有周亨升李莘起繆鞏陳宗亮闕介卿鄭謨俠之曾孫卓薿元龜之孫葉之盛陳賓陸玠震之子卓汝顯楊宗旦黃公輔陳自得自强之兄林永叔陳亨甫陳安仁嘉祐六年傳之孫武舉陳說榜陳說字和中閩縣人程汝翼字子獻連江人第二名倪震字子彰閩縣人陳應字定夫寧德人楊明輝字清叔閩縣人黃賾字子深永福人林軾字和伯福清人鄒次鳯字仲師長樂人姚浩俊之之子陳英准字景平長樂人終江西安撫司准備將領鄭子遇字宋弼閩縣人許士口字格夫矢福清人黃績字定功寧德人陳績字德彰寧德人鄭炎字遇之弟宋卿許必克字汝能福清人淳熙七年庚子童子舉先一歲指揮自今童子舉並要年十歲以下通誦六經及語孟全文方許赴試林公洽長樂人以四歲全通九經特授迪功郎何擢懷安人以九嵗全通九經特授迪功郎八年辛丑黃由榜朱鼎士挺之父字調父林谷字聲之永福人以上甲科孫格字正甫閩縣人林焞字炳叔寧德人陳天冝字祐之張紹字諤甫長樂人王瑜字器之閩縣人陳岡字伯嶽古田人楊武字有文長溪人朱淵字似宇潘士表字伯仁候官人王泰之字伯宇永福人俞南仲字山甫福清人蔣斌字文叔候官人王宗度字叔霞閩縣人潘涓字普之謝牧字謙之長溪人陳士表字表之閩縣人楊是甫字德師長溪人王椿字春卿候官人洪紱元夀之姪孫字恭叔林稱字子實福清人王知章字雲叔長溪人周震冝老之孫字永叔陳朴字羲叟候官人歐賡字少皋閩縣人黃左之字繼周閩縣人曾曄質之子字晦仲陳焯字景陽候官人陳堯佐以乾道五年學究出身再試吳畋字力本永福人陳永叔字修父閩縣人王宗𫝊字景孟寧德人黃槿度之子字子周洪公㢲浩之姪孫字伯權黃桷槿之姪字景成閩縣人陳圭字叔清懷安人李賁字夢實懷安人蕭軫字方叔永福人何庇萬之族姪字叔信閩縣人曾鉌丕烈之子字聞人候官人池申字嵩卿候官人方寀時可之姪孫字同甫洪鑄元夀之姪孫字成文陳修億之弟字修年陳宗訓仲諤之弟字彛叙李公升泳之從侄字士臣張紱字文代長樂人葛有興字可大閩清人紹興三十年解首林觀國字邦光懷安人陳可行字允功長樂人特奏名陳縝第一人字德容羅源人林定國何升之連楹黃開林惠輔張驥髙夢卿陳葵黃琯度之子瑾之兄黃延世光宗之子何孟文甘霂商俊份之弟侑之兄黃時中王士亷武舉江伯虎榜江伯虎字君用永福人名南强唱名日御筆改今名黃萬石字萬卿長樂人吳斌字公瑞閩縣人蔣夢震斌之從弟字震卿李興時字叔起寧德人施子禮字子禮懷安人姚况字子發長溪人林浩字叔大福清人陳纘字侣公長樂人盧南仲南金之弟字祥仲林萬全字允成永福人周肇字元禮長溪人姚廓字開之長溪人吳堯仁字彥性閩縣人李叔淮字伯海閩縣人淳熙十一年甲辰衛涇榜林瑑遹之孫字景良福清人王益祥字謙叔長樂人以上甲科陳纘覺先之從弟字嗣公長樂人前武舉登第吕啓宗字景初閩縣人周峻字瞻叔寧德人髙首卿字景端閩縣人楊冝中字行可候官人李櫜字時中連江人陳綰纘之從兄字晉卿長樂人黃善字子韶林士衡字商卿閩縣人潘子儀冠英之從姪字行父閩縣人陳畦字仲卿候官人連虞鳯字應韶閩縣人鄒洙字宗魯長樂人陳子冲字致逺福清人陳潮字伯時寄居福州林昉字子揚閩縣人陳雄字淳甫長溪人黃奕字子山長溪人江伯虎字君用永福人前武舉第一人楊安字勉之候官人陳舜申字宋謨連江人周時貴字良彥羅源人鄭域字中卿閩縣人黃移忠字孝可寧德人葉景溫字仲寶羅源人何士顯萬之姪字升甫閩縣人鄭昌之昂之孫字伯耆候官人余用之字行仲閩縣人鄭驤字舉之閩縣人林璟遹之孫字景宋福清人林文蔚字宗之懷安人髙名世字興之閩縣人林瓌遹之孫字景溫福清人夏允中字彥執福清人曾願汪之侄字謹之候官人梁昞字景明閩縣人張起宗字起之永福人劉襲字仲新福清人薛夢能字于之福清人特奏名陳謙厚黃輿黃雲林可大林森許惠卿陳楠程萬林抃黃嵒陳浚宋霖之姪武舉林㟽榜林㟽字珙中福清人林可大字之逺閩縣人孫祖武字仲實候官人陳商霖字汝作長溪人張泳之字叔潜懷安人林獲字誠身福清人鄭良佑字光輔候官人王億字景文閩縣人劉方輔字輔之永福人賴嘉猷字汝弼閩縣人鄭顯大字夢應閩縣人黃東字叔魯連江人林之望字知章長樂人吳冲字一飛懷安人馬煥字著明候官人施子美子禮之兄字子美懷安人黃公舉字保之候官人林宋輔字佐叔閩縣人鄭摶字子萬寧德人夏介字通甫長溪人連向字伯震懷安人淳熙十三年丙午太上皇帝慶夀恩上舍釋褐林彌明字晦之長樂人潘子直冠英之從姪字叔方閩縣人十四年丁未王容榜陳元字仁之候官人殿試第二人林選聳之子字擇行閩縣人淳熙十三年解首以上甲科陳德豫字子順連江人陳元衡誘之子字莘夫閩縣人林執綱字維國閩縣人朱著倬之孫字性誠閩縣人陳公奉公顯之兄字叔璋羅源人林千字能之閩縣人柯垓字經父閩縣人鄭昭先字景紹閩縣人李庚字子西連江人張德明字晦叔長溪人黃子善字元夫連江人黃宏斗南之子定之從弟字達之永福人陳誘公格之孫字循仲閩縣人陳方字與直閩縣人陳誠中字表之閩縣人林煒桷之子字謙之繆倬字昭子長溪人陳絯綰之兄字嵩卿長樂人黃恂倫之子字叔信閩縣人黃致一字通甫長溪人陳億字曼卿閩縣人鄭德美應申之從弟字景韶黃自誠字孚叟永福人陳宋烈字鼎卿長樂人鄭之悌字茂愷長溪人林㞯字仲忌長樂人方沂字伯春福清人沈康字直叟閩縣人林拱之字應中閩縣人陸彥敏藴之曽孫字誠之侯官人林翹然字端夫候官人劉松奕之曾孫字公茂候官人吳孝齡字仲房候官人商佾份侑之弟字元節福清人謝伯常字彛叟閩縣人柯謙宗梁之曽孫字次恭閩縣子林時英字才甫長樂人方巖起疇之姪字伯瞻陳燾字仁甫閩縣人楊祖堯字述甫長溪人林琪字粹甫連江人陳甫中之弟字景山鄭肇字端父長溪人髙齡字德一長溪人林伯誠自之子字性之林子發字藻之閩縣人吳申字柔直閩縣人朱金發字振仲福清人終龍岩簿尉特奏名黃邦彥公舉之兄馬璋瑒之兄鄭發繆宗興段格余飛公方薦鶚王良輔魏應之吳季山劉撝許教黃九齡楊興之陳夢英陳璟林亞文林應辰武舉黃褎然榜江伯䕫伯虎之弟字君俞永福人第二名歷東門舍人終東南第十將許邦光國之弟字謙仲閩縣人林伯成之望之弟字知萬長樂人歷閣門舍人知髙郵軍終知真州潘子震子直之從弟字伯威閩縣人鄭鋼字叔浩閩縣人陳介石誘之姪字岩生閩縣人黃浩字直甫永福人彭安土字伯禮寧德人熊武飛之姪字君右閩縣人王石孫字宗略寧德人楊舉字褎叔閩縣人潘子禮字和中閩清人陳紀字仲禮寧德人王復古字一之福清人淳熙三山志卷三十
