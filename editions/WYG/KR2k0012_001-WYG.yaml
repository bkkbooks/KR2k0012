body:
  text: 淳熙三山志巻一宋梁克家撰地里類一叙州周禮職方掌天下之圖與其地七閩與焉七者所服國數也初夏少康封庶子於㑹稽二十世至句踐又六世無彊為楚所滅通鑑周顯王三十五年子孫播越海上七世至亡諸摇姓騶氏一曰駱氏秦始皇二十六年既并天下置三十六郡乃使尉屠睢平百越廢為君長以其地為閩中郡按史記始皇帝紀二十六年分三十六郡三十二年使䝉恬破胡三十三年置桂林南海象郡東越傳秦巳并天下皆廢為君長以其地為閩中郡蓋在置諸郡之後史闕其年諸侯伐秦亡諸摇帥閩中兵從畨君滅秦項羽主命弗王以故佐漢伐楚髙帝五年封亡諸為閩越王王故地都冶蘇杖注嚴助傳曰冶山名今名東冶林魏黄初人當得之今甌冶池山是也唐元和八年刺史裴次元於其南闢為毬場即山為亭作詩題於其壁自為序大畧云場北有山維石巖巖峰巒巉峭聳其左林壑幽邃在其右是用啓滌髙深必盡其趣建創亭宇咸適其宜勒為二十詠有望京山觀海亭雙松嶺登山路天泉池翫琴臺筋竹巖枇杷川荻蘆崗桃花䲧芳角茗原山隂亭含清洞紅蕉坪越壑橋獨秀峯篔簹坳八亭椒盤石白土谷詩各一章章六句内望京山云積髙依郡城迥㧞凌霄漢蓋始以望京名之也時觀察推官馮審為記刻石大畧言次元報政之暇燕逰城之東偏曰左衙營遂命開治化磽确為夷址去荆棘於叢薄以為毬場其北乃連接山麓翳薈荒榛公日一往或再往焉捫蘿躡石不憚危峭轉石而峯巒出濬坳而池塘見為潭為洞為島為沼窈窕深邃安可殚極凡二十有九所聲於歌詠者二十篇蓋又有漣漪亭東陽坡分路橋乾崗岑木􅏨亭石堤橋海㨨亭松筠陌夜合亭未為詩也至大中十年亭壁之詩已無存者刺史楊發訪於邑客得其本為鑱諸碑隂而識之其後碑石埋没洎皇朝熈寧二年夏新子城役人裒土於宣毅營北將軍山下得之乃輦而置於郡中日新堂之西廡有程大卿師孟題記今存其言宣毅營即舊左衙營今廣節營也將軍山即唐望京山舊冶山也按治平圖則曰泉山熈寧圖名為將軍未詳所始經累代營造脩築山形今卑小矣然觀唐元和中猶巉峭幽邃如許則秦漢間益可知閩越王故城即此山西北孝惠三年立閩越君摇為東海王都東甌應劭注東海曰在吳郡東南濵海徐廣注東甌曰今之永寧也永寧即今永嘉師古曰今泉州葢指福州非也吳王濞敗子駒亡閩越怨東甌殺其父屢勸擊之建元三年閩越圍東甌帝遣嚴助發㑹稽兵浮海救之閩越聞風而遁其年東甌舉國徙江淮六年其王郢擅擊南越嚴助傳閩王以八月舉兵於冶南葢兵已離所都由南路以往復遣王恢韓安國兩道擊之弟餘善鏦殺郢遣使者上符節請所立嚴助傳云不敢自立以待天子之明詔餘善意欲漢立之耳漢以繇君丑獨不與謀張晏曰繇邑號使立為繇王奉亡諸祭祀餘善威行國中民多屬遂竊自立為王帝聞之因立為東越王漢只封丑王繇邑以奉閩祀有意於郡縣之矣及餘善自立以繼郢乃因而封之按司馬遷作東越傳總閩越東甌為名立為東越王者盡王此閩越東甌之地也自秦以㑹稽郡之南皆為閩中郡漢髙惠始分為二建元三年東甌既徙江淮其地無所屬閩越併有之至此乃盡以封餘善故曰東越王班固漢書用遷之文乃以東甌請舉國徙中國改為東越請舉國徙中國其名始不辨矣盖漢惟有東越南越此則東越其統名也與繇王並處既立餘善亦不廢繇王故曰與繇王並處元鼎五年餘善請從擊南越不至漢將請伐之兵臨境乃反朱買臣傳時東越數反覆買臣因言故東越王居保泉山一人守險千人不得上今聞東越王更徙處南行去泉山五百里居大澤中今發兵浮海直指泉山可破滅也是時元鼎六年餘善之立已二十五年矣買臣故言舊時東越王只守泉山之險今乃去之而南可直指其巢穴而取之蓋謂所都之地顔師古曰即今泉州之山謂福州也自隋文平陳改豐州為泉州唐開元置福州折衝亦號泉山府兵皆即今甌冶山為名爾唐裴次元作天泉池詩題其山亭云魚鱗息枯池廣之使涵泳䟽鑿得䝉泉澄明覩秦鏡今山下猶有泉一泓紹興間薛殿撰弼創泉山堂其側蓋識古也舊城在此山西北越王山之南越山寺記乃云山本泉山因遷今城乃指故都以越王名之非也後之人又不詳究始末以餘善與丑為共王其地疑各别在一處有以泉山為在蓮華山下有指鼔山為説皆失之買臣言更徙處南去泉山五百里即所謂泉南猶言冶南也泉山堂側有龍王祠王参政之望因禱雨獲應更名喜雨詔朱買臣與韓說出句章今慈溪浮海東徃楊僕出武林今錢唐王温舒出梅嶺今䖍化越侯出若邪白沙今㑹稽有若邪溪擊之漢時東越四境民物稀曠史言守武林田餘干入尋陽可見矣元封元年入東越繇王居股殺餘善以其衆降帝以其阻悍數反覆改封居股東成侯萬户漢表東成在九江郡遷其民江淮間遂虚其地或竄山谷後稍稍出因自立為冶縣前後漢及晉以来地理志並無此縣名前漢志雖有治縣疑是冶字然考之後漢志乃是章安今台州臨海縣地也惟晉志云武帝滅之徙其人名為東冶舊唐志云其逃亡者自立為冶縣得之漢置㑹稽南部都尉於塞上以禁備之治回浦鄞縣南囘浦鄉漢邊縣有障塞尉掌禁備𦍑夷犯塞者自武帝既廢東越遂於塞上置治縣以處近境之民又置回浦以為南部都尉治所故前漢志此兩縣最在㑹稽郡諸縣之後顔師古注治縣曰本閩越地注回浦曰南部都尉治是也治縣在今臨海舊東甌地閩王郢至餘善皆得而有之又秦統名為閩中謂之本閩越地可也而宋書志沈約所作乃引司馬彪云章安故冶地然則臨海亦冶地也又引張勃呉錄云閩越王冶鑄地蓋以治字為冶字後人因之遂以漢甞置冶縣於此且無諸都冶摇都東甌自是两處若置冶縣豈於東甌界中又冶今州治去臨海一千二百里若置縣在此其界至臨海則前漢表縣大率方百里又安得一縣如此之逺乎况治縣始改為章安續又分章安南為永寜不將永寜介乎其中而南北斷為兩境皆名冶縣故今前後漢志及唐元和郡國志皆作治字宋志又云後分冶地為東南二部都尉東部臨海是也南部建安是也此固後漢至呉時所分呉時多指東越之地呼為東冶故云爾以為漢甞置冶縣於此則誤光武時罷都尉時遂廢回浦縣後復置南部建安元年孫䇿令永寜長韓晏領南部都尉將兵討東冶時方立此名及晏敗以賀齊代之八年始置府于建安建安初始有候官等五縣舊記謂光武以為東候官未見其據建安元年孫䇿渡浙江㑹稽太守王朗浮海奔東冶候官長商升不納頼虞翻説之乃為起兵䇿復遣將擊之是時縣皆豪傑自立可知也未幾升降於賀齊建安南平漢興三縣復反又其後東冶五縣反四縣名見前其一史闕書自孫氏時五縣既平始隨立為縣或者乃以遁逃者出漢復立為冶縣亦誤矣呉景帝時置曲那都尉領謫徒造船於此舊記開元寺東直巷呉時都尉營號船場永安三年置建安郡治建安候官屬焉時建安屬縣呉興東平建陽將樂邵武延平建衡元年李朂從建安海道擊交趾晉太康三年始以候官為晉安郡嚴髙為守初治故都遷今城縣八原豐新羅宛平同安候官羅江晉安温麻𨽻揚州漢武帝元封五年始置刺史時東越已虛矣呉時以丹陽郡為刺史治所今建康晉因之元康元年𨽻江州時以疆土曠逺統理尤難分置江州以揚州之豫章鄱陽廬陵臨川南康建安晉安七郡荆湖之武昌襄陽安成三郡置刺史治所初在豫章咸康六年移治潯陽今江州宋泰始四年改為晉平郡舊記云元嘉中改晉平攷宋書無縣五按宋志晉安太守領縣五候官原豐晉安羅江温麻而無新羅宛平同安者併省也或以為是時析置南安郡非也宋志即無此南安郡其晉安縣即今南安之地故知是併省尋復故宋書晉安王子勛敗遂改為晉平以封休祐似嫌其名稱六年休祐死明年徙其十三子於晉平齊建元四年封王子懋為晉安王相距十餘年史闕更復梁天監中置南安郡以晉安縣地置時始置龍溪縣遂以晉安縣為南安郡而屬焉按隋志梁武帝天監十年有州二十三郡三百五十其後頻事經略開拓閩越謂此普通六年遂以晉安建安南安三郡屬東揚州先是宋武帝惡江州彊大常欲分之孝建元年因討平臧質遂分揚州之㑹稽東陽新安永嘉臨海五郡為東揚州刺史治所在㑹稽至是遂以三郡屬之從其近也陳永定初升為閩州領三郡始為刺史治所時以陳寳應為閩州刺史天嘉六年州罷以寳應敗故廢還屬東揚光大元年復升為豐州隋開皇九年平陳改為泉州廢建安南安二郡來屬大業初改為閩州三年改為建安郡治閩縣縣四閩建安南安龍溪唐武德元年改為建州四年移建州于建安是時閩縣屬建州六年析置泉州舊唐志云貞觀初為泉州非也四年移建州五年以南安為豐州六年置泉州宜以新唐為正縣五閩候官長樂連江長溪八年置都督府領建豐三州寰宇記云武德四年為豐州置都督領泉建潮㑹要云武德八年改為豐州都督府按新唐武德四年未有泉州五年始置豐州於南安寰宇記年與州名及所領皆誤㑹要州名誤冝以元和志為正貞觀初𨽻嶺南道廢豐州来屬縣六萬安今福清聖厯二年置景雲二年改為閩州都督府是嵗六月分天下置汴齊兖魏冀并蒲鄜涇秦益綿遂荆岐通梁襄揚越安潤洪潭二十四郡都督閏六月置按察使七月停新置都督府是時二十四郡都督之命並不行惟閩州都督乃是嵗正月指揮不在停廢之列領泉建漳潮五州先是垂拱二年析置漳州聖厯二年以舊豐州為武榮州是嵗以武榮州為泉州開元十三年改為福州都督府或曰以董奉福上名十九年置泉山府兵治平志按察使席豫奏福泉等州山洞僻逺江海廣深請於福州置上折衝府兵千二百人二十一年置經略使治平志有八月十二日𠡠二十二年以漳潮歸嶺南督泉建汀四州二十一年置汀州天寳元年改𨽻江南東道尋改為長樂郡改刺史為太守仍為長樂經略使縣八古田尤溪復領漳潮二州十載復以漳潮歸嶺南舊記云二年非至德二載置經略軍寜海軍乾元元年改為都防禦使兼寜海軍使復為福州都督府改太守為刺史置防禦使以治軍事刺史兼之上元元年升節度使領州六舊記云代宗時領温州治平記云寳應元年袁鼂反攻陷台温明三州李承昭率兵破之遂以温州来屬未幾歸越州按唐書台州人袁鼂僣號改元寳勝李光弼遣將破之于衢州廣德二年鼂伏誅免越州今嵗田租之半三州給復一年其間来屬未詳何時縣九永泰析候官尤溪置大厯六年罷節度置都團練觀察處置使以潮州歸嶺南乾符五年黄巢入閩焮蕩幾盡中和四年陳巖逐其帥鄭鎰自稱觀察使光啓二年王潮據泉州巖表為刺史巖卒其婦弟范暉自稱留後驕暴失衆心衆道潮以來潮遣弟審知攻之景福二年入福州乾寜元年授潮觀察使三年唐表作四年升為威武軍拜節度使四年卒潮自光夀南渡由贛川入漳浦據泉福十二年葬晉江審知立初潮未至民謡曰潮水来巖頭沒潮水去矢口出至是騐梁開平三年封閩王縣十乾化元年以梅溪場為閩清縣貞明六年升為大都督府唐同光三年卒子延翰立天成元年偽建國稱大閩國王十二月延禀殺延翰推延鈞為節度觀察留後長興四年僣號改元龍啟升為長樂府縣十四是嵗以羅源場為羅源縣感德場為寜德縣歸化場為德化縣建州永順場為順昌縣咸屬子繼鵬為尹清泰二年繼鵬弑立改元通文晉天福四年朱文進等害之季父延羲立改元永隆明年延政始貳後三年延政僣號於建州國號殷以將樂為鏞州延平鎮為鐔州開運元年文進殺延羲自立晉因授以節度國人尋殺之迎延政於建州明年延政稱閩王以福州為東都領州七縣十三是歳析出順昌子繼昌留守列校李仁達殺繼昌立僧卓巖明雪峯僧莆田人未幾殺之自立其年延政為南唐所滅自光啟二年丙午入閩有神僧黄涅槃人就問之僧云騎馬來騎馬去滅之明年嵗復丙午蓋六十年漢乾祐元年仁達舉國歸呉越縣十一是嵗改鐔州為劒州以尤溪𨽻之三年又以徳化歸泉州周廣順元年改為彰武軍避周太祖名今法祥院有建隆三年石闕殿記功德主上軍散兵馬使充彰武軍省勾院使徐廷鎬迨我皇朝太平興國三年錢氏納土復為威武軍領州六軍一鏞州失所廢年月是嵗析建州之邵武為邵武軍屬兩浙西南路四年領軍二是嵗析泉之莆田置興化軍六年縣十二是嵗析閩縣九鄉置懐安雍熙二年始為福建路嘉祐四年帶鈐轄大觀元年升為帥府四年罷建炎三年復升為帥府自太康置守至今淳熈八年凡九百年考占星土蓋斗牛須女之分也周禮以經星十二次辨九州之地以觀妖祥内呉越屬星紀前漢志謂交趾南海等郡皆其分野志自斗十二度至女七度為呉越特言其大界也非止謂本州廣輪之數具列于後東西四百五十里南北五百七十八里東南西北四百九十四里東北西南干八十里東百九十里至海西二百六十里至界首又百二十五里至南劍州南百七十八里至界首又六十三里至興化軍北四百里至界首又百三十里至建寧府政和縣東南二百八里至海西南五百四十里至界首又四百二十五里至南劍州東北五百四十里至界首又三百二十里至温州西北二百八十六里至界首又百十八里至南劍州淳熙三山志巻一
