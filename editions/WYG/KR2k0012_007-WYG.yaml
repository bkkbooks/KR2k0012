body:
  text: 淳熙三山志巻七宋梁克家撰公廨類一府治州自嚴髙大相兹土告卜於晉乃定宅方位迄今不移矣遐服列邦初作郡宇宫室規制可知也暨為刺史加都督進節鉞改連帥皆號會府自陳至唐三百餘年間創立營築徃徃易庳陋為髙廣更壞復葺亡所紀載唯衙門唐上元軍門元和所建天王堂咸通所造尚有遺跡然是時衙門止為都督軍門止為州門也乾寧錫軍號威武遂作重鎮梁貞明復陞府大都督勢望雄偉蓋與岐益楊越齊列偽閩僣號改作踰制通文永隆之間宫有寳皇大明長春紫薇東華躍龍殿有文明文德九龍大黼明威門有紫宸啓聖應天東清安泰金德錢氏内附廢撤無留者獨面衙門一殿故址猶在至今呼為明威國初守臣避不敢居以為設㕔凡勑設宴集乃就焉而即其西建大㕔以為視事之所舊紀節度觀察使衙在府中近西北今呼為常㕔天聖五年始於其東創都㕔今修令堂自公堂九年以大㕔毁敝摧剥斥而新之景祐四年又於其西創便坐今三清堂有以接僚屬治政事臨見吏民矣慶厯八年乃大新衙門嘉祐中又更軍門為雙門於是重譙傑麗邃宇閎固翬飛雲矗望者肅服名公鉅人剖符開藩官崇地重僉曰惟稱其餘燕室閒館虚堂華閣巍樓廣榭離亭别圃自公之暇據勝臨眺樂豐餘而壯吟觀蓋又開寳以來間有作者夷荒理廢感興寓懷更名易額不一而足仕四方者閱歴孔多獨目此為善部姓名歲月於是悉書焉威武軍門本唐元和十年觀察使元錫所建州門也乾寧三年州升為威武軍遂為威武軍門周改為彰武皇朝太平興國三年復舊名吕權書嘉祐八年元給事絳更為雙門上建樓九間樓上梁題作是年歳次癸夘五月壬寅朔二十有七日戊辰重建熙寧二年始創滴漏建州門之歲置推晝夜刻元給事絳改築威武軍臺門至熈寧二年程大卿師孟始作滴漏推測晝夜蓋祥符中劉承珪之制也今漏室中有程大卿詩牌二一云科漏新成因成二篇呈監官葉左院臺門新漏一聲聞從此朝昏百刻分他日郡人思太守也湏談及葉參軍風雨雖昏漏不移百年應未失毫釐湏知萬户千門裏正得人間㓙吉時一云曉登威武軍皷角樓百尺譙門戍萬兵黄昏初動盡龍聲銅鉦猶是閩王㸃銀秤纔懸漢守更四面僧誇金作界半年人看玉為城官程稍近千餘里不到儂家向此行於第四句下自注云舊無滴漏予至始創建炎二年江待制常申明約束一守漏人四分為兩畨直日放漏水候魚珠落銅盤乃移秤刻即告户外報時者一諸衙報牌人九日通以皷角匠輪差於户外祗應告報一直漏人五夜分直五更並以撾皷人輪差其奩具等物五十日一濯有皷角國朝軍防格節鎮皷角各十有二舊有十二角建炎二年江待制常約束云昬時吹角八人各二十六聲為三疊撾皷八人角聲止乃各撾皷千為三通凡三角三皷而畢四更三㸃及申刻各吹角三疊為小引更㸃說云更以皷㸃以鉦今鉦間欵識云梁開平五年歲次辛未七月壬午朔十三日甲辰造重百二十觔所謂閩王㸃即此下為亭以翼之左宣詔右班春内府廊三十五楹時元給事絳移南都代者未至間建大都督府門唐武德八年州始升為都督府上元二年創門梁貞明六年升為大都督錢氏歸朝凡偽世門額悉廢毁惟威武軍與大都督門仍舊慶厯八年成郎中戩修有潮陽從事丘濬為記云蔡公時方欲新之俄詔為本路轉運使成公至以是年六月始事九月告成舊額蔡正言襄書紹興七年南市火拆以禳之張待制致逺重書列㦸十有四㦸衣長一丈二尺以朱白蒼黄𤣥為次謂之儀門亦曰衙門設㕔衙門内舊有之慶厯六年蔡正言襄重建偽閩時明威殿舊基國初改為設㕔至是頽敝蔡公始重創今梁間有公自書慶厯六年歲次丙戌春正月壬午朔二十有七日戊申新作使㕔二十五字後太守許大夫懋為鋟板碑立日新堂右嘉祐八年元給事絳修宣和五年俞提刑向權州事復修有通判黄琚為記設厨在今自公堂之地見熙寧圖後移於設㕔西南隅大㕔之東廂大㕔設㕔之西治平圖題為大㕔自設㕔西過都㕔是舊有之天聖九年十一月鄭職方載重建十年十月建大㕔東門於中庭之東西創御書二閣都㕔大㕔之東治平圖題為都㕔今所謂簽㕔也天聖五年章兵部頻創隆興元年汪侍郎應辰移都㕔見止戈堂項内至乾道二年王叅政之望始立今額前修令堂後自公堂王叅政有自公堂詩叢石當軒峙横池傍砌深還將脩竹遶半入古榕隂晝賞風瀾皺宵憐月影侵􅂓紓江海志寄此小山林小㕔大㕔之西景祐四年范都官亢創治平圖題為小㕔熙寧中更名清和堂見熙寧圖時以設㕔為大㕔以大㕔為小㕔於是以小㕔為清和堂靖康後始塑三清像於此為三清堂旁有觀音堂日新堂設㕔之北慶厯六年蔡正言襄創治平圖有之熙寧二年程大卿師孟題毬場碑額云輦而置之日新堂西廡今碑在堂下之西廊建炎三年改鈐轄為安撫使以為安撫㕔春野亭日新堂東南慶厯六年蔡正言襄創元豐四年劉待制瑾修治平圖有之蔡公留題古風兩篇首云太守職名治詔書劭吾農載酒事緬邈作室當廨中况恁軒牖髙中視田野功澹沲沐新澤依微生柔風江潮漲晚綠山麓延朝紅耕鋤時節動歌語聲意通慚非共理才幸遇頻年豊未厭畎畝樂駕言誰相從觀此可見命名之意也後有蘇舜欽劉瑾王子京林顔字上交王伯虎范伯玉呉拭余授陳粹詩各一篇若曰翰林遺創久欹隤又曰鏤額竒蹤蔡翰林知亭公所創額公所書也又曰天章餘力起傾隤知劉公所修也前有池亭淳熙三年陳丞相俊卿創九仙樓樓下東衣錦閣西五雲閣舊小㕔之西南有清風樓爽心閣即此也見治平圖蔡公襄有登清風樓詩郭外清溪溪外山溪雲飛上破山顔晴明天氣琉璃色何處峯頭帶雨還樓舊有之閣嘉祐八年元給事絳創州有元給事詩碑乃元公自題云嘉祐八年癸夘建威武軍門又建逺南門宜興門使院作院公使七庫作會稽亭流觴亭佚老菴爽心閣修轉運司明年建忠義堂信美堂篔簹軒又修城隍廟本城八營作戍兵三營門怡山門昇山門康泰門杪冬訖役厚之記又有移鎭南都留别福唐詩二首觀此知爽心閣為公所作樓即舊有之熙寧間更名九仙樓賞心閣見熙寧圖程大卿師孟有九仙樓觀塔燈詩宣和元年孫龍圖竢於閣西增名五雲唐李若初甞登城西望有五色雲當王霸宅遂作冲虚宫至此既樓南對九仙遂以西對五雲為閣名今五雲閣下有安撫司印書庫五年俞提刑向權州事以余太宰典鄉郡於閣東更賞心名衣錦安撫司簽㕔置衣錦閣南尋移春野亭乾道元年王叅政之望復舊淳熙五年移自公堂六年復舊燕堂大㕔之北嘉祐四年燕司封度建安民堂見治平圖序燕公所建也安民堂在大㕔北又創甲仗庫於安民堂東亦見熙寧圖熙寧間又創談笑軒於安民堂北見熙寧圖後皆更名燕堂堂之西廡有舫齋元祐四年林中散積作艤閣其上閣上有林公詩牌云州宅之東北有燕堂堂之西廡舊有舫齋今又新艤閣遂作小詩以紀之濟川須用楫罔水戒行舟四海風波路安眠是勝游時四月十五日也大觀三年羅殿撰畸䟦其後云因登艤閣視梁間尺板見字畫竒勁語簡思逺超然有収身寕迹謝脱世患之意遂呼匠理其棟宇而刻其詩於石今齋閣皆廢六年柯龍圖述修宣和七年權州事俞提刑向重修紹興十三年葉觀文夢得以校書黄伯思慕索靖急就章千四百五十字鏤板於堂之壁使宅治平熙寧圖皆題為使宅燕堂之西南今眉壽堂雅歌堂和樂堂之地也紹興十年張丞相浚為其母秦國太夫人名其南為眉壽堂堂中有辛待制次膺留題云多病相如故倦游四年紆緩到三州君恩乞與歸巖壑何啻將軍得罷休時丐祠得請也乾道間王參政之望名眉壽之北為雅歌堂額簽判呉稽淳熙五年又重創雅歌之北為和樂堂舊眉壽之西廡嘉祐八年元給事絳建信美堂堂西南為篔簹軒通忠義堂東廡並見熙寧圖後廢紹興十五年莫尚書將於其北為堂曰慶雨以禱雨獲應名二十六年李待制如岡於其南為堂曰愛山萬象亭燕堂之北紹興十四年葉觀文夢得創十六年薛殿撰弼修立石止戈堂今安撫㕔後架閣庫之北舊甲仗庫置大㕔東廂見治平圖上有凝翠樓慶厯初王祠部達有詩今樓存嘉祐四年燕司封度增置甲仗庫於安民堂東見熙寧圖今燕堂東自慶厯後設㕔之北惟日新堂而止元豐四年十一月劉待制瑾始創架閣庫於堂北舊架閣庫在使院之東見熙寧圖前作大門謹啟闔之時紹興間以門東西兩間為安撫司錢庫復闢庫後為堂曰武備東西北列甲仗庫又為大門其南而旁為便門二扄鐍嚴固於是舊甲仗二庫皆廢大㕔東廂庫今樓下便路燕堂東庫今為廊屋矣建炎四年建㓂猖獗程待制邁乞師於朝乃出禁旅命孟叅政庾韓少師世忠討之紹興二年賊平遂更名堂曰止戈有秦檜李綱孫近汪􅍨許份張致逺李彌遜辛炳張觷洪炎鄧肅李芘朱松等詩詠程公之功今為止戈堂集初州簽㕔建長官㕔側隆興元年汪侍郎應辰命移使院趙侍郎子潚繼之以不便遂移今所蓋由架閣庫及通止戈堂門也今簽㕔即止戈堂門南東為直司即架閣庫東廡西為職官直舍即架閣庫西庫甘棠院今忠義堂之西按熙寧圖在忠義堂西㑹稽亭南後廢其額只寄於流觴亭西屋簷間開寳九年錢昱創昱之記曰予自下車數月適因廵城觀隙地髙下景趣俯邇郡齋乃命芟去荒蕪開闢基址至是車書既同戈甲皆罷乃卜築處花心者曰夢蝶亭瞰水際者曰枕流亭迎爽氣者曰臨風亭眺夕照者曰綺霞亭嘉祐八年元給事絳建㑹稽亭時簽判喬孝本作詩云元侯選勝重經營地取園心正且平揆日募工踰再浹創亭合樂落初成面開西向縁忠孝牓揭新封紀寵榮隠隠湖山藏故國漫漫煙水隔都城低迷疊嶂囬峯抱繚繞芳叢列艶迎臺上臨風共瀟灑花間夢蝶助淒清枕流小檻欹前沼散綺幽軒接後甍舊景周環如有待夕陽偏照似多情縈紆碧沚通潮浦左右脩篁拂􅀞楹自昔甘棠雖足愛會稽從此擅佳名則是時四亭皆在也治平圖有夢蝶亭在㑹稽亭西臨風亭在夢蝶亭西枕流亭在夢蝶亭北綺霞亭在威武堂西南臨風亭南綺霞亭北又有望京樓至熙寧圖則臨風綺霞亭望京樓皆廢矣而又别創小齋甲於四亭不獨用之待賔亦可處兹為政乃目之曰甘棠院程大卿師孟有甘棠院招簽判小飲詩簽判和云甘棠深院百花香後院始廢今甘棠院額掛簷間者徐兢篆程邁立蓋存古也其南為門牓曰甘棠治平圖尚有甘棠門今春臺館門是也天聖中陳郎中絳重修男說之為記皇祐四年劉待制䕫於其東建逍遙堂大觀三年羅殿撰畸修紹興二年程待制邁重修額徐兢篆嘉祐八年元給事絳於逍遙堂西作流觴亭元公流觴亭詩春風流水出巖扉載酒輕舟颺綵旗把得玉杯還自笑老翁真令似童兒舊有流觴木槽後汪樞密徹移雙松亭作石槽亭西北作佚老菴初名佚老後改為隠几見治平圖元公隱几菴詩分得藩符近海濵溪山清處養天真幅巾隠几春菴静直是羲皇已上人後又改為淨名菴見熙寧圖今廢菴西南作㑹稽亭以元公開國㑹稽名公出守龎公籍王公珪范公鎮王公安石司馬公光等五十三人賦詩五十七章以寵其行刻其顯者置壁間公亦自有詩治平元年建忠義堂於逍遙堂南堂東西壁繪像凡四十七聖人一人周公社稷忠臣十六人張良以下節義忠臣十九人申包胥以下諫争忠臣十一人樊噲以下庭間有池作亭其上曰熙熙治平圖見政和元年黄尚書裳更名得象自為記後廢池存熙寧八年元即中積中更甘棠門名為春臺館其後錢公四亭摧壞紹興十年張丞相浚理夢蝶故址為偃蓋亭二十三年張侍即宗元改創為秀野亭取東坡獨樂園詩花木秀而野之句有教授徐士龍記又創清風亭於秀野亭之南雙松亭秀野亭之東北有蔡公襄𨽻書額後刻石立日新堂左公為守時所創也宣和七年俞提刑向修紹興二年程待制邁重修治平熙寧圖亭西有火箭庫後廢威武堂忠義堂之西有蔡公襄所書額公為守時所創也紹興二年程待制邁修前有教場西有敦教埸廟熙寧圖作永安王廟今永安王廟在逍遙堂東坐嘯臺逍遙堂之北舊養和亭也見治平圖熙寧二年程大卿師孟築為臺初名翫月見熙寧圖宣和五年俞提刑向以得象亭材創更名月榭紹興二年程待制邁重修改今名有劉嶠所書額威武臺城隍廟東今興福菴之東熙寧二年程大卿師孟築城日封其址為之今基猶存時又負城為三亭春風亭在東山樓之北吏隠亭在城隍廟西北雅歌亭在城隍廟西南各有詩今皆廢蕃宣樓城西北隅舊碧峯亭也見治平圖熙寧二年築子城改創城上凡九樓西湖樓蕃宣西五雲樓城西南下金墉橋三山樓城東南下長利橋清微樓清泰門上東山樓康泰門上堆玉樓城東北隅今觀風亭緩帯樓城北今超覽亭望雲樓城西今怡山閣並見熙寧圖今惟清微東山與此存樓東有亭曰野雲淳熙五年創怡山閣坐嘯臺之東舊望雲樓閱射亭荔枝樓之地也治平圖只有閱射亭在其東熙寧圖増荔枝樓於亭西而中為望雲樓元祐五年柯龍圖述創紹興二年程待制邁修懷隠菴和樂堂之後州宅牆之南紹興十四年葉觀文夢得創沈括有懷隠集載居山之式後歸休於夢溪葉公慕之以名菴自題云春風的的為誰來遶舍閒花亦謾栽菴内不知菴外事夜來微雨小桃開菴東小亭曰歸意亭之東有元明王廟相傳閩王時竈神西小亭曰柏恱清閟亭自九仙樓下涉石橋而南為南園紹興十六年薛殿撰弼創亭曰清閟今廢又創亭於其東曰與春後改名清虚觀風亭城東北隅舊堆玉樓地紹興十年創額張丞相兄滉書十六年薛殿撰弼修超覽亭天王堂西舊緩帯樓地淳熙五年創亭西有亭曰流憩同時作澄瀾閣舊西湖樓基待制趙公汝愚創建公題於柱曰按熙寧圖西湖樓在州治直西鹿項門之南乆廢不存矣澄瀾閣在舊子城之西跨古渠南向秋風亭下有敗屋數椽猶在或是其處也湖事既興俯視衆役乃即樓之故基為屋十楹將因樓之名則太質而閣顧不可緩營也遂以澄瀾易之亦存古之義云天王堂城北舊有門唐貞元中軍悖南甸師乗而入閻濟美塞之後咸通七年李瓉乃版築其上作天王堂有館驛巡官鄉貢進士盧標作修築城北門及剏天王樓記今存僧史略云天寳元年西蕃㓂安西明皇詔不空三蔵誦經不空因言北方毗沙天王神通可以禦之㑹安西亦奏將戰有神丈餘金甲而来因勑諸道州府城東北及營寨並設其像威武營威武堂教場之南舊駐泊廣勇營之地也見治平熙寧圖淳熙五年為營以居衙兵轉運行司國初諸路置轉運使太平興國三年錢氏納土閩為兩浙西南路置使副尋省獨使一貟五年始命太子左贊善大夫賈昭明為本路轉運判官無副者置天聖六年罷之七年復置慶厯五年復罷嘉祐二年後置雍熙改福建路將輸舉刺自端拱明道之際詔所屬郡不輟巡按端拱詔或端坐本司或故留諸郡深彰曠職殊不盡心自今並須不住巡按所部明道𠡠今後並一年之内遍巡轄下州軍將帶本司公人兵士不得過二十人司屬不得過二人故逐州皆有行司舊記轉運行衙在府西南隅置司建州蓋舊矣考治平圖府西南公宇東為運判司西為轉運司而於其南同一門曰西總蓋舊行部所舍也虎節門内之西有西總門南向即俗呼西衙蔡公襄自知福州除本路轉運使有移居轉運署詩熙寧既築子城併二司為一併運判司轉運司為一更其門東向時提刑司同提刑司實在其北見熙寧圖時大街西有提刑司同提刑司轉運司蓋始以同提刑及轉運㕔門東出尋罷同提刑司政和間始併轉運司為提刑司屬宮㕔吏舍省馬院架閣庫等而遷轉運行司於府東迎仙館治平圖南禪寺東曽師建記政和五年三月撤舊迎仙館増而廣之靖康元年罷㢘訪使者又以其廨為之今試院西是也㢘訪衙本駐泊㕔地其東有隆道侯廟慶厯八年鄉貢進士翁定基為記駐泊都監楊永慶刻石今存建炎二年以建㓂故移司福州紹興二年還建州三年復移福州尋仍舊其㕔事之東有繡采堂恕堂公明堂乾道間武憲權寓此所修而名之又其東涉池橋有清和堂而迎仙館遂為轉運東行司兩漕所舍各趨其近東行司亦浸摧圯矣提㸃刑獄司淳化二年詔諸路轉運司以常參官一人紏察刑獄事於是以司門貟外即董循等分充諸路轉運司提㸃刑獄四年罷之獨委轉運使蓋始𨽻漕臺也景德四年乃命與轉運使分路提㸃選朝臣及諸司使副至閤門祗候明幹者充太子中允直集賢院丁遜為本路提刑供奉官王守元為同提刑兩貟自是始天聖六年並罷交割與轉運使訖赴闕公人歸元差來處明道初復置舊記公宇在府西南有上下衙蓋今所也范遷圖經上下衙俱虎節門内治平圖運判司東北嘉祐五年罷同提刑熙寧元年復置二年既築子城乃以同提刑司與提刑司各為大門東出見熙寧圖尋罷同提刑政和間遂以其廨與轉運司皆為提刑司屬官㕔吏舍省馬院架閣庫等宣和三年増置武臣靖康元年罷紹興三年四月移司建州十一月仍舊乾道六年復増武臣初寓轉運行司淳熙三年乃於提刑司中門之内分公宇為東西兩㕔武憲葉南仲修建自為記舊治有前後㕔事兩所皆明道二年劉比部立之所建後㕔之西有池創閣其上池閣之北有一堂焉熙寧五年提刑宋道為記云廨有東堂甚壯舊不名四隅鑿小牖前後二户至卑乃撤去闢為四軒髙其後閎前不設戸名曰幸堂後更名虛静俞龍圖時詢幸堂所在巳更此名矣而宅堂在其西宋提刑記廨有東堂則舊宅堂在其西可知宣和時巳廢俞龍圖記不載後㕔之北故有堂也宣和時已為宅堂又於其後為亭曰雙桂康定元年李都官敷於堂之北復建兩堂前堂解龍圖向名曰澄清後堂俞龍圖向名曰憲堂後更名中慶於中慶之東有小軒曰静寄嘉祐七年王郎中陶創兩亭於堂左右左亭俞龍圖向名曰熙春後頹廢吕敷文企中重建於看樓西南右亭俞龍圖向名曰藏春梁上題嘉祐七年壬寅正月提㸃刑獄職方貟外郎王陶建後更名留春八年復創亭後㕔之東北舊名繡衣更名薫風吕敷文企中修熙寧五年宋即中道既修建幸堂遂闢其旁為軒北軒俞龍圖向名曰清逸其東有小軒俞龍圖後名曰幸軒東軒之左附以便室俞改名曰山齋宣和二年俞龍圖向乃皆葺而新之各為之命名又建兩樓於兩亭東西舊熙春之東名曰斑衣樓藏春之西名曰荔支樓東樓後更名宿雲紹興中災改創看樓緫而牓曰樂圃俞作樂圃記曰熙寧五年宋公作憲於此嘗為幸堂記予言和巳空詢幸堂所在易名虚静是也自虚静之北園館連屬明年更新繕完之名其北曰憲堂南曰澄清廊廡映帶為樂圃之冠庭之南有二木栖故亭其下曰雙桂囬廊之外左右二亭東曰熙春西曰藏春熙春之東樓額宏麗時可奉親為㳺覽之地目之曰斑衣藏春之西有樓遍植荔攴命之曰荔支面樓一軒北顧諸亭左右二沼手植瑞蓮名曰清逸幸堂既易不欲廢其名虛静之東曰幸軒幸軒之左乃治事之便室小山聳翠題之曰山齋宣和四年俞龍圖向記異時樂圃作門威武軍西南每歲二月府開西園與民遊玩至三月提刑司亦開樂圃各一月頃三十年樂圃始罷開矣及分為兩㕔也毁塞池閣移前㕔建後㕔之西後㕔遂為東㕔前㕔遂為西㕔武憲所治也其西有欏木亭未名西㕔之後遂為燕寢之宅清逸軒額移牓東㕔之東偏不欲廢其名也小軒便室乃撤去之為仁亭於兩㕔之間餘則如故也若夫簽㕔置中門之外屬官公廨即外門之内檢法其左提幹其右皆舊所建云提舉行司崇寧三年詔諸路置提舉學事四年始建司州南街東舊都作院地也見曽師建記五年正月罷七月復置宣和三年罷建炎三年建卒叛移提舉茶事司於此紹興五年移泉翊遂廢七年火西外宗正司紹興三年詔西外宗正置司福州知宗正司事廨舍始寓太平寺屬官二貟即其東慶成寺居之主管敦宗院今寺西南宗學教授今寺東北帥屬廨舍州作帥府自建炎三年始置機宜撫幹為屬以監務㕔為機宜廨舍今旌隠坊北是也見治平圖地名鎮前紹興五年増置通判以為通判㕔十一年初置叅議猶寓他所至十九年通判移威武軍之東後乃以為叅議廨舍機宜舊占僧寺撫幹貟多所居不一後省各一貟今累政機宜南禪撫幹神光通判㕔州舊通判一貟㕔於威武軍門内之西熙寧九年通判方蓁建宅堂元祐四年通判雷豫建㕔門建炎四年通判葉擬建長樂堂於其東紹興五年増一貟始居旌隠坊北十九年通判葉仁以日趨都㕔不便乃請於朝以威武軍之東故知錄司户㕔合而為廨舍秦呼門内通判為東通判門外通判却為西通判淳熙五年復置添差釐務通判寓轉運行司之東偏職官㕔慶厯舊記本府幕官三其廨並府東廊治平間移察推㕔今定安門内之北府東廊獨為節推簽判㕔並見治平圖元祐既建試院察推㕔復仍舊府東廊今簽判㕔察推之東節推㕔察推之北曹官㕔慶厯舊記府院在威武軍門外東偏六曹官舍附之兩司理院在虎節門外左右觀治平圖威武軍門外之東先府院次司法次司戸㕔熙寧初移府院門出威武軍門之内見熙寧圖政和間罷府院更兩司理院為左右獄而府院南為知錄廨舍如故建炎初移司法㕔府東廊舊㕔之北曽師建記建炎元年重立額尋以府院北為撫榦廨舍與司法㕔相對門亦出府東廊紹興十九年合知錄司户所居為増置通判㕔曽師建紹興甲寅増廣記知録司戸㕔並在威武軍門外東偏於是知録移寓大中寺遷易不定後撫榦省貟乃得今所司尸先僦民居後治威武軍門外西偏故如歸館惟兩司理院即其舊無改作教授㕔教授舊選仕於州有文學者兼居於鄉有德行者充故未立廨舍熙寧三年程大卿師孟重建府學乃即園為宅以居之見林希州學記教授有㕔自此始今學東是駐泊都監監押㕔駐泊舊總一道戍卒都監監押主本城兵其始責重故駐泊兵馬都監㕔在府東偏治平圖在職官㕔之東熙寧圖門出府東廊在簽判㕔之東南政和中以為㢘訪治所移還珠門外今春風樓地見紹興甲寅曽師建記紹興七年火遂僦居後治雄略指揮教場官廳都監㕔舊寧越門内之東監押㕔舊利渉門内之東見治平熙寧圖元豐間以都監㕔為東南第十將公廨紹興九年移副將建州正將始遷其西因以為犒軍庫監押㕔不知何時圯廢今旌隠坊内橋東紹興間巳為士大夫居宅今都監監押増四貟皆僦居將官㕔今寧越門内之西舊崇軺驛慶厯四年以為路分㕔見治平熙寧圖元豐間改副將廨紹興九年始為正將㕔監務廨舍初監務兩員都務官廨舍舊旌隠坊北臨河務官廨舍舊法海寺北見治平熙寧圖建炎以來旌隠坊北迭為機宜通判叅議㕔法海寺北嘗為登瀛館近亦添差簽判所寓監務後増三員皆僦居監甲仗庫廨舍舊康㤗門内之南乾道元年以展拓試院移甌冶池南菴舍淳熙八年復為菴舍始僦居廵檢㕔舊在城廵檢以都監監押兼天禧中嘗令南臺監倉兼管四城門外廵檢公事故廵檢㕔在鹽倉之西今閩縣尉㕔是也見治平熙寧圖後移置辜嶺廵轄馬鋪舊在南臺横山之西見治平熈寧圖天聖九年移白田渡景祐二年移水口尋仍舊試院長樂大府祥符以來文物歲盛自景祐建學大比例為集試所生員逡廵邸宿於外先聖釋奠亦移他所元祐五年柯龍圖述謀所以易之㑹朝廷下學及孔子廟不得試進士之制五月乃擇州治之東南公廨及隙地治平圖有察推㕔及作院廣二百三十尺有奇而深倍之乃増築厥址崇其舊三尺穹堂延廡中闢曠除後敞公堂繚以重屋以為考校之舍外門之内監門廵鋪彌封謄錄之所皆具旬五十而成凡為正屋百有二十區是時舉士纔三千峩冠鵠袖雍容而入其後寖増至於五倍側肩爭門坐不容膝紹興十七年乃假漕司行臺以殺其溢然猶病其隘也三十二年王尚書師心以就試人益來奏請増考試官三員為十員乾道元年郡學諸生鄉士林丙相率以請於王叅政之望乃相其西北隅官舍易之如監甲仗庫廨舍之類得其地東西二十有八丈南北四之三増為屋百二十有七楹是歲秋試王叅政有戒諭文云福唐今年秋賦投家狀於有司者幾一萬七千人鄉舉之衆天下莫比亦閩中昔日之所未有也可謂盛哉前牓自大魁而下聫甲科者五人與臚唱者六十七人國家於此邦人士誠無負矣本州仰體朝廷之意以賔興為重事開斥貢院編排坐次増添内外執事等人種種如法州郡於此邦舉子亦不茍矣諸君盍修身礪行思所以稱副者父兄戒其子弟長上訓其後生朋友之間更相勸約咸趨禮義盡革囂浮毋怙衆以作非毋黨惡以長亂絶博塞之戲息錐刀之爭出為里巷之遊必有矜持之色衆庶歸重儒服自尊凡所觀瞻誰敢干侮士風如此顧不美哉或有敗羣不靖之徒多士共疾之蓋歳厯三更科詔一下賢才皆待時藏器指日奮身豈容一夫猖狂以致衆人顛沛且大開選舉精考藝能乃功名富貴所由之途非兇暴强豪興爭之地正使㨗如慶忌勇若孟賁何取於翰墨之場乎一犯嚴科自有公法三木被體二物加威屏於逺方編之罪籍與夫鹿鳴開宴黄堂享勸駕之儀豹變還鄉緑袂耀觀光之寵者榮華僇辱烏可同日道哉又况閭歩既騰亨衢甚坦稽古所獲不止於此而巳夫以萬七千人羣考於此其間𤨏碎寧無短長在於寛通所宜闊略三日借路豈責其全一忿亡身雖悔何及至如將來引試切忌攙先蓋緣題目出頒必俟舉人盡入何須競進以冐隘途雖少遷延未曉晷刻逺於踐蹂方免憂危宅心既寧下筆孰禦又按設既定尺寸有分移徙亂行擾動實深我欲自便人將謂何若其有知必不為此嗚呼在醜不爭先聖之格言畏威如疾前賢之明戒凡我應書之衆勿屑細故以逺大自期鴻鵠秋天一飛萬里安可量也惟諸君勉之淳熙元年應詔者二萬人史丞相浩講求累舉之弊乃復假簽判察推知錄司法四㕔以益之以大㕔兩廊坐負城兩縣舉子舊坐三縣人以添四㕔故只坐兩縣而懷安福清羅源於行衙長溪永福古田於舊展試院乾道元年所増屋宇連江長樂閩清寧德於新展四㕔就試試之日四其門以入之而出以二時曉示閩縣候官士人並於定安門入試院門晚出中門納巻畢出試院大門懐安福清羅源並於依仁坊門入行衙興賢堂桂堂外長溪永福古田從東康門入舊展試院入訖闗閉不許出入連江長樂寧德從皷門内東廊入新展四㕔入訖闗閉不許出入凡十縣並出行衙中門納巻畢出行衙大門先是行下諸縣士人有訟在官除事干人命外其他並與結絶或召壯保許試遂約束結保投納家狀以七月十五為限以慿類保排定試按限滿射保或改姓名不許収受尋有在外遊學方歸續射保者别就他處排坐内閩候官士人從皷門裏東廊棘門入司法㕔寧德長溪古田永福士人從東康門入舊展試院就試晚出並由行衙大門異時試院街南一帶人户各安泊舉人入試每候開門率爭先突入至是帖廂官刷具姓名禁止有後門者亦權織斷不許通東衙巷初令監門官公服立門左右肅揖而後入巡按者唱坐巳定不許徙案只許保頭起身取巻始罷卒名編攔號為祗應逐間榜揭姓名以待需喚猝有疾患批厯至府不移時給藥以時警其怠慢者時以為禮闈當如此置巡按官抄附祗應功過厯一道取藥厯一道應兵級供應從早至夜合不住火常將沸湯頓貯令温以備呼喚有不到巡按官行遣畢上厯候開院勘斷不違慢者犒賞凡外門有所傳入常切機察先是告示官私屋賃士人就試及賣試按人並不許長價納巻吏貼不得邀覔錢物其試院諸官㕔祗應人及雜職獄子并使府諸官㕔虞侯當直人等不得循習更就吏貼乞取常例及其他各巳優待舉人又自作勸諭文以戒爭門先入毁棄巻按皷噪場屋者至是又闗防上件逮晚設燎門道列十四幕為納巻所閩候官分六幕新舊展拓試院分七幕其續射保人别置一幕是歳䇿問始命工鋸板分雕防漏泄也逐篇目限以一紙期趣辦也舊䇿題並連黏三篇方捲入試巻分俵多是臨期不辦今只將紙作様造板如問目稍長計㑹試官細字書寫只以一幅為限疊三紙捲入不須連黏凡納巻有號簿彌封官手自封押逐場彌封畢即以號簿入匝封押永不得開其單號簿逐夜繳入監試處不得漏泄如將來有行先報姓名並根究増謄錄為三百人十人為甲置交巻厯一道功過厯一道有節去文理添注雜一拆換卷頭或别行抄上白卷者悉許人告其同甲能自舉首與免謄錄或課寫不辨依指揮牒院展日考校初禁兩司官人來徃舊彌封謄錄兩處官吏不禁徃來别差對讀官舊就委謄錄官始選楷書十名分諸考官位以備抄寫每位楷書一名送紙五百張欲再謄以歸者自令抄寫遇再謄巻獨許關監試躬㸃簿混以五號批下從彌封官措置貼號監寫封入前已謄錄却以正巻發過彌封所今只委彌封官封貼字號監臨謄寫拘収正巻纎悉嚴密訖試無違犯者至今行之州自國初舉子尚少錢氏歸朝解額未有定法天禧四年詔節鎮州府取進士二人累増至天聖七年為十八人明道二年増為四十一人景祐四年以明道二年所増人數太多令十取二州該四人併天聖七年額為二十二人慶厯五年貢舉所以元年就試人數解二分不得過元額之半州該増十一人併景祐四年所解總三十三人嘉祐二年以四歳科場時頗淹乆自今間歳一試三年禮部因請減諸州解額之半遂減一十六人五年増解額以就試人數為率舊一十七人増為二十五人元給事絳勸駕詩英五五出南閩蓋謂是也治平元年嚴挾書之禁都倉州都倉舊名西版倉閩王審知創子城外皇朝熙寧二年拓豐樂門城為子城倉乃在内元祐四年建倉㕔治敖廥翼以旁屋大小凡二百一十區政和八年重修建炎元年復修列倉敖於兩廡凡三十八眼以千文題其號紹興四年石甃兩廊以便輸納常平倉舊在倉内鹽倉國初轉運司置倉南臺儲福清長樂等縣長溪寧德羅源連江運置至天聖六年罷鹽給州縣務州有鹽稅務縣各置鹽稅務及倉聴民自買今閩尉㕔東教場其地也見治平熙寧圖在武勝王廟之南按祥符五年轉運司奏鹽倉在城外十里有一二千家接連城内大中祥符五年以水口嵩溪驛増為倉移運上四郡綱鹽於此以便搬賣明道二年罷元豐元年復之政和八年詔移水口倉於懷安縣創蓋時興化軍以㴠頭倉運鹽到此搬剥留滯奏移懐安始在縣治西一里黄石﨑山置宣和四年復歸水口時科賣民户鹽始不給還於是南臺倉亦廢矣徐成忠銓私記此年産鹽每觔添一文為十九文無鹽給還建炎間停水口倉復創蓋於懐安紹興十一年轉運使余應求賀允中自縣西移置東北地名郭埕即今所安撫司監倉紹興初帥奏置回易後始運賣官鹽以寧越門内之東舊將官廨積貯號犒軍庫乾道八年轉運司行鈔鹽法以合沙江南舊濟川亭為倉尋罷鈔鹽遂歸安撫司軍資庫府衙門内東偏天聖七年尹屯田錫重建曽師建記慶厯六年蔡正言襄修治平圖序常平庫舊附之有轉運司上供庫在其西北公使庫大㕔前過西園路之南嘉祐八年元給事絳作公使七庫按元公自書記云是年建公使七庫治平圖在西園門南有四庫東酒庫西醋庫又西省庫又西進奉庫熙寧圖東銀器庫次帳設庫南公使庫又南醋庫西進奉庫今東公使醋庫庫南公使錢庫西公使酒庫又南有一庫内元係公使雜物庫公使銀器庫公使帳設庫後移三庫於忠義堂西以為安撫司錢物庫餘為公使煑酒庫宣和二年俞提刑向修俞公自書再任使事兩領帥轄㡬及二年經營補整倉庫軍營城門公宇亭榭池館為之一新公帑什物帟幕鐏爼粗亦偹具安撫司公使庫帥司錢庫在大㕔之南與架閣庫門之東西為三若公使錢物酒庫初皆即忠義堂西為之既而錢物移使院門北惟忠義堂西廊南酒庫如故安撫司抵當庫安泰橋北之東舊利涉門下今抵當庫也又時設於威武軍門西及還珠門外凡三所州抵當庫起元豐七年屬常平後寖廢紹興初帥奏行囘易此始置經總制庫經制錢起宣和三年至建炎三年詔守臣樁管令提刑司變轉輕賫起發紹興四年專委通判五年初取總制錢主管官如經制法十年勅經總制錢通判㕔置庫别無當職官干預以是專庫侵盜其令發納軍資庫别為庫眼椿管許通判不時檢察十五年兼委知通十六年獨委通判二十一年改行十五年之制三十一年復詔通判㕔置庫出納委提刑司檢察之今經制庫置内通判㕔總制庫紹興十七年自軍資庫移外通判㕔置今内通判㕔又有牛皮庫作院嘉祐八年元給事絳建定安門内之北見治平熙寧圖元祐初建試院其所移南街東崇寧中以其地置提舉學事司乃遷今開元寺南紹興初寺為啓運宫奉迎所於是别置鐵作院清逺門内之東謹火禁也使院大㕔前過西園路公使庫之南嘉祐八年元給事絳建其門出府西廊立使院額與東廊節推㕔對見治平圖熙寧後以不嚴密移額北向大㕔見熙寧圖隆興間嘗遷簽㕔於院中㕔復闢府西廊門既而以不便仍舊今為吏舍衙院舊在府東廊職官㕔之南今不廢都稅務舊額茶鹽商稅務國初茶鹽有㩁官自設市於此収稅官通領之熙寧三年罷科賣茶故至今只稱鹽商稅務雖産浮鹽乆不給其名不廢也舊務還珠門外西偏今春風樓見治平熙寧圖政和間以為駐泊治所遂移今安㤗橋北之西舊駐泊廣勇營地紹興七年災再創臨河務州東南美化門内慶厯記治平圖紹興甲寅曽師建記同古南鎻港凡百貨舟載此入焉故務於是置樓店務治平記左廂屬州東兵馬監押治所右廂屬州南兵馬都監治所後合為一以都監主之淳熙元年以𨽻司法㕔修造場舊威武軍門外西偏見治平圖後為如歸館復為醋庫今司戸㕔是也場後𨽻都監抽木場治平圖有退木場在宜興門外之北旁有磨務熙寧圖場與務皆廢矣淳熙五年為安撫司客邸惟抽木場附臨津館後凡抽木七分變轉以歸經制此主焉三分入河以備州用修造今權就忠懿王廟内收管窰務慶厯舊記務在南臺主造塼瓦凡官有修築營繕命流役人充作治平圖南瓦窰廵檢㕔之西今閩尉㕔後是也後並為閩尉㕔窰遂廢船場慶厯舊記場在南臺舊鹽倉之東今閩尉教場東也治平圖復在井樓門外州東北古有船場門謂此今皆廢官造舟率就河口彌勒院之旁灰場舊在窰務之西見熙寧圖後廢炭場舊宜興門外之北治平圖無熙寧圖有淳熙三山志巻七
