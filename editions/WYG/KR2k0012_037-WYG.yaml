body:
  text: 淳熙三山志卷三十七宋梁克家撰寺觀類五僧寺永福縣七十一所慶厯舊記七十所内五所有寺額曽師建記七十二所鍾世明根枯寛剰七十二所淳熙八年縣申七十一所内六十所㑹到起置年代十一所未詳枕煙院唐元里唐永徽元年置舊産錢八百五十四文重光寺開平里大中二年置皇朝宣和二年改為神霄宮建炎元年仍為寺呉侍郎拭登重光寺詩云上窮蒼石梵成拂祖意誰參隻復西曉閣濃隂雲散嶺夜堂清影月雙溪地開今日青銅鑑碑立何年碧玊圭靜覺官名微可笑南華經裏一醢雞有放生池舊産錢三貫四百六十二文雲際院待旦里五年置蘇老亭慶厯間提刑蘇舜元呉拭詩蘇老行諸郡多為洒落遊靜心山共止動意水俱流赴仕辭陶令翻經約謝侯高風誰復記明月上西樓舊産錢二貫二百一十文曽記二貫二百二十文縣申二貫二百一十五文天柱觀音院永安里咸通二年置舊産錢一貫七百三十文縣申一貫七百三十二文大興院保安里同年置舊産錢二貫四十八文曽記二貫一百文縣申二貫五十文三峯院新豐里同年置舊産錢一貫三百五十六文縣申一貫三百五十一文上林院唐元里同年置舊産錢一貫一百五十四文曽記三貫一百七十文上生院唐元里同年置舊産錢一貫九十六文曽記一貫一百一十四文棲林院新豐里三年置舊産錢二百三十三文上龍泉院待旦里十年置舊産錢一貫七百九十二文龍興院永安里乾符三年置舊産錢二百五十三文曽記五百二十三文新興院保安里四年置舊産錢八百五十四文曽記八百五十文瑞應院安樂里廣明元年置舊産錢一貫三百六十七文白雲院新豐里二年置舊産錢五百二十文曽記五百二十一文縣申同曽中峯院待旦里中和元年置舊産錢五百四文惠安院保安里光啓元年置初為大普慈報國禪院大中祥符八年勅改今額舊産錢四貫六百八十五文高葢名山院平葢里文德元年置後唐天成中閩王賜額山在縣西二百里周回九里秀巒挿天常有紫雲䕃之如葢因名高葢山有泉金色亦號金支山偽閩將郊天乃封西嶽以霍童山為東嶽始後漢時土人徐登院記作徐登隱弟兄姊妹七人隱於此齊建元初有僧姓陳氏號慧炬與一侍者姓喻氏號智著亦入此山絶粒禪定唐乾封中因霍童山趙炳來于白巖時樵者戢步林間見炳與登酌東澗水為醪剝枯桑皮為脯醉臥久之炳語登曰吾當先去子亦速來登曰鳳立煙霄迥桃香碧洞逢言畢俱不見儀鳳二年元日登與弟兄姊妹七人於壇上並蟬聨上昇而去僧慧炬者後縣宰三請不下乃遣侍者赴縣城届重光寺始信宿命浴坐化時炬在室内亦然今二真身皆存室前有一石龜旱禱必應見偽閩鄉貢進士王瞻記記云神仙變化非靈洞而不棲祖佛修行非聖岳而不憩以王子晉騰身於緱嶺能大師景跡於曹山雖出凡之路斯然而達本之元不爾是謂控鶴驂鸞之客以九仙六洞為家出生離死之人以大道三界為宅或金骨化而煙霞停影空閉古壇或色身謝而水月回光却歸他世豈可以凡心識于去住豈可以𤣥心測彼變通哉大閩國西岳名山者初有神仙以變化次有祖佛以修行堊迹聿興在於唐朝之三葉其山中分六合高冠二儀巖根而吼出雷聲峯首而戞横斗柄寒生六月風起五天上有列仙聚㑹之壇中有志士修真之室云云崇寧三年􅃯封登淨慧真人慧炬慈利大師智著惠應大師大觀三年知縣鄭仁達始建三聖殿室先是有徐真君伺堂及東西二室嘉祐中許公將留題二室云上得山來過石門謁靈特地乞真言再三許我前程事敢不留詩荷聖恩紹聖初陳公賜亦繼前韻六題曽徹九重門蹔阻堯階奏萬言今日又蒙師許我漢廷當沛異常恩知縣施常詩白雲來去自閒閒鎖靳千山與萬山羽客已歸霄漢去虚堂流水漫潺潺步盡千山與萬山白雲步處叩禪關曉猿夜鶴應相笑笑問勞生幾度閒良翰敘詩巨鎮摽閩越高蹤肇晉齊空壇仙一上古洞佛雙樓化石龜仍在燒丹井已迷塵襟誰復悟惟聽曉猿啼龍都峯其巖在龍都峯頂其下雙崖對峙拔起千竹宛若洞門有三石室世傳趙真君壇有祠宇後傾陁侵其洞口為菴政和三年陳侍郎陽還自高葢來謁祠下遷其菴葺祠宇遂復洞門故跡詩云巖頂風雲常不散洞門日日吐煙霞濟時偏解為霖雨信是神仙第一家舊産錢二貫九十八文縣申二貫一百文上資福院義仁里景福元年置舊産錢一貫二百四十五文報恩院新豐里同年置舊産錢一貫四十一文曽記一貫四十四文安善院感應里二年置舊産錢二百三十一文布泉院開平里乾寧二年置舊産錢五百五十二文曽記五百五十五文翠峯院安樂里同年置舊産錢五百三十二文曽記五百四十文香泉院義仁里同年置太極山樂賢亭有侍郎呉拭留題舊産錢二貫九百八十一文集禪院安樂里三年置舊産錢五百八十八文仙巖羅漢院唐元里光化二年置有篆書十不知何代書也夭矯崖間灑落竒妙古號仙篆歐陽文忠公嘗得之喜其無鐫刻之迹如指畫成文欲以蕃夷金書字圖號譯之未暇也蔡端明釋曰貧道守真乙中有不死術亦莫得其據一在安仁寺仙人山狀如雲靁文蜿蟺模重疑古羅漢字後僧憚墨蠟之費燎斵而􅄟之一在中和寺黄坑之崖尤剞劂生如華葩熟如槁橈或水銷而未既或布汞地上枝葉不屬而脈絡皆通疑開闢之初孕雲結寳若龜圖馬籙鎮壓山川未易以今書通政和三年陳令武祐得安仁三字於沙燼之中又於上生院僧景純得所藏善本四字併羅漢中和鋟諸木舊産錢一貫三百文報恩尼院開平里同年置舊産錢二百二文曽記作無産錢下資福院保安里同年置舊産錢一貫一百九十文文殊院開平里三年置舊産錢三百六十三文曽記三百七十文縣申三百六十一文北山院光德里天復三年置舊産錢二貫一百一十六文曽記二貫一百一十二文能仁寺保德里天祐二年置溪流㑹注曰漈溪溪之源羣峯高拔者曰瑞峯初僧無爽廬此名寄林後唐清泰二年更號瑞峯皇朝大中祥符中李郎中欣以天子承天祐名山異跡多所旌表奏以承天為額政和中易名能仁有放生池舊産錢一十一貫六百一十二文曽記一十一貫八百五十文資國院歸義里同年置舊産錢三貫六百四十一文縣申三貫六百八十四文寳積院開平里梁開平二年置舊産錢一貫七百九十五文摠持院開平里同年置舊産錢六百四十五文靈鷲院永津里同年置舊産錢四百三十九文靈峯院開平里乾化二年置舊産錢一貫三百二十九文曽記一貫三百二十七文縣申同曾清凉院光德里三年置舊産錢三百五十八文曽記三百六十八文佞草院安樂里同年置舊産錢一百六十文靈居院平葢里四年置舊産錢一百八十二文曽記多一文北巖院歸義里貞明元年置舊産錢七百六十五文香葢院保德里後唐同光二年置舊産錢九百三十文延壽院開平里六年置舊産錢三百九文閒居院平葢里同年置舊産錢二貫八十文曽記二貫七十五文縣申一貫一百三十八文謝洋觀音院同里天成三年置舊産錢一百五十文上崇壽院義仁里長興二年置舊産錢二百七十九文鷲峯院待旦里晉天福元年置舊産錢四百一十六文鳳棲院光德里二年置舊産錢二百五十二文秀峯院保德里漢乾祐二年舊産錢一貫六十八文上觀音院感應里皇朝建隆二年置舊産錢七十五文方廣巖保安里同年置巖高千仞慶厯間邑人黄非熊養高其中訪得竒所作十詩留於石玉泉洞瑞松塢鐘磬石聽泉崖瀑布崖龍樹巖靈羊谷龍尾泉望仙臺清音洞舊産錢二百六十文梅山院保安里開寳元年置舊産錢一十一文越峯院開平里同年置呉拭詩野僧迎客笑開關更拂殘碑辭字班徐姓仙歸空碧洞越封王去漫青山影來秋月林十缺聲落春風水一灣焙茗滿甌須強啜過橋車馬便人間玩芳亭元豐七年創知縣某敘名而記之舊産錢一貫八百五十四文曽記一貫八百五十六文鳳凰巖院安樂里六年置舊産錢一百四十六文翠林巖院同里太平興國元年置舊産錢二十九文下崇壽院唐元里二年置舊産錢六十四文曽記少一文北林院感應里八年置舊産錢一貫四百三文曽記多一文禪林院保安里九年置舊産錢五百四十八文善淨塔院開平里同年置舊産錢二百六十一文景星尼院保安里淳化四年置舊産錢二百二十二文極樂巖院開平里大中祥符二年置舊産錢一百八十五文保壽尼院同里慶厯元年置舊産錢一十五文曽記四十文下龍泉院永安里舊産錢六貫二十四文曽記五貫九百六十七文仙峯院待旦里舊産錢二貫四百九十九文安仁院唐元里舊産錢六百九十四文大㑹巖院義仁里舊産錢一百三十四文曽記大會巖一百三十五文香林院新豐里舊産錢一百二十三文武陵巖院待旦里舊産錢一百七文靈源巖院保安里舊産錢五十二文曾記作靈源巖中觀音院待旦里舊産錢二十三文中和院永安里舊産錢一十八文普門菴唐元里舊無産錢縣申二文陸山院保安里舊産錢七十文巳上十一所未㑹到起置年代閩清縣九十所慶厯舊記八十七所内八所有寺額曽師建記九十八所鍾世明根括寛剰九十所今州籍數同内五十五所㑹到有起置年代三十五所未詳寳山院仁壽里唐大和元年里人池清有地曰池坑延僧德光為菴以池坑名之其後陳立増創為幽林院咸通間始賜寳山觀音為額舊産錢四貫一百二文曽記四貫一百一十文寳積院居仁里大中八年置舊産錢八百三十三文曽記八百二十三文天王院縣城宣政里九年置先是㑹昌中楊訥捨宅為基至是有鄭氏始創殿宇皇朝元豐五年僧顯寂撤而新之舊産錢八百三十九文曽記八百三十六文藥師院孝忠里咸通二年賜額舊産錢九百八十九文禪林院安仁里同年置舊産錢七百文陳園院仁壽里十四年置舊産錢三百一十二文仁王院賀恩里大順二年置先是元年黄少干避地於此誅茅以居至是賊平捨僧師正為院皇朝景祐寳元間始大建堂殿舊産錢二貫八百八文縣申二貫七百三十六文保福院安仁里乾寧元年置舊産錢三百三十文偃峯院安仁里光化二年置舊産錢一貫八百九十三文開明院宣政里天復二年置初建陳洋山以山名院後遷山下十里改今名舊産錢三百三十九文普應院同里開平二年置舊産錢二百七十六文曽記二百八十文靈巖院曽記真善靈巖仁壽里乾化元年置舊産錢四百一十九文報恩普賢院䕶仁里貞明二年置有放生池舊産錢六貫一百七十三文曽記六貫二百七十三文大際院安仁里同年置舊産錢一貫九百四十三文曽記一貫九百三十文法華院仁壽里龍德三年置舊産錢一百四十三文曽記二百七十三文鶴林院金沙里後唐同光元年僧悟皎置初院之前崗峭拔獨立古號華表故以鶴林名之康定中主僧牓院前曰華表峯舊産錢一貫一百五文香山院賀恩里二年置舊産錢二百八十四文曽記三百八十四文地藏院葢平里四年置太平興國中賜額舊産錢一貫六十三文曽記一貫六十五文中峯院仁壽里天成五年置舊産錢二百七十六文雲居院賀恩里長興元年置舊産錢三百三十八文曽記三百二十文象峯院安仁里晉天福元年置舊産錢八百九文縣申多一文瑞林院仁壽里同年置舊産錢三百二十六文曽記少一文紫臺菴葢平里五年置舊産錢二十六文縣申作紫臺院産錢四十五文興隆院同里六年置是嵗偽閩永隆三年賜號瑞陽山舊産錢一百九十九文崇福院孝順里七年置舊産錢八百一十文南泉院仁壽里周顯德三年置舊産錢一貫