body:
  text: 淳熙三山志巻三十六宋梁克家撰寺觀類四僧寺福清縣一百九十六所慶厯舊記一百八十六所内一十九所有寺額曽師建記一百八十一所鍾世明根括寛剰除道觀二外一百九十六所今州籍數同内一百四十五所㑹到起置年代四十七所冇住持及四己召人承佃共五十一所起置未詳天王院文興里梁大通二年置初號法建咸通二年易今額有湖光亭今為放生池所舊産錢五貫六百二十四文曽記五貫五百三十三文鳯林院新安里大同元年置乾德四年勑額舊産錢二貫三百二十一文林泉院清逺里陳永定元年置舊産錢八百八十三文曽記八百八十六文縣申八百七十三文廬山寺永福里同年置舊記作永明元年誤林概寺記寺基於陳大義白鹿山東走二十里為金翅山聳數百丈寺枕其前唐㑹昌例廢大中初有僧惠澄善望氣往來其間乃丐廬居宅以廣之號廬山皇朝天聖初始為禪寺尋如初慶厯中復為禪寺舊産錢五貫九百二十三文延慶院新豐里同年置舊名靈曜北有靈曜嶺皇朝天聖間賜今額舊産錢三貫九百八十九文曽記三貫九百七十四文鍾山寺仁壽里天嘉二年置舊産錢一貫五百四十六文曽記一貫五百六文縣申同曽靈應寺遵義里三年置舊産錢五百八十三文縣申五百八十二文寶慶院善福里唐開元二十九年置皇朝紹興三十一年黄樞密祖舜請為功德院改名教忠顯慶有秋雲亭舊産錢二貫一百三十二文黄蘗寺清逺里以山多黄蘗名江淹南齊人好山水嘗遊焉詩云長望竟何極閩雲連越邊南州饒奇怪赤縣多靈僊金峯各虧日銅石共臨天陽岫照鸞采隂溪噴龍泉杌殘千代木廧崪萬古烟禽鳴丹壁上猿嘯青崖間貞元五年沙門正幹嘗從六祖學既得其㫖乃辭去祖送之曰把菩即止幹抵此乃安之遂創院名般若臺今十二祖師堂其地也八年於其東大闢堂宇德宗改為建福禪寺皇朝咸平初降太宗御書因閣於法堂西以藏之十二峰佛坐香爐吉祥寶峰鉢盂報雨寶月羅漢天樂屏嶂天柱文筆龍潭泉勢髙健淙巖石為穴下潭無㡳潭口徑八九尺僧云中冇福德龍禱雨輒應上絶險處復有一潭人跡罕至龍嘗移從下潭而上所厯有爪迹髙頭陁巖在寺西至今石罅猶有乳香出於其間舊産錢五貫五百五十八文閒居院江隂里開成二年置鴻休巖在白嶼山絶頂巖竇天成下瞰滄溟杳望無極僧鴻休嘗棲息于此鳥窠巖鴻休巖西累石為之初鳥窠遊餘杭巢木杪而居白傅訪之曰得無危乎答曰如公所處則危甚乃曰薪火不停識性交攻安得不危白以詩贈之後居是故以名巖舊産錢七百六十二文靈鳯院靈德里大中元年置舊産錢八百三十八文石竺院修仁里同年置舊産錢一貫六百六十文安福院清逺里四年置舊産錢八百二十六文裏塔院清元里同年置舊産錢一貫七百五十文曽記又作靈石塔産錢一貫六百九十文縣申一貫三百三十文應峰院同里同年置舊産錢二貫六百八十七文大乘寺遵義里同年置舊産錢五百二十文曽記五百二十一文僊巖院同里同年置越十三年賜額滿月僊巖院舊産錢二貫三百七十七文上資國院拜井里同年置舊産錢五百五十七文靈瑞院欽唐里同年置舊産錢一貫一百一十一文曽記一百一十二文歛石院方興里同年置龍潭海口衆流原于此舊産錢四貫四百一十文靈石俱胝院清元里同年置先是唐武宗時僧元修始庵於此誦七俱胝呪治疾祟元結詩萬計千謀總不真虚將文字役心神俱胝只念三行呪自得名超一世人後深入巖谷中人以為遁去矣有蔬甲泛流而下乃沿源訪而得之再往則廬已虚矣葢避㑹昌禁也宣宗時出詣闕貢金買山始創精舎名翠石院至是錫今額光啟三年將死書云吾初住庵刀耕火種造伽藍買莊田供僧待客未嘗縁化茶毗之日負院田園足為齋供外莊輸王及友費此外不得他營許難記自香城北沿嶺十里西渡小橋入長道又西入蟠桃塢十步冇石屏因為榭榭之西有欶玉亭次有溪光素波二臺數十步冇松偃葢西有散花堂又西有放鶴待月二樓髙視亭白蓮社乃至塔院中有胡僧像僧自西域來有神術至今鳥雀不棲靈石山磅礴僅百里峻拔逾千仞層林積翠飛泉潄玉山形九疊東有石焉凡遇久晴不雨如石震吼不過七日必應故以靈名十勝九疊峰通天石報雨峯僊人巖僊人碑偃松亭竹簾軒留雲峰碧僊洞戯龍瀑舊産錢六貫三百六十九文曽記五貫八百五十四文縣申六貫三百六十文羅漢院同里二年置舊産錢二百八十七文福山院新豐里同年置舊産錢三百四十八文曽記三百四十六文報恩院江隂里乾符二年置舊産錢一百二十九文䕶國報恩院永壽里五年置舊産錢二貫二百一十三文曽記二貫二百二十三文有城院清逺里中和三年置舊産錢二貫六百四十六文僊井院永壽里大順二年置舊産錢二百五十九文常豐院新安里景福元年置舊産錢一貫一百七十二文靈峰院安香里同年置不溢泉平步亭海月庵舊産錢四貫五百二十三文曽記四貫五百九十四文觀百尼院文興里二年置舊産錢三貫九百八十三文靈慶院拜井里乾寧二年置舊産錢一貫六百七文曽記一貫六百十九文縣申一貫六百一十七文南谷院新豐里同年置舊産錢五百八十九文曽記五百八十七文禪林院遵義里天復二年置舊産錢一貫一十九文曽記一貫一十六文藥師院永東里天祐四年置舊産錢一貫一百九十二文文殊院新安里梁開平四年置舊産錢五百九十三文曽記六百三文縣申五百九十二文栖林院栖仁里貞明二年置舊産錢七百四十二文新城院新寧里五年置舊産錢二百八十六文曽記二百七十九文聖跡院永西里後唐天成五年置舊産錢三百一十文曽記二百七十九文縣申三百一十四文神泉院遵義里同年置舊産錢七百四十五文曽記七百四十六文雲洞院永福里長興二年置舊産錢七百四十六文清凉庵海壇里清泰元年置太平興國七年請圖記於京師舊産錢六文地藏院方興里二年置舊産錢二百五十二文曽記二百三十七文縣申二百三十文資福院安香里晉天福二年置舊産錢五百六十一文龍溪院永福里同年置舊産錢三百五十文囷山院善福里四年置舊産錢六百六十文永壽院新安里八年置舊産錢一百五十七文鷲峯院永西里漢乾祐三年有異禽来集五色炳煥或曰此西乾靈鷲也因以名山僧靜慧卜庵居焉皇朝寶元二年升為院崇寧間改為神霄宫尋復為院靜軒知縣張伯昌詩靈鷲峰寒碧玉堆紅塵斷處小軒開㤀言更覺諸縁盡只冇桃花㸃翠苔舊産錢九百六十三文曽記九百六十文天竺院方興里周廣順元年置舊産錢四貫九百二文曽記四貫九百三十文縣申五貫二百四十八文北新興院安夷北里同年置舊産錢五百二十九文重興院光賢里顯德二年置初有庵號大悲是歲翁正度遷于山之趾號重興有碑銘石馬峯在蒜嶺西有古碑勒石馬泉三字舊産錢九百三十七文曽記一貫八百二十四文義泉院遵義里皇朝建隆元年置舊産錢三百六十二文陳田院江隂里同年置在白嶼山之巔巖穴佳勝四望滄溟舊産錢一百八十七文曽記一百四十六文招慶院文興里乾德二年置景祐二年勑賜明因招慶禪院舊産錢七百七十二文曽記七百七十六文淨明院修仁里開寶二年置舊産錢八百八十七文廣平院永西里三年置舊産錢一貫七百二十八文曽記一貫七百二十一文黄蘗塔院清逺里太平興國元年置運使張徽詩云曉塔影分山店北暮鐘聲落海門西白沙院永賓里同年置舊産錢六百六十一文曽記六百一十六文資國院惇和南里同年置舊産錢五十三文曽記五十一文新興院光賢里二年置本崇福院之廢址翁仁凱廬墓之處至是新之始立今額草堂山院西北昔有隱者結茅讀書于此堂松徑猶存傍有小瀑布壇髙數十尺舊産錢三百七十二文曽記三百七十文竹浦院臨江里同年置舊産錢九百七十四文曽記九百五十四文應泉院歸化北里同年置舊産錢六十七文清勝尼院江隂里五年置舊産錢六百二十二文感應院清元里六年置舊産錢一貫八十四文羅漢院海壇里同年置舊産錢二十一文地藏院遵義里八年置舊産錢一貫三百三十三文雲峰院安香里雍熙二年置雙髻峰上有僊石壇天然而成髙二丈餘四面如截肪上平如削亦有自然石為級道乾道元年雷震為二舊産錢四百八文縣申四百八十文龍居院遵義里端拱二年置舊産錢七百四十九文中峰院潯洋里大中祥符二年置舊産錢二貫六百五文擇善院永賓里三年置舊産錢七百八十三文曽記七百八十四文崇慶院修仁里同年置舊産錢一貫五百四十二文髙葢院安夷南里五年置舊産錢四百四十九文清泉院江隂里天禧二年置舊産錢七百八十三文觀音院蘇田里四年置院西瀑布舊産錢二百五十三文龍卧塔院方成里天聖元年置舊産錢一百七十一文彌勒院欽唐里同年置舊産錢一百五十文香山院清元里同年置舊産錢一貫二百一十六文五峰院江隂里同年置舊産錢一貫五百一十二文縣申一貫五百七十二文金峰院遵義里二年置舊産錢八十七文曽記四十文水陸院永西里四年置舊産錢八百七十六文曽記八百六十三文報恩院新安里同年置舊産錢四百九文曽記六百九十七文五峯院栖仁里同年置舊産錢一貫七十二文盧尼院永福里九年置舊産錢一貫二百一十文曽記一貫二十三文縣申一貫二百三文瑞龍院新安里明道二年置舊産錢一百五十三文栖林院新寧里同年置舊産錢九十五文曽記一百文縣申一百四十五文香林院方興里三年置舊産錢八十九文曽記八百七文縣申八十文廣濟院江隂里景裕四年置舊産錢六百四十二文曽記六百四十一文縣申同曽西峰院蘇田里寶元元年置舊産錢三百四文彌陁院永西里二年置舊産錢五百一十文壽山院遵義里同年置舊産錢一貫八百五十九文雲林院同里同年置舊産錢四百八十七文地藏院靈德里同年置舊産錢三百七十五文曽記三百六十四文延壽院永壽里康定二年置舊産錢九百五文曽記八百九十文南福興院歸化南里慶厯四年置舊産錢九百三十七文曽記九百四十文縣申九百二十七文報恩院清逺里七年置舊産錢一貫二百七十九文新福院仁壽里同年置舊産錢八百四十六文應天院萬安里同年置舊産錢一貫六百二十三文資聖院臨江里同年置舊産錢七百二十七文瑞峰院新寧里皇祐五年置舊産錢七百一十三文曽記六百九十三文清泉院永福里同年置舊産錢四百五十文安善院安香里至和二年置闕鷓鴣峰院南正溪山中闕隂多鷓鴣産錢五百一十文曽記四百九十文靈雲院永福里同年置舊産錢一百五十九文興福院修仁里三年置舊産錢七十四文大澤院新寧里嘉祐二年置舊産錢五百五十八文泗洲院臨江里同年置舊産錢五百四十一文北崇福院歸化北里同年置舊産錢四百五十四文曽記四百五十八文北塔院同里四年置舊産錢二百六十五文曽記二百三十文華嚴院善福里五年置舊産錢六百二十二文雙林院仁壽里六年置舊産錢四百五十八文西方院靈德里治平二年置舊産錢二百八十二文幽巖院同里熙寧四年置舊産錢一貫三百六十八文普賢院遵義里五年置舊産錢二百五十六文積谷院歸化北里八年置舊産錢三百八十三文曽記二百三十三文廬巖院永福里同年置舊産錢五百一十六文曽記五百一十一文瑞峯院方成里元豐元年置舊産錢四百四十九文龍泉院