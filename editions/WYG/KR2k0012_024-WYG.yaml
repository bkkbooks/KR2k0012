body:
  text: 淳熙三山志巻二十四宋梁克家撰秩官類五縣官閩縣知縣事一員晉太康三年省典船校尉立原豐令原豐今為閩縣自晉迄唐皆稱令五代吴越時或稱判縣事國朝用京朝官知丞一員崇寜二年置大觀四年省政和二年復置治平圖經十二縣皆不置丞崇寧五年正月􅃯福建福清縣等七處舊有縣丞合依舊差内福州比福清縣置閩縣等十五處依崇寕二年三月𠡠差置縣丞及改主簿充丞内閩縣候官古田懐安等二十五處委是不應差置是月十八日勑萬户以上事䌓縣分縣丞依舊餘並置大觀四年勑閩候古田縣等處雖係萬户以上事務不至䌓冗不消置縣丞政和二年復置建炎元年六月詔諸縣如係嘉祐以前員闕并及萬户去處許置縣丞一貟餘並罷紹興今諸縣及萬户注縣丞一員主簿一員開寳三年詔諸縣一千户以上依舊置令簿尉三員紹興十六年臣寮劄子國家剏業之初人物稀少權宜措置将東南縣小而事簡者簿常闕員而尉兼之其後縣滿萬户置丞而簿猶闕朱異劄子萬户以下縣分已不差縣丞却多有主簿兼尉去處乞應如此去處並特許専置主簿一員從之尉一員紹興十年本路提刑安撫司相度本路沿海巡尉界分若一任巡捕别恐踈虞并無未獲賊火除合賞外從安撫司勘當保明申朝廷與減二年磨勘選人循一資巡檢一員今銜帶長樂連江閩縣沿海巡檢私鹽賊盜公事連江縣知縣事一員晉太康三年以温麻船屯立温麻令即今連江崇寜三年以係萬户擬差京朝官知丞一員崇寧二年置五年省政和間復置縣先不及萬户故未有丞至崇寜間其數乃登始立丞繼而例減政和間仍舊主簿一員尉一員監商稅務一員崇寜三年置崇寜三年講議司劄子課利一千貫以上無正官本處知佐兼監今擬各置官一員連江縣商稅鹽礬本縣官兼管租額三千五百九十餘貫今收三千三百七十餘貫萩蘆寨水軍統領兼福州興化軍都巡檢使一員候官縣知縣事一員隋唐為令唐歐陽景為候官令本朝用京朝知丞一員崇寜二年置大觀四年省政和二年復置主簿一員尉一員甘蔗洲捕捉盜販一員元豐七年差使臣一員充巡檢私鹽依舊於甘蔗洲駐劄専一捕捉盜販長溪縣知縣事兼兵馬監押一員咸平初以使臣為兵馬監押兼知縣事慶厯後用文臣以知縣兵符題名記自太平興國六年始太平興國右班殿直徐闕雍熙右賛善大夫徐闕縣令吴闕端拱縣令胡闕淳化縣令楊闕至道縣令趙闕咸平縣令王闕景徳左班殿直吕闕三班奉職馮闕右班殿直戴闕大中祥符右班殿直寗闕天禧右班殿直林闕右侍禁胡闕右侍禁王闕右侍禁李闕慶厯著作佐郎張闕皇祐五年五月宣差趙沭知本縣事兼本縣兵馬都監提舉兵士巡檢六年差鮑彭年知縣嘉祐三年宣就差周尹知縣事其都監提舉並如皇祐五年丞一員元祐五年省増縣尉一員崇寧二年置五年省後復置元祐五年知縣馬康侯申本縣界山路透僻封疆闊逺只管縣尉一員乞依古田縣例添置縣尉一員州司契勘古田縣管縣尉二員并主簿知縣共四員長溪縣雖管縣尉一員却有縣丞主簿知縣亦管四員乞依古田縣例添置縣尉一員仍減縣丞主簿一員東尉一員西尉一員元祐五年省縣丞置監黄﨑鎮一員峯火巡檢一員今以正使人充銜帶長溪寧徳二縣巡檢兼烟火巡捉私茶鹽礬長樂縣知縣事一員丞一員崇寧二年置五年省後復置建炎元年以縣未滿一萬户省不置主簿一員元豐七年置元祐元年省四年復置嶺口監倉舊置主簿一員元祐元年減罷四年知縣袁正規申所管監額浩瀚乞復置主簿或監當官遂置主簿一員尉一員監嶺口鹽倉兼催煎一員紹興七年創立催煎官淳熙五年省監商稅務崇寧三年置尋省仍以本縣官兼管課利一千貫以上無正官本處知佐兼福清縣知縣事一員本朝用京朝官知紹聖三年兼兵符今不繫銜紹興三年州闕息依省部相度福清知縣依蔡州新縣體例於銜内許令帶兵馬司公事為兵馬監押丞一員熙寜四年置熙寕四年中書劄子諸路縣分應今實管主户二萬以上委轉運司勘㑹委係䌓劇難治去處保明申奏各置丞一員福清等七縣各實管主户二萬户以上委是䌓劇難治去處許添置丞主簿一員尉一員監海口鎮一員元豐五年置舊巡檢治鍾門鎮稅以主簿監後移海口以巡檢兼監稅熙寕二年主簿監鹽倉兼鎮務許轉運司奏舉見任選人使臣充不限别路元豐三年許提舉鹽事司於京朝官使臣選人内奏舉繼罷舉官之法五年詔於京朝官内選差兼管本鎮煙火今以京朝官充監海口鹽倉一員熙寜中以主簿監尋許奏舉皆兼鎮務紹興六年添差監倉一員廢罷年月未詳十年尚係安撫司奏辟使臣選人窠闕今以小使臣充海口巡檢一員舊置治鍾門巡捉香藥管本澚煙火及長樂海道皇祐之後所差官皆以海口結銜時已移海口嘉祐間復移鍾門鎮稅以主簿監治平元年復歸海口仍兼本鎮煙火公事兼沿海巡檢二年令兼監海口鎮稅熙寧二年徙鍾門稅復以本縣主簿監後移止馬門又移蘇澚今以小使臣充銜帶海口巡檢兼巡欄香藥沿海巡檢及催綱巡捉私茶鹽礬防䕶畨舶松林巡檢一員紹聖五年兼管巡檢防䕶海口鎮官物令以小使臣充銜帶長樂福清松林巡檢専切巡三處地分私煎販鹽公事兼催綱巡捉私茶鹽礬主管巡欄貨物事南匿巡檢一員今以小使臣充銜帶南匿嶼巡檢福清就近水陸賊盜公事兼催綱巡捉私茶鹽礬古田縣知縣事兼兵馬監押一員太平興國以後率用武臣景徳四年兼兵符天禧初始授文吏申縣圖經縣令自薛琪而下至李起凡九政太平興國三年至景徳四年自二十八年復用殿直曹堯廣至喬宗自景徳四年兼兵三政合七年後又更用殿直蕭玠自天禧元年始差文臣計二十一政合五十四年至熙寧以来用京朝官行令事惟古田長溪兼兵符大觀二年林膚銜帶權知縣管勾勸農兵馬司公事丞一員崇寧二年置大觀四年省後復置主簿一員淳化中廢以尉兼後復置尉一員元豐二年増置西尉一員監商稅務二員監水口鎮一員舊有税務以古田縣官兼監大中祥符五年置使臣一員司鹽倉給納遂兼管收稅景祐二年以罷鹽倉省移巡轄馬逓鋪使臣於水口巡捕私茶鹽收稅如初皇祐二年復鹽倉就今本縣主簿兼監并收稅始分使臣巡防主簿監當未㡬鹽倉罷元豐元年復置始専差官任之紹聖二年分命官二員文臣監鹽倉兼商稅使臣専管巡捕尋廢鹽倉遂以監稅兼本鎮煙火公事紹興十年差京朝官今以京官充水口巡檢一員大中祥符五年差使臣一員監鹽倉巡察私販景祐二年減罷移巡轄馬遞鋪使臣於水口都大管當巡捕時兼收稅後専置巡茶使臣一員元豐元年下三班院選差紹聖二年以武臣一員専管私鹽盗賊文臣管鹽倉兼税今差小使臣銜帶水口鎮巡捕私茶永福縣知縣事一員丞一員崇寧二年置五年省後復置主簿一員元豐二年置尉一員辜嶺巡檢一員今差小使臣銜帶福州水福興化軍興化兩縣地分巡檢兼催綱巡捉私茶鹽賊盜公事閩清令一員選人京朝官通差主簿一員尉一員監商稅務一員崇寜三年置舊本縣官兼管丞一員崇寧二年置五年省寧徳縣知縣事一員丞一員崇寧二年置五年省後復置主簿一員元豐二年置元祐二年罷後復置尉一員巡檢一員今以小使臣充銜帶長溪寧徳兩縣巡檢巡捉私茶鹽礬監商稅務一員崇寧三年置政和八年以商稅不滿千貫罷監官仍以縣官兼監羅源令一員選人京官通差主簿一員紹興四年置尉一員監商稅務一員崇寧三年置南灣巡檢一員元祐七年始以兩縣巡捉私煎販公事入銜今以小使臣充銜帶連江羅源兩縣南灣巡檢兼催綱兼管沿海陸路私鹽賊盜巡攔市舶物貨兼管兩縣私煎販主管本澚煙火事懐安縣知縣事一員丞一員崇寧二年置五年省後復置主簿一員尉一員雞菜鎮巡檢一員今以小使臣充銜帶閩候官懐安閩清古田五縣巡檢兼催綱巡捉私茶鹽礬監鹽倉一員鹽倉舊主簿兼監紹興十三年差小使臣一員専監宫觀嶽廟宗室本州十五員添差大小使臣親民各一員小使臣監當五貟宫觀嶽廟共八員初紹興三年三月勑諸州軍添差不釐務宗室每十縣以上不得過十員諸縣萬户以上三員萬户以下二員仍並以二年為任自是本州十員閩候官等十一縣各三員長樂二員淳熙六年􅃯裁定帥府十五員諸縣宗室滿罷更不作闕於是本州止十五員安撫司使臣正任釐務指使二員紹興二年置用江南安撫例置見任小使臣二員添置釐務聽候差使一十員六員紹興二年置四員五年増置添置釐務聽候差使下班八員四員紹興二年置四員五年置添置釐務指使准備差使大小使臣校尉五員紹興五年置沿海緝捕盜賊一員紹興五年置添置不釐務使臣二員紹興十年招汀贛州山寨首領劉賢等八人奏補充散祗候等差遣任滿存留再任後各陞轉官資差充聽候使喚指使作院差遣見五員州司三人本司二人添置不釐務准備差使大使臣三員紹興二十五年置添置不釐務指使散祗候小使臣校尉六員紹興二十五年置添置七項員額共三十五貟見任大使臣二員小使臣十一員下班八員校尉一員副尉十員共三十二人州司使臣正任釐務四員准備差使一貞指使三員舊置指使一員政和七年増置准備差遣一員指使二員見任大使臣一員小使臣三員添置釐務四員准備差使一員指使三員紹興五年置添置不釐務指使散祗候使臣三員紹興十年置添置不釐務准備差使大使臣二員紹興二十五年置添置不釐務指使小使臣三員紹興二十五年置揀汰離軍一百二十員淳熙元年置紹興二十九年指揮節鎮州一百五十員淳熙元年復裁定大使臣二十四員小使臣校尉六十員副尉下班祗應三十六員十三處戰功添差都監監押監當四員大使臣二員小使臣校尉二員願授嶽廟者聽淳熙五年置十三處戰功堂除添差宫觀嶽廟使臣三員淳熙六年置十三處戰功聽候使喚下班三員乾道八年置已上八項員額共一百四十二人見任添差准備差使大使臣十三員添差指使大使臣一員小使臣十二員校尉一員添差使喚大使臣十員小使臣三員校尉一員副尉二員下班八員散祗候下班一員副尉一員共五十三員數雖止此而其他使臣却有溢額者見後項提刑司使臣正任釐務緝捕盜賊四員大觀二年將准備差使改充見任校尉二員小使臣二員添置釐務緝捕盜賊三貟内一員建炎四年置二員紹興五年置此二員通差大小使臣添置釐務指使三員紹興五年置添置不釐務准備差使大使臣二員紹興二十五年置添置不釐務指使六員紹興二十五年置已上五項貟額計一十八員今見任有添差指使小使臣三員添差緝捕小使臣二員校尉一員又添差不釐務緝捕副尉一員不釐務准備差使大使臣二員不釐務指使小使臣五員不釐務使喚小使臣一員下班七員副尉二員共二十四員歸朝歸正歸附忠順官歸朝官紹興六年指揮州置六員見任大使臣一員見借此闕差注紹興三十一年以後歸正小使臣三人歸正官乾道二年指揮紹興三十一年以前歸正人帥府大使臣三員見任大使臣三員乾道七年指揮三十一年以後歸正官帥府十員見任添差有替人大使臣一員小使臣十二員下班七人副尉十四人無替大使臣一員小使臣八員副尉一員共四十四員乾道九年指揮紹興三十一年以前歸正人帥府小使臣六員見任小使臣四人下班二人歸附官見任大使臣一員小使臣一員按自乾道九年淮西總領所發到劉成等一十一員鎮江府駐劄御前諸軍統制司發到孫直等四十員共五十一員添差將領等差遣任滿申奏朝廷乞存留再任見任添差將領小使臣六員下班一員添差監押校尉一員添差指使下班三十九員校尉一員副尉一員共四十九員淳熙三山志巻二十四
