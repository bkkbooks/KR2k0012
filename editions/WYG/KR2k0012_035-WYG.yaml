body:
  text: 淳熙三山志巻三十五宋梁克家撰寺觀類三僧寺長溪一百三十四所慶厯舊記一百六十所有寺額曽師建記一百一十五所鍾世明根刮寛剰一百五十四所淳熙八年縣申一百三十四所内一百七所㑹到有起置年代二十七所未詳建善寺擢秀里齊永明元年置舊號建福在温麻縣背洪嶺之北面黄沙之南所謂安逺里也今寧逺鎮故基自隋廢温麻唐析置長溪尋省西鎮長安中既再置縣景雲二年遂移建寺在縣城東寺碑云邑既遷來寺亦隨至改號建善㑹昌例廢大中四年僧大千令弇奏復之賜大中建善為額有建隆四年威武軍節度館驛巡官儒林郎呉慎辭撰碑銘今存皇朝乾興元年始為禪刹有放生池舊産錢六貫一百五十六文雲峰寺招賢里梁太清元年置舊産錢八百五十三文縣申八百五十五文清潭寺新北里有松山又十里有潭淵然涎沫時沸凌波數丈則雷霆風雨暴不可避闕移月田廬漂溺民甚患之隋開皇二年梵僧闍那崛多曰此龍之變也宜峻佛祠以鎮之後十年乃建寺潭波帖妥耆艾遂目曰清潭當時沙門若溈山祐靈雲勤等十七人皆出於此隋唐之世真修梵境他所莫擬上有洞林巒萬狀尤可愛舊産錢一貫四百二十四文栖善院歸化西里唐大中三年置舊産錢三百六十四文縣申四百文栖隠院西興里十二年置景福元年號景福隠院舊産錢三貫四百七十文資國院亷江里咸通元年置舊産錢一闕六十一文曽記一貫三百六十二文縣申五百六十二文靈巖院西興里同年置舊産錢二貫闕七文曽記二貫六百二十五文闕院平溪里同年置舊産錢一貫闕一文崇仁院歸化東里同年置舊産錢一貫九十七文曽記一貫九十八文龍潭院温麻里二年置舊産錢一百四十七文崇福院温麻里同年置舊産錢七百七十文資福院望海里同年置舊産錢一百四十六文旃檀院萬安里同年置舊産錢七百八十一文石門院歸化東里五年置舊産錢八百五十九文清溪院望海里同年置舊産錢五百四十四文曽記五百四十七文雙溪院萬安里六年置舊産錢八百七十二文曽記八百五十三文縣申同曽龍巖院歸化東里十年置舊産錢四百八十六文縣申四百八十文法林院安民里同年置舊産錢一百七十二文雙巖院秦溪西里十一年後置按鍾刻云龍紀元年造捨入東熟文殊院後因巢賊欲以烹牛乃飛至西熟潭其後潭窒又飛六嶼江皇朝咸平三年迎歸于院舊産錢八百五十五文縣申八百五十文瀑泉院擢秀里十二年置崇寧元年賜額舊産錢五百三十二文中成院温麻里十三年置舊産錢五百三十六文曽記五百五十六文縣申同龜湖院柘陽里光啟二年置始僧惟亮築庵今院之前山有大龜浮湖中沿巖而上僧有所之輒載往既而龜化為石菴鞠為草其徒乃移建今院皇朝景德始為叢林林積仁記舊産錢九百四十八文曽記九百四十五文西雲院安民里三年置舊産錢七百一文崇福院歸化西里同年置舊産錢一百三文曽記一百九文上興福院遙香里大順元年置舊産錢八百六十五文曽記八百六十四文栖勝院温麻里二年置古有十奇㫋檀林文筆峰石鑑軒壽山臺翠蘿屏湛恩池偃松塔湼槃石僊人冡展旗峯元祐中僧繼超始闢新成海印二莊陳祥道為記舊産錢六百九十文曽記七百文慈雲院西興里同年置舊産錢八百九十八文盧巖院温麻里景福元年置舊産錢一百五十七文象山院遥香里同年置舊産錢八百九十五文曽記九百九十五文西峰院仁風里同年置舊産錢一貫八百二十文曹山院沿江里二年置號曹山韞玉東興禪院舊産錢四百一文曽記四百四文馬冠院遥香里乾寧三年置舊産錢一百二十文報恩院柘陽里天祐二年置舊産錢二百三十二文曽記二百三十三文縣申二百三十五文瑞峰院擢秀里梁開平二年舊産錢一百四十文曽記一百四十四文縣申一百四十三文宣聖院柘陽里乾化元年置舊産錢八百文曽記七百九十六文禪寂尼院沿江里四年置舊産錢六十文曽記六十四文縣申同建福院安民里貞明二年置舊産錢五百六十五文曽記五百四十九文縣申五百五十五文清凉院新北里五年置舊産錢五百一十八文曽記五百九文靈應院育仁里六年置舊産錢五十九文曽記四十九文資福院秦溪東里後唐長興元年置舊産錢五百二十文曽記五百二十四文縣申同曽廣福院柘陽里同年置舊産錢一十四文曽記産錢龍壽院縣申作降壽安民里同年置舊産錢二百三十五文瑞巖院擢秀里清泰元年置舊産錢九百九十五文曽記九百八十三文聖壽院柘陽里同年置舊産錢一貫九十四文曽記一貫九十八文保安院柘陽里同年置舊産錢三百五十七文曽記三百三十九文瑞雲院望海里晉天福元年置舊産錢六百一十文保慶院薪北里三年置舊産錢七百九十二文曽記七百六十八文西林院亷江里同年置舊産錢六百五十一文南峰院歸化東里同年置舊産錢三百四十八文保林院仁風里五年置舊産錢三百四十七文地藏院萬安里同年置舊産錢四百三十三文慈壽院安民里漢乾祐二年置舊産錢一百九十四文南禪院萬安里周廣順元年置舊産錢一貫一百二十五文龍居院曽記作龍宫温麻里同年置舊産錢二百二十九文地藏院温麻里二年置舊産錢二百四十八文縣申二百四十二文六禪院萬安里三年置舊産錢一百四十六文曽記一百五十六文資壽院擢秀里顯德二年置初為保明院大中祥符六年勑改今額舊産錢三貫四文曽記二貫八百五十文龍泉院擢秀里同年置開寶中號開寶龍泉舊産錢三百七十九文曽記三百四十四文五臺院安民里三年置舊産錢六百二十八文天王院遙香里四年置舊産錢一百五十七文曽記一百五十六文南峰院萬安里同年置舊産錢四十五文曽記三十五文報親院温麻里五年置舊産錢三百一十一文曽記三百七文報慈院萬安里六年置舊産錢二百六十文曽記二百三十文延壽院柘陽里皇朝建隆元年置舊産錢一百四文縣申一百四十文福興院遙香里二年置舊産錢五百五十八文曽記五百五十四文廣應院柘陽里同年置舊産錢三百三十四文縣申三百四十四文招聖院擢秀里乾德元年置舊産錢一百二十七文曽記九十五文洋門院擢秀里同年置舊産錢四十一文曽記二十一文縣申二十七文仁王院秦溪東里二年置舊産錢二百二十二文法華院招賢下里同年置初為靈瑞治平元年勑改今額舊産錢一百六十三文曽記一百二十九文縣申一百六十二文廣濟院擢秀里四年置舊産錢二百七十一文寶勝院曽記寶慶縣申作寶勝柘陽里同年置舊産錢五百七十三文縣申五百七十七文白蓮院秦溪東里同年置舊産錢一百八文雲峰院柘陽里五年置舊産錢六百九文雲林院秦溪東里同年置舊産錢六百五十一文靈泉塔院擢秀里同年置舊産錢四百七十四文明宗塔院萬安里開寶元年置舊産錢八百二文南峰院新南里同年置舊産錢二十文應慶院同里同年置舊産錢六百一十文資崇院新北里同年置舊産錢五百九十四文靈泉院安民里同年置舊産錢五百三十四文興慶院西興里開寶元年置舊産錢五百二十九文興福院擢秀里開寶四年置舊産錢九百六十一文福生院望海里八年置舊産錢一文金光明院温麻里同年置舊産錢八十文越峰院同里同年置舊産錢六十文觀音院西興里九年置舊産錢三百六文祥雲院同里同年置舊産錢三百六十文寶幢院西興里太平興國元年置舊産錢一百二十二文善積院新北里同年置舊産錢五十一文華嚴院温麻里太平興國七年置舊産錢四百八十四文惠日院温麻里雍熙三年置舊産錢五百九十五文西禪員果院萬安里四年置舊産錢二百一十文曽記三百五文目連院温麻里淳化四年置舊産錢五十文國興院望海里大中祥符四年置太姥山舊名才山力牧録云客成先生嘗棲之今中峰下有石井石鼎石臼存王烈蟠桃記堯時有老母以藍練為業家于路旁往來者不吝給之有道士嘗就求漿母飲以醪道士奇之乃授以九轉丹砂之法服之七月七日乘九色龍而僊因相傳呼為大母山下有龍墩今烏桕葉落溪中色皆秀碧俗云僊母歸即取水以染其色漢武帝命東方朔授天下名山文乃改母為姥林嵩記云先是無寺祥符間僧師待始築居於此乃圖其秀抜二十二峯示林陶陶因名之新月天冠神羊毬頭寶强僊女僊童􅋖㐲迎僊象簡呈珠團玉碧鍔怪石三靈抗天捧玉摘星飛葢靈龜龍角天圭山凡有三十六奇僊掌石虎摩霄懸鐘石笋天柱撥雲闕琕子蓮花石鵶飛僊碁盤隱真林嵩草堂嵩唐咸通初山居讀書嘗作草堂今基猶存舊産錢一百三文曽紀八十八文涌泉院温麻里天禧元年置舊産錢四百四十七文金剛臺院擢秀里天聖元年置舊産錢一百六文曽記一百文報福院温麻里三年置舊産錢五百七十六文羅漢院欽德里七年置舊産錢一百九十文曽記一百二文縣申一百一十文山門院育仁里景祐二年置舊産錢一百二文曽記六十二文觀音院擢秀里慶厯六年置舊産錢四十七文觀音院遥香里至和元年置舊産錢四十五文保巖院招賢下里熙寧七年置舊産錢二百七十九文漳洋院安民里同年置舊産錢四十一文曽記作漳潭無産錢闕明院亷江里元祐九年置舊産錢八十八文曽記三十八文西山尼院萬安里元符二年置舊産錢二百七十文報恩山院擢秀里舊産錢二貫七百二十六文曽記二貫七百九文報德院同里舊産錢一十一文西方院新南里舊産錢一貫八百八十二文曽記一貫八百七十八文資聖院西興里舊産錢一貫一百一十八文曽記一貫一百四十八文廣化院遙香里舊産錢八百七十五文曽記八百六十六文縣申八百七十七文大疑院仁風里舊産錢八百一十五文棲林院同里舊産錢四百八十一文報恩院同里舊産錢二百七十八文曽記二百六十六文縣申二百三十八文興雲院同里舊産錢四十文僊聖院歸化東里舊産錢四百八十五文曽記四百八十三文縣申五百一十五文棲雲院歸化西里舊産錢三百七十三文縣申三百七十二文白蓮院温麻里舊産錢四百一十八文靈瑞院同里舊産錢二文曽記無産錢中峰尼院沿江里舊産二百三十四文報恩院萬安里舊産錢三百一十二文縣申一百一十二文藥師院同里舊産錢一百九十七文曽記一百八十四文建福院同里舊産錢五百二十六文北山尼院同里舊産五百二十三文曽記無産錢觀音院同里舊産錢八十九文曽記二十九文松嶠院新北里舊産錢一百九文光化尼院同里舊産錢一百一十八文青雲院秦溪東里舊産錢九十八文寶林院同里舊産錢九十文安福院望海里舊産錢三百六十二文鳯嶺尼院同里舊産錢九十五文保院招賢下里舊産錢八十四文鏁泉院平溪里舊産錢三十九文曽記三十三文縣申三十二文已上三十七所未㑹到起置年代興聖院舊記唐中和元年置曽記萬安里産錢三貫一百一十六文禪巖寺舊記陳天嘉六年置禪林寺舊記梁太清十年置輝光寺舊記景雲二年置已上四所今州籍並無長樂縣七十九所慶厯舊記八十所内一十六所有寺額曽師建記八十三所鍾世明根刮寛剰七十七所今州籍七十八所縣申一所内七十七所有起置年代二所未詳靈隱寺逍遙里梁大通二年置縣申咸通元年置舊産錢三百七十五文皇恩寺方樂里太清元年置縣申咸通八年置唐咸通九年賜潘誠詩睿澤潭來數百年海山髙處冇祇園禅林自是三三界塵世誰知十二門詩客迢迢尋義路禪翁特特起談軒香爐頂上垂東注萬𣲖分明出一源舊産錢一貫二百九十六文决澗院敦素里同年置縣志作咸通四年林瀆捨地創陳毅詩逺歸滄海通舟楫近洗山僧一片心留與卧龍成窟穴等閒飛去也為霖舊産錢一貫六百四十一文光嚴寺仁義里陳太建元年置初土人嚴光之子恭商維揚舟次江滸市黿五十而舎之光家居一日被黒衣者五十人送緡錢五十曰君之子恭維揚所附還也及恭囘騐之實未嘗有乃悟贖黿之故遂舎宅為寺田為湖因以為名寺背二里有瀑布下有白龍潭舊産錢二貫五百八十九文光澤院崇賢里唐天寶二年置初僧光蟾庵此夜現神光因曰普光後改今額舊産錢一百四十八文建林院廉風里永泰元年置縣志施主陳蘭創舊産錢五百七十五文泗明院永勝里大中六年置縣志厓人陳省創以泗洲像名舊産錢一貫五百八十八文天王院賔賢里大中七年置初有檀木遡江潮而上牧童取之夜中發光里人林錡夢其木謂我北方毗沙門天王遂捨宅為寺亷帥闕公奏賜額曰靈感天王寺寺有天王閣檀像今存闕烟蘿亭慶厯中縣令董淵立枕流軒皇祐中縣令兵仲舉立連江尉林伯材詩誰在紅蓮陣裏行泠泠飛玉抱山清㡬畨人世興亡夢千古雲涯黯淡聲春暖蘚花隨雨到夜深寒月落溪明倦懐一枕清凉地斗藪塵埃羽翼生縣令闗希哲詩山出太虚外溪流千古髙臨牕喧客枕洗耳濺僧袍夜月氣猶凛秋風聲更豪二年甞賞劇欲别首頻搔清心亭皇祐中縣令余侻立松石峰嘉祐中縣令王企立詩云老樹隂中閒日月小池波面醉家鄉運判蔣之奇詩晚向津亭泊畫船忽逢佳處在雲烟松根化作千峰石山氣蒸為一澗泉祖意共看亭下柏禪心同結社中蓮明朝輿轎還躋嶺聊借僧房一覺眠閩清令彭次雲詩連登雲級上危巔松石嶔崟掛晚烟好是囘頭遥望處海波如滯石如拳樂壽臺嘉祐中縣令胡昱立望江亭熙寧中縣令蕭竑立詩云滄波水上嶺崔嵬中有幽亭向水開草色直連天色逺風聲長送浪聲來雲收山脚雞園見潮滿航頭釣艇回咫尺市㕓塵不到檻前鷗鳥自毰毸竹溪陳傳詩山藹峩峩江岸深望餘亭影落江心無風萬里磨平玉有月千波􅃞碎金思逺解邀無好句流清宜寫不齊琴僊槎一棹驚秋曉此去銀河尚㡬尋舊産錢二貫四百一十二文曽記二貫四百四十一文靈峰院良田里同年置初僧恩卓庵千溪潭上有石洞嘗見龍乘雲而歸里人施志為創寺號龍龕山靈峰院八年賜額及圖書陳密學㐮詩天柱支南極蓬山壓巨鼇雲崩石道險潮落海門髙客館聞鼉鼔秋風憶蟹螯凭欄望鄉井千里楚江臯知縣董淵詩礧硌彌沙界谽谺古洞天門隣金布地橋枕玉鳴泉庭鶴歸迷主龕龍去失年掃雲嫌俗駕題壁詫詩僊勝景無今古居人有後先不知遊者馭誰見海為田程大卿師孟詩階前玉水供千指缽裏金沙飯百年運判蔣之奇詩龍歸一餉雲􅃒洞猿呌三聲月滿山張徽詩雲蒸洞穴秋成雨泉落庭除夏結氷湛俞詩禅林瀟灑􅀝危巔税駕登臨思豁然萬里碧光晴望海一堂幽響夜聽泉寒龕龍卧清凉地古㓊雲歸暗淡天好景自嗟唫不盡擬凴圖畫寄詩僊縣令蕭竑詩怪石參差蹲虎兕亂峰重疊走龍蛇連江陳珏詩石洞雲歸春雨足海門月上夜潮生羅源林迥詩門前紅日海千里池上白蓮山四隣僧子耶詩松欺臘雪千年翠竹引溪風六月寒歸雲洞邑佐曹元振詩石洞興衰亦有時因師移錫致雲飛雲心莫道全無著應解從師去復歸陳毅詩雲道無心亦愛山雨餘時向此中還而今天下焦枯甚只恐蒼龍未放閒翠亭嘉祐中縣令王企立有詩嵐光入坐茶甌緑海氣逢春柱礎腥望海亭熙寧中張運使立有蔣運判之奇詩香爐峰放生池舊産錢一貫三百八十一文竹林寺崇賢里十一年置見縣志舊記作梁太清元年置時戸曹林勣觀大厯二年釋法照遊衡州雲峰寺堂食次鉢中忽五色雲現雲中有寺寺有金牓題曰大聖竹林寺嘆異之以居脩篁千畝遂捨為寺藏經寶函藏經五百餘函内有寶函一乃乾德中得之于海上以巨螺乘之發函乃妙蓮經也前賢詩云昔聞僧觀雲中瑞今得函浮海上書龜山寺後主山其形若龜蔡公襄嘗至親筆勒于石有運判蔣之奇詩白龍巖寺背乃唐末甘蔗洲白龍院僧遁于此後人誌之安適軒唐最詩卧聽潮音坐看山烟蘿静處閉禪闗都將物外紅塵隔占得壺中白日閒吟罷寒猿號木末定囘清磬落雲間髙僧隠几無餘事應笑勞生去又還白雲亭溪㑹亭昔元祐中縣令袁正規立三十六庵白蓮慈氏上方隣溪華嚴慈雲普雲地藏龍溪瑞應觀音文殊普賢天冠白龍龍丘釋迦白雲寶積靈源泗洲歸雲延壽香嚴彌勒凌雲龜石廣平彌陁積翠藏院懴堂乾懿功徳堂育王塔羅漢院凡三十六所皆唐末同興慶厯中併為禅寺庵始廢舊産錢二貫八百九十九文龍泉院清平里十三年創庵見縣志舊記作梁承聖四年置時有僧師邑人曰懐海甚謹一日令浣巾乆之師詰其由曰適見青黄二龍戱井中乃以鉢往貯以示師師心異之因令遊方後果於百文開山著叢林規式盛行於世咸通中嘗録所受業及見龍之由奏之乃賜今額舊産錢一貫五百四十三文新成院崇化里同年置縣志作十四年里人林烈創舊産錢一貫三百七十二文曽記一貫三百五十七文縣申一貫五百八十八文五雲院崇仁里同年僧道深創庵清晝澄霽五色慶雲旋覆其上咸通初黄璟創院二年賜今額舊産錢四百七十五文碁山院新開里咸通二年置後西峯頂有石臺耆艾云昔有二僊於此枰碁知縣董淵詩風際有雲多世態海中無底是人心可堪更問碁山話一局閒爭古到今舊産錢一貫八百八十一文北崇信院大宏里同年陳皎捨地創舊産錢一貫四十六文曽記一貫九文縣申一貫四十八文福興院崇丘里同年林遷創後唐清泰初賜今額舊産錢二十五文縣申九十五文南觀音院同榮里四年陳公薦創十年賜今額舊産錢一百四十九文觀音寺賓賢里同年置本大夫王想之宅宅背有巖中有古觀音像像後芝草覆焉因舎為寺石屏慶厯中監司蘇邵二公刻去華才翁四字見江亭元祐中縣令袁正規立有詩地産靈芝古道場危亭陡起負重崗江心逺疊通潮浪海外遥分異域疆繚繞人家依縣市寂寥烟景認呉航倚欄望斷暮雲碧不見長安見夕陽舊産錢一貫二百五十文雙峰院方安里五年林秦捨地以創舊産錢一百一十五文金砂尼院建興五年置舊産錢六百三十文曽記六十三文當陽院同榮里六年置以面東名髙亭嘉祐中縣令王企立山月堂有陳郊詩舊産錢八百一十八文南崇信院崇丘里八年置舊産錢四百八十二文禪林尼院仁義里同年置寶元二年併為十方舊産錢一貫七百五十八文靈光院海賓里九年置林榮以其地夜發光晝掘之獲古像首遂創院以像首重塑同光中賜額舊産錢八百二文北靈山院敦化里同年置十年賜額舊産錢一貫二百二十六文靈鷲院昆由里同年置縣志係此年里人馮吉創舊記作梁大通二年置耆老相傳先有二塔飛來僧云佛說法二寶塔涌地即靈鷲峰也因以為名塔為中朝所取後人以塼為之志其所也旣而院移溪上故基惟二塔存舊産錢二百九十一文龍宫院絃歌里乾符三年陳朏創舊産錢九百八十七文靈握院嵩平里廣明元年置以開山僧能伏靈蛇故名舊産錢二貫二十九文南棲林院泉元里中和元年置邑僧師晉孤潔樂處山林林邵舎地以創舊産錢三百三十六文阮山院泉元里二年阮氏創舊産錢三百二十文曽記三百二十二文縣申三百三十三文興國院建興里大順二年陳蘭創以祈國祚興隆故名舊産錢二百一十四文南陽院千零里景福元年福清僧宗岳卓庵林濟舎地創舊産錢六百九十文曽記六百九十五文祥雲院方安里光化二年置去院三里有潭時有毒龍僧彦希善呪術日誦以降之鄭堙為創院曰龍樹皇朝治平初改今名舊産錢七百五十一文巖泉報恩院敦化里天復二年監軍李柔創舊産錢一貫八百八十二文福安院亷風里天祐二年僧皓琛廬於山之陽右軍太尉張彦縱為建刹目曰董平閩王易以今額琛師示寂其徒律學星處景祐初更為禪寺元祐二年林闕記福山郡國志云上有神人祼身散髪人見必有福因以名之呉先主時董奉嘗隠此山往來南海以靈丹起死疾後輕舉于豫章之杏林北山之名遂著董巖奉嘗於此煉丹後從頂峯上升履跡在焉人指其處曰董巖舊産錢一貫三十四文靈瑞院方樂里同年以僧德冲卓庵有異呉賢等為創院舊産錢二百八十三文南福興院靈石里同年司議潘季翔捨田創舊産錢一百四十二文西峰院昆由里梁開平二年里人陳禔捨西山之地以創舊産錢一貫四百二十九文淨林院崇丘里乾化二年尼法政創皇朝明道二年改僧住持舊産錢八十六文新安院信德里後唐同光元年鄭暉募建舊産錢二十八文縣申二十六文秀峰院嵩平里長興二年南安縣令陳鵠創鮑承議詩平田千頃緑秧稠水遶山阿出澗流門掩落花春自晚畫簷時聽鳥聲幽舊産錢二貫五百九十二文資福院敦化里清泰二年置舊産錢七百一十二文棲林尼院招賢里晉天福二年陳由捨宅尼善縁創舊産錢二百八十三文小門院靈石里同年陳圖創舊産錢一百七十七文幽林院崇丘里同年陳塔捨地僧法誨創舊産錢六百三十七文南崇福院泉元里同年北嶺崇福僧紹澄卓庵里人為創院太平興國七年賜今額舊産錢二百三文寶藏院昆由里三年周角創以漁人於江上獲寶函首置於此故名圅復入竹林寺舊産錢五百六十七文東庵院泉元里四年陳將堅創舊産錢四百六十六文甘泉院賓賢里九年雪峰僧守稠卓庵施水里人卓垂逺舎地黄仁偉創甘泉普濟茶院開寶七年張正字記刻石前西塔下云平險道以利行人施義泉而資渇者義漿亭舊曰茶亭嘉祐中改名舊産錢八百七十一文北崇福院敦化里十年端州司馬陳􅙒里人林懐振創舊産錢一百二十二文三峰院崇丘里漢乾祐元年歐陽遂舎地創太平興國三年賜今額登龍山石塔院附焉距縣二百步上有登髙亭林修撰安上創因以名山後累石為浮屠七級今以其亭為僧舎矣舊無産錢西崇福院崇丘里同年林渠捨地創舊産錢五十文妙峯院方安里二年林思順捨地創舊産錢七十六文廣順院絃歌里周廣順元年黄迫捨地創舊産錢四百四十三文曽記二百七十一文瑞峯院同榮里二年太保王紹齊以開山僧居巖間常有烟雲覆葢以為瑞始創院縣令董淵詩石屏樹幄白雲端溪路生苔樹石間閒訪禪家問塵世總言塵事不相干有運判蔣之奇詩垂露亭慶厯中提刑蘇翁刻字於石屏舊産錢一貫三百四十九文鴻慶院崇仁里皇朝建隆元年黄穗捨地創天禧二年始係帳立今名舊産錢二十九文曽記三十三文地藏院永勝里同年王延賀創舊産錢三百九十一文靈源院同榮里開寶二年僧守堅創舊産錢二百五文曽記二百二文永壽尼院昆由里三年黄韶捨地尼守縁創舊産錢三百一十七文靈山塔院崇丘里同年嚴氏捨地創因開地獲寶塔故名舊産錢一百二十八文華藏院崇仁里九年里人黄泉於此守墳誦華嚴藏後創院舊産錢九十八文極樂院同榮里太平興國元年潘勤創舊産錢四十六文文殊尼院重興里同年尼行證募創舊産錢一百三十六文北觀音院絃歌里二年陳隆創舊産錢三百九十一文曽記三百九十七文資壽院逍遥里同年僧傳宗得陳訥所居以建舊産錢一貫四十八文曽記一貫五十一文南甘泉院靈石里同年僧惠勇於此守父母墳至九年周文鐸創院舊産錢三百四十七文寶林院千零里同年置初名棲林治平初賜今額舊無産錢乾元院泉元里七年州乾元寺僧至長創舊産錢二百四十一文保福院泉元里同年置先是益州僧惠文入閩至此見紫雲覆其上遂卓庵曰瑞雲至是林帑創院易今名舊産錢四百五十五文資聖院賔賢里八年翁縁創舊産錢一十八文越峰院敦化里同年王俊捨地創舊産錢一百六十六文靈臺院千零里同年林建等同僧義璉創舊無産錢報恩院和風里九年巖泉報恩僧元應創因以為名舊産錢二百六十五文曽記二百六十六文縣申同曽龜石泗洲院清平里同年置有石如龜因塑泗洲像舊無産錢中峰院嵩平里端拱初陳珂捨地創舊産錢一百四十三文報先院同榮里二年潘吉士創舊産錢一百六十四文大溪新豐院良田里淳化二年劉謙等創以地名大溪其源深逺漑田頗多歲常豐稔故名舊産錢四百二十八文縣申四百二十六文南山塔庵賔賢里舊無産錢已上州籍普照庵同里舊無産錢係縣申巳上二所未㑹到起置年月縣山寺舊記大同五年起興國寺舊記太建年置靈芝寺舊記永泰元年建成查已上三所今州籍並無淳熙三山志巻三十五
