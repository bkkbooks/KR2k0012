body:
  text: 淳熙三山志巻八宋梁克家撰公廨類二啓運宫奉迎神御所神御七殿今州東開元寺始景德四年眞宗詔西京建院藝祖誕聖之地迎奉神御祥符中賜名應天天禧以後至建中靖國六聖神御相繼為前後殿前曰繼明後曰㑹眞政和七年詔三門外立額曰應天啓運宫建炎元年十二月遷東京景靈宫四年二月令幹辦官李􅑸迎自温州權奉安福州三月至自温州七殿神御四殿御容遂奉安開元寺大殿紹興三年九月勑以啟運宫奉迎所為名社稷壇風師雷雨師壇附舊社稷壇州南七里並城以西地汙濕遇祭報趣戒閩候官縣吏辦治唐大中十年觀察使楊發始遷於其西今南澗寺之東為社稷及風雨師壇四天寳四載詔風伯壇置社之東雨師壇置社之西各稍北三數十歩卑小於社壇五載詔遇祭雨師宜以雷師同壇共牲别置祭器時蓋用此制也廣狹髙下有制度齋廬皆具周回三十有九丈七尺繚以崇墉為門東鄉其外闢二室南立雙表既成命攝巡官濮陽宁為之記以防改易閩遷新社記攝館驛巡官前鄉貢進士濮陽宁撰大中十年夏六月公命遷社於州坤凡築四壇壇社稷其廣倍丈有五尺其髙倍尺有五寸主以石壇風師其廣丈有五尺其髙尺有五寸壇雨師廣丈而髙尺自初獻訖終獻專一室有厦横附二室皆南鄉備犧幣西鄉之楹凡二室龜塼脊道凡十有三條其縈折則三百九十有七尺繚垣凡百堵其髙迭尋苞巨榕凡二十本南北行延崇甍展階揭雙扉以東鄉具扄鑰焉其外北東闢二室有厦其南立雙表及逵功以十七日戊子起冬十一月庚子畢謹案閩故壇坫南邪西隙蛙蟹洿輳負蒲葦之濠家禽野牧觸踐無禁至祈報時率戒閩候官責辦與胥譁尼權事其晴也雖重菅不免於濡舄其雨也必撑蓬以護緌凟神勞人未嘗有寤者元侯關西公既涖閩其春具郡儀即社喟然顧曰吾曏理蘇厥壇惟更仍歳穰穰蘇人宜之今閩澆訛期將不革首在兹乎由是擇謹事者行故壇西躬取其地授之節餼嚴帑非隠者除鳩工以掉畚斵材以陶坏肩有歡謳杵無怨築故擘錢垂十萬不徭一丁不歛一户而爽潔開拓四壇鏤焉夫遷社於州坤右位也不書稷風雨尊社也禮稱諸侯為百姓立社曰國社而厲山氏之農棄輒隆焉共工氏之后土勾龍兼饗焉風秩雨班光昭舊典蓋先聖王尊以示本均以行政未之改也惟我元侯敬恭於上撫臨於下戢苛薙慢顯晦咸寧繁條隂森如肅其享自然克靈克序德致元侯而施於一方也是月牙將翁行全牘其績歸成於公公曰壇邇浮屠祠爭出眉睫吾患將來有醉浮屠者或易於遷徙焉茍非䥴􅅣則本末無所彰遂以記徴百僚宁宁不得辭且拜命之辱謹用二十九日戊辰獻記云其碑𨽻書今存偽閩時乃以其地為佛祠而遷壇於烏石山之隂今道凊寺之側皇朝元祐六年柯龍圖述闢而新之建齋㕔中門外之西為祭器庫政和元年詔立州縣社稷風雨雷師壇之式頒圖於天下是歳四月江東提舉沈延嗣奏天下州縣社稷壇壝大率皆不如法乞按式作圖鏤板頒下仍於壇壝之外别為大牆圍之外建一門常加封鏁於齋㕔立石刋刻増立法制守令上之三日躬詣壇所按圖修治從之九月孫龍圖琦立碑社壇今存於是移風師壇西門外龍山寺之西移雨師雷師壇北門外法雲寺之東惟社稷壇仍舊政和五禮新儀州縣社壇方二丈五尺髙三尺四出陛稷壇如社壇之制四門同一壝二十五歩風師雨師雷師壇皆卑小於社四出陛四門皆一壝二十五歩療壇於神壇之左壝之外稍髙於神壇􅄟坎於壇之北壬地南出陛方深取足容物廟學廟學舊州西北一里唐大厯七年觀察使李錡移城南始補生徒三十獨孤及記成公始至禮先聖先師歎其湫隘乃助其地而大之貞元元和間學者益盛乾寧元年王鴻於州四門置義學梁龍德元年忠懿置四門學以招徠四方之秀呉越時作新宫號使學逮屬皇朝學制廢壞太平興國中轉運使楊克讓始作孔子廟景祐四年權州事謝微表請於廟立為府學從之是年八月二十九日勑福州奏㨿試助教黄洵武及進士鄭洙等一百一十三人狀伏見節鎮舊規許將宣聖廟立為府學頒國監之墳史給官籍之田疇雖廟貎攸存尚虧工葺乞脩門宇陳請監書許從建立當州體量所管一十二縣僅二十萬餘户文物彌盛仕進實繁雖嚴宣聖之學堂未興府學之制度伏望特頒芝檢許復杏壇建立儒宫恢張聖域候勑旨牒奉𠡠許將文宣王廟立為府學所乞經書仰依近降指揮備錢於國子監贖置五年二月一日勑令本州勘㑹於逺年係官荒閑逃田内量撥五頃充州學支用詔下微適罷去范都官亢許駕部宗夀踵其事歴五載乃成糜公帑錢千萬植宇六十楹中設孔子與其徒髙弟者十人像又繪六十子及先儒以業傳世者於壁有九經閣三禮堂黌舍齋廬旁翼兩序庖次井飲百用皆給康定二年沈都官邈増賜田延舊儒敷講經術乃立課程要束以示學者是年朝奉即祕書省著作佐即充館閣校勘蔡公襄撰廟學記并書治平圖進德坊内之北有文宣王殿今興賢坊是也熙寧二年圖進德坊之北又二州學坊坊内之北為文宣王廟是時廟學皆從西出也元祐外門自中門之南於是南出熙寧三年災郡人韓昌國劉康夫等二百人以狀言於府請自創蓋無費縣官一錢程大卿師孟許之既而十二縣之士各以狀請於令如昌國等不一月集錢三百萬為門為殿為公堂環列十齋以居學者如其舊公堂之後又别為室以藏書為堂以講議為齋以處師長蓋合百有三十間自孔子以下至十哲塑像冕服更請制度自朝廷頒䧏熙寧四年五月中書批送下提㸃福建刑獄沈即中狀福州文宣王廟州學為火延燒淨盡及百姓人家一百三十七間州司見將本學官物収買材植蓋造次伏見至聖文宣王及亞聖十哲從祀之人諸州塑像冕服之制多有不同蓋是朝廷未曽頒降制度乞明降指揮後批送太常禮院檢坐牒報學成之數年編修林希為記然自是以前養士歳纔十數人元豐初始増至數十時孫公覺奏増安福寺籍沒田范擴為記元祐八年王袐監祖道始至顧視狹隘不足以處多士乃斥東西序之北二百四十尺増為齋十合舊齋十而小學在中門外之左客次在中門外之右外門直中門之南歳補生員五百紹聖改元王公祖道自為記崇寧元年舍法行始自朝廷選擇教授増養士之額益廣為三百五十一區是年十一月准轉運衙牒准勑罷開封府觧額除量留五十名取土著人外餘並改充天下貢士之數約度所在應舉人數多寡别立定額所有諸州軍額各取三分之一添充貢士郡大或應舉人多則度地之宜或因舊増廣量合教養人數置立舍屋自朝廷選擇教授分教天下以太學三舍校試法刪立頒降其升補上舍者聴每二年貢入太學每州知通依發觧條管勾每路選委監司二人提舉知通每十日一詣學監司一歳巡遍所部州學有御書稽古閣二即舊九經閣也後改名經史大觀二年御筆比聞諸州學有閣藏書皆以經史名者方今崇八行以迪多士尊六經以黜百家而史何足云應已置閣處可賜名稽古今書閣一養源議道駕說堂三今養源堂一齋二十有八審禮由智祖義隆仁崇德事道興能賔賢尚志逢原愛日譽髦乆中端身通理嗣音明善抜萃遜志依仁養浩育英致道烝髦壯猷制勝小學自訟其後舍法罷尋省為十二齋養士二百人興能事道崇德時習祖義由智在東廡明善嗣音通理端身隆仁譽髦在西廡外職事位四祭器樂器庫各一印書庫一有先賢堂慶厯皇祐間陳先生襄鄭先生穆劉先生彛皆已登仕籍鄉人尊師之與周先生希孟陳先生烈同號五先生紹聖初賢良陳賜始與提舉陳敦夫請置祠於學郡守温公益從之遂立五先生祠政和中黄尚書裳復以閩清校勘陳公祥道解經以悟學者宣和中余太宰深復以候官劉公康夫教授諸生為多其後又以福清鄭公俠節義著間並圖像於學先是唐觀察使常衮配享學官政和中柯暘為漕自試院遷其父龍圖述生祠於學遂並稱為十先生又其後王端明祖道亦以有功於學祀焉紹興九年張丞相浚言常公首倡儒風不可與後來者並列乃位常公於中益以歐陽詹與諸公列左右乾道間有言陸公祐亦鄉先生宜祀者於是為十三人襄字述古候官古靈人氣古行髙與鄭先生穆周先生希孟陳先生烈為友時學者方溺於彫篆之文所謂知天盡性之說皆指以為迂而莫之講四人者獨以斯道鳴聞者笑之不為變守之益堅躬行於其家而達於州閭皇祐初知河陽縣富鄭公弼移鎮河陽厚遇之㑹入相以文學政事薦召試秘閣校理判尚書祠部權貴人奏乞寺觀名額且度僧道上令議先生執奏言近年以來自宫闕宧官以及要近一例陳乞蓋秉政大臣不為陛下愛惜典刑臣不敢奉行尋知常州熙寧初召脩起居注知諫院管勾國子監薦常秩陳烈管師常程頥經明行修宜召為太學官遷知雜侍御史論青苗可罷召試知制誥先生言論事未能開悟聖意不敢就請外補上批其䟽曰朕慕卿經術行巳深惜逺去遂復修注尋知制誥兼直學士院適河決河北有詔先生視草以水不潤下為言中書改之乞知陳州召還知通進銀臺司除樞密直學士判太常寺兼侍讀卒年六十四有文集三十巻紹興初上得先生所薦司馬光以下三十三人奏草降詔褒嘉焉穆字閎中篤學修飭厯國子監直講太常博士熙寧中為岐王侍講陳先生襄為臺雜䟽言府僚不可不謹擇人神宗曰如鄭穆德行乃宜左右王也出知越州元祐初入為國子祭酒時楊王荆王請為侍講除直集賢院楊王賛善太學諸生復上書乞為師範除祭酒未㡬請解職許之五年除寳文閣待制復為祭酒踰年乞骸骨提舉杭州洞霄宫闕中范祖禹上疏穆年雖過七十祭酒為國子師非藉其筋力願留之以示朝廷貴老尊賢之意太學諸生請留者亦數百人皆不報公卿大夫太學之士設祖道供張於東門外辭决而去卒年七十五希孟字公闢通五經尤邃於易取孟子闢楊墨之義以為名而字焉初與鄭先生穆為同志友後得陳先生襄陳先生烈相與講貫力主斯道既而劉先生彛以問學顯名復與定交學者師慕之知州劉公䕫曹公頴叔蔡公襄皆親至學舍質問經義既而部使者相繼論薦詔賜粟帛授將仕郎試國子監四門助教充本州學教授先生三表力辭不許尋以病終年四十二門人曽伉陸宣朱敏中許將曽黙范鏜陸術王晦林璋等七百人相與塑像立祠堂於崇福寺元符中太守率寮屬致奠焉有詩義十巻易義十巻春秋義三十巻雜文二巻烈字季慈甫年十四繼失怙恃水漿不入口五日自壯迨老恪奉如事生特立獨行非禮不言不踐雖御童僕如對大賔慶厯中蔡公襄為守下車之始以書問閩俗利病先生條利害二十篇獻之嘗謁襄留建溪灘詩以諷之襄為霽威嚴先生通三代之禮凡㛰冠䘮祭悉遵行之雖博學如陳先生襄劉先生彛皆問禮焉皇祐五年周先生希孟及郷老柯懐祚等舉先生文行太守以聞詔授將仕郎試秘書省校書郎本州教授三表辭不許復授守安州司戸叅軍充國子監直講又辭元祐元年授宣德郎致仕其後監司復薦落致仕為州學教授改京秩凡六考不願磨勘不受廪祿敝衣糲食裕如也卒年七十六有孝報經三巻授其子丞寡彜字執中少師事安定胡先生初為朐山縣令恤孤平賦斂作陂池教種藝振㳺惰或類其事為一書曰治範熙寧二年召對言聖人之道有體有用自文取士不以體用而尚聲律浮華則風俗偷薄上恱授都水監除兩浙運判移知䖍州歳饑民多不舉子俗尚巫獄訟尤多彜為三勸以諭之在任四年奏課連㝡加直史館知桂林以元祐六年卒年七十先生著書以皇極為本述七經中義有文集三百二十巻至俠字介夫嘗從王安石學舉進士調光州司法秩滿京師㑹安石秉政為具言青苖免役用兵之害不答復數以書論之亦不報乆之監在京安上門時初行免役及収市利錢㑹大旱河東北陜西流民入京師先生畫圖為書勾馬遞以聞曰如行臣之言十日不雨乞斬臣以正欺罔之罪又自劾擅發馬遞上覧疏歎息終夕不寐翌日詔韓維等體量發常平倉放商稅務及諸門稅錢三十文以下市利錢二十文以下青苗免役方田保甲並罷凡此類十八事民間讙呼相慶遂下詔責躬求言越七日大雨上出圖示宰執且責之安石遂力求去薦吕惠卿執政先生上書言安石本為惠卿所誤今復相㧞援以遂前非不為宗社計又疏切諫用兵他語譏大臣甚衆并詆臺諫如芻靈木偶惠卿怒以為謗訕編置汀州移英州先生徒歩赴貶所居十年陳先生襄在經筵薦司馬光而下㝡後言先生忠直哲宗登極放還用蘇軾孫覺等薦除泉州教授秩滿諸生借留州奏得再任元符元年再貶英州徽宗登極遇赦東歸復為泉州教授崇寧初又勒停尋復將仕郎卒年七十八建炎間詔錄熙寧元祐忠讜子孫中書舍人林遹以聞紹興初贈朝奉郎授孫嘉正官嘉正終朝散郎知建昌軍詔祥道字用之博學尤精於禮嘗著禮書王安石以聞尚書給筆札以進除國子監直講遷館閣校勘兼太常博士卒年五十二有論語解行於世康夫字公南從周先生希孟學知州張公伯玉元公絳程公師孟皆慕重之熙寧中五路置學官有請以康夫主畨禺學進志述二十七篇其文皆羽翼詩書根柢仁義元祐三年以六舉該恩先唱名二日卒年五十三鄭先生俠表其墓祐字亦顔刻意學問為莆田簿荆湖廣南路宣撫司准備差遣福建茶事司幹辦公事所至有惠愛察識寃枉於茶法講究尤不苟每謂㩁無良法能以仁恕存心寛其禁網使公家不失大利之源足矣與使者論辨不屈泉南當海舶運輸之衝使者欲復市易公曰此漁奪之術言之切至乃止盡心職事不求榮進或勸以治生笑不答讀論語尚書中庸大學反復玩味究其止歸居毋憂終䘮不忍去墳墓不隨俗之好尚亦不顧人之是非率以禮經從事既老里居士大夫狀其質德乞添差教授本州帥葉公夢得以聞從之命下而卒紹興十年張丞相浚増養士為二百四十人紹興九年十月張丞相浚奏據州學學生陳備中等三百三十八人狀竊見本州科場赴試至七千餘人補試終場二千五百五十五人今繁籍學生五百餘人本學養士止二百人額每人食錢止一十九文餘皆供給不到乞别給田五七頃仍以五百人為額不報明年奏以寧德芹溪院籍沒田入學許之遂増養二百四十人教授張洙為記乾道改元王參政之望定三百人為額教授馮攄為増田廣士額記淳熙四年陳丞相俊卿始創射圃南北十三歩東西五十歩有奇仍剏亭以序賔今歳春秋補終場各五千餘人取五百人養士三百人祠廟武烈英護鎮閩王廟釣龍臺山之西昔漢遣使封王為閩粤王授冊命於此其後即此立廟武帝既誅郢封繇君丑奉王祭祀居股繼之及殺餘善以降祀遂廢至唐大中十年建祠後唐長興元年閩忠懿王復追封為閩粤王皇朝因之號顯聖武勇王見慶厯記廟有左右二王相傳王二將也不顯姓氏英靈間發惠祐一方土人世事之熙寧中閩兵出戍熙河二王現雲端大戰獲㨗政和間復戍桂府征蠻之際二王復現降大雹飛黄蜂以退蠻兵宣和二年浙冦竊發連陷數郡將及境俞提刑向自建安領兵南下黄蜂數萬隨舟蔽江居民咸謂神兵之助境内帖然迺五月大新祠宇建楹之日有青紅二小蛇蜿蜒香几間累日暨上梁俄又見其兩端舉首北向移時即隠六月以儀曺陳璡奉二王像入廟二蛇又現七月廟成俞公向臨奠前夕夢有神人青色謝以遷祠者祀事畢青蛇忽現左王前神色如所夢瞻歎乆之禱右王曰願賜臨降尋亦現邦人信敬益篤州以其實聞於朝十一月勑賜廟號武濟並見俞提刑向廟記六年進封閩粤王為鎮閩王二王左封靈應侯右封顯應侯建炎四年王加封武烈靈應侯加廣惠顯應侯加嘉澤紹興三十一年膠西之役舟師禱戰獲㨗王加封英護夫人封賛靈左侯加協威右侯加翊忠州諸廟惟此廟夫人坐東王坐西以廟尚循漢制漢尚右故也明德贊福王廟西湖之旁後隔城牆城外為湖昔閩粤王郢開州西大路畚土成丘後人即其地立廟郢塜在閩縣東田中血食不衰自唐大厯以前閩城通得祀者四南臺善溪城隍與此而巳見檢校太傅陳郯烏石廟記累封至本朝為明德贊福見慶厯記善溪冲濟廣應靈顯孚佑王廟鼓山之北大乘之南山峽間有二潭下潭廣六丈深不可計距上潭五里昔閩粤王郢第三子有勇力射中大鱔於此潭其長三丈土人因為立廟號白馬三郎唐貞元十年觀察使王翃旱禱得雨崇飾廟貎自後太守躬禱輙應唐太和元年觀察使張仲方祈禱囘屆聖泉寺雨巳至遂題詩曰入門池色净登閣雨聲來團練副使李貽孫和云旌斾憂民至風雲逐馬來團練判官李敬彛和云雨随青障合雲拂畫旗來内供奉彭城侍御和云雲隂随雨度桂馥逐風來今詩牌在聖泉唐咸通六年觀察使李瓚奏封龍驤侯梁貞明中閩忠懿王奏封𢎞潤王本朝建隆二年知閩縣江文秉葺廟有記慶厯六年六月旱蔡公襄齋戒自為文禱讀徹大雨乃命知縣賈太冲新其祠文學范宗韓作記熙寧八年勑封冲濟廣應王紹興十一年以張丞相浚奏増封靈顯仍賜廟額曰永寧十七年秋大雨中夜水暴出聲聞數十里詰朝有石髙廣可二丈峙廟後如堵水左右注庭除無恙人異之紹定五年李大卿駿以靈應如響奏増封孚佑淳祐八年陳侍即塏為鄉帥以田疇缺雨率知閩縣師輿致禱有騐因閱廟前華表扁曰鱔溪詢其故則土俗疑傳以鱔為靈不知王親殺鱔以為靈也其可以鱔名溪乎遂判云善溪龍潭以神能體天而福善利澤可蘇焦槁故以善得名方言誤以為鰍鱔之鱔鱔微物也豈能化為龍近乎誣神矣帖縣宜與改正閩令承命易扁以善溪名鋟梓祠下云仁者樂山知者樂水山水之性是豈專乎仁知哉亦惟人之所樂然耳故易曰仁者見之謂之仁知者見之謂之智閩之東舊有鱔溪分三潭神實居之雨暘禱必應今帥守侍郎可齋陳公以旱親謁於上潭之石壇精忱洞徹疑其稱謂之訛遂舍魚而取諸善善嘉號也心善淵也字心畫也兹非善者見之謂之善乎退而考諸廟諜則鱔之為說前守尚書郎王公陶嘗辨析之謂其類野老言不足據可齋之名斯溪也一洗痼陋善與人同千古在後德厚流光越王之宅斯土也一靈如在福善好直百世在前有德必祀栁子省愚溪之對昌黎寢惡溪之文吉水㢘泉慈湖直瀆蓋將齊聲並價而不得顓美矣豈惟人樂斯稱吾意神亦歆是名矣昔唐人守古栝有善政改惡溪名好溪後世美談今溪以善名事有類是用敢併書眉山師輿立郡人馬載書梓劉自書扁忠懿王廟慶成寺之東王諱審知字詳卿姓王氏本琅琊人髙祖􅈌唐貞元中為光州定城令遂世為固始人黄巢之亂王與兄潮從王緒入閩景福初攻福州兵馬使范暉殺之詔授潮廉帥乾寧三年拜威武軍節度觀察處置等使明年潮卒王代立天復初勑列十二㦸於私門天祐元年封瑯琊郡王三年閏十二月勑立王德政碑銘禮部侍即于兢之文也碑今立廟中梁開平二年加封琅琊王尋進封閩王後唐同光三年薨年六十四冊贈尚書令諡忠懿王奉身儉約至躡敝屨聚書建學以養閩士之秀者屬諸邦僭竊獨遣使出海道奉朝貢民不見兵革殆三十年晉開運三年地入呉越錢氏始命即正舊第立廟開寳七年刺史錢昱復繕新之塑故都押衙建州刺史孟威等二十六人配饗自為記政和元年羅殿撰畸命雪峯太平主僧重修畸自為記云過忠懿王祠歎其陋甚竊自惟曰浮屠氏好談因果以動世而忠懿喜營塔廟其功德在佛之徒為多若使反其所施以治其廟像是使浮屠氏之說益信也聞雪峯太平主僧足以任事乃諭之未閱月而成紹興二年州官吏以廟摧圯宜致嚴飭請於郡張叅政守乃出公帑令知閩縣李公彦董其役既訖功率官吏祗謁祠下四年何大圭記自唐以來碑記銘今存東嶽行宫偽閩所建東華宫之太山廟也見淳化四年節度掌書記承直郎試大理評事兼監察御史裴詢所作福州東華宫太山廟記首云四時代謝東方立生殺之權五岳辨方泰山掌生死之籍蓋本宫中之廟也錢氏時廟祀始盛記云王氏既滅斯師治民斯廟也玉宇恢廓金殿崢嶸乞福人多紙錢飛雪祭神客衆竹葉成池隂司之部從克全地府之曹寮畢備大中祥符中既以東華宫為天慶觀廟乃獨為東嶽行宫自是祈獻愈多屋宇浸廣城隍廟府治之東古有之元祐戊辰長樂人林通作本縣圖經内縣東北城隍廟曰廟之神西漢御史大夫周苛也守榮陽為項羽所烹髙祖休兵思苛忠烈乃令天下州縣附城而立之廟以時祀之晉太康遷城即建今所紹興二十七年沈待制調増創㕔宇尋置興福菴其東淳熙五年前作更衣亭肅儀亭今十二邑皆舊附縣治置五通廟通津門之外河南岸舊記亦名龍官廟相傳王氏入閩州邑閭井許民咸得立祠斯廟之址昔懐逺驛之地也景德中葉扆陳熙等所建康定元年陳紹濟僧懐軫與其徒復創屋七間有進士方暠為記記云古筆峯之上游宅石渠之左界厥地廣表周囘十尋時所至廟祀郡大姓咸世事之今不衰惠安明應王廟烏石山之西王姓陳氏舊隠是山廟碑云心遊典墳性愛山水遊息於宿猿之洞闚臨乎落景之平注山下舊有古跡結石垂藤號宿猿洞山號朝陽頂落景平沒而顯靈唐元和後始立廟凡水旱疾疫必禱焉大中時羅中丞祈雨霰立應咸通間李大夫運餉湖湘亦獲隂佑至閩王忠懿乃表其事曰寧逺將軍封武寧侯増至顯應王後唐長興三年改服逺昌運王後五年改振義保成王又十年改貞閩安吉王後歸呉越封宣威感應王先是石人娘舊廟於城西忠懿王移以配享别創閨閣永隆庚子驍衛長史彭城文遇又於堂東北隅為寢室屬檢校太傅陳郯撰碑銘猶存皇朝熙寧八年改封今號剛顯廟烏石山之巔公姓周氏諱朴本呉人唐末隠居於此與僧靈觀薛長官逢友善雙峯寺法主大溈寺懶安更為禪恱之交黄巢之亂求公得之曰能從我乎公曰我尚不仕天子安能從賊遂遇害後人即其山立三賢祠觀逄與公為三雙峯寺亦有三賢堂法主李中丞瓉及公也紹興初張丞相浚謫福州將遊雙峯夜夢一僧與一金紫人及白袍士來謁翌日登山堂見三公容貌如夢中異之及為帥遊烏石至公祠歎公死節三百年未有廟額何以激厲當世乃奏之詔賜號剛顯郡人鄭昂記而序之曰東漢之衰陳蕃李固孔融之徒相與標牓以節義名世故雖以曹公之隂賊終身睥睨漢室不敢取唐末名節掃地君子在野小人在位朱温以斗筲穿窬之才談笑而攘神器士大夫亦欣然與之莫敢正議使公得志其肯以國與人乎乃為詩以貽來者俾歌以祀公詩曰公昔隠居烏石岡老觀禪師同道場法主懶安共徜徉李薛咨參互擊揚擺脫利欲心清凉是以能全此至剛黄巢兵亂來福唐公力抗之不肯降欣然引頸齒劒鋩白乳上湧如雪霜老賊自謂暴無傷纔殺半人於南方巢斬公白乳髙一尺五寸時懶安聞巢至坐蛻去巳入塔以劒斫塔白乳髙三尺巢與人言自入閩纔殺一人半而已公無爵位在周行史臣不書名不彰後三百年丞相張夜夢三賢與迎將翌日遊山登公堂宛如夢中貎昻蔵再來為州剡奏章賜名剛顯烈有光葺祠為廟飾棟梁普與州人奉肴觴於薦荔丹與蕉黄歳時來享以為常我作銘詩刻其旁千萬億載死不亡北廟遺愛門之外去州十里王姓劉氏諱行全唐末事其妻兄王緒為將緒為秦宗權所逼㧞其軍南徙以王為兵鋒至漳州緒忌而殺之忠懿有國悼其死非罪為立廟州北時烏石廟號南山廟故指此為北廟乾寧四年奏封武寧侯梁初累封昭感王凡出師捍敵隂助顯著貞明五年備以聞於朝進封崇順王棟宇宏麗有果園稻田歳殖其利祀事以給時移事變廟宇圮壊皇朝政和二年知懐安縣呉與始召祠旁寺僧諭之乃築髙寢其後設重扉於前周垣脩廡㸑濯皆具舊有從祀三人亡其名氏始遷於外示有别也既成與自為之記時帥張殿撰勱為書其額石頭廟嚴勝門之東北舊記無諸王時民轉漕徃浮倉於此祈福因有磐石故名之今東湖地形是浮倉近蓮蕐山下閩粤轉漕以備東甌之地或者遂以為舊嘗建府治於此非也昭利廟東瀆越王山之麓故唐福建觀察使陳巖之長子乾符中黄巢陷閩公覩唐衰微憤巳力弱莫能興復慨然謂人曰吾生不鼎食以濟朝廷之急死當廟食以慰生人之望既沒果獲祀連江演嶼本朝宣和二年始降於州民遂置祠今所五年路允迪使三韓渉海遇風禱而獲濟歸以聞詔賜廟額昭利建炎初建㓂犯西闉吏民奔走乞救於神俄頃雨雹交下盛夏如冬時平地水尺賊惶怖而遁道連江欲掠之見士馬雲布而去四年封褒應王子姪九人皆賜列侯知西外宗正嗣濮王仲湜為記鍾山肅安王廟子城西梁普通二年袁士俊捨宅為鍾山寺王其寺之土地也後唐長興三年閩惠宗始崇建廟宇龍啓初封感化將軍永隆二年改𤣥應將軍明年進封洪音侯塑立夫人像晉開運三年江南兵至攻城王有神助李仁達升拜武靈王夫人封號昭德漢天福十二年改肅安王建堂三間亭一間周廣順二年林嗣宗為記皇朝以來寺遭爇者再火及廟輙滅元豐五年里人復修之龍跡山廣施廟懐安縣興城里唐林諝記廣德中一日清書雲雷騰震有飛龍自地出驟雨石上遺跡可數寸歳為大豐遂名其地為龍跡山太平興國之後遇水旱有懇輒應民立廟祠之竹椽茅屋蓋草創也嘉祐四年春不雨知縣樊紀初禱祠下還未五里甘澤傾澍於是撤屋為堂易茅以瓦脩廊崇宇廟貎儼肅紹聖元年知縣洪子著禱之復然而所潤不過邑境洪以白帥王祖道謁之即日大雨乃創亭其右為駐節之地三年復旱又以白帥葉伸請與簽判偕行是日於炎烈之中倐然變為滂沱者繼日大觀三年知縣吳與以祠迫通衢屬有禱亟得乃命僧營葺基山為殿即亭之背列齋室設庖厨前臨大溪又建亭其上名曰沛然自為文記之又有西湖陳文伯為記政和五年以轉運司奏賜額廣施武勝王廟今南臺教場之北見治平熙寧圖舊記南臺節後知此舊别有館也今猶呼館前廟舊傳陳九郎神偽閩通文二年封寧應侯永隆五年改昭義侯尋升武勝王熙寧中丁少卿竦重建見曽師建記宣和二年既大新武濟廟釣龍臺西復遷左右二侯像於武勝王廟以便民祠祭七年俞提刑向乃新廟宇靖康初江待制常立額為武勝王左右二侯廟靈澤廟通仙門外廟舊號五龍順化王塑位五方配以方色相傳偽閩王氏所建本朝因之載在祀典皇祐中久旱邑人祭於廟雲霧晝瞑暴雨大霔即殿中視之北位黒龍鱗甲猶帶池萍如乍出水靈跡顯異紹聖四年温公益命知閩縣葉黙因其舊増葺之重堂夾廡輪奐一新元符改元廟告成有神光發於殿屋是冬大旱麥苗將枯井泉㡬涸率僚屬禱祠下讀祝未畢隂雲四合飛灑隨至命候官尉王壽刻石書之大觀三年勑應天下有五龍㑹應廟處合依原封王爵稱呼青龍神封廣仁王赤龍神封嘉應王黄龍神封孚惠王白龍神封義凊王黒龍神封靈澤王乾道二年夏不雨王公之望一禱而應歳則大稔邦人曰廟未有額無以彰神之靈乃為請於朝詔賜號靈澤知閩縣丁長卿為記廟旁有田及蓮塘二十餘畝州許蠲租以僧掌之淳熙十四年安撫賈選奏以舊制改作㑹應廟事見後九仙安境侯廟光孝觀之北偽閩永隆元年封光威振逺將軍是年十一月牒九仙龜七即可封上件或云本龜靈也元有青白石二片盛貯木座見在㑹同十年加封安境侯制詞云閩府苦於多難近致承平得非神福其善而善者興禍其滛而滛者敗九仙山光威振逺將軍夙嚴祠宇乆尊是邦幽贊伊人炳然慕義是致封疆大肅黍稷長馨苟虛褒羙之恩曷報感通之惠告牒今存時廟祝皆命官先是龍啓二年勑太祝院祝生陳興可銀青光祿大夫檢校太子賓客兼監察御史上柱國制詞云勑祝生陳仁遇等每脩祀典常覩正辭告天地以誠䖍致神祗之響應宜行奬擢豈恡官榮可依前至永隆元年牒兼殿中侍御史餘如故三年牒兼侍御史餘如故告牒今並存可以見當時之政矣効節護君侯廟南澗寺開運二年卓岩明所封告今存制詞云奉宣昔當國山名烏石地布黄金乃西乾釋子之居曰南澗去山之寺寺有龍神善護神於像代㝡靈從他社䑕稷蜂應難託附任爾心猿意馬終被區分但予隠憾之時徃還斯境受五通之加備致萬姓之推思亦嘗許與封崇報於昭感今則因追舊諾爰沛新恩俾隂德之為侯處名藍而作聖所宜初中後夜𡨕扶三寳以勤拳過現未來無怠雙林之付嘱前件天王寺土地可封効節護君侯開運二年五月日利澤廟甌冶池之南紹興四年有龍晝見於池郡為立祠乾道二年王叅政之望以禱雨獲應為請於朝賜是額威勝侯廟館前治平熙寧圖有南殿廟河伯保勝侯廟湯巷資利成寳靈應侯廟錢作前偽閩鑄錢監所姑娘廟西湖見治平熙寧圖應聖侯廟河口惠民侯廟河口鎮寧侯廟怡山門内鎮武侯廟浦尾保安王廟河東竹林通應廟仁慶坊丁戊山之麓竹林之墟神興於此立祠廣贍侯廟閩縣前㑹應廟通仙門外舊號靈澤淳熙十四年安撫賈選祈求屢有感應乃新廟宇教授許衍為記是歳九月奏改今額淳熙十四年十二月二日禮部狀准都省批下福建安撫使賈選狀照得福州去歳自入冬以來亢旱日久麥不入種徧走群祀寂無感應按之圖籍本州通仙門外舊有五龍廟塑位五方配以方色靈跡顯異選遂具辭致禱一念方啓雨勢頓作奠祭未徹大雨隨至連夕霶霈四郊霑足又於十二月二十八日并今年正月二十日以大小麥垂熟隂雨不解遣官致祭皆一禱而晴二麥悉獲収刈選緣是時拘於近制不敢陳乞恩典止給錢委官新其廟貎自是節次祈禱無不響答又今年六月初三日本州以早禾巳熟晚田闕水亦一禱而雨至六月二十日選齋捧御香躬詣祈雨感應稍遲選詳思其由再以圖籍考之見得大觀三年禮部符備坐勑命天下應有五龍㑹應廟處自合依已封王爵稱呼青龍神封廣仁王赤龍神封嘉應王黄龍神封孚惠王白龍神封義濟王黒龍神封靈澤王今福州五龍廟亦是五方龍神其廟號封爵自合遵用大觀三年指揮而今來廟額乃因乾道二年守臣禱雨有應失於檢照遂請於朝以靈澤名額而邦人又止以偽世舊號呼為五龍順化王度神之意恐或在是乃於二十六日具此意黙禱且約如獲感通當為奏請乞正大觀廟號封爵是夕大雨傾霔累日髙下之田悉頼以濟兼福州諸縣所在多是髙仰山田水澤易涸踰旬不雨即以旱告前月二十九日選又因闕雨遣官祈禱方書祝文雨勢大至日夜不止今月初二日告謝甫畢即漸開霽次日晴明越十日又雨兩日而止非獨晚禾頼以成熟而一歳再挿之田皆有剰水悉得秀茂豐登可望委是有功於民一邦之人倚以為命欲望特賜敷奏照大觀三年指揮正其廟號封爵給䧏誥命并舊額勑牒以彰靈異以慰邦人之願伏候指揮後批送部勘當由尚書省本部尋行下太常寺檢照到國朝㑹要東京㑹應廟春明坊五龍祠元祐四年七月賜額先是熙寧十年八月信州言州有五龍廟禱雨有應賜廟額曰㑹應自是五龍廟皆以此為名額大觀二年十月詔天下五龍神皆封王爵青龍神封廣仁王赤龍神封嘉應王黄龍神封孚惠王白龍神封義濟王黒龍神封靈澤王本寺今勘當欲乞將福州五龍廟從國朝㑹要大觀二年巳封王爵廟額一體稱呼本部勘㑹今來本官奏照得福州去歳入冬以來亢旱日久麥不入種遂具致禱一念方啓雨勢頓作奠祭未徹大雨隨至又今年六月内晚田闕水一禱而雨及今年七月内又闕雨遣官禱祈雨勢大至委是有功於民欲望特降眷旨照大觀三年指揮正其廟號封爵給賜誥命并舊額勑牒本部照得今來本官奏到前項事理應得國朝㑹要合行一體稱呼其本官奏陳乞給降告命勑牒於本部雖無似此條法指揮今來本官奏福州諸縣髙仰山田悉得雨秀茂豐登可望委是有功於民一邦之人倚以為命本部今勘當欲乞朝廷特䧏指揮從大觀二年巳封王爵廟額指揮給降勑劄下本州照㑹施行申聞事十一月三十日奉聖㫖依禮部勘當到事理施行淳熙三山志巻八
