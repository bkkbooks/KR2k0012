body:
  text: 淳熙三山志巻二宋梁克家撰地里類二叙縣閩宅東南負山而䑛海由建劍至嵩谿巖壑夾駛不留其間州縣若鎮雖僅啟廓竟不能容與十數里道出甘洲山川揖遜乃百里如掌海潮漲鹵至東峽激淡潮而西脉絡敷貫委蛇詳緩州治其中有中州氣象縣十二瀕海七福清距海六十里長樂二十里閩五十里連江二十里羅源十五里寧徳縣東長溪十里依山三古田閩清永福挾江二候官懐安按國初吏部格户二千以上為望千五百以上為𦂳千為中五百為下今中縣併主客户皆萬以上姑以建置先後為次云望閩縣州東南隅閩越故都冶漢末為候官吴屬建安晉太康三年置晉安郡省典船校尉立原豐置原豐縣郡治在焉候官仍舊隋平陳郡廢改縣曰原豐與候官俱為原豐開皇十二年改為閩至大業初置郡復治閩縣偽閩龍啟元年長興四年改為長樂三年仍舊永隆三年天福六年又為長樂四年仍舊東西九十三里南北八十里六十步東連江縣界九十二里西候官縣界一里南福清縣界八十里北懐安縣界縣治後絶河東南長樂縣界七十五里西南懐安縣界十七里東北懐安縣界二十里西北懐安縣界一里十二鄉三十七里鳯池西鄉縣東南舊名䨇桂鄉有都尉聨榮上仁棠隂崇賢五里今併為崇賢崇賢里縣治在城鳯池東鄉縣東二十里舊無東字有清謹新昌與今三里為五今併焉歸善里前後嶼皷山里阮洋石魁﨑痕磕下石劒山如劒臨江桑溪里獵嶺晉安東鄉縣東七十里舊無東字海曲里湖江山在海中合浦南里浮﨑猴嶼洋嶼鎮閩安北里舊名海濵里翁鐡場殷嶼﨑海畔里王晡山海中風海雷石波濤所穿其下成竅摇則訇然有聲晉安西鄉縣東五里舊名靈芝有清平永樂習賢暨易俗孝義為五里今併為三里閩越王郢塜縣東田鄉孝義里鷓鴣嶺秋竹鵝鼻瑞聖里大乗前嶼竹嶼横易俗里舶塔頭作東嶽前亭奉真橋元豐三年道士顔象環草參橋靖國年作茶園山王延禀為王仁達敗奔之茶山館舊閩縣尉廨也崇寜三年勅以常平錢置漏澤園遂於此創今為東禪菜園即鷄公巷口也髙蓋南鄉縣南十五里舊無南字有仁德方勝與今三里為五今併焉時昇里舊龍政里渡浮橋頭下仁豐里蓋竹井髙蓋仙人光德里髙湖髙蓋北鄉縣南十里舊鳥石鄉有周鼎下惟令徳與今二里為五今併焉加崇里王坂洋横山頭時河口號鳥石洋上中下航釣龍臺閩王江邊新市堤翁承贊還朝審知餞行於此髙惠里木道塘河口五龍崇善東鄉縣南七十里舊名希福東鄉凡四里還珠北里扈嶼南里横嶼榮繡里麻溪舊名西集里淳祐戊申待制侍即陳公瑄為鄉帥告詞云榮哉此行何殊晝繡知閩縣師輿從士民之請立榮繡坊于大義盖陳氏世居此地鄉貴觀文殿學士毅齋鄭公性之書扁里遂以榮繡名方嶽里崇善西鄉縣南七十里舊名希福西鄉有永慶慕賢與今三里為五今併焉待仕里塔林方山清亷里叚塘虎靈岫里館前劉嶼開化東鄉縣東九十五里舊無東字有受善里與今二里為三今併焉光俗里營前竹嶼籌崎至徳里洞江澧瀆開化西鄉縣東南三十里舊温泉鄉有歸化崇信與今三里為五今併焉歸仁里盧螺石步永福里舊永安里城門山髙詳里贊賢鄉縣南百里紹惠里琅琦欽仁里蕉溪歸義里蔗崎枕嶼積善里青布苦竹安仁鄉縣東十七里接賢里白浮仁惠里城門盧龍泉坑下永盛南里石鼈後為雷所震斷之今半猶存北里舊勝殘里然磕下甘勁竹石山有自井水美開化里洋下郡連坂上林浦邊﨑下董望連江州東北九十里舊記百六十里晉太康四年以温麻船屯立晉志宋志皆有温麻縣隋開皇中省入閩縣唐武德六年復析置其年改為連江以縣治連接江水故名崇寜三年尚書省以係萬户擬差京朝官知東西九十五里南北百十五里東海二十里西懐安縣界四十里南閩縣界二十五里北羅源縣界四十五里東南海三十五里西南閩縣界二十五里東北羅源縣界百二十里西北懐安縣界九十里七鄉舊五鄉二十四里寧善鄉縣東南四十里舊有豐邑後併欽平上里東塘村下里白沙浦號通津橋初梁石為歩中流以舟濟中濟政和甲午為十八梁崇德里桑嶼北東路有上下竽塘在海中闗嶺氏蛤沙交舊鎮今廢大小亭山昔黄兄弟載寳没於此遂二處立廟永福鄉縣南二十四里新安里荻蘆安慶里赤沙渡鄭赤沙館﨑永貴里舊有上下里亭併鎮船歩渡後荻蘆寨有渡二沙今廢浦太平鄉縣西四十里光化里羅崙渡潘渡清河里臨江里泗口北􅣚洋後長圓盧溪舊有嶺鎮廢安仁里上屯長溪東岸下屯白岩菜洋中屯渡陂西猴天鑿東岸七渡名聞下鄉縣西北七十七里安義里辛洋溪路丹洋下屯洪中鵠里南坂山不黄岩村湖舊名通化唐張瑩嘗有詩一箭中鵠五歸釣魚景德中以更里名敦賢里翠林山安定里洋尾東充名聞上鄉加賢里九彎溪西際下里麥浦進賢里東塘黄坑歸仁里舊屬太平鄉米令橋頭五賢上鄉縣東北百五十里集政里上洪麻白鵠臨下亷村海安德里状元坊以鄭侍講鑑兩優釋褐名招賢下里舊不分上下里峽口鎮今廢五賢下鄉保安里甆窑管瀆建興里浮曦村赤石招賢上里望候官縣州西南百步唐武德六年置治州西江岸水陸三十一里貞觀五年省入閩縣長安二年析閩縣西十二鄉復置貞元五年洪水漂壊後團練觀察使鄭叔則奏移入州城元和二年省五年復置先是同長樂省仍置場徴民不便遂復置偽閩龍啟元年改為閩興以長樂為候官三年皆復舊東西百八十里南北二百九十里東閩縣界五十步西永福縣界八十里南閩縣加崇里二里北懐安縣﨑山界五里界首至縣二十里東南閩縣寜越門一里西南永福縣笻溪村五十里界首至縣五十里東北懷安縣界二里西北閩清縣仁溪埕百里界首至縣三十里十鄉五十里桂枝鄉縣西南二里以唐陳去疾登元和十四年科第改名劉若虛作陳淑唐登科記無陳淑有陳蜀閩縣人榮親里舊名延福咸平五年劉若虛登第授大理評事知温州永嘉縣解任歸鄉時王父母父母俱無恙謝侯泌因改今名以寵之若虛自記仍賦詩聚星里城内永平里城内東孝悌鄉縣南八十里舊無東字安平里陳湖馴翬里小目溪永欽里栁橋處仁里舊屬桂枝鄉孝順里城西草市美宅里祭酒嶺俗呼為進酒湛温光州人事王延翰延官至御史大夫國子祭酒時延禀守建州與翰有隙遣使覘之延翰命温徃餞因鴆之温歎曰脣亡則齒寒吾寜以一身代萬人肝腦塗地引巵獨酌斃于嶺下西孝悌鄉縣西百里舊修文鄉揚名里赤岸惠化里赤岸齊禮里塘岸招賢里石門順平里石門勝業鄉縣西十五里新安里瓦埕孝成里新道偽玊山宿猿洞之西南閩望祀之所正節里廊迴方興里後塢方樂里洪塘修仁鄉縣西南七十里永康里横棣遷蝗里南嶼綏平里坎下靈鳯里髙﨑海平里曇﨑永安鄉縣西北百六十里嘉祥東里大湖洋西里白沙保安上里大目溪興崇慶院前豐澤潭相傳有龍二年一興則暴雨漲溪衝梁突岸乃以鐡䌫䌫之上鑄鐵佛縫鏬皆藏鐵自此不為患下里䝉溪永興里黿村清化里黿村守仁里仁溪湯溪石門鄉縣西北八十五里九功上里甘蔗下里甘蔗歸德里唐舉萬安里彭蜞東太平鄉縣西北百二十里興禾里嶼頭東安里黄沙嶺安仁里雷峯湯院加川里後尾疇川里後尾西太平鄉縣西北百二十里舊原豐仁德里大小若旗亭里志節里惇和里永寜里己上四里地名候官鎮五芝鄉縣西南百里舊令善鄉閩光里方輿記月嶼出蟟蛤號蟟沙清政里舊曰貞正避仁廟諱改白鶴三秀里黄岸江口新興里古靈吉壤里龍湖望長溪縣州東北水陸五百四十五里舊記八百五十六里唐武德六年析連江置尋省以為寜逺鎮長安二年復置縣南有溪數十里通海寜逺故城遺址今尚存或言長溪唐嘗升為松州按舊唐志武德中括州管松嘉合三州七年廢松州為松陽則長溪未嘗為松州也東西八百四十五里南北六百三十里東海十里自海至榆星嶼二百里西建寜府界二百三十里界首至政和縣百七十里南海百里北處州界三百六十里界首至龍泉縣三百里東南海十里西南寜德縣界百五十里界首至縣三十五里東北温州界二百里界首至平陽一百里西北處州界四百里界首至縣三百里四鄉二十二里勸儒鄉縣東北晦唐林嵩登乾符二年第觀察使李表請改鄉里因勅賜今名擢秀里赤岸江渡鹽埕橋文翁橋峯飯溪寨沙龍首三沙火望海里斂村圓太姥山露文村埕三陁九嶺益溪大小塘白鹽六十六竈遥香里白林橋溪翁潭尖王孫鴈三育仁里南北鎮四後埕沙埕縣里亷江里桐山百駱駝嶺秤靈霍鄉縣西南六十里萬安里大小黄沙波獅頭宣鹽埕與擢秀里百二十五竈金橋化橋戢田縣北龍首山西脇有清泉病者飲輙愈温麻里石背鹽東灣田柘陽里蓋竹重魚蟬洋羅浮沿江里古漏港蘓洋大流秦溪東里東屬才下盃良西里大小籰浦黄﨑深永樂鄉縣西北二百里仁風里龍臯口茜洋沙黄蘭海秦溪白大西興里白沙芳亷村人薛家坂唐進士薛補闕令之所居其孫杜為正直既死鄉人為立祠與令之同祠立亭曰清風欽德里繆洋牛雞嶼嶺平溪里大小魚溪灘西溪麻竹斜歸化東里察洋湖邉西里松潭溪船潭安東鄉縣東南九十里安民里縣南十里地形飲海中作蜂要東名上限西名下限徃甞截之通潮以不能而止嵗春夏交有跨魚掩至其積如山上鹽埕鼎沙舌髙平山俗傳葛洪嘗游其有丹丹竈新南里吒﨑尺舊有浙津驛在八琅玕頭今廢新北里南北爐坑嶺虎曲虎跳連海里蚶硯石捕苦竹翼濵海之民多滬業輿地志海濵漁張兩潮上即沒以取魚謂之滬業招賢里舊無金上下角安西􅍫輸蠣澚縣大小鹽埕同民里寜德緊長樂縣州東南百里曽師建記百二十里潮信也唐武德六年析閩縣地為新寜縣在敦素里平川距今縣十五里尋改為長樂上元元年防禦使董玠以其卑湫移治呉航頭元和三年省入福唐縣五年復置偽閩龍啟元年改為候官縣三年仍舊永隆三年改閩縣為長樂長樂為安昌明年仍舊東西百二十里南北六十五里東海澚三十五里西閩縣界一里水路百二十里至縣南福清縣界五十里北山外大海去連江縣界百二十里東南千零里至東洛水路百二十里西南泉元里至尤嶺三十五里福清縣界東北新開里至當西澚水路百二十里外連江縣界西北賔興里至閩縣苦竹溪小路十五里四鄉舊七鄉三十二里善政鄉縣西一里併永泰鄉為之亷風建興崇德敦素崇賢舊屬永泰賔賢里舊徳致里因鄒異中經明行修科改河南臨水渡出首石縣主山髙二十餘丈廣數十里中有泉四望皆水也又名四水口相縣驛縣南十五步臨水驛縣西一里吴航頭傳夫差略地至此未必然逍遥里黄彈嶺進賢里桃坑源出董平山亷風里董平山建興里距海半里清平里沙坑距海半里嵗縣濵海處多沙風颺蜚積小成坡大成山嵗遷徙無定撲面眯目無所不至而米榖飲食中殊無之亦異也崇德里北湖距海三里敦素里舊縣治距海五里崇賢里晁石仁義里穫溪橋源出大山陽流入演江潭闊九里深十一丈東流二十里入海昔有二龍起於江中白歸山陽則白龍潭也黒居山隂則祥雲潭也有人於潭側獲卵殻大如斗昌化鄉縣東南十里併依徳鄉為之海濵崇化良田千零舊屬依德絃歌里石梁海濵里東石崇化里流水良田里江田千零里社下今鍾門驛無崇仁里湖東和風里何下石雙髻招賢里竹永勝里干歴二難鄉縣西南五里舊崇丘郷以潘循潘衢同發祥符元年第改後併安時鄉昆由依福靈石泉元歸義里同榮里疑更歸義為之可參溪破石潭下有石柱廟至摶紗潭深不測嘗有以紗一摶測之不其底崇丘里大邊洋門信徳里小邊嵩平里白上三里舊屬閩縣咸平二年以煎鹽之鄉與閩縣惟界一嶺私販叢至踰境即非所部閩之弓手倉卒莫至遂以隷之泉元里石尤嶺白岩山依福里前曽村靈石里小門昆由里百石堰見黄新潭嵗旱雩之昔有巫者妻漚麻潭側黄龍首藉其上馳以告其夫夫以告縣往祈之俄而大雨芳桂鄉東北二十五里新開里梅花村方樂里東皇村大宏里以林慎思中宏詞奏名大石渡橋萬安里相村避祥雲潭舊名𤣥雲祥符中聖祖名改旱禱即應敦化里古爛嶺淳熙三山志巻二
