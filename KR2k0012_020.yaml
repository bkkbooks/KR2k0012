body:
  text: 淳熙三山志巻二十宋梁克家撰秩官類一郡守封君諸使附閩自周季立國稱王秦雖置郡猶棄不屬獨降號君長而已漢興既詔復國綿及三世顧亡城郭邑里可以郡縣一經徙廢曽有孑遺三百餘年生聚日蕃自相臣僕孫氏崛起謀有江表乃拓平内地翦莠鉏荒然猶六十餘年僅克開郡又至于晉始建治此州渡江之後壤地既狹分部益多更宋齊至陳此州始為刺史唐初改郡為州太守並為刺史小大莫辨此州又始為都督開元分道置使採訪惟在邊鎮首謹兵防此州又始為經畧乾元内外悉治軍戎大府要藩許専節制此州又始為防禦節度大厯以後冦難略平思弭甲兵鄉意風俗此州又始為觀察王氏僣偽固不足言皇朝改為提舉若提轄本路兵甲等事嘉祐中改為鈐轄大觀初又改為安撫總管因時廢置随事立名輕重不同要皆總統一道兵民之寄比年府望益顯來涖者率宰執侍從之臣今自周秦以來封君而下至為諸使編年以見之其餘列職本末悉著焉淳熙三山志卷二十
  hash: sha256:aee7dc40bf27886e968f1889062dde391f6dce2c75584669c127e3fa5332fda2
