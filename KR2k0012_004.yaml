body:
  text: 淳熙三山志卷四宋梁克家撰地里類四子城閩越王故城今府治北二百五步晉太康三年既詔置郡命嚴髙治故城招撫昔民子孫髙顧視險隘不足以聚衆將移白田渡嫌非南向乃圖以咨郭璞璞指其小山阜曰是冝城後五百年大盛於是遷焉唐中和中觀察使鄭鎰始修廣其東南隅先是開城南河有人得石記云五百年城移東南本地合出連帥自太康至是適五百年閩川名士傳以為陳巖閩人為連帥之應舊記作七百年文德元年陳巖復修巖傳云恢其形勢甃之甎石舊有觀察支使林嵩為重修子城記在作院內王氏國閩壁壘翳山樓櫓庇馬城益堅緻矣乾寧四年王潮築永平城梁乾化二年審知築內城恐即此城後歸吳越至皇朝太平興國三年錢氏入朝詔墮其城不用四海混同人無外虞斷垣荒塹往往父老徒指故迹以悲舊子城二百三十三步有小牆周圍在皇祐之後始有建請修築外城者尋亦寢議熙寧元年章大卿岷奏竊見州城四十餘里自屬天朝官吏因循嵗嵗毁圯茅牆數尺霖雨連澍遄至傾頽亦有居民冒蓋屋宇者今來相度欲只就舊基修築子城便願委本路轉運使同共計度若允所請乞降度牒三二百道添助支費有旨令轉運提點刑獄各具相度以聞尋復奏交趾蠻人聞自亷雷將趨廣州本州邊海萬一乘風奔衝何以禦捍乞檢尋前狀許令修築子城從之仍給度牒一百五十道每道許賣一百貫足是嵗六月也會岷移海州議者猶以子城故狹而表猶六七里費與役廣恐不能成程大卿師孟謂轉運使曰第得錢二千萬半嵗可就乃以二年四月始事益以西南隅周九百五十丈舊子城西至冝興門今又廣至豐樂門厚五尋而閷其半崇得五之四表裏纍以甓石上設女牆其下覆以攘瓦為臺名威武以抗其隅創九樓城上時師孟奏女牆用灰飾開箭窗結流道水溝井敵樓角樓記言創樓九見府治下負牆為亭三一曰雅歌二曰吏隱三曰春風濬其隍為橋十二見內外城壕門拒以一􅓩疏以二門費緍錢一萬九百七十四用工十一萬七千三百八十九日卒功時於後圃草中得朴石乃陳巖修城記嵗適三歷已酉矣九年許門下將為記三年敕知通都監常務點檢修葺俾勿壞轉運提點刑獄遇巡歷檢察之八年元郎中積中以女垣善壞乃悉撤其覆本欲為屋併覆女牆會交趾叛白禦暴不待屋也乃併撤其舊所覆城面椽瓦甃以重甓密置候樓皆得瞰臨之勢紹興元年范汝為據建州程待制邁乃發巷石纍虎節定安豐樂康泰為四甕門設敵樓閲月乃成三年八月張參政守毁虎節甕門復舊門明年正月復定安十五年四月莫尚書將復二門其敵樓各從門毁之今門七南虎節門雙門祥符九年嚴侍御辟疆新而名之嘉祐四年元給事絳重作熙寧二年修政和六年黃尚書裳重修門外還珠門雙門舊龜頭門偽閩龍啓元年作嚴侍御辟疆改今名寶元二年范都官亢修政和六年黃尚書裳修紹興七年居民火拆榜以禳之尋重立東南定安門閩王審知作嚴侍御辟疆更名今梁間有八月庚戌樹立六字乃閩王時題至是修政和六年黃尚書裳重修東康泰門梁乾化二年八月十九日閩王作名東康治平元年元給事絳重作更今名上有樓名東山西豐樂門舊羅城門初嚴侍御辟疆更名樂輸以近都倉也至是拓子城遂為子城門建炎間建寇攻城惡輸字更今名淳熙改元鄭提刑良嗣重修門內冝興門舊子城門也嘉祐八年元給事絳作至是拓子城不撤今仍存西南清泰門羅城唐天復元年王審知創築羅城四十里舊記云五十二里設大門及便門十有六水門三舊有觀察判官劉潞作修羅城碑在利涉門外熙寧二年既增築子城西南羅城西門缺不復作豐樂門已為子城西門政和五年利涉門災羅城南門復廢不治二方雉堞堙沒斷絶遂與夾城通矣門今存者六南利涉門雙門上有重樓挾閣前安泰橋政和五年災東南通津門嚴侍御辟疆名兼濟康定二年沈都官邈更今名東海晏門嚴侍御辟疆名熙寧六年丁聳修淳熙五年沈樞密復修今俗呼雞鴨門東北延逺門崇寧二年王祕監祖道重作門外橋欄石刻通逺必舊名也北永安門熙寧三年程大卿師孟重作門外絤栁橋西千騎橋西北安善門閩王王審知作上有樓熙寧三年修紹興七年復修廢樓內有鹿項門今西湖旁熙寧廢其外城距子城數步正偽閩為復道處西南清逺門今俗呼鴨門崇寧三年修舊以豐樂為羅城與清逺城接故中間又有金斗門熙寧拓子城遂自金墉橋以南皆無城門亦廢夾城梁開平元年偽閩録云二年王審知初築南北夾城南夾城今寧越門東西一帶北夾城今嚴勝門遺愛門一帶謂之南月城北月城黃滔萬嵗記新城似月圓南城大門纍磚甓設懸門外樓櫓七十間便門六水門二濬壕以通潮汐北城大門二便門五南城大壕百五十步北城壕通西湖黃滔記後漸湮塞今多豪右租占李仁達時唐兵攻之不下初王氏築城令陶者印磚悉為錢文及兵退仁逹果歸錢氏今門六南寧越門雙門梁開平二年閩王審知作名登庸以協郭璞遷城之讖長興二年延鈞改為閩光嚴侍御辟疆更今名東南美化門門內水步門水步門內西通登瀛坊有橫門俗呼上門有土牆南走至美化門西遂踰九仙之麓抵寧越門宣和四年攝州事俞提刑向修舊臨河務美化門東北井樓門北嚴勝門崇寧四年葉吏部棣修西北遺愛門舊名升山治平元年元給事絳作明年移尹南京父老請于府願以公之政績名之遂更今名西迎仙門門外通冶山外城皇朝開寶七年錢昱築東南夾城東夾城今行春門南北南夾城今合沙門東西即今外城也按錢昱自作記題作重築云晉開運三年丙午江南舉兵大侵疆境當矢石之地最甚東南二城周顯德六年巳未始增土補其缺壞纍石立其欹邪既欲速成墮頽低下至是始經度修築則是自王氏以來有此城矣南自光順門而西即合沙門城三百二十九丈其門樓六間敵樓三十間記不言光順門以東恐是時不曽築今東邉城具存東至東武門而北即行春門安邉臨江門樓皆五間便門二一湯中一船場敵樓九間城二百七十四丈開沿城河二千九百尺自東武門而南門樓三間敵樓二十四間城三百一十丈開沿城河三千六百尺凡城髙丈有六尺而厚半之石其基纍甓而覆以屋二年乃畢記云凸則為基坳則為洫今兩城東南皆遇水而止乂云東臨大江西接平陸見當時沙洲未合城猶近江也三年而墮之因其址茨小垣以周焉王氏自忠懿在位既久遭五季兵革為其國深慮重壁纍塹至於三四周回繚繞外城西北遂與羅夾樓堞相屬益完固矣一經毁廢迄未能復皇祐四年詔曹待制頴叔以漸開修乃自嚴勝門始甓百五十丈時蔡襄作頴叔知福州誥詞有爾其繕除兵械補完城堞之語今所甓尚存嘉祐元年蔡密學襄奏本路建劒汀邵地連兩浙江南乘舟下水至州城不過三二日東南邊海溫莆泉漳諸郡船皆可至今城牆髙止數尺頃儂賊之變嘗詔本路修葺城壘近曹穎叔復只築數十丈願計度卒城之時重惜民力有旨沿海分界有盜賊可窺伺之處令擘畫防備見端明文集有知福州自乞相度開修城池奏狀云福州外城周圍約二十里工料極大若行修築須至科點丁夫配約物料收拾備足一兩月間便要了當若候兵士功役空延嵗月乞降旨揮檢計如重惜民力亦係朝旨熙寧九年交趾叛提刑司奏福州以土垣為羅城緩急無以守禦乃下本路相度仍命兵馬都監郝永德提舉修之轉運使徐億奏本司嵗入所積支用殆盡時詔沿海州軍修築城壁令轉運鈐轄司同共檢計人工物料已有見闕以聞億奏泉州添修外城已約八萬餘貫外福漳州興化軍並係創新開築細計須五十餘萬貫本司逐年所收雜納等錢只及八十萬貫粗了年計惟常平苖役嵗寬剩十五萬貫已應副安南軍與支遣修城之役本為保民今城三千四百餘丈用物料二十萬二千九百餘緡十九萬九千二百餘貫甎石灰竹木價錢三千七百餘貫係樓櫓用鋸木匠雇工錢兵夫三百三十七萬三千四百餘工十一萬三千四十工本州軍工自備三百二十六萬三百七十一工每工每日攴米二升計六萬五千二百七石四斗二升鹽菜錢十文計三萬二千六百三貫七百十文足願借民力以成之尋以嵗未豐稔遂罷宣和三年方臘反州鄉老李全等復以外城為請亷訪司奏本路有封樁鈔旁定貼錢十五萬緡望行取撥與居民願出備錢物併力完築有旨令壯城廂軍以漸開修時余太宰深復奏乞依元豐法制建創外城乃下轉運提點刑獄鈐轄司審度諸司以元豐法邊城髙二丈廣加四之一閷其半為上之廣壕三重又有甕城羊馬城釣橋之屬今打量外城長三千三百七丈髙二丈底闊二丈五尺上收一丈共用人匠八十一萬三千一百餘工物料十五萬三千四百餘貫既而以賊平復罷建炎二年詔諸路城壁令守令勸誘官民户助修不足申省給降錢物本州計度當用緡錢二十萬民貧産薄助者實鮮乞給度牒一千三百道尋降五十道遂止紹興二年十一月臣寮建言閩在今日實作屏翰泉福皆號巨鎮泉城稍固望特詔福唐度修城池仰寬南顧之憂有旨令帥臣相度張參政守奏城周六千八百餘步頽基廢址占佃者衆重以地多沙礫所費不資略行細計緡錢約七十萬米六萬斛軍興以來公私困竭夏秋大旱米斗千錢乞候豐嵗為之乃寢今壕隍湮塞半為民田矣外城門六南合沙門嘉祐八年元給事絳作名逺南政和二年張殿撰勱修更今名宣和三年攝郡事俞提刑向修次自南臺渡江十里合沙門次寧越門次利涉門還珠門次虎節門次威武軍次都督府門麗譙凡七程大卿詩七重樓向青霄動王尚書詩七樓遙直釣龍臺政和五年利涉災今六譙矣東南通仙門美化門之南嚴侍御辟疆名樂郊後更今名東行春門嚴侍御辟疆更名景祐二年梁比部逸修東北湯井門外湯路門即安邊樓也船場門恐即臨江樓門也西怡山門治平元年元給事絳作城塗州城九軌之塗四州至寧越門鳯池坊至行春門依仁坊至開元遵義坊至豐樂門六軌之塗三行春門至天慶觀寧越門至合沙門興賢坊至羅山寺東四軌之塗八清泰門至儒宗坊拱星坊至羅山寺西侯官坊至延祥前豐樂門至迎仙門夀帥坊至旌隱坊登瀛坊至水步門慶成寺前至乾元寺前三軌之塗七美政坊至通仙門聚英坊至登俊坊忠順坊至閩縣棣華坊安善門至鹿頂門其他率增減於二軌之間雖窮僻側足皆石也偽閩以來塗多凹弊石亦未遍康定元年鄉民黃浩然等砌東瀆熙寧以後道士顔象環勸募周更營幹凡三十一年至夷康山鐵塔二嶺道左刻施者姓名與其嵗月東門刻元豐八年陳奕砌東路刻熙寧十年衆砌河西刻蔡宗與衆砌南門刻何日華男亮成砌陳植贈象環詩銷整新階繞郡城知師才智善經營為憐世路多傾側故使行人盡坦平一府輪蹄還往便干門箕帚掃除清樂遊橋上紅塵接未免區區事送迎政和二年林瑶與衆砌永安門州産榕木河堤官廨多植之陳贈元給事詩榕葉堂前坐晝隂治平四年張郎中伯玉令通衢遍户濬溝六尺外植榕為樾嵗莫不凋熙寧以來緑隂滿城行者自不張蓋程大卿詩蒼煙巷陌青榕木政和中黃尚書裳蒔補其闕今定安冝興新河無恙東南數里僅存數株矣子城坊巷由儀門而東入東康門抵康泰門州便門路也由儀門而西入西園門折出威武營冝興門內由儀門而南威武軍門又南虎節門舊街東民居於溝外設店鋪中為廊以便行者往來乾道四年災吳憲龜年攝郡以街南北與譙門相望不冝偏狹今拆入近裏架造廊路遂塞東依仁坊子城廂治平記東定安坊西冝興坊各以其方之門名之西遵義坊後更今名仁義表東西也慶厯中蘇提刑舜元開井號蘇公井鋟之石欄子城九外城五今隨方具之由豐樂至定安其井三由臺門至虎節門其井六臺門第一井以銅為水用之漏壺輕重適平嵗久多堙建炎四年程待制邁悉濬之由依仁抵定安循城出虎節之東曰東衙舊官廨所在也其南有東總門今皆為民居小巷經緯二由遵義抵冝興循城出虎節之西曰西衙舊有西總門出其南小巷經緯三蔡公襄於西總門之東創醫學東總門之西揭示聖惠方見治平圖由冝興抵豐樂即都倉前熙寧二年築子城環城下內外甃甓為塗登新城詩云白晝兔探湯冝興坊南並渠抵清泰門西中羅夾城坊巷由虎節南至合沙門又南至江東鳯池坊地名十字街頭舊號左通街許公將遷右丞郡守葉吏部棣昜今名以期之鳯池亦鄉名也大隱坊舊號都市韓通直召之祖之居崇寧間舉八行黃尚書裳昜今名使旌坊地名大石井李大夫浼嘗任漳守鄉人因名云嘉榮坊地名南營政和間李大夫俯知婺州後其子提舉衙東鄉人榮之故名內蘇公井一旌隱坊地名館前沈郎中舍五十致政還鄉隱于城南宿猿洞三召不起以為轉運判官元始事因名其坊內北發政坊舊內有居養院安濟坊元符元年置以處不能自存者月以丐者之半給之驍騎坊駐泊營名漣漪坊臨河朱紫坊地名新河舊號三橋朱通奉敏功之居昆仲四人皆登仕版通奉享年九十餘子孫繁盛朱紫盈門鄉人因以為名內南鄉行坊陳祖武政和二年特恩轉運使欲舉其行實力辭之乃名其坊為鄉行仍手札以旌之興賢坊內州學舊曰進德政和行舍法改今名學之東有閩時太妃宅今猶呼蘇公井一西登俊坊地名楊橋舊曰右通衢宣和間改名春風樓前有蘇公井一即官坊以劉濤子孫皆為即故名陳先生烈之居興文坊地名塔巷舊曰修文其中舉人數不利陳知縣肅改修為興其年登科新美坊舊黃巷永嘉南渡黃氏巳居此乾符六年黃巢儳路圍福州觀察使韋岫敗而遁遂暑爇城中至崇文館校書郎黃璞之居曰此儒也滅炬弗焚惟此一巷以璞免黃巷名因此益著崔大夫及第因改今名元台育德坊舊安民巷劉中奉藻以孝聞郡上其事詔賜粟帛以旌之因號其坊曰錫類余太宰深登庸以其舊居改今名聚英坊內紫極宫故名仙居後崔李二姓咸顯貴因改名利涉坊利涉門之旁桂枝坊以鄉名安泰橋下蘇公井一萬夀寺前一候官坊內候官縣近里人以候闕日久改為宫賢將官衙前蘇公井一內南道山坊以道山亭名之內有道士井初晉時林氏入閩有華陽道士謂之曰可鑿井於南山下遇磐石則止乃如其言俄有白豕躍入其中泉遂湧至今旱不涸西儒宗坊北名山兜鄭司業南所居舊名延平由鳯池東抵行春門外北介福坊內元明王祠鄉人祈禱之所振名坊並地名後河陳太丞以方醫名京師既而彭文嗣登第因名太平公輔坊地名坊門舊以通太平寺名坊紹興末朱公倬拜右相王尚書師心加公輔二字以名之坊尾舊有開元坊今無開元寺前蘇公井一髙行坊地名鄉習營以驍勇名坊蓋內有駐泊營也後趙伯尚舉八行改今名秀實坊舊曰升秀士人有纍舉不第者後有登科故名內夀寧坊通井樓門忠順坊舊名延慶以慶成寺前延慶橋名陳奉議景參三世登科郡守欲號顯裔以其私諱乃詢其字或曰字子孝守曰以孝事君則忠以敬事長則順故名之慶成寺東舊有南禪坊今無寺前蘇公井一閩都坊舊曰閩會縣治在焉海晏坊海晏門之旁喜壽坊卓推官之居其母陸侍郎藻之姊也侍郎治郡日年八十餘尚寧健因以為名棣華坊地名湯巷鄭氏兄弟三人中武舉杜廷試為第一因為名溫泉坊地名內湯南思義坊舊曰阜財交易所也通大隱坊地名厰下連桂坊地名梳行黃給事唐傳之居兄弟繼登科第延康名之清泰坊地名石井大觀中李殿撰畸立識時也朝士坊地名小石井以朱大夫敏元之居名仁慶坊舊曰捉生偽閩營黃尚書裳以其非雅改之拱星坊閩王時號新路口華萼坊閩王時號新市美政坊舊名施攻地名河西出通仙門外冠賢坊黃國録倫兩優釋褐立罾浦坊地名河東天聖中李屯田正登第子述繼之葉吏部名其坊曰世顯初郡人有詩云疑是分開渾沌初奔竒走秀兩相於等間開圃多栽竹到處人家盡讀書宴飲直嘗千户酒盤飱唯侯兩潮魚九華峯頂真仙宅罾浦坊中出輔車鄉人以久無第進士者乃剽詩以更其名今又為罾浦狀元坊舊曰團練坊嘉祐八年因許將狀元改尊儒坊蔡伯俙字景蕃祥符九年應童子科真宗賜舊詩七閩山水多竒俊四嵗兒童出盛時家世傳清白裔嬰孩自得老成姿才方學步來朝謁未及能言便賦詩更勵孜孜圖進益青雲千里有前期授東宫侍講暇日畫村民以嬉目而蒿且有菜色帝適見而詢焉對曰臣所居州蓋瘴鄉也故其人皆然帝嘆久之東嶽行宫坊行春門外地名舶塔頭通天慶觀繼韋坊髙縣尉介卿與子安世同年登科故立南入拱星坊直抵通津門由通津門至羅山寺角西出興賢坊東舉亷坊地名黃兼倉黃鄭初入閩所居後陳尹舉八行改名潤澤坊閩橫衝營內義井二葉吏部闕名髙節坊舊名嚴師因林提學徽之名後楊通判幹引年致仕更其名至喜坊胡氏兄弟文炳文煒同時登科因名濯纓坊通使君化成坊舊鐵冶坊冶鑄之所登瀛坊舊九仙坊地名仙迹水步門大路仙迹坊亦通九仙山西積貨坊近市黃尚書名內過捉生營連榮坊通小石井舊曰既富以樊氏兄弟仁逹仁逺登科改名嶽臨坊內嵩嶽行宫丁戌山之巔南舊有安福寺崇慶塔號新塔夀帥坊王端明祖道之居端明兩知鄉郡移知桂府故名西通旌隱坊地名館前蓋閩越時五州諸侯館所至今猶呼云兼濟坊通津門之旁門舊名兼濟坦履坊西通朱紫坊沿河一帶地名新河中狀元坊紹興十二年因陳狀元誠之立全勝坊地名羅山寺角今法海寺也以舊營名由豐樂門至迎仙門中亮功坊余太宰深府第政和中賜賢弼亮功扁郡人因以名坊南永和坊地名小排營北西湖坊舊有贊城坊以城里為名今無由豐樂城而北西踰冝秋橋宜秋坊通西湖坊不踰橋而北出安善抵遺愛拱辰坊州北熙然坊政和中黃尚書裳再任日立亦識時也由清泰門出清逺門外地名後街東通大街中豐盈坊舊楊橋坊西大水流坑小水流坑並通浦尾棣錦坊舊通潮巷以二陸皆知鄉郡改今名文儒坊舊山隂巷後改儒林以鄭祭酒穆之居改為文儒甘液坊地名方井即蘇公井也中光祿坊舊曰閩山光祿卿程公師孟遊法祥寺置光祿吟臺因以名之西風憲坊清逺門外余太宰之兄待制清之居擢為御史俄改今名由康泰門東行折而南出井樓之西北麗景坊地名東瀆由麗景坊北行出延逺門抵嚴勝門昭利坊祐正坊俱以昭利王祠故內外城壕橋梁附舊記州東帶滄溟百川叢會控清引濁隨潮去來吳都賦所謂潮汐池幾是也今城東南地勢卑平潮上大江自南臺城南有越王釣龍臺故名東北入河口津經通仙門舊樂郊門後以土人嫌樂落音同改美化門之東至臨河務入南鎖港水門北過德政橋古渡也紹興十四年僧覺漸作闊九丈為三門號曰新橋曩時大義白田諸渡至河津及城南有東適者皆出澚橋欲徑者此渡焉或曰自橋立東走者免百步之迂然北山七十里之水會于澚橋之北駐而後進行未百步復逡巡于是橋之下時潦暴至尾泄不逮東湖數十里田畝莽為水病由此故也今考舊記則不然東湖自晉開鑿正欲受北山之水民自堙塞而為田豈橋之罪哉乾道二年創亭至去思橋為羅城大壕即澚橋也南從江岸開河口通潮北流至澚橋浦遂通東湖直如溝瀆號直瀆浦相傳亡諸時四面皆江水此如屋奧舟楫所赴北會山原東逹行路其時已有橋惟木性喜腐更革莫得詳閩王時始以澚名橋至皇朝開寶中錢昱修景德元年謝即中泌謀昜以石州民陳祐等奔走營集泌去三年而橋始成後泌死州民相與縞素嚴侍御辟疆問之曰我皇朝刺史十四人而爾獨拳拳于兹何於是嚴尚嚴故祐等皆曰侯於吾民天地也不張權不恃威兄弟而爭者訓之頑梗者責之訟幾乎息矣嚴聞其言刑亦為寬祥符七年改曰通津崔軻記熙寧八年元即中積中慕謝之政於是舉何武故事改曰去思大書于橋左後五十年陸侍即藻守鄉郡始措民居而亭之朱欄鴈齒縹碧凌空亦一時壯觀也俞提刑向記植于橋右過橋北出鎖港非水路但設水門散入東湖舊記在州東北周回二十三里晉嚴髙築城日與西湖同時開鑿今漸堙塞為民田慶厯中作記只曰漸堙塞是猶有湖也其西分為三一自通仙門之南入通仙橋乾道三年始創亭西行經洗馬橋合沙門外時洗省馬於此橋之東别分一支南橫通韭菜橋又東西分為兩支而南名曰玉筋水而西會于夾城壕之西南隅一自美化門之西入教場南過寧越門外九仙橋有景德四年林洪範為閩光門合沙新石橋記大略言南城之壕實要津焉先是壕梁造以官籍之數嵗理日葺軍什即役相顧其咨虞部袁公召緇流地民好善者示以石梁之議人樂其便逾時告成或曰梁開平二年閩王作名合沙按開平四年翁承贊同閩王有登水閣詩軋軋朱輪下九霄登庸門內駐星軺他時若問今時事只有南邊是舊橋注橋名合沙然則二年蓋修之也逮皇朝元符二年顔象環亭其上更今名橋東有湖閩王築南月城因設大壕百五十步後為蓮池宣和五年榜曰南湖今多堙為田矣旁薰風亭禊遊亭秉蘭堂西踰宿猿洞趾過西門迎仙橋乃北通西湖至遺愛門池橋舊記西湖在州西三里蓄水成湖可蔭民田偽閩又益廣之迤邐南流接城西大壕直通南蓮池父老相傳閩時湖周回十數里築室其上號水晶宫時攜後庭逰不出莊陌乃由子城復道跨羅城而下不數十步至其所今宫迹猶存民田其上而湖盡為民田及菱池矣異時太守出西湖觀競渡則知與南湖通也舊記云亡諸時湖中山一夕飛往臨海其説誕一自德政橋之西南至河西橋以西大中祥符二年作紹興二十六年鄉人更名使君以閘名之也置閘舊名清水堰今名使君閘吸大河水貫城而西經通津門橋舊名兼濟舊記從清水堰開河通澚橋浦拔潮貫城橫度兼濟門蓋偽閩築羅城時所鑿也咸平中陳象輿重濬之併門改名俗號新河通大船往來次安泰橋利涉門外舊有重修津渠記在利涉門下掌書記陶嶽文宣和七年陸侯藻創亭次清逺門橋次板橋次金斗門橋直抵浦尾羅城壕在金斗門東橋近之故名西橫出金斗門以西乃是外城壕壕通迎仙門外橋至湖觀治平圖水從外壕入城至金斗門西入至浦尾通澚橋潮水相傳自晉時有堰今湮塞折而東經金墉橋五雲樓下保一營門南與甘棠閘潮相遇其東别為一自通仙門之東北行至臨河務水門分支壕繞外城而北過行春門外樂遊橋元祐中顔象環作又繞而西至湯井門接去思橋河尾其北又分為二一自去思橋北西入甘棠閘舊記晉嚴髙築城日從今迎仙館前開水口通澚橋浦觀治平圖館在甘棠閘側今轉運東行衙是也閘舊有之政和中黃裳修紹興二年夏旱程邁命知閩縣王陔重修陔曰凡閘必設二以迭為啓閉今但修一其泄必利或遇啓放馳駛昜涸冝增一以節其勢啓前閉後於水無損此真法也乃從之使君閘六月二十四日興十有八日成甘棠八月十三日興十日成今法海慶成二寺管之以潮大小為啓閉之節淳熙元年史丞相浩復修又西行過延慶橋慶成寺前次師橋壽寧坊前次經院前橋次長利橋由三山樓下橋之北又有一橋旁有閘基猶存前通仁愛橋通闤橋左院後後河新瓦路次虎節門大橋舊記云前大橋河晉嚴髙開舟楫往來因名大航相承去航字直曰大橋後五百年至唐元和中觀察使薛蹇冉開以油杉作提限熙寧三年程大卿師孟改為樂土次清泰門雅俗橋清泰門外門東迫子城有小橋名衆樂下有水門至子城西南隅髮苖橋髢也俗呼苖為堯昔有嫗於此賣髮髢因名今普明菴傍舊橋側有水閘基石猶有後又創為橋與清水堰潮相遇北行至豐樂門義和橋今俗呼定逺橋恐舊名次冝秋橋至鹿項門牆止相傳偽閩時鑿渠引西湖清水貫城而入沿豐樂門城隅與浦尾潮接為浴馬之所且以滌滓穢今無清水潮尾或時至先時尚容小舟今不復有猶名西湖一自去思橋北北行稍不附城至嚴勝門並石泉而北乃東折至安國之左舊記云由渠一支自嚴勝門通潮西至遺愛門四面設壕塹通潮慿髙望之如小蓬瀛是亦言其大槩耳未必實抵遺愛門也偽閩時嘗穿龍腰術家以為主山蜂腰之脈竟不敢而罷所謂至遺愛門者諒第底龍腰而止今自石泉西折至龍腰之東皆為民田若其子城之東南自長利橋北走經定安門仁愛橋並開元而北踰康泰門樂遊橋趨將軍山之南自長利橋至定安門渠旁民多侵為浮舍熙寧二年程大卿築城始撤之尋其源而復濬焉乃北趣將軍山之麓西南自清泰門東衆樂橋水門入子城舊以冝興為子城是渠浴城而北熙寧拓子城遂為水閘經開通橋與衆樂橋隔牆次便民橋大中寺東次冝興門橋橋東退木埸西舊冝惠坊磨務治平猶有之今為安撫司客邸沿都倉至威武堂西澄瀾閣閣臨水今廢通西園池園在府治之西左亭而右庫忠義堂前池舊通潮凡府右諸竇之水皆歸焉巳上嘉祐二年蔡密學襄開河有記立于左院之碑亭自清水堰口至兼濟門橋南岸百五丈九尺五寸北岸百五丈七尺泥面三丈六尺底二丈四尺深三尺兼濟至利涉門橋南岸百七十六丈北岸加一丈八尺泥面三丈三尺底二丈二尺深四尺利涉至清逺門橋南岸百四丈一尺北岸加八尺泥面三丈三尺底二丈二尺深三尺清逺門至髮苖橋南岸四百八十一丈六尺北岸四百六十八丈二尺泥面三丈底二丈深六尺髮苖橋至清泰門橋南岸四十八丈五尺五寸北岸四十二丈六尺泥面二丈底一丈四尺深六尺清泰門至後河口開元寺前小石橋南岸九十二丈九尺五寸北岸百八十九丈二尺泥面二丈底減六尺深五尺小石橋至經院前橋十八丈八尺泥面三丈底二丈深五尺經院橋至南禪寺斗門南岸百七十六丈二尺五寸北岸百八十七丈七尺泥面三丈深四尺髮苖橋至樂輸門橋百六丈五尺五寸泥面二丈底丈有四尺深六尺樂輸門至鹿項門牆九十八丈四尺泥面二丈底丈有四尺深六尺清泰門至冝興門橋東岸九十五丈八尺西岸加五寸泥面丈有五尺底丈深六尺冝興門至州衙牆七十八丈泥面丈有五尺底丈深六尺小石橋至定安門六十三丈六尺泥面八尺底六尺深六尺定安門至東康門橋百九丈六尺泥面丈有五尺底減三尺深六尺又自西北繞郡城之後東入甌冶池今將軍山之北昔冶山之麓也亦名東冶及俗呼甌冶皆以東越故耳程大卿師孟創甌冶亭作詩又為後序云豫至州之明年新子城城之東北隅灌木隂翳因為開通始問此水或對曰甌冶池豫竊喜其迹最古且愛其平闊清泚又池之南隴阜盤遷喬林古木滄洲野色鬱然城堞之下於是亭閣其上而浮以畫舫可燕可遊亭之北跨濠而梁以通新道既而州人士女朝夕不絶遂為勝槩程以為迹最古者謂甌冶子善為劒者事載越絶書頗詳此池乃甌治子鑄劒之地然無所稽考州雖有劒池寺唐元和中僧惟幹濬之得銅刀劒環數枚猶有冶竈在竹林間又隔在將軍山之南南去尚百餘步非此池也或恐鑄劒者因此以自號則有之矣然池非以鑄劒者得名偽閩時州北無渠從州西北西湖廟南十五步羅城開渠外吸西湖水源東入沿子城以通此池長三百步上立木橋四西湖樓下恱濟橋直通安善門次玉壘橋次永安橋正北天王堂下蓋主山之經脈初開遇石恐傷其氣故渠不甚深次龍泉橋入歐冶池政和中亷訪以其地植花修貢宣和五年俞提刑向攝郡事移甌冶亭木植于禊遊堂之東為秉德堂紹興四年復亭于故址又有喜雨堂城隂館西湖舊記在州西三里偽閩時湖周回十數里築室其上號水晶宫其後盡為民田淳熙十年待制趙公汝愚奏請興復開浚而朝廷從之今盡復舊制公奏曰契勘本州元有西湖在城西三里迤邐並城南流接大壕通南湖瀦滀水澤灌溉民田事載閩中記甚詳父老相傳舊時湖周回十數里天時旱暵則發其所聚髙田無乾涸之憂時雨泛漲則泄而歸浦卑田無弇浸之患民不知旱潦而享豐年之利後來人户夤緣請射嵗納些小課利謂之池户官中但見其絲毫之入而不知其為民户永逺之害嵗月浸久填淤殆盡各立封畛以為己物或塞為魚塘或築成園囿甚至於違法立劵相售如祖業然西湖南湖不復相通而古人積水利民之地盡為豪民猾户所有雖潮水不住往來而上下阻隔無由通濟臣照得本州地狹民貧全仰嵗事豐登田疇廣殖小有荒歉難以枝梧况田並湖彌望盡是負郭良田自從水源障塞之後稍遇旱乾則西北一帶髙田凡數萬畝皆無從得水至春夏之交積雨霖淫則東南一帶低田發泄遲滯皆成巨浸致使一方人户白納稅租而所謂池户者公然坐享重利第以圭撮之入其為利害大不相侔矣今來若不申明恐向後轉見堙廢難以興復並湖之三閘高六尺長二丈四尺板二重各五片髙五尺長一丈一尺五寸開元寺看管五第四閘髙六尺長二丈三尺板二重各五片髙四尺寸長九尺安國寺看管第五閘髙六尺五寸長三丈五尺板二重各四片髙四尺長一丈七尺東禪寺看管右五閘各以板數為凖滀水灌溉常冝扄鎖不可妄啓惟大潮候日初三十八遇有小舟乘載往來聽啓閘一次一鳯池橋堰一座髙五尺長二丈四尺遇上斗池涸竭聽民户從便車湖水入池以助灌溉一西湖巡鋪屋三所鳯池橋黿潭三橋每所差延祥寨兵士四人守宿十日一替近湖居民以農為業並不許置捕魚網具一西湖新買官地砧基簿十本內四本藏之本州及三縣架閣庫六本藏之雪峯鼓山東禪西禪支提寺紫極宫常住永逺照用一三縣承食水利民田總計一萬四千四百五畝十西湖閩縣三千五百九十八畝候官縣一千六百八三畝懷安縣二千三十畝濶東湖懷安縣七千九十四畝一浦三道鳯池橋浦一丈五尺道士洋官亭下浦濶五尺水道士洋房廊屋後浦濶一丈七尺右係引灌田之處各有水窗禁魚出入淳熙三山志卷四
