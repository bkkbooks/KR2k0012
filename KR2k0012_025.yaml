body:
  text: 淳熙三山志巻二十五宋梁克家撰秩官類六啟運宫官幹辦官一員建炎四年置紹興四年至三十一年淳熙元年二年五年六年皆二人西外宗正司官知宗正司事一員紹興三年移司福州士樽右監門衛大將軍英州團練使紹興三年正月二日至子淔寳文閣直學士左大中大夫七年閏十月士漮文州團練使十一年正月士樽光山軍承宣使十五年士衎和州防禦使二十一年士礽右朝議大夫三十二年子瀟龍圖閣直學士左大中大夫知福州兼知隆興二年七月子英左朝議大夫乾道二年五月士秀眉州防禦使五年五月士程武當軍承宣使七年五月不敵左朝奉大夫九年十二月子濤奉議郎淳熙二年七月公廙朝奉大夫六年九月丞一員以本州通判一人兼用崇寧元年指揮簿一員以本州簽判兼用崇寧元年指揮主管敦宗院一員紹興元年文武各員後省武臣一員宗學教授一員紹興元年自侯文中始提刑司官文臣提刑一員淳化二年甞遣使察本路刑獄尋省之景徳四年始置提㸃一員副以武臣天聖六年廢明道二年復置武臣提刑一員同提㸃刑獄景徳四年置天聖六年廢明道二年復置嘉祐五年廢熙寧元年復置二年廢宣和三年詔權置事平日罷乾道六年復置丁遜太常丞直集賢院景徳五年至大中祥符四年王守元同提刑内殿崇班閣門祗候劉文濟殿中侍御史大中祥符五年至七年韓闕同提刑閣門祗候王文震考功員外郎天禧元年至二年張闕同提刑東頭供奉官閣門祗候耿克從國子博士天禧四年丁諫同提刑侍禁閣門祗候王耿侍御史乾興元年至天聖二年冦用和同提刑右侍禁閣門祗候林宥太常博士天聖二年趙易簡同提刑内殿崇班閣門祗候劉立之比部貟外郎景祐元年張知雄同提刑内殿承制閣門祗候韓琚都官員外郎景祐四年移廣西運使劉逵同提刑右侍禁閣門祗候欒源虞部郎中景祐四年王翌同提刑内殿崇班門門祗候寳元元年李敷都官貟外郎寳元元年至康定二年李傳同提刑供備華副使丘倚都官員外郎慶厯元年自撫州移王罕國子博士慶厯四年張闕同提刑東頭供奉官閣門祗候髙易簡虞部貟外郎慶厯三年自䖍州移郭承規同提刑供備庫副使蘇舜元太常博士慶厯六年自湖南提刑除八年移京西提刑張顯普同提刑内殿崇班閣門祗候慶厯七年至皇祐二年盧咸司封員外郎慶厯七年至皇祐二年曽經同提刑内殿崇班閣門祗候慶厯七年至皇祐五年章君陳屯田員外郎皇祐三年翟承恭同提刑左藏庫副使皇祐三年吕公孺司封員外郎皇祐四年至至和二年知常州張肅職方員外郎嘉祐元年至二年柴肅同提刑閣門祗候嘉祐元年至二年施元長司封員外郎嘉祐三年至六年移兩浙提刑李宗孟同提刑内殿承制嘉祐三年至五年罷不差武臣王陶度支郎中嘉祐六年至治平元年羅拯太常少卿治平二年至四年陳益司農少卿治平四年至熙寧元年阮紳司封郎中熙寧元年至三年杜該同提刑内殿崇班熙寧元年至三年移知黔州後不差武臣宋道司封郎中熙寧四年李景亮金部郎中熙寧四年葉温叟水部員外郎熙寧五年至八年沈叔通屯田員外郎熙寧九年徐總太常少卿熙寧十年閭丘孝直屯田郎中元豐元年李茂直朝奉大夫元豐五年喻陟朝奉郎元豐八年十二月十九日到任元祐元年五月初四日除陜西提刑彭寂朝議大夫元祐元年八月初四日到任三年十二月初十日赴闕錢㬇朝議大夫元祐三年十二月初五日至五年六月二十七日移淮西提刑祖無頗朝奉大夫元祐五年十一月二十三日到任七年十一月二十七日赴闕曹振朝散大夫元祐七年十一月二十三日到任王祖道朝奉大夫紹聖元年閏四月十三日到任置南臺合沙橋二年十二月除吏部員外民立祠於浮橋南濟川亭張琬朝請郎紹聖三年二月十三日到任四年四月四日赴闕程遵彦朝請大夫元符元年六月初四日到任至三年十二月十五日除祠部員外郎周誼朝奉大夫建中靖國元年二月二十三日到任崇寧元年三月移廣西運副張向朝請大夫崇寧二年四月三日到任二年六月赴闕畢漸承議郎崇寧二年六月初五日到任四年五月初八日除膳部員外郎喬世材朝請大夫崇寧四年五月初二日到任大觀元年十二月二十九日授京東路提刑句仲甫朝請大夫大觀二年三月四日到任准朝㫖措置福泉劍州邵武軍鑄錢至六月二十三日移湖北提刑陳覺民朝請大夫大觀二年六月二十五日自泉州就移至四年閏八月八日移廣東提刑邵璹朝議大夫大觀四年閏八月十五日自泉州就移政和四年二月二十五日移淮西提刑陳建承議郎政和四年十月二十日自泉州就移六年八月二十三日除直龍圖閣移本路運副郡人鄭南朝奉郎直祕閣知泉州就移政和六年十月初五日到任宣和元年六月十九日罷任郡人王仲閎朝奉郎自本路提舉香茶礬事就遷宣和元年六月十九日到任當年九月十一日除湖北提刑俞向朝散郎直龍圖閣宣和元年九月十二日到任五年正月十四日再任耿南金武經郎閤門宣賛舍人本路亷訪使者宣和三年二月内填復置闕六年三月内准勑發赴闕陳桷朝請郎靖康元年四月十九日到任至建炎元年十月二十二日罷任李芘中奉大夫建炎元年十月二十二日到任建炎二年八月初四日罷任郡人林杞朝奉大夫吏部員外郎建炎二年九月二十五日到任三年十二月初七日罷任梁澤民朝散郎自提舉准勑差權建炎四年正月二十六日到任六月二十五日得正官替王綰朝請郎吏部員外郎建炎四年六月二十三日到任十月十七日丁父憂陳桷朝散大夫再除建炎四年十二月初七日到任紹興元年三月十七日宫祠罷廖剛朝散郎紹興元年三月二十六日到任四月初六日准勑發赴行在徐庚左朝請大夫紹興元年五月二十五日到任二年六月二十五日召赴行在劉嶠左朝奉大夫直徽猷閣紹興二年六月二十七日到任至四年九月初五日罷吳聰問右朝請大夫紹興四年九月初五日到任六年十一月十七日除廣南西路提刑施坰左朝請大夫紹興六年十一月十三日到任八年四月二十七日罷任宋孝先左中大夫直秘閣紹興八年八月二十二日到任十年二月十六日准朝㫖與浙東提刑李維兩易其任李維右朝散郎直祕閣紹興十年三月二十五日到任至十一年八月初五日致仕方庭實左朝散郎直徽猷閣紹興十一年八月二十二日到任十三年八月二十七日罷任李公懋左朝奉郎直寳文閣紹興十三年八月二十七日到任十五年正月初八日罷任李鞉左朝請大夫直祕閣紹興十五年二月二十六日到任六月十一日除江南東路提刑王元鼎左朝請大夫紹興十五年七月十四日到任十六年七月十四日致仕郡人吳序賔左朝請大夫紹興十六年十月初四日到任十九年二月二十八日除知常州孫汝翼左朝散郎紹興十九年三月二十八日到任二十年九月内差知荆南府趙令詪左朝議大夫紹興二十三年七月十七日到任二十五年八月九日除直袐閣再任二十六年二月二十日除祕閣修撰知台州吳逵左朝請大夫紹興二十六年二月二十七日到任十二月十九日除直秘閣知鼎州沈大亷左朝奉郎直祕閣紹興二十七年二月十七日到任七月二十七日兼權泉州十一月二十八日致仕樊光逺左承議郎紹興二十八年二月初二日到任三十年三月初六日除知嚴州王大寳左朝請郎直敷文閣紹興三十年四月初十日到任是月二十七日宫祠梁仲敏左朝請大夫紹興三十年六月二十四日到任七月二十八日准省劄召赴行在李莫左朝散郎直袐閣紹興三十年十二月二十三日到任三十一年三月二十日致仕沈樞左承議郎紹興三十一年七月初二日到任三十二年九月十八日除尚書考功郎官何佾左朝奉大夫紹興三十二年十一月初十日到任隆興元年十二月二十五日除直祕閣知静江府任盡言左朝散郎直祕閣隆興二年九月初一日到任乾道元年正月二十七日致仕李若樸右朝散郎直秘閣乾道元年五月初八日到任二年六月十一日除江南東路提刑何逄原左朝散大夫乾道三年九月二十四日到任四年三月十一日宫祠吳龜年左朝奉大夫直寳文閣乾道四年六月初三日到任六年三月初六日除江南西路轉運副使趙子英左朝議大夫直敷文閣自本路轉運副使就移乾道六年十一月二十四日到任六年二月二十一日召赴行在鄭興裔武功大夫成州團練使填復置闕乾道七年十一月二十五日到任吕企中左朝奉郎直敷文閣自本路轉運判官就移乾道八年二月二十三日到任九年三月除直寳文閣知楊州鄭良嗣朝奉郎淳熙元年二月十四日到任二年三月十二日准省劄任滿召赴行在二十五日滿葉南仲敦武郎淳熙三年二月二十五日到任四年三月二十四日觧罷赴行在奏事謝師稷朝散大夫淳熙三年三月二十五日到任五年四月十八日准省劄候任滿赴行在奏事五月十二日滿孫憲文朝請大夫淳熙五年五月十一日到任七年十月滿鄭槐武經大夫淳熙五年六月二十七日到任六年六月初七日宫祠陳孺朝散郎直秘閣淳熙十年八月到任榦辦公事一員宣和二年置局當公事官一員紹興十八年減帥司屬官一員充提刑司榦辦公事二十二年添差一員二十五年省淳熙八年復添差一員今二員檢法官一員熙寧六年置元豐三年置元祐五年復置轉運使副建炎二年移司福州紹興二年依舊三年復移尋依舊提舉常平茶事元豐元年置提舉常平司崇寧大觀間以轉運司兼領奉行茶事政和三年専置提舉茶事官置司建州二年建兵叛權移福州紹興五年併以提舉常平司為名置司泉州九年經制使司總領諸路常平尋罷經制司常平令提刑兼領福州置司十二年歸建州提舉學事崇寧三年置五年廢大觀元年復置宣和三年廢走馬承受大觀元年以福州為帥府置走馬承受内臣一員武臣一員政和八年走馬承受為亷訪使者靖康元年罷淳熙三山志巻二十五
