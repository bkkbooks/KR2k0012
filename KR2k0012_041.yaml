body:
  text: 淳熙三山志卷四十一宋梁克家撰土俗類三物産地均有所産然各有所宜宜非偏得于此則亦獨盛于他郡馬益福州詩兩熟潮田世獨無陳傳甌冶遺事果有荔支花有末麗天下所未嘗有此其所偏得者而傳又云長樂地産魚蟹多于牛羊葛枲溢于絲纊是其所獨盛也歟然求之十二邑又有不能盡宜者潮田不出倚郭三縣荔支末麗不能及陀驛以北湯背以西魚蟹濱海而葛枲利于平陸如是之類不可以無紀榖稻周禮職方氏揚州榖宜稻州古揚州南境也故稻之名亦不一今州倚郭三縣兩熟早種曰獻臺向金州曰林晚種曰占成曰曰香曰白芒通謂之稻至外縣名色尤多按閩清圖經旱稻之種有六曰早占城烏羊赤城聖林清甜半冬而烏羊最佳晚稻之種有十曰晚占城白茭金黍冷水香櫛倉奈肥黃矮銀城黃香銀朱而白茭冷水香最甘香奈肥獨宜卑濕最腴之地糯米之種十有一曰金城白􅐕黃秫魁􅐕黃苊秫馬尾秫十秫臘秫牛頭秫胭脂秫而寸􅐕顆粒最長蓋諸邑亦或通有之占城相傳其種自占城國大中祥符五年淮浙微旱遣使福建取種三萬斛分給令種蒔之今土俗謂之百日黃是也已上名色雖多不過有二秫曰糯稻餘皆粳稻爾雅所謂黏與不黏之異粳古名稌糯古名黍麥有大麥小麥蘇恭云今南北之人皆能種蒔凡麥秋種冬長春秀夏實具四時中和之氣故為五榖之貴又有一種秋花冬收名蕎麥麻有胡麻有大麻胡麻即油麻也有白黑二種相傳其種得之大宛故名胡麻以其壓油以油麻名之今長溪者佳大麻牝麻之子也諸色皆有之豆有黑者紫者白者緑者紅者羊角者虎爪者如錢片者又有扁豆種于籬落間有蠶豆蠶熟時有之粟粒細者香美南地以稻灰種之不必鋤治江東呼粟曰粢粢稷也即此甌冶遺事米與黍米相似而粒大吕氏春秋飯之美者有陽山之薏苡春生苗莖髙三四尺葉如黍開紅白花作穗五六月結實形如珠子而稍長故名薏珠貨鹽福清鹽埕經其略曰海水有鹹滷潮長而過埕地則滷歸上中潮退日曝至生白花取以淋滷方潮未至先耕埕地使土虛而受信既過刮起堆聚用車及擔輦致孰頭穴土為窟名為漏丘以杵築實用茅襯底滿貯土信取鹹水淋之惟實則取滷必鹹旁用管引入滷楻楻在漏丘之下掘土為窟以受滷芋草覆之取雞子或桃仁置滷中以候浮則滷鹹可煎築土為斛畎在宫竈旁以竹管接入鹽盤如畎澮之流盤以竹篾織用蠣灰塗復織釡牆以圍繞亦塗以蠣灰蓋益以受滷也大盤一日夜煎二百斤小盤一百五十斤今福清長樂縣見有鹽户連江羅源寧德長溪邊海舊亦各有鹽額鐵寧德永福等縣有之其品有三初煉去礦用以鑄冶器物者為生鐵再三銷拍人以作者為鑐鐵亦謂之熟鐵以生柔相雜和用以作刀劍鋒刃者為剛鐵商賈通販于浙間皆生鐵也慶厯三年發運使楊告乞下福建嚴禁法除民間打造農器鍋釡等外不許販下海兩浙運司奏當路州處自來不産鐵並是泉福等州轉海興販逐年商稅課利不少及官中抽納折稅收買打造軍器乞下福建運司曉示許令有物力客人興販仍令召保出給長引只得詣浙路去處販賣本州今出給公據糖取竹蔗搗蒸候官甘蔗州最盛紅花閩縣懷安福凊長樂等縣皆有之花如刺結秋末種春末採可染絳紫草八月末種二月採根用密籠收見海風則變黑矣與紅花同所出藍澱諸邑有之閩縣桐江上下尤多故地有名青藍或青布者為盛出于此草席閩縣江南沙洲草熟織作尤盛陸販上四郡舟運至准浙其至粗者舊淮浙鹽袋用之木筏羅源寧德連江多取木為筏出南北洋白梅懷安候官鄉户園林種至千萬株鹽者為白梅焙乾者為烏梅行至江浙蜜有石蜜巖石間作色青赤有木蜜木枚間作色青白及人家窠檻中作者蜜濃味美紙竹穰楮皮薄藤厚藤凡柔韌者皆可以造紙竹紙出古田寧德羅源村落間黃魯直有次韻惠玉板詩古田小箋惠我百應知溪翁能解玉楮紙出連江西鄉薄藤紙出候官赤岸厚藤紙出福辜嶺茶舊記舊閩縣尉㕔名茶山館又縣東十五里有茶園山亦云石鱉山出茶毬場山亭記有芳茗原今甌治山唐憲宗元和間詔方山院僧懷惲麟德殿說法賜之茶懷惲奏曰此茶不及方山茶佳則方山茶得名久矣唐地理志亦載福州貢蠟面茶蓋建茶未盛前也今古田長溪近建寧界亦能採造然氣味不及絲麻紬桑葉小不甚冝蠶得絲粗才可為紬蕉大觀本草閩人灰理其皮績以為布舊嘗入貢紵其皮可以績布一科數十莖宿根至春自生嵗三四收麻諸邑有之績其皮為布連江以北皆溫之于溪旁為坑藏火束麻內其中石覆而水沃之良久乃剝今連江及福清永福出麻布尤盛葛可緝為布長溪等縣有之果實荔支州北自長溪寧德羅源至連江北境西自古田閩清皆不可種以其性畏髙寒連江之南雖有殖者其成􅍄巳差晚半月直過北嶺官舍民廬及僧道所居至連山接谷始大蕃盛大觀庚寅冬大霜木皆凍死經一二年始于舊根復生淳熙戊戌冬大雪亦多枯折常時霜雪寡薄溫厚之氣盛于東南故閩中所産比巴蜀南海尤為殊絶蔡公襄譜之其于果品卓然第一非虛證也江家緑皮大薄而味少淡蔡公荔支譜云福州種殖最多品目至衆惟江家緑為第一緑核頗類江緑色丹而小荔支皆紫核此以緑見異圓丁香他種蒂大下鋭此獨體圓與味皆勝虎皮紅色絶大繞腹有青紋類虎班牛心以狀言之長二寸餘皮厚肉澀福州唯有一株每嵗貢乾荔支皆調于民主吏常以牛心為凖民倍直購之以輸嘗無而不用玳瑁紅荔支上有黑㸃疏密如玳瑁班城東冇之硫黃色正黃兩刺微紅亦小荔支以色名之朱柿色如柿紅而扁大亦云朴柿葡桃穗生一朵至一二百附支而生樂天所謂朵如葡萄者蚶殼殼為深渠如瓦屋焉白蜜純甘如蜜小丁香核如小丁香俗謂之醮核大丁香出天慶觀唇殼瓤多雙髻小紅每朵數十皆並蒂駢首真珠剖之純瓤圓白如珠荔支之小者止于此十八娘紅色深紅而細時以少女比之俚傳閩王有女第十八好噉此品因而得名將軍紅五代間有為此官者種之後人以其官號其樹而失其姓名叉頭顆紅而小可簮纓之側故特貴之紛紅荔支多深紅而色淺者為異故曰枌紅中元紅荔枝將絶才熟以晚重于時巳上蔡公所譜一品紅于荔支為極品出州宅堂前狀元紅于荔支為第一出東報國院已上曽公鞏所記馳蹄以其長大而甘柔也金粽上鋭而下方色深黃栗玉似金粽而圓實其味佳勝洞中紅出于宿猿洞因以名之已上陳傳所傳火山嶺上樹閩記荔支南中之珍果也梧州江前有火山上有荔支四月內先熟核大而味酸謂之火山今州為减其佳者不名品星毬紅此一種出靈岫里田間枝條花葉大三倍色紅而不絳蒂根于臍鋭者如瓜扁者如橘圓者如雞子頎者如皂莢形殊狀詭核皆如丁香亦有絶細者大者器不能盈細者拳之頗重甘脆而韻蓋神品也奪其枝者竟莫能逺焉已上近所稱龍眼一名益智葉凌冬不淍春末夏初生細白花七八月實成殼青黃色圓如彈肉白而甘有大如錢者人亦珍之曝乾寄逺亞于荔支橄欖木端直而髙秋實先苦後甘脆美者曰碧玉柑橘柑類有朱柑乳柑黃柑羅浮柑鏡柑石柑沙柑洞庭柑橘類有密橘朱橘乳橘踏橘山橘黃淡子金橘緑橘宜母子今懷安黃江多亦有柚子橙子類極多佛頭橙蜜橙青橙皺橙欒橙香綿橙香櫞子大者長尺餘香勝柑種楊梅木似荔支葉細隂厚其實生青熟紅無皮殼南人多醃浸之枇杷其葉隂密四時不淍十月開花四月熟甘蔗二種短者似荻節而肥長者可八九尺似竹管宋孝武送蔗百挺與魏太武今閩人稱極為杖蕉葩如萏菡媯紫而倒垂左右挺弓駢其間味甘清媯者為佛指舊極香美為牙蕉曝乾可以寄逺無實而花紅者為紅蕉白者為水蕉棗種類非一方者名骰子尖長者名牙不堅實者名麩棗栗外刺如蝟熟則罅發永逼縣山邑為多蒲萄龍鬚蔓衍水沃其本須㬰露泫藤杪故根號木通花細而黃白實如馬乳碧者葉差厚比果之珍者今州有之蓮爾雅及陸璣疏荷為芙蕖華未發為菡蓞巳發為芙蓉其實蓮其根藕雞頭芡也埤雅蓬鐏似雞首先實而後花畫合而宵開與荷花相反蓋隂陽之别也今連江東湖亦多有之芰菱也浮水上花黃白實則回向水中櫻四月熟深紅者曰朱櫻黃晶者曰蝟櫻木瓜大者出長溪瓜城北下洋最多其小者謂之一握青出福清柿有花柿有卯柿有烏柿有朱柿古田縣最多杏圓者名金杏熟最早扁而青黃者名木杏外皮中實者名銀杏即鴨腳也州近亦有之石榴有黃赤二色近亦有白者實亦甘酢二種甘者為果酢者入藥梨鵝梨舊出近京今州亦育之皮薄而漿多味差短于宣城乳梨香則如之其餘輕消梨拒霜梨水梨赤梨紫梨煤梨之類其糜者謂之綿梨桃有紅桃白合桃晚者為十月桃李有緑李赤李琥珀李鵝黃李林檎一名來禽有甘酢二種甘者早熟脆美酢者差晚胡桃本出羌胡今亦有之奈似林檎而青小花白其味苦榅桲味酸甘似橙子而大舊生北土今亦有之楊桃臨海異物志楊桃其色青黃核如棗核生晉安候官縣可蜜藏之有五瓣或謂之五辮子王壇子臨海異物志王壇子如棗大晉安候官越王祭壇邊有此果無知其名以其生處遂名王壇形小如龍眼王彪之閩中賦王壇假栗楊都賦曰果則龍目荔支王壇丹橘舊記又云相傳生于王霸壇側茨菰葉如剪刀草根實大如錢而差長方言謂之蘇菩提果自西域來得名夏實中虛味香甘而脆核如枇杷子金斗實紅葉似橄欖而長新羅葛根甚大色青白一名土瓜菜蓏菘與蕪菁相類莖葉不光者為蕪菁莖短葉闊厚而肥者為菘芥似菘而有毛味辛辣此青芥也紫芥莖葉通葉多作虀食之最美白芥闕水其餘南芥花芥石芥之類皆菜茹之美者萊蔔俗呼為蘿蔔蓴葉似鳬葵浮水上採莖堪噉花黃白子紫色三月至八月莖細如叉股名絲蓴味甘鳬葵即荇菜也莖澀根極長花黃水中極繁盛白苣如萵苣葉有白毛又有雞苣亦堪作茹萵苣遁齊閒覽載王舜求云萵菜出卨國有毒百蟲不近藝臺香可噉破結血雍菜蔓生花白堪為菜南人先食雍菜後食野葛二物相伏自然無苦取汁滴野葛即死張司空云魏武帝噉野葛至一尺應是先食此菜也一名甕菜遁齊閒覽甕菜本生東夷人用甕載其種歸故以為名水斳音芹生池澤中可為生菜亦可作菹冇兩種荻芹取根白色赤芹取莖葉菠薐劉禹錫嘉話録菠薐出西國中有自彼將其子來如苜蓿蒲萄由張騫而至也苦蕒可傅蛇蟲咬蠶蛾出時不可取令􅴕赤爛蠶婦亦忌食莙薘莖灰淋汁洗衣白如玉色東風菜葉長極厚軟上有細毛紫莖先春而生故有東風之號茄子有數種紫茄重茄青水茄白茄一名落蘇嶺表録異記南中草菜經冬不衰故蔬圃之中栽種茄子宿根有二三年者近城種多出城西莧莧有六種有人莧赤莧白莧紫莧馬莧五色莧胡荽湘山集胡荽即園荽也人或謂之香荽幼幼新書云一名鵝不食草同蒿令人氣滿不可多食蕨爾雅曰蕨鱉也郭注初生者可茹薑出在城三縣連江縣多葱有數種入藥用山葱胡蔥食品用陳蔥漢蔥凡蔥皆能殺魚肉毒韭園人種蒔一嵗三四剖之其根不傷至仒壅培之先春而復生許云先種而久故謂之韭薤似韭而葉闊多白無實不可生噉以其葷辛也葫大蒜也每頭六七瓣主散癰腫蒜為小蒜以其氣類相似也苗皆如葫而極細冬瓜即白瓜也生苗蔓下大者如斗而更長皮厚而有毛初生青緑經霜生粉乃取藏蓄彌年可作菜果瓠味甜似越瓜長者尺餘夏熟瓠􅕕夏末始實取以為器經霜乃堪小者名瓢白蘘荷春初生葉似甘蕉根似薑而肥其性好隂在木下生者尤美潘嶽閒居賦蘘荷依陰是也荆梵嵗時記謂可以防蟲紫蘇葉下紫而甚香夏採莖葉秋採實一名荏薄荷葉尖冬不死夏秋採莖葉暴乾馬芹子香似橘皮花似芹花子似防風褊而大茵蔯春初生苗秋後葉枯莖幹經冬不死春生新葉故名茵蔯海藻葉大生深海底爾雅疏藻水草也楊州人以當榖食埤雅云善療瘤􅕅紫菜附石生海上生青取乾則紫其莖纎而希其味尤珍出福清者佳鹿角菜生海中亦能解麵熱芋陶隱居云蜀川生者形圓而大狀如蹲鴟謂之芋魁閩中出者形長而大細者如卵生芋魁傍食之尤美州北下洋尤多枸把春生苗莖幹髙三五尺秋生紅實是時採紅實春夏採葉冬採根幼幼新書云一名地骨一名西王母杖花末麗此花獨閩中有之夏開白色妙麗嵇含草木狀謂之末利佛經曰末麗花香又有畨末麗藤生亦香素馨蔓生白色露裛愈香蔡公襄詩素馨萬里來商舶團圓末麗叢繁香牡丹州舊無之慶厯間羅源林迥隱居闕在處有出山遇慈恩長老獻牡丹詩云春闕王稀山中還信正芳菲蓋有之闕謂寧間程大卿師孟詠福州詩云芍藥闕難種處城中也今古田長溪羅源連江多有之芍藥所産與牡丹同紫玫瑰亦名徘徊花郡人翁承贊詩三株紅芍藥一架紫玫瑰四時山丹花紅色葩英叢起如絳羅囊林迥詩葉剪青油蘂渥丹春風隨衆出欄干碧桃黃菊凋零後誰伴長松到嵗寒長春花亦四時有之林迥詩洞門深不放春期客到尋芳莫問時遲日暖風冰與雪照臨紅艷一枝枝真珠有單葉亦有百葉許公將詩䔩䔩圓英淡粉粧肯隨桃杏媚韶光金刀不到春風外草密林深只自香酴醿花白而香春時極盛葉公夢得詩東風吹麝入鉛華未肯隨春到謝家夜半粉香垂露泣定應和月怨梨花又有檀心而紫者尤香梅花又有紅梅蠟梅百葉梅瑞香紫色芬香舊記無近州多有之千葉石榴花紅艷不結實薔薇枝幹有剌花紅紫色盛開如錦亦有薔薇如棠棣金色有淡黃薔薇鵝黃越橘花如瑞香葉幹如黃楊實如朱櫻金林檎花繁生如郁李花狀差大實如來禽而差小半丈紅花如御帶而差大一名棠棣衮繡毬色白圓如毬海棠色紅以木瓜頷接之則色白鬬雪紅閩中近有之花如玫瑰而香色過之四時常芳不隨羣卉雕茂闍提南海種商人傳之花晳白而香勝如素馨蓋巖桂之流品也仙書曰闍提玉簮質素而香形如玉簮亦名白鶴金沙玫瑰之流也香不及之剪金紅圓無香葉分數岐如剪刀之狀度年紅幹髙而花難雕自冬末涉春不少變含笑白花有二種小者香猶酷烈開盡則香微故以含笑名百合莖特生而直上亦名倒仙花白一種班紅謂之川百合凌霄藤蔓附大木而生其花黃赤夏盛紫荆木似林檎花深紫可愛罌粟花有紅白二種九月布子春深乃生實如小罌子若細粟葵冇數種蜀葵出戎蜀爾雅所謂菁莪葵花白者生痎瘧黃者葉尖狹夏間花淺黃色主瘡癰小花者名錦葵俗呼為胡燕脂菊紫莖而香葉厚嫩可食者花微小味甘為真菊乂或莖青根細花白蘂黃其葉似同蒿花蘂並黃者俗傳為廣菊狀似嬰兒者俗呼為孩兒菊遁齊閒覽南方花發較北地常先一月獨菊花開最遲菊性宜冷也惟一種深黃色名滴滴金六月開玉蝴蝶色白如瓊花中叢蘂傍有八蝶繞之謂之聚八仙垂枚條而雙對者名玉蝴蝶朱槿一名佛桑一名佛日色深紅葉如桑髙者丈餘一種色白一種色紫淡黃者俗謂之金木蘭純白而英間無紫㸃者名舜英雞冠秋生紫色如繡畫雞冠之狀山茶花深紅色冬盛開御仙似罌粟而小金鳯狀如飛鳯有紅白紫粉紅數種金錢深紅色葉長細拒霜一名木芙蓉秋開色淡紅一種百葉朝開純白午後則漸紅如醉謂之醉芙蓉巖桂其葉兩兩相向粟結其間及開清馥斷續而逺聞俗呼為九里香木紋如犀可以為器亦號木犀數種有四時開者紫者鞓紅者深紅者曰丹桂凡色勝則香薄鷹爪藤生夏開末鋭似鷹爪薄暮方開香如爛瓜鳯尾有二種大者花白蘂黃穗生長僅尺若鳯尾然一種差小花疏而香勝亦名七里香可以辟蠧玉屑藤生花白色如碎玉之狀玉籠鬆藤生花微紅而圓一種醉楊妃花相類葉尖寶相藤生花類長春藥地黃葉生布地上有皺文根如手指通黃色牛膝春生苗莖髙二三尺青紫色有節如牛膝狀今州人單用土牛膝根治血塊薯蕷根如薑芋土人單呼為諸生于山間石罅者良天門冬春生藤蔓大如叉股髙至丈餘華如茴香極尖細而疏滑有逆刺根大如指長二三寸爾雅謂之靡一名釁冬麥門冬葉青似莎草長及尺餘四季不凋根如連珠形似穬麥顆故名黃精三月生苗髙一二尺葉如竹葉而短兩兩相向莖便柔脆頗似桃枝根如嫩生薑黃色八月採蒸熟啖博物志天姥謂黃帝曰太陽之草名黃精餌之可以長生細辛其根細而其味極辛故名蘹香子亦名茴香葉似葫荽疏細作叢花頭如圓蓋黃白色實如麥而小北人呼為土茴香茯苓生大松下望松赤者下有之作塊如拳大者至數斤似人形龜形者佳假松氣而生不附著根上其抱根而輕虛者為茯神淮南子曰下有茯苓上有兔絲茱萸葉似椿而闊厚實似椒子嫩時微黃熟則深紫石韋叢生石上葉如柳背有毛面班㸃如皮故名一名石皮州自有一種三月有花採葉可煎湯浴亦有生古瓦上者決明子葉似槐花黃子如菉豆而鋭香薷陶隱居云似白蘇而葉細一作香葇俗呼香茸霍亂轉筋煮飲服之連翹南方生者葉狹而小莖短才髙一二尺花亦黃實房實黑內含黑子如粟粒香茅四季常冇苖葉而無花其根謂之茅香何首烏春生苗葉葉相對如山芋而不光澤其莖蔓延竹木牆壁間根大者如拳各有五稜瓣似小甜瓜赤者雄白者雌本名交藤因何首烏服之故名半夏獨莖生莖端出三葉淺緑色似竹葉根下相重生皮黃肉白使君子蔓生花紅白相間形如梔子而稜瓣深天南星苖似荷梗莖髙尺餘葉兩相抱花黃子作穗生根如芋而圓萞麻子音卑莖有節秋花結實殼上有刺仁白有油如大麻牽牛子蔓生籬落間葉有三尖花帶碧色實作毬內有黑子一名鼓子花子其木似樗莖間有刺子辛辣如椒石蠶單根之似蠶者出山石上四時常有其苗青亦有節土紅山味甘苦大者髙七八尺葉似枇杷而小無毛秋生白花如粟粒州生者作細藤似芙蓉上青下白根如葛治勞瘴車前子爾雅云芣苡馬莧馬舄車前郭璞江東人呼為蝦蟇衣今閩中亦然栝樓一名天羅藤亦名天瓜退之所謂黃團掛門衝者治風熱土人取瓤研和酒飲之方家搗其根為粉入劑獨腳仙生山林傍隂泉處多有之春生苗至秋冬而葉落其葉圓上青下紫夏採根葉連梗焙乾治人血塊石益生山中子治蠱毒赤孫施葉如浮萍草一名嵗寒漿一名酸漿離騷云薋菉葹紫金牛味辛葉如紅花上緑下紫實圓如丹朱根微紫色八月採牛心暴乾頗似巴㦸小青生搗其葉可治癰瘡庵䕡狀如蒿艾可以辟蛇鹽麩子葉如橘子秋熟為穗粒如小豆上有鹽似雪食之酸鹹止渴蜀人謂之酸鹽吳人謂之烏鹽桑螵蛸螳蜋子也多在山木及荆棘間桑上者以得桑津氣故佳市之者以附枝為驗蒴藋輕虛無心主續筋骨一名接骨方覆盆子苗短不過尺莖葉皆有刺實如佛螺而旋石菖蒲陶隱居士云生石磧上概節者佳下濕地大根者名昌陽惟真菖蒲葉脊如劍今黃檗山龍湫崖下瀑布飛度却離可數步生其間者絶佳非神全不為濺悸者莫能採溪蓀根形氣色極似但葉無脊耳淳熙三山志卷四十一
