body:
  text: 淳熙三山志卷十六宋梁克家撰版籍類七水利長樂縣唐志閩縣東五里有海隄大和三年令李茸築初每嵗六月潮水鹹鹵禾苗多死隄成瀦溪水植稻其地三百户皆良田田灌溉為五十里海濱處所也今縣東二十里鹵潮所不到藴旱涸竭則時至焉然不常爾長樂十里有海隄大和七年令李茸築立十斗門以禦潮旱則瀦雨則泄旁皆成良田武德六年析閩置長樂則二邑也而皆築於茸之手相距才四年必是更宰不然則攝篆也蓋長樂濱海山淺而泉微故瀦防為特多大者為湖次為陂為圳垾海而成者為塘次為堰毋慮百五十餘所每嵗蓄溪澗雖不泄涓滴亦不足用必時雨滂澍乃獲均洽農事畢天雨止向數十里皆為無用之地以是狡民或侵或請不知水利之所係咸平熙寧屢有訟者建炎初陳可大宰是邑大修塘垾陂湖後四十八年當乾道九年知縣徐謨延耆老講究水利為斗門及湖塘陂堰百四所溉田二千二十三頃崇丘里濱江大圳等五浦計長九百丈溉田四十餘頃內浦口濶五尺深八尺湖塍浦濶三丈五尺深六尺尾濶一丈深四尺米籠浦二百五十丈濶二尺深五尺溉田六頃官塘浦一百一十丈濶一丈深五尺溉田五頃餘陳師浦一百丈濶六尺深四尺溉田一頃餘官丘等四浦計一千七百二十丈官丘濶三丈深一丈擔水浦闊四丈深九尺黃聖屋前浦濶一丈五尺深五尺塘浦濶三丈深七尺溉田六十六頃王丘浦一百二十五尺濶二丈四尺深六尺尾濶九尺深六尺溉田五頃餘白竈浦五十丈濶六丈六尺深六尺溉田三頃餘鱉石浦二十五丈濶四丈深一丈溉田一頃餘後角浦九十丈濶一丈八尺深六尺溉田四頃餘銀盞浦七十五丈濶二丈四尺深六尺溉田八頃餘渡龍浦九十丈濶一丈八尺深六尺溉田七頃餘坂塘浦三十五丈濶二丈四尺深六尺溉田四頃餘官堰浦二百六十丈濶八尺深五尺溉田十頃古塘浦一百五十丈濶一丈深六尺溉田六頃師娘浦三十五丈濶三丈二尺深六尺溉田四頃浦口小浦七十五丈濶七尺深五尺溉田二頃下籠坂浦五十丈濶二尺深一尺溉田三頃橋頭浦五十四丈濶二丈四尺深六尺溉田七頃蠣殼浦一百丈濶一丈八尺深六尺溉田十頃籠臂浦三十五丈濶一丈六尺深六尺溉田三頃朱湖髙浦二十丈濶七尺深五尺溉田三頃嵩平里趙塘浦七十丈濶一丈二尺深八尺蘆蕁浦四百丈濶八尺深五尺官塘浦三百五十丈濶一丈二尺深七尺孤塘浦四十丈濶一丈二尺深八尺九石浦三百丈濶二丈四尺深一丈一尺車下浦七十丈濶九尺深五尺新塘浦八十丈濶九尺圳兊浦二百丈濶二丈二尺深並同上孤洲浦四百丈口濶四丈深一丈五尺絃歌里東洋塘縣東北長一千二百丈高一丈二尺濶八尺禦鹵湖瀦雨水子塘三道共長一千五百丈髙九尺濶五尺溝長三百四十丈濶八尺深五尺橫埭二啓閉以竇溉三百石種西洋塘長九百五十丈高一丈二尺濶八尺斗門一溉九十六石種鄭湖塘泄水港抵海長二百丈濶一丈深三尺三竇溉百頃石埭崔塘斗門西抵海垾長一千一百二十丈濶七尺髙一丈崔塘洋溝長一千三百五十丈溝濶二丈五尺深七尺子溝一丈二尺深六尺溉田八頃鄭湖周二十丈橫塘十二丈溉田三十畝新開里屈尺塘縣東北長一百五十丈髙七尺濶五尺有竇溉三十石種建興里舊載福湖屬北里民嵗競渡以祈豐年嘉禾大石新成屯四堰合為一縣東南隅長一千九百八十丈髙一丈濶五尺溉田種四百石橫嶼湖周三百一十丈髙九尺五寸上濶一丈四竇溝長六千九百丈溉田種千餘石清平里鏡石何師新三堰合為一長二百丈髙二丈一尺濶七尺溉田十頃招賢里穫洋王背大溪中圳劉背二溪皆出白龍潭有五圳橫圳尺圳函口圳十犢圳東攬圳共長一千九百一十丈四閘溉田種三十頃永勝里黃㺯溪長二百丈陂長五十丈溉田十二頃溪口溪三坑共長一千四百九十丈溉田五頃橫圳九百丈濶八尺深六尺溉五頃進賢里桃坑湖即桃枝湖也東西一百三丈四尺南北三百六十一丈五尺垾塍圳四𣲖溉田種千餘石偽閩時為指揮使邱進所有後售林璉等為田僅四頃咸平四年劉轉等訟之乃以其田産千二百三十六文米二十三石一斗半均湖下百七十餘户田敕仍為湖熙寧四年林注等又訟髙建等侵耕知縣蕭竑因括湖塘陂堰簿而圖之擇主領立徑界培堤岸碑於湖之旁今周五百一十丈濶一丈髙八尺石斗門三圳長二千二百餘丈濶一丈二尺深六尺瀦乾溪溉田二十九頃跨逍遙清平里沙坂後洋溪共長五百丈入桃枝湖溉田七頃同榮里石瀨陂食龍潭水長五百丈濶二丈深一尺溉田種七百石古散陂食龍潭水長七百一十丈髙一丈濶七尺溉田種三千石靈石里新田陂食童溪水長六十丈濶一丈五尺深七尺溉田種四十石餘灌洋陂食童溪長一百一十丈濶七尺深五尺溉田種一百三十石湖前陂長三百丈濶一尺深七尺溉田種四百石丘溪並食童溪長二百一十丈濶五丈深一丈溉田種二百五十石依福里周陂食童溪長一千丈濶二丈深一尺溉田種四百石前曽浦食龍潭長二百丈口濶二丈深四之一腹濶五丈深三丈尾濶深皆一丈五尺口為石閘禦溪洪尾為石函埠長一丈五尺髙如之濶五尺溉田種七十石丁塘食龍潭石瀨陂長七百丈溪口濶一丈七尺橋下濶六丈溉田種三百石昆由里大塘跨敦素崇賢同榮里大斗門二知縣徐謨築基方廣二十餘丈兩旁扺海長一千五十丈髙一丈八尺濶一丈溝港共長三千七百丈濶一丈二尺深八尺瀦福清界水溉田千石萩蘆陂長六十丈濶二十丈深七尺圳長三百五十丈大圳濶一丈深七尺小圳濶八尺深五尺瀦髙陂水溉田種五百石方樂里陳塘港會七十二洋水溢則開斗門歸絃歌里溝及林花溝瀆入海