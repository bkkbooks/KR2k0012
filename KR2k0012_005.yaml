body:
  text: 淳熙三山志卷五宋梁克家撰地里類五驛鋪驛鋪古亭郵也州南出莆田北抵永嘉西達延平車旌之所宿㑹文檄之所往來求其安便迅駛而無阻絶沉滯之憂故更易廢置迄今始定由南以往凡五驛十鋪舊由方山渡宣和六年乃出西峽由北以往經十一驛紹興元年以建寇故道路梗絶亦嘗命置鋪由西以往驛四鋪十三崇寧初以嶺峻狹廢西門路從北門鋪歷雪峯直抵富沙又從古田谷口刺出南劒五年復西門路西路舊無車道抵中國緣江乘舟郵奡蕩而泝凡四百六十二里始接道唐元和中嵗歉憲宗納李播言發使賑濟觀察使陸庶為州二年而江吏籍淪溺者百數乃鏟峯湮谷停舟續流跨木引繩抵延平富沙以通京師有洪文館袐書李叔夏為記蓋謂此路也其古田路亦自開元二十八年洞豪劉彊等納土始漸有之今冠蓋旁午負戴四達三方驛館聽所投足獨傳致期㑹取西南二十三所設立鋪兵國初猶役遞未曽迭命諸卒已乃許就置營房然猶未立額元豐六年鄭居簡始添定人數仍創急遞居簡時催刷本路軍器奏福建遞鋪未曾興置急腳兵士文字違滯乞每鋪以十五人為額內二名充急腳轉運司申本路除偏僻遞鋪四十三所不消添置外有一百六十二所乞添急遞一名兵部看詳各添急遞二名元祐元年減罷急腳兵士改作馬鋪剩數撥填廂軍崇寧二年十二月復依元豐法施行崇寧三年以行北門十四鋪各增廂軍二人罷橫山惟二十二鋪北鋪率三南鋪五置將校一名初給印歷考其稽慢者時有旨近來遞鋪稽留盜匿緩急報應有失事機本路下州遣司户竇恭祖相度尋施行五年行西門復橫山罷土塸大觀元年土塸復置自橫山至營頂十四鋪復塘急遞二人門許置曹司政和元年更議存減時有旨以大觀添置兵馬未便再行相度州委簽判杜思巡鋪曹䀭措置存減除橫山急遞不减餘悉損其半軍興之後警報益急增額浸多以至于今舊有鋪馬至和二年章柬之奏罷柬之時知漳州以山徑險僻遞送轉見遲回乞抽收官馬差急腳兵士時本州有馬四十五匹並罷嘉祐二年薛綸請復之綸時知建州奏急腳兵士止傳送遞角使命經過州縣臨時借馬於人户不無搔擾乞每鋪量置馬兩匹復罷急腳隆興二年乃盡罷其詳具見于後云城中使星館海安門內街北舊為使星驛州著衙前主官員驛料紹興中火因為宅子店俄復為館閩候官典押更主之今批給驛券猶以驛名迎仙館南禪寺東景祐中范都官亢所造治平圖有之其後為轉運行衙崇軺驛南門內西舊置翁承贊冊閩王館於登庸門內是時已有驛治平圖為路分㕔元豐中為東南第十將公廨如歸館威武軍門外西治平圖修造務自迎仙館廢始為如歸館後嘗為醋庫令司户㕔皇華館還珠門外舊春風樓地淳熙十四年安撫賈選創建候官縣丞歐陽光祖為記西路迎恩館舊迎仙門內北有送客亭淳熙元年史丞相浩始置館于門外之南為迓接御香及恩賜之所西門鋪國初置東取州城半里西取土塸十八里舊本州及南路遞角並從西門至劒建及官員驛料經水口嵩溪驛支給久以為便崇寧元年因本州申請以古田不當驛路及西門一去水口中間有號倒羊猪猔嶺和尚盂一帶路不通轎乘及小若安仁兩溪置渡子三人古田置解子三人嵗支雇錢七十八貫以為費多乃廢西門路遂從北門鋪雪峯路而去不由南劒直抵建州又從古田縣西南刺從谷口出南劒五年復以北門路支費不資仍舊行西門葛崎陳湖等至芋洋十一鋪通接營頂至南劒元豐中馬遞四人步遞六人急遞二人大觀元年添馬遞三人步遞三人急遞二人曹司一人政和元年減急遞一名後額管二十四人今供申一人節級二人鋪兵三十人土塸鋪西取葛崎鋪十八里崇寧五年罷大觀元年復置元豐中添定馬遞三人步遞四人急遞二人大觀元年添急遞二人遞馬一匹政和元年減急遞一人留遞馬并元額共二匹以監司巡歷將官巡教不可闕也今額管十四人供申一節級一鋪兵十二葛崎驛懷安縣北舊在芋源村置驛取州六十里後移此於使星雖近亦作一程驛券批支元祐八年轉運司以使星至大瀨七十里大瀨至小若七十里遂罷葛崎驛不批支按程大瀨至小若五十五里使星至大瀨實九十里葛崎鋪西取陳湖二十里陳湖鋪西取豐田二十里大目渡熙寧九年置投充不支錢豐田鋪西取大瀨二十里已上三鋪元豐六年並定馬遞三人步遞四人急遞二人大觀元年並添急遞二人遞馬一匹惟葛﨑崇寧三年行北門路添廂軍二人政和元年並減急遞一名罷添馬今並額管十四人供申一節級一鋪兵十二大瀨驛候官保安里距城九十里臨江下水口值風多暫憩於此大瀨鋪西取湯背三十里湯背鋪西取小若二十五里安仁渡熙寧八年置小若驛閩清縣東北五里祥符二年重建小若鋪西取嵩灘二十五里渡熙寧八年置紹興中以安仁小若二渡歸湯背嵩灘鋪北取常瀨二十五里常瀨鋪西取朱坑十五里已上五鋪人數更改及遞馬存減並與豐田司髙溪驛古田縣南九十里水口鎮已上三驛熙寧六年並省併後獨嵩溪驛批支朱坑鋪西取芋洋三十里芋洋鋪西取使華亭二十里又十里至營頂使華亭地名黃日宣和六年創為星軺食息之所營頂鋪西取南劒界首五里又八里至武步去金沙六十里金沙至南劔五十里已上三鋪惟營頂崇寧三年行北門路增廂軍二人其元豐大觀人數及今額並同前五鋪南路橫山鋪州南九里取江南鋪十五里舊有馬遞兵士三人元豐六年獨不置急腳大觀元年增步遞三人急遞二人政和元年罷步遞三人後額管二十四人今除供申節級外鋪兵二十五人臨津館唐名南臺梁開平中翁承贊冊王審知為閩王有南臺路書事詩今館天聖五年章頻作館之西南隅榜合沙亭是時以䜟諸方望沙合皇祐間江東西始有洲元祐四年洲猶中斷而為二林中散積又即館之東南楹望合沙臨水開軒仍舊名亭是嵗許公將為尚書右丞浮橋由郡直上南臺有江廣三里揚瀾浩渺涉者病之元祐以來江沙頗合港疏為二中成楞嚴洲八年癸酉七月郡人王袐監祖道為守相其南北造舟為梁北港五百尺用舟二十號合沙北橋南港二千五百尺用舟百號南橋衡舟從梁板其上兾以扶欄廣丈有二尺中穹為二門以便行舟左右維以大藤纜以挽直橋路於南北中岸植石柱十有八而繫之以備癡風漲水之患縻金錢千萬一出於施者明年紹聖元年甲戌十月成以其餘錢三千九百緡分給負郭三縣僧寺以為本錢俾嵗取息以待缺弊修造十一月落成自為文記之尋又為屋以覆纜柱架亭於其側以憩行者中亭之北又有泗洲堂一所命僧守之施熟水亭下而守橋軍房亦在焉南亭之南復即山為亭以濟川名之創菴其西有齊禮九功馴翬嘉祥四里産錢二貫二百八十八苖米一十五石二斗七升輪大院三十主之以管幹橋事再嵗一替有水手二十一人𨽻焉朝夕巡視白所當修造者以報逐寺崇寧二年公復守是邦乃於橋南建天寧寺以菴之田産併歸之命天寧主僧為三十院都管是時港已分為三矣北港舟十有六中港七十有三南港十有三凡一百二隻僧寺産錢初自五貫以上令獨任其一不及則合一二或三四院以為助蓋受船板本錢者二百一十三所而受置大藤纜本錢者又其內三十所公命籍本錢之日及其要束一藏之郡案一付之橋司使相授受其略曰橋船及板本錢三千三百九十貫正橋門船四隻板六間四院主之各受本錢六十貫南港南岸馬頭船一隻板二間一院管認本錢亦如之橋門第二船四隻板四間四院主之各受本錢五十貫北港中港兩岸南港北岸馬頭船五隻板五間五院管認本錢亦如之其餘每船一隻板一間各受本錢三十貫自北而南船以千文為號後有廢壞永歷息錢興修常取堅固大藤纜本錢五百一十貫鼓山雪峯神光西禪芙蓉法海乾元安國夀山開元大中精嚴等覺九峯囷山萬嵗報恩白鹿天王太平賢沙升山靈峯仁王雙峯大溈聖泉衡山興福廣因凡三十寺各十七貫嵗出息一分令橋菴經官置簿拘納分輪兩院管置纜一次及屬架之蓬悉交割乃得替凡橋門船長四丈六尺面一丈五尺頭各八尺板二間長各四丈四尺闊一丈直梁八圍各三尺六寸輪木闊各一尺三寸厚一尺兩頭鐡䌇各四並四斤其次橋門第二船三港馬頭船長四丈四尺面一丈一尺頭六尺其餘船長三丈九尺闊一丈頭五尺五寸板每間長二丈三尺濶一丈直梁七圍各二尺四寸輪木闊一尺厚八寸鐡䌇二各四斤勾欄每扇各二柱髙二尺五寸方五寸上下壓枋闊五寸厚三寸短柱四髙一尺七寸闊五寸厚三寸凡大藤纜於船左右常各存新舊二條圍各二尺五寸五嵗一昜不許以退纜舊藤間雜收使如三港西岸馬頭時有流刷傾側或泥地淤長可堪增築及橋亭軍房屋宇井蓬纜蓋架等損弊悉仰管幹橋院畫時修葺其鐡䌇常備六十具以待去失急用於守橋兵士名下勒填餘船板碇石有一不備刷染更換有一滅裂以時巡察報逐院增修不得别有率斂其措置纎悉盡蓋如此尋復嵗以三院輪入管幹其後間以故獲免受役者至十八院先是水手各認管船五隻月米一石錢二千四百從逐院赴橋司輸送然後給之後浸為弊乃悉罷去輪諸寺行者代其役給官舟與來往護視遇夜則守橋紹興十一年都管主僧僧珵立規式菴中課督羣行者甚力輟前所給水手錢米入長生局為度牒之本以勸勉之是時北港已為石墩橋道十五座矣船惟中港七十四南港十三拘納二分息錢復散寄逐寺收息愈廣其後藤纜乃不以時治二十三年僧圓覺住天寧寺募作鐵纜每節為錢三百越一月遂辦藤纜始廢二十四年提㸃刑獄趙公令詪攝郡事覩橋道寖壞命閩縣丞黃昭祖因舊制度復一新之㑹圓覺以事罷估籍衣物金銀等錢一千二百八貫有竒及橋司所椿置纜息錢二百三貫有竒用舊例復命以其錢分為九十二分半均給諸寺其橋門船及南港南岸馬頭船凡三隻各給二分橋門第二船及中港兩岸南港北岸馬頭船凡五隻各給一分半餘各一分增為本錢申嚴舊式凡尺寸悉以官省尺為度梁木須徑直者板必厚一寸六分募置水手復仍舊役惟船頭拋碇藤纜務要緊實各長一十五丈不許水手打攬以舊纜添造亦置籍二本一藏郡案一付橋司明年梁山等十七院復為石墩橋道於是菴中既無所拘納都管之職亦漸衰弛向所輸送水手錢米遂從逐院自取之上下懈怠莫有統屬橋事以是愈壞今鐵纜斷裂僅存置菴舍藤纜息錢枉增諸寺船板之數本錢雖散在三十寺未有興復者石墩橋道尋又增置今為船者六十二耳中亭項賃㑹户以匿稅故乾道中併拆其屋逐之泗洲堂淳熙元年一夕爇盡往時營幹橋僧既交替以有勞率得院住持近乃無聞水手昔屬閩尉後有尉適不振職因屬縣丞云江南鋪南取方北十五里元豐六年添定馬遞三人步遞三人急遞二人大觀元年添遞馬二匹政和議存减獨不罷後額管十四人今供申一節級一鋪兵十二西峽北驛名濟川北館宣和六年作方北鋪南取方南隔江折二十里異時驛路出方山渡江面瀰漫無風只二十里有風七十里沿兩沙洲隨潮涉二時乃至既有傾覆之患又有候次之勞風潮弗律候或一二日甫登南岸即涉方山嶺又有佛嶺白蒲嶺熱隔嶺而後逹太平驛宣和六年俞提刑向以西峽水面五里私商往來之地命本邑治道由玉泉院之尾鼓樓入新路經彌院菴西方院五里真隱又五里峽江北岸亭渡五里枕峯十八里白鹿寺踰嶺十二里抵福清界行者便之乃植木以庇行人尋自枕峯前良步角梁山院十里通麻溪橋五里瀨溪橋過常思五里通舊路遂不登白鹿履道尤坦因名峽江二亭俱曰濟川有記合沙亭之右於是以方北鋪移於西峽路石鋪橋頭方南鋪移於枕峯院前大田鋪移於大義驛下接常思鋪紹興六年申明以為經久可行九年峽江路旁諸寺賂州吏請遵故道張丞相浚召驛兵質之遂不復昜鋪仍舊名今於城門村渡以避峽流之迅且約里數也方南鋪南取大田鋪二十里西峽南驛宣和六年作舊方山驛移此大田鋪南取常思二十三里大義臨津驛河口渡次常思鋪福清南取太平七里嶺髙一里相承為相思故王文公圭贈元公絳詩頒春莫向相思嶺太平驛福清縣西四十里熙寧六年省併方山太平漁溪三驛不批支驛券七年猶雇衙前主持給馬草八年除漁溪外復罷紹聖元年轉運提刑司狀以方山至迎仙只一百二十七里輒作三程乞減罷太平一驛移漁溪驛於石塍馬鋪蓋造尋留漁溪驛為憩息亭館折太平驛材料蓋造於石塍太平鋪南取假面十七里假面鋪南取漁溪十八里漁溪驛有蔡密學襄梅詩漁溪鋪南取蒜嶺二十三里蒜嶺鋪南至莆田縣界三里至迎仙二十八里至興化軍五十里或曰山形如蒜亦其間多蒜苖由建劒汀邵武至此方見漲海烟波萬頃嶺頭有照海亭宣和間有唐運使留題隆興初廢今送迎時寓民家已上八鋪元豐六年並添馬步急遞共八人今並額管十二人常思見闕三人假面二人蒜嶺一人內供申節級各一人北西取建寧路出州北門由沙溪别往新藍雞菜距縣百里極􅑖惡觜於旁而啄衣牙於中而齧足蹲於前而梗步嘉祐三年知懷安縣樊紀昜而夷之自記云雪峯至古田縣一出西門經石岊至葛崎與北門路通鳴玉驛古田縣東初溪有洪瀨灘知縣李堪以其非雅改為鳴玉遂以名橋亦以名驛前有㴠碧亭紹興七年移於縣西北舊學基通建驛縣北鎮安驛縣北地名孤鎮村西至建寧府七十里崇寧元年廢西門路行北門由土塸葛崎别仕雞菜雪峯杉倉北望青田嶺中館龍爬林換營頂凡十四鋪至建州三年以山嶺危險里數隔逺每鋪各增廂軍二人五年以改路後雪峯一帶山嶺既峻道旁絶少人家每鋪幾三十里或七八十里始至館驛實有未便其水口下雖有倒羊猪猔等嶺然官員並行水驛獨鋪兵往來而已况自行北門六驛十四鋪添廂軍二十八人一嵗請給衣糧約一千五百餘貫匹石此之西門添置渡子古田解置解子費絶不等今將六驛十四鋪及古田縣西南刺從谷口出至南劒一驛二鋪並行廢罷仍舊行西門路北取溫州路出井樓門經四明亭盤石陟北嶺一路出井樓門經安國寺透馬溪抵北嶺下嶺髙一千八百步十五里屬連江界頑石根互沿崖而躋嘉祐三年知懷安縣樊紀僦工致治乃奠髙為夷正曲為直陷者培回者續迄今利之主簿王知微記又治路自北門入岩溪抵青山又培土築趨府道積德承平移風三鄉地庫窪悉砌石以便民至溪澗或江浦之阻梁石以渡者五十一木為橋十有六皆利民之著者周希孟記下湯嶺諺云陽嶺兜北嶺頭志險也溫泉館距連江三十二里舊名湯泉驛淳熙元年重作因改名潘渡橋東取連江二十三里道羅源即絶渡而北異時溪漲需渡者病之紹興十四年知連江阮圭始創橋焉未幾水淙齧以壞乾道三年朝子闔更新之長六十五丈柱趾十九名惠政陀驛北取羅源四明驛七十五里四明驛南取飛泉驛四十里建炎三年置淳熙三年重作飛泉驛有渡熙寧七年置過官井洋百八十里逹長溪鹽田元祐八年移置焦門頰紹興三十年以風海險惡禁渡驛今佃為民居陸行出寧德縣白鶴嶺嶺頭有白鶴亭半有憩亭泉眼清徹可處多留題下即縣也寧川驛寧德縣南紹興二十八年以主簿王置乾道八年重作深浦渡元豐三年置渡頭有康濟亭十里至雙巖雙巖嶺五里至黃崎黃﨑鎮灘頭渡元豐三年置陸路徑絶經環塢村秦家山路如馬齒旁無逆旅行者多過渡至下杯下杯驛長溪縣西出七十里有渡一潮至監田准陸二十五里鹽田驛縣西三十五里有渡元祐八年移於析埭置溫麻驛縣海晏門內今廢倒流溪驛飯溪驛縣東五十里有渡白林驛縣東北百里去桐山五十里今廢只憩天王院牌嶺桐山驛去泗洲驛二十五里今廢只憩棲林院駱駝嶺平陽二十里泗洲院過分水嶺是路國初置驛自使星至陀驛羅源縣下驛白林驛飯溪驛支給驛券熙寧六年咸併陀驛鹽田驛白林驛飯溪驛併歸所過州縣批支紹興六年本路陳運使國瑞請立馬遞鋪招置土兵承傳文字尋罷渡州東南門河口登舟大義渡乘退潮東經古山尾憩程水港候潮西入峽門旁入港即此渡貞觀中别駕衛總持見其處西旅賔主有序故名之長樂航頭渡百二十里洋門渡百五里白田渡百十五里洋下渡百八里皆退潮一初臨水洋門洋下白田四渡皆貧民以私船渡載志在遂利安弊不修中經雞嶼風濤最險多方難之必厚獲而後涉槳無宿手惟取於所渡之人操縱不調以此昜致漂溺嘉祐中長樂始置三渡於臨水創官船以渡之募善水者為槳夫渡者人輸錢七籍給募之餘為船具及補敗之資後因循不舉元祐六年知縣丁掌乞奏舉行明年敕以白田距臨水十五里洋下相距八里洋門相距五里且同岸又三渡水路皆避征者所由遂罷之止於臨水造官船四大船所載止百人水手十五人小者五十人水手八人渡者人輸錢五均給之紹興元年流寓民姜子清乞收江淮河港溪渡錢遂令日收嵗終較額為殿最今渡人輸錢一十洞江營前洋嶼籌﨑浮崎翁崎皆一退潮王峬渡河口渡抵翁﨑由翁崎渡三十里乃至入城亦然出西門十五里度橋舊有之嵗久頽甚霖潦艱涉紹興七年汪義和知懷安舉一講僧更造之六批五間靈光橋旁有靈光寺至懷安縣石岊亭縣之右建炎間置亭東有石異時嵗覺增長後因火乃止閩越亭縣前閩越王遊憩之地舊有記相傳為雷震飛入水中石岊渡驛路百六十里至水口水路經甘蔗衙大小目福院小若大若亦百六十里至水口渡風或跨二日嘗有監司詩云朝辭虎節門暮宿牛頭寺江神也世情一送三程路又西門十五里洪塘髙﨑渡即石岊江東流分為二自洪塘渡至水西髙﨑江南楊﨑渡大樟渡楊﨑屬懷安大樟屬永福相去三十里由大樟至永福縣越峯渡永福縣下元豐元年造橋重光渡五十口渡皆縣下洪面渡縣南七十里南取溪東渡四十里熙寧十年置渡闊十五丈漲准十五里溪東渡縣北百一十里北去洑口東渚渡二十里渡闊七丈漲准三里熙寧十一年置洑口埕闕闕紹興二劒闊十丈十六年罷淳熙三山志卷五
