body:
  text: 淳熙三山志巻十八宋梁克家撰兵防類一諸禁軍閩自無諸以兵從番君滅秦及助漢伐楚非無兵矣中更廢徙建安八年孫䇿始立南部都尉於建安吴景帝時有都尉營在今開元寺東直巷葢以分兵於此晉因吴舊既有典船校尉又有温麻船屯舟兵徃徃有之然法制未立唐興宇内為一髙祖嘗以其子夀王為越福十二州招討海賊使進都督府開元十九年始置泉山府兵左衙營在州東百步今東毬場是也毬場舊在州西北隅元和八年裴次元始移於此見毬場記今廣節營而右衙莫記其地二十一年置經畧使史言有兵千五百人刺史領之豈其數邪至徳二年復置經略寧海二軍刺史為防禦寧海軍使冦盗既平易以觀察至元和二軍亦罷乾符俶擾陳巖置九龍軍王氏繼之竊立龍虎天霸等六軍及拱宸控鶴宸衛三都以自衛迄於五季有曰全勝百勝橫衝海路捉生䕶閩營壘故號班班猶在全勝營今坊名百勝營今棣錦坊橫衝營今潤澤坊海路營今罾浦捉生營今仁慶坊䕶閩營今道山坊而井樓門外百餘步又有營墌不知何營基也國初兵制尚詳西北而略東南州有本城兵曰崇節營三保一保二保三曰水軍營三第一今保四第二今雄略第三今全捷及牢城今營凡三千一人而已外則自京或他路更畨遣至屯駐駐泊軍兵舊有屯駐建州營今朱紫坊之南街東駐杭杭越蘇營今閩縣丞廨屯駐西京營今嘉榮坊號南營又有帶號戍兵若驍騎今坊名驍勇今太平坊西駐泊廣勇今利涉坊慶厯中添置澄海宣毅指揮宣毅營今廣節嘉祐四年併為威果熙寧中改本城兵為教閲廣節不教閲保節指揮牢城兵如故元豐中置壯城作院指揮及巡檢諸寨土兵仍分東南置第十將紹聖五年罷遣戍兵置有馬雄略國初未嘗増置兵額惟嵗時分遣出戍故習險阻㤀顧戀緩急征行人皆可用本州兵多戍二廣咸平五年差借職龎翰徃福州本城内抽差百五十人赴潮州屯駐至和元年四十人赴潯州五十人赴桂冝州二年四十五人赴藤州七十三人赴賓州四十八人赴融州嘉祐六年密院劄子福建路差本城兵士赴廣西屯駐並二年一替熙寧六年廂軍係轉運司差徃本路州軍屯駐置籍拘管於合替前一季檢舉差替訖奏八年指揮廣西鈐轄司并宜州駐泊已係就糧禁軍教閱廂軍全指揮並依舊替換内福州係威果二十五指揮四百八十五人其邕州駐泊福建等路畸零廂軍一千人十年尅復廣源思浪等州要兵馬駐劄内抽差福州廣節第一指揮一百一十人此類是也又有外來戍本州者皇祐三年差在京奉節第二指揮三百二人赴本州權駐泊五年本州駐泊雍邱懐勇第一指揮六十一人忠節第十六指揮一百十二人可往亳州抽押平塞弩手指揮一百七十三人充替歸營六年福州屯駐撫州騎射等指揮一百人仍於撫州差人替歸嘉祐二年福州屯駐撫州崇節蘇州牢城潤州水軍等指揮各八十人差人於逐州抽本城兵士前來抵替七年於滑州抽廣勇第二十三副指揮三百七十三人赴本州充替駐泊陳留賡勇第十六指揮一百七十三人歸營熙寧八年差亳州雄勝第三指揮四百五十人夀州勇捷第三指揮二百五十人永城威武第一指揮二百五十人赴福建路鈐轄司駐泊此類是也自熙寧元年指揮福建路將逐州廂軍揀選教閱今後不得申奏乞差禁軍至州防托八年福建廂軍駐泊邕州一千人内五百人候邕州招填澄海土兵替換五百人令運司就整差撥替換今後福建承例差赴廣西屯戍更不差撥至此又以抽回虎翼軍歸營遂置雄略蓋兵額既増自熙寧及今始免出戍然兵漸驕惰大觀元年御筆帥府望郡各別屯兵毎二年更及出戍終亦不能行大觀元年升帥府置全捷紹興初乃置萩蘆延祥二寨水軍兵籍甚衆矣鋪兵弓手猶不在是云鋪兵見地里類弓手見版籍類嘉祐七年知泉州闗詠請籍福建鎗杖手云毎有盗賊膽勇可用然無事之時亦能教誘郷民為盗是未有制御之法冝各簿籍姓名若有功與量免戸丁差役敢結集作過除死罪外並加一等熙寧九年本路提刑申明行之如毎年遇提舉司考閱弓手之際暫行勾唤較試酬奨十年詔鎗杖手百浮浪兇頑無家業令逐州募充廂禁軍元豐元年以舊管人數於逐州縣就整裁定以為永額隷提刑司於農隙牒運司提舉分往教閱長溪三都零六大保定九百人古田二都零五大保定六百二十五人閩清七大保定二百七十五人寧徳連江各六大保定各一百五十人永泰五大保定一百二十五人長樂四大保定一百人福清羅源各三大保各定七十五人閩候官懐安各兩大保各定五十人元祐元年與免勾集教閱紹聖二年詔仍舊政和六年朝請大夫許穀劄子本朝聮保甲於西北籍鎗杖手於東南深得寓兵於農之意然經厯年深浸失稽考乞嚴括責考正名籍宣和中方臈反乃募往衢信州䇿應紹興二年臣寮以多聚羣不逞剽掠如范汝為之徒乞行禁止至五年有㫖福建鎗杖手並與蠲放今姑記之威果指揮禁軍隷侍衛步軍司二十四指揮在永安橋北二十五指揮在乾元寺東嘉祐四年詔置就糧禁軍兩指揮各四百人以威果為名除捕盗不許他役五年排次自荆南至州指揮為第二十四二十五先是慶厯二年詔諸州置澄海兵士大郡兩指揮各五百人四年又詔上州添置土軍二千人為宣毅指揮時知諫院蔡襄建言福建諸郡近依廣南置澄海兵士尋又置宣毅各係禁軍昨因創選宣毅軍時多於澄海揀撥今所餘人無幾並存則兵冗徒費廩食乃廢澄海併歸宣毅五年立三百人為宣毅額六年續招三百人八年以選入京填補近上禁軍餘兵士三百八十六人併為一指揮而已其軍員十一人並發赴闕嘉祐二年前知福州曹潁叔奏宣毅一軍累經抽撥及戍廣南物故太半亡以備緩急於是有詔招填至是既置威果熙寧四年遂以本州就糧步軍撥入宣毅亦廢元豐四年詔増招五百一十人隷東南第十將分五都都百人將校二人指揮使以下五十一人長行四百五十九人今二十四指揮三百七十一人指揮使都頭十將將虞候承局押官共一百四十四人長行二百二十七人闕一百三十九人除一百二十五人充延祥水軍名糧外十四人未招二十五指揮三百四十八人指揮使以下三十七人長行三百十一人闕一百六十二人除一百二十五人充延祥水軍名糧外三十七人未招全捷指揮禁軍𨽻殿前司在井樓門内之東大觀元年十二月御筆祖宗以來人未繁盛舊來兵數雖少可以支梧今承平百五十年之久地大人衆兵寡勢弱非持久之道可除見今兵額外帥府别屯兵二千人望郡一千人常管在營比諸軍加數教閱毎二年令更互出戍帥府五百料錢以威捷為名望郡四百料錢以威勝為名帥府望郡三百料錢以全捷為名並充步軍𨽻殿前司管轄時本州并帥府殿司續勘會近准宣命排置淮浙荆湖福建等路威捷十指揮威勝十一指揮全捷四十一指揮其逐指揮部轄將校依馬軍司見行條格與步軍司分擘在京取㨂一次十將將虞候内威捷威勝下京東西路一般料錢軍額禁軍取補内全捷令逐路於一般料錢取㨂其承局押官於招揀到營及半年無過犯人内排連三年有㫖將巳𨽻將全捷十七指揮別排軍分資次帥府福州全捷第三十改為第九依舊存留外其不𨽻將全捷及威捷威勝四指揮並罷已招到人撥填別指揮自此全捷遂𨽻東南第十將分為五都都百人將校二人共五百一十人指揮使以下五十一人長行四百五十九人今三百四十二人指揮使以下一百二十二人長行二百二十人闕一百六十八人除一百二十五人充延祥水軍名糧四十三人未招廣節指揮廂軍後升下禁軍𨽻侍衛步軍司在康泰門外之北熙寧六年改教閱保節指揮為廣節指揮先是二年六月詔州郡廂軍即前代本處鎮守之兵冝料揀强壯團結教閱常留在城以備盗賊今後不得申奏乞差禁軍防托時本州團結二百人置副都頭三人十將虞候承局押官七人以教閱保節指揮為名依威邊則例請給仍分為二畨差往本州界及本路州軍巡檢下披帶一年替五年八月増以五百人為額仍排為第一指揮令教習弩鎗刀標牌捍棒捍棒以備捕盜單鬭時福建一路以二萬人為額内教閱保節一千四百五十人今定四千人作十指揮興化為尾第十福州為頭係第一至是以諸路教閱廂軍名額不一除教閱二字改為廣節指揮其不教閱保節依舊元豐三年閏九月升為下禁軍考軍防令諸軍係教閱人料錢滿一貫為上軍五百以上為中軍不滿五百為下軍四年八月以三百五十人為額元祐三年八月添補一百五十人復元來五百人之數福建路廂軍元管二萬人今裁減三千人以一萬七千人為額内教閱廣節五千五十人除二千二百五十人充巡檢下土兵外定立二千八百人大觀三年撥𨽻東南第十將分五都都百人將校二人計五百一十人指揮使以下五十一人長行四百五十九人今三百八十四人指揮使以下一百一人長行二百八十三人闕一百二十六人除一百二十五人充延祥水軍名糧外一名未招不教閱保節指揮廂軍第一指揮金墉橋北第二指揮豐樂門外之南第三指揮豐樂門外之北牢門營之西第四指揮廣節之東熙寧四年改併崇節水軍指揮為不教閱保節指揮先是咸平三年八月勅本州崇節水軍三千一人節次逃亾四百七十六人可依數招填國初以來兵籍大略如此本州始置嵗月未詳熙寧元年宣命逐路諸州軍兵帳甚有冗占人數比慶厯以前舊額内福建見管二萬一千七百五十八人景祐中一萬九千五百五十人今定存二萬人為額福州係在數内兩軍二千九百五人減一百二十九人以二千七百七十六人為額崇節第一指揮四百六十五人今減二十人第二指揮四百八十人今減四十人第三指揮三百一十人今以上併為額水軍第一指揮今四百三十九人今減九人第二指揮四百二十三人減三人第三指揮四百九十三人今減四十人牢城指揮二百四十三人為額如故至是樞宻院奏諸路廂軍名額猥多自騎射至牢城凡二百二十三其間因事募人團立新額有事存而名未可廢又有剰員及牢城壯城例非差出者又别為一軍今逐路教閱廂軍巳立定額外欲將逐路不教閱廂軍併為一額其餘並從省廢仍令逐路相度州軍大小排定次第毎指揮不得過五百人從之遂下逐路轉運司本路具申昨來撥併軍額之時逐州只據見管均定如泉建州各得四千人以上福州一路都㑹内外十二縣差使乃只得二千七百七十六人願於畸零人數并就泉建兩州額内量那兼福州水軍自來與崇節一例差使名存實亡合一例併省於是以不教閱廂軍重行團併充為保節五指揮毎指揮五百人與先來教閱保節一指揮及牢城三百人共定三千三百人為額保節第一指揮改崇節第一指揮充第二指揮改崇節第二指揮充第三指揮改崇節第三指揮充第四指揮改水軍第一指揮充第五指揮改水軍第二指揮充所有水軍第三指揮撥併廢罷至元豐間福州一路軍額為一萬七十人而不教閱廂軍當一萬四千九百五十人四年復裁減定為一萬三千人於是移本州保節第五指揮於泉州止以三千人為額今第一指揮四百二十人將校十四人不管事將校八人兵級三百九十八人闕八十人外有鼔角將祥符勅開寳六年至至道二年勅應州府主户三萬户於本城抽差鼔角將二千人熙寧四年省併軍額立為不教閱保節指揮是時鼔角將二十六人不係入額數依舊存留今管兵級二十六人係保節第一指揮名糧第二指揮三百三十九人將校四人不管事剩員一人存恤一人兵級三百三十三人闕一百六十一人第三指揮三百二人將校四十八人不管事半糧五人長行二百四十九人闕一百九十八人第四指揮四百四十八人將校三人不管事剰員一人兵級四百四十四人闕五十二人有馬雄畧指揮禁軍不係將隷本州駐治司今嚴景坊内之東元符元年勅東南要郡宜添置馬軍如不該増許減步人額數易以騎卒本路相度福州鈐轄所在最當衝要前差在京虎翼龍騎兩指揮皆是騎兵赴州駐劄紹聖三年直抽歸京至今馬軍差使其闕可添置有馬雄略一指揮排次為第十二以四百人為額其合用馬聴於有馬地分收買支填仍不得過七分閩中皆山道路所出多險且狹於戎事或棄馬用步水戰則利舟檝歴代鎮多馬政不講唐桞冕為福建觀察使還奏閩中本南朝畜牧地可息羊馬置牧區於東越名萬安監又置五區於泉州悉索部内馬五千七百匹驢騾八百頭畜之人情大擾不經時死耗殆盡本朝常於福泉興化置監牧然馬皆低弱不堪披甲惟以給本州廂軍及江浙諸處鋪馬福州四牧曰永崝龍湖瀝﨑海壇然不乆亦廢自此循襲無他廢置至建炎之初馬二百九十匹宣撫司選可用者九十八匹以歸軍前餘耗死殆盡乾道六年本軍所管僅存二十三遂以𨽻省馬院使就芻秣馬本軍今四百八人將校二十三人兵級三百八十五人闕四人初剏馬軍置駐泊一員與州都監通管紹興八年縁兵官與駐泊忿争按撫張給事致逺専撥隷駐泊後來有離軍大使臣經朝廷陳乞添差駐泊一次遇有添差即與正官同管萩蘆塞水軍禁軍名糧紹興九年四月遷都巡檢寨於連江縣管下地名萩蘆門先是慶厯四年逐路留都巡檢兩員改為提舉捉賊内漳泉福興都巡檢内殿崇班林充勤管軍員兵級二百九十一人置廨宇於泉州惠安後分置永泰縣辜嶺熙寧五年就整差撥巡檢下廂禁軍而福州興化都巡檢始定二百人為額從福州差撥步軍元豐二年十月提刑閭邱孝直有請㳂海州軍控扼地分移置巡檢於是辜嶺都巡檢寨移閩縣方山渡北岸置仍以三百人為額巡警賊盜兩州軍三年閏九月巡檢下例招土兵唯都巡檢以地分濶逺仍舊輪差就糧禁軍教閱廂軍宣和令格復以一百七十五人為額六年京東安撫使董正封條具收捕盜賊利害應都巡檢下士軍乞依一指揮以上三百人為額庶幾些小賊徒㑹合縣尉可以同共捉殺從之紹興六年七月安撫司奏置水軍三百人分隷福興漳泉都巡檢兩寨毎寨一百五十人仍存留禁軍五十人方山北岸即閩縣吴嶼也時有海冦始議遷寨近海至是乃以安撫使司水軍統領兼福興都巡檢使為名仍移巡檢寨於萩蘆門置立二十八年九月安撫司奏本路海道北連兩浙南抵廣南自前盜賊多冦掠僻逺及人船稍衆即突入本路本司所管萩蘆延祥兩寨水軍人數不多乞各以三百人為額從之内萩蘆寨昨以一百五十人為額至紹興二十四年捕海賊蘇安等以合决配二十人刺充本軍二十七年廣南賊船作過遂急添募二十人又捕得劉臣興等選強壯三十七人共管二百二十七人今更招七十三人凑三百人為額三十年七月有㫖令安撫司籍募土豪水手漳泉福興籍募到船三百六十隻水手一萬四千人仍於瀕海巡檢下土兵内取七分識水勢人毎月一次同土豪水手船出近海港口教閱三五月復回本處本州九寨共揀土兵六百三十一人而本寨選取一百五十四人乾道七年三月以沿海州軍諸寨巡檢下土軍人數甚少措置増招時見管三百六十八人添招一百八十二人計五百五十人今四百四十五人延祥寨水軍禁軍名糧紹興六年安撫司招到鄭廣鄭慶等人船存留强壯一百七十人内撥五十人充萩蘆寨水軍一百二十人充本州禁軍闕額於延祥寺置寨今候官縣西南繼而萩蘆五十人復取回隷之十五年莫尚書將奏招五百人為額自後節次募到一百十七人又二十四年捕獲海賊蘇安等以合决配一十四人刺充本軍二十六年四月詔分本軍之半隷統制陳敏於泉州時去老弱惟二百五十九人而已命鄭廣領其半以往紹興間朝廷命劉寳分兵駐閩中以備盜賊至十八年泉州士民以状請于朝乞更留劉寳收捕餘黨於是詔本路帥司統領陳敏下竒兵并汀州駐劄翟臯温立漳州駐劄周皓盧真下官兵改充殿前司左翼軍以陳敏為統制漳州駐劄盧真充統領汀州駐劄並權聴劉寳節制翟臯周皓温立發赴殿前司劉寳更住半年候回日専令陳敏等彈壓盗賊時陳敏下管官兵四百人及交割周皓温立下官兵一千九十人馬六十八匹汀州翟臯下官兵一千二百八十五人馬七十匹十九年以陳敏所部兵數少今帥司於本路係將不係將兵内揀選少壯一千五百人毎一百人差將校一名部轄付陳敏下使唤二年一替二十五年復令陳敏招刺吐渾一千五百人替回諸州將兵二十六年並赴泉州駐劄汀漳建三州各差將官一員軍兵三百人屯戍是年延祥寨鄭廣水軍亦分擘一半前去泉州存者一百二十八人本軍兵數既少尋復増募為二百五人時再募四十九人及捕獲劉臣興等刺强壯二十八人充本軍共二百五人二十八年復募九十五人充為三百人額三十年六月有㫖廣州泉州福州三大寨水軍揀選强壯各一半起赴明州時見管將佐使臣効用水軍二百九十七人除分往外存留在寨惟一百四十九人三十一年安撫司措置増招三百人分撥延祥萩蘆兩寨本寨計四百五十人乾道七年例増招土兵見管四百八十七人再招一百十三人計六百人今五百五十二人壯城指揮廂軍舊在威果二十四指揮之東乾道九年改為忠順官舍今散居廂軍營元豐三年五月勅諸路已置壯城兵士其有城壁樓櫓去處以城圍大小分為兩等大城五十人小城三十人専充修城不許招揀填別軍分用熙寧八年樞密院之請也時本州差五十人後崇寧五年河東提舉李公年以潞州城壁頺圯申乞諸路州軍招置壯城兵士工部檢准元符令諸城池軍器及應干軍政或訓練有陳請者申總管安撫鈐轄司専行唯以所用物料責轉運司應副下其說於諸路至大觀元年復奉御筆東南城壁土惡易於淪塌往往作塼城石城或為木柵或施瓦為屋以覆城身非西北比可令帥府置壯城兵士四百人望郡三百人依元豐法制以土起築仍開壕如土惡乃以塼石隨冝施行繼有㫖罷政和三年因陳光弼光弼時為編修國朝㑹要所檢閱文字建請於是帥府望都及㳂邉州軍量數興復州元管五十人復置三百三十人今八十一人將校一名兵級八十人闕二百五十人牢城指揮舊營豐樂門外之北牢城指揮以待有罪配隷之人本路唯福漳二州為然餘郡雜以召募非本法也間因廂卒選補他額如本指揮内元以杖罪到營及二年無過犯者亦許充焉熙寧元年裁定兵帳遂以二百四十三人為額六年復省併諸軍據見管人為一指揮仍量留闕額以為備内權管軍軍員一人軍頭將級二十九人各係招補尋定為三百人元豐四年裁減一路軍額為一萬七千人而牢城指揮當一千五百五十本州復以二百人為額今管四百四十七人副都頭一人十將十一人將虞候押官三十人小分曹司四人不管事剰員一人朝廷配到不應差使三人長行四百人剰員指揮大中祥符四年勅諸路轉運使副屬行巡郡同知通都監監押揀選本城牢城人員節級兵士慶厯五年乃差内臣往福建等路揀選其就糧禁軍及本城兵士如病患可醫者減充半分剰員乆或不堪與給放停公據若曽有戰功及陣亡人弟姪子孫令仍舊自後嵗委監司分揀於是有剰員指揮嘉祐編勅轉運提㸃刑獄巡厯與當職官據本處本城牢城節級兵士當靣揀選其老病乆逺不堪征役者即減充剰員若年七十以上或病患不任醫治即給公憑放停訖奏以天聖四年嘉祐三年勅詳定然非疾病或衰老不任戰禦視嵗數有減切法諸廂禁卒自十將至押官六十五減切七十放停長行六十減切六十五放停惟副都頭以上獨免減切至七十則放停而已熙寧二年樞密院劄本城牢城節級兵士揀選其老病稍堪征役者即減充剰員若年六十五以上并病患久逺不任醫治者不問年甲即使給公慿放停訖奏元豐令諸揀軍將校稍堪部轄軍人稍堪征役及年六十者減充剰貟内節級仍依舊職例惟軍頭改十將其病假滿不堪醫治及年七十者並放停廂軍剰員年六十五准此淳熙令諸揀軍將校稍堪部轄禁軍報所為廂軍減破請給兵級稍堪部轄征役者並減充剰員長行雖堪征役而年六十禁軍節級雖堪部轄而年六十五者亦同其病假滿不堪醫治或年七十者並放停廂軍剰員非級節而年六十五嵗者准此凡減切及嵗時㨂汰疾病稍堪役者充剰員兵級甞有戰功應放停者亦減充看營不管事剰員其衣糧等各得元來之半終其身熙寧四年改崇節水軍為保節五指揮其剰員凡一百五十八人十年勅逐州就糧禁軍廂軍通計十分立一分為剰員額聴於舊營居住遇出軍毎指揮留守營常二十五人仍著為令元豐元年本州申廂禁軍剰員見管二百八十九人時州就糧禁軍廂軍共九指揮四千三百人當以四百三十人為額時合㨂四百三十人以州申員銷差使剰員已足乞以見管人數為額今禁軍諸寨土軍廂軍壯城作院鋪兵水軍牢城剰員共六百七十一人四百六十六人減切剰員二百五人不管事剰員都作院指揮舊營浦尾今斗門之北國初州有作院以待朝廷抛造及州自製軍器本州工匠舊四十人熙寧六年詔諸路置都作院凢四十一所十七處係上供軍器二十四處係應副本路及緩急泛抛軍器而本州居其一以三百人為工匠額七年二月福建路申不銷置監門官九年正月樞密院劄子諸都作院元額工匠三百人以上置副正指揮使各一人都頭五人十將將虞候承局押官各五人二百人以上置都頭一人副都頭三人十將以下各三人一百人以上置都頭各一人十將以下各二人不滿一百人置副都頭十將將虞候承局押官各一人仍編入軍防令時本路福建兩郡並置九年十月軍器監奏近以諸郡各有作院役匠既少復無監官拘轄雖非出産材料之處一例造作般請勞費遂就要便州軍團併差官今聞一路乃數處並置止以三五十人為額舊弊仍初其福建路可止於一處存留於是都作院獨置於建州而本州仍為小作院兵匠七十人習學十四人熙寧九年差計置軍器官秘書丞朱伯虎左侍禁張敏往淮浙福建路計㑹製造軍器元豐六年差入内殿直鄭居簡往兩浙福建路剗刷催促軍器大觀元年十一月御筆東南州軍軍器以承平日久全不修治亦多闕數仰帥府封樁三將軍器望州兩將非軍須盜賊不得支用仍三年一修訖申提刑司帥府望州未有都作院各許一處置立工匠帥府二百人望州一百人若帥府望州人工物料不足許抛下出産諸州小作院分造所造軍器東南土俗不同春夏氣暖筋膠不可施用可三分中計以一分置土俗所用器仗如偏架弩紙皮甲之類令本路官取索講求便利輕捷可用名件製造仍具圖様名色聞奏時州升帥府復置都作院以二百人為額元額七十人習學十四人遂招募一百十六人共二百人為一指揮四年都作院罷依舊為小作院存留八十四人自餘工匠一百十六人權寄保節等指揮政和二年十月以户部侍郎張杲獻議復置都作院仍依舊封樁三將軍器及刷元初撥退工匠凑二百人額宣和元年臣僚有請福州都作院額管兵士二百人舊以本州都監管轄隨時製造朝廷降下外路軍兵或修葺本州團結及將下教閱軍器本作木匠却與兵馬司混同差以防䕶送迎在院者不過三四十人於是下提刑司申嚴違制之法時額管二百人習學四十人分為三都都八十人正都頭一人副都頭三人將級二十四人左右十將六人左右將虞候六人左右承局六人左右押官六人長行二百十二人至靖康間諸作院多物件不備匠人移占他役諸州軍遇有調發軍器皆從京支降乃令提刑司専一管幹有作院州軍招集匠人轉運司别應副材料紹興以來皆仍舊額今見管一百九十四人將校四人將級二十四人糧典一人兵匠一百六十五人分十一作箭作弓弩作甲作皮作銅作漆作旗作條作木作磨鋥作鐡作闕四十六人後別置鐡作於清逺門内兵亦分隷養老寧節指揮紹興十一年揀汰諸軍中傷老病軍員三百七十八人下本州養老充牢城指揮乾道九年閏正月樞密院奏諸軍揀汰養老將校合均撥補外處廂軍内有補充牢城指揮收養名稱未當遂改為寧節指揮淳熙五年移居合沙門外新寨乾道中汪樞使澈創新寨屯駐上四州軍兵至是為寧節指揮淳熙三山志巻十八
