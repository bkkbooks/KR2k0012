body:
  text: 淳熙三山志巻三宋梁克家撰地里類三叙縣望福清縣州東南百二十里舊記百七十七里唐聖厯二年析長樂南八鄉置萬安縣因鄉為名天寳元年改為福唐梁開平二年改為永昌唐同光元年復為福唐偽閩龍啟元年改為福清或曰晉天福初改為南臺縣攷未見東西百二十里南北百四十七里東大海五十里西興化軍百丈嶺分水為界六十里南大海百二十里北長樂縣石尤嶺分水為界二十五里東南海西南莆田縣縣嶺分水為界六十里東北長樂縣薛田嶺分水為界五十里西北閩縣常思嶺分水為界六十五里七鄉舊十鄉三十六里太平鄉縣東五里舊有龍興崇賓里後入永東永西海壇三里永東里通海橋俗名河頭舟楫所萃天聖五年以木為之元祐中増十三間名坦履紹興中知縣黄童以橋南勢卑増築八梁永西里修仁里舊屬永樂鄉海壇里海中間八百里户三千萬安鄉縣西南四十里舊有文秀鄉以翁諫議承贊得名嘉祐省𨽻萬安萬安里新豐里舊屬太平鄉靈徳里蘇田里舊屬文秀有裏外今併萬安橋鐵場橋光賢里舊屬文秀鄉翁承贊之居安香里舊屬文秀鄉相傳雪峯真覺僧歸莆中囊山僧妙應迓之舉香問訊崇徳鄉縣東南五十里山亭鄉舊有遵義遵教靈瑞時和里今併附近諸鄉欽唐里惇和南里舊有惇和北里今併歸化北里安夷北里舊屬山亭鄉拜井里閩王審知築占計洋鑿井無水拜而得之安夷南里舊屬山亭鄉孝義鄉縣南二十五里舊有萬夀桑里後併栖仁里江隂里舊屬崇徳鄉臨江里徑江躡雲橋元豐初作名鼇江名橋政和五年為亭淳熙初改今南匿里舊屬萬安鄉歸化南里舊屬崇徳鄉長東鄉縣西四十里舊有長樂西鄉此為東鄉後併西鄉此遂去樂字文興里舊無清元里舊半屬西鄉永夀里新寧里舊屬西鄉有裏外里今併方興里感徳鄉縣東二十五里舊有鱣庭里今併仁夀里潯洋里舊屬孝義鄉新安里方成里永賔里方樂南里舊有北里今無二龍江橋闊五里中浮六丈政和中増四十間林舍人遹記以連滄巨浸名劉提刑嶠改名永平紹興中林少卿栗改今名永樂鄉縣西十二里舊有常樂元福立徳里後併永福里清逺里舊屬萬安鄉善福里舊屬長樂東鄉士林橋水陸院之左開寳五之年創治平元年修無患橋近林真君煉丹地相傳飲其水者無疾患今改為龍津林樞密希記交溪橋宣和四年作遵義里舊屬山亭鄉望古田縣州北二百八十里唐開元二十八年洞豪劉彊等三人以土地人民歸于都督李亞丘乃遣楊參軍招致林鎔記作溢等千餘户咸曰祖父咸亨中來此潜焉因古昔田畝墾闢而居以聞于朝明年立縣雙溪之匯屏山之南平陸三十五里新唐書永泰二年析候官尤溪置誤皇朝太平興國五年從轉運使楊克讓之請乃遷治于水口今嵩溪驛乃縣庭端拱元年仍舊轉運使崔䇿請從之東西八十三里南北二百五十里東連江縣界百四十里界首至縣二百里西南劒州界百四十里界首至縣二百里南水口鎮八十里北建寜府界百四十五里界首至府二百里東南候官縣界百七十里界首至縣百九十里西南閩清縣界八十里界首至縣六十里東北羅源縣界三百里界首至縣六十里西北建寜府界八十里界首至府九十里四鄉十三里東鄉保安里東溪石感溪洲屈斗沙轉水龍鳴玉橋下有磨劒戴星平橋津橋勸農橋醻温泉橋坊仙岩醴山上龍潭花岩井潭尖峯城小尖峯下坊龍古山環屏山花山崇禮里白沙桃凌橋井花塢茶亭山螺坑山風伯林峯龍五花玉大仙瀨溪里破石闕車竿年寰宇記云瀨溪積善二里峯南唐六𨽻南劒今有瀨溪白銀後溪龍潭和平里神前路芋洋魚小鱟湯谷口屬黄田皆驛潮橋橋半閩清林洋凊潭橋舊從朱坑鋪前渡恩惠鄉舊有長安里今無慕仁里天宫嶺桃羊角髙洪頭柏口洲家遊筋竹嶺黄覆船新興里左㧞平湖副㧞山石﨑横溪里横口東西溪黄柏造山場銀場窟栗木洋新俗里舊名洛陽出牡丹芍藥建中靖國元年改今名包地白溪菴溪青溪元和鄉邵南里金坑嶺倒坑溪臙脂籠牛頭甘潭溪安民里辜洋蘇廖洋洋青田鄉安樂里西寮皮寮盖竹西溪杉洋皆徐坂紙潭書造竹移風里舊無場竿舟龜嵩舟悉西溪二白籰八若洋造山石口眼具長丈廣九尺一人登其上亦㣲動寳泉山順委里犯御名改為順紙黄柏茶洋造竹緊永福縣州西百二十里唐永泰二年節度使李承昭析候官尤溪縣各一鄉置號永泰新唐志咸通二年析連江及閩置誤皇朝崇寧元年改今名避哲廟陵名東西百五十五里南北百二十里東候官縣界六十里西南劒州尤溪縣界六十五里南興化軍興化縣界七十里北閩清縣界四十五里東南興化軍界八十五里西南泉州德化縣界百里東北候官縣界七十五里西北閩清縣界六十里三鄉十四里豐和鄉縣東七十里舊里五後併永泰為唐元待旦里抵候官皆危居斜耕之地泉東新橋旁有欵骖亭湯保安里大小妃山越王葬二妃於此鑄鐡蓋以掩之湯泉永安里大樟觀獵大霄東洋唐元里剏嶺龍石人坑清巖村溪郭店嶼福十八路通化鄉縣南三十歩開平里縣市三平政橋在重光寺前以木作十八盤用舟十六乘之盤長一丈四尺闊一丈舟長三丈濶四尺紹聖四年作原通凉橋傳宣和橋政和橋太原灘下石刻太二字相唐大中初王令罷秩艤舟于此邑中餞行莫夜未返其夫人題詩一章何事潘郎重别筵君心未斷妾心懸太原灘下相思處猿呌青山月滿船政和三年知縣陳武佑以刻石方廣巖極樂巖六洞仙巖里永泰鎮今廢縣南五有大湯小湯陳山光德里大小洋古爛北山圓埕鍾山蘇坑新豐里魚坑湯辜洋白黄坑口泉面平蓋里髙蓋山下東坑口黄柏洋上下㧞花林庄謝洋安樂里杉洋白腰永安橋通興化尤溪胡鼻毗坑朱洋和平鄉縣西南九十五里歸義里洑口登沖龍湘溪東石瀬葛洋龍津里舊曰新津溪居人沿溪尺峬嶺陽井流石上六義仁里洪面後池拏板辜嶺感應里五十大狶鰲坑栁園保德里濁水際門塘貫尾沖口中閩清州西北百二十里唐貞元中徐絳記元和中觀察使王雄析候官縣十里置梅溪場新唐書云置縣誤梁乾化元年王審知以為閩清縣縣路僧法箋開治通逼峻頗有條理東西八十里南北百二十里東候官仁德里十五里界首至州百二十里西南劒尤溪縣松陽里七十里南永福縣新豐里五十里界首至縣五十里北古田縣和平里七十里界首至縣三十里東南候官縣守仁里十五里界首至州百二十里西南永福縣平蓋里百里界首至縣五十里東北古田縣邵南里六十里界首至縣六十里西北尤溪縣松陽里七十里二鄉十里奉政鄉縣東北三十里宣政里天王渡蘆白塔渡中鍾湖山半内有湖泥如浦溆生荻相傳有積水應海潮盈縮旱禱雨於此相石竹山縣南二十里山半有靈壇石巧如畫屏傳山下有穴水流相通猴猿多居之有佛跡盤石上鵲仙橋安仁里白面山天晴望之巖石隠隱如人面而白温泉金沙里賀㤙里唐乾符中有池錫家天雨錢數萬夜夢人送鐵鏁二至旦果得後有鶴盤旋下庭號其山曰朱頂林曰白鶴至今子孫家焉永寜鄉縣西山五十里盖平里石屋山巖下有石屋仙人棊局護仁里薛丕山産石花異果相傳逸人薛丕於此居仁夀里大帽山峯接永福界有鼔聲或一月三五鳴或不鳴經年雲常覆其上旱則禱之龍爪橋溪旁四爪㾗猶在旱禱即雨孝順里龍都巖髙百丈常有雲氣不散時聞仙樂聲側有靈洞院苑丘里居仁里仙人跡入溪岸盤石上長一尺五寸濶八寸入石一寸傍有石白深八寸中寜德縣州東北三百里唐開成中析長溪古田二縣地置感德場偽閩龍啟元年升為縣東西二百里南北三百二十里東長溪縣鹽田江松門為界三十五里亦至海西古田縣安樂里百二十里南羅源縣飛泉嶺十五里北政和縣秦溪西里二百三十里東南海西南羅源縣興成里百里東北長溪縣二百二十里西北建寜府四百五十里三鄉十里安東鄉縣東南五里陵山里小場鎮蚶﨑飛泉今廢殊溪梅花三焦釣﨑臨海里杯竹金溪里趙公橋舊在横山淳熙以䜟移於渡船田赤鑑浦渡石碧村百丈際龍潭灌數十頃霍山鄉縣北七十里水漈里長境渡關西溪渡廢霍山溪埭鎮今霍童里黄大夫湖旁中程黨渡乆霍山井霍童山中廣五丈相傳有海鰌晴昇木為雨乆雨昇之必晴安樂里龜村斑赤溪竹青田鄉縣西百五十里東陽里芹溪東渺外渺巖顯聖安逺里章溪溪桃花感徳前里穹窿村竹檉湖杯後里福輦葛石唐常斛仙翁巖中羅源縣州東北百六十里唐大中元年觀察使韋岫以連江縣一鄉為羅源場偽閩龍啟元年陞為永貞縣皇朝天禧五年改為永昌避皇太子名乾興元年改為羅源溪名亦姓也初治水陸寺西雙溪之間地庳潦官物陷溺即配富民償慶厯八年土民陳智津倪昱等擊登聞鼓奏理之乃移今治於舊縣東北東西七里南北一百里東寜德縣界四十五里西連江縣界二十五里南連江縣界三十五里北古田縣界六十里東南連江縣界抵海四十里西南連江縣界二十五里東北海十五里西北古田縣界六十里三鄉十二里崇德鄉縣東南五里八里舊與北社為安金里四明山名雙石橋名金釵三石橋崇德鯽魚嶼拜井里松﨑山梅溪里舊有上下里山居新順里石鼈善化里舊有上下里最險僻常熟鄉縣東北十五里賢舊有遷明新豐里後置招里遂併之招賢里舊無險鏡様瀕海僻徐公里仙茒山臨濟里白巖山下瀕溪羅平里洪福山同樂鄉三屯縣西七十五里舊曰屯今曰里霍口里梧桐山下瀕溪黄重里羅漢山下瀕溪林洋里山望懐安州西北二十里皇朝太平興國六年郡守何允昭奏閩縣畫疆不啻百里户僅二萬吏患簿籍繁徴輸逺請析九鄉八千户置初治芉源江北三十里咸平二年轉運使丁謂奏移石岊民便之始廣故驛為今治東西八十五里南北二百一十里東連江縣界七十五里西候官縣界十里南候官縣界四十里北古田縣界一百七十里東南閩縣界二十六里西南候官縣界三十里東北連江縣界八十里西北候官縣界三十五里九鄉四十四里敦業鄉州城北鐘山里周廣順二年林嗣宗鐘山記螺湧千巒竒木秀聳擇善里開化里以上三里附城太平里城北地十國紀年王延翰葬閩縣太平山即太平藏也為普同墳紹興十一年鄉民請為之張丞相浚乃令芙蓉僧營於北門之外男左女右各廣二丈二尺深二丈為四穴以待不能葬者乾道六年黄監簿啟宗請於府為三墳於天王院之東則謂之義冡忠信里興聖坑朱陶穴有九十五家佃官池院唐相王摶謫逹回卒于此因葬閩山塔西感應鄉縣下以西十八里贊城里西安里後浦清平里舊曰清義之後山舊為陶竈政和初知縣呉與乃禁今陶迹猶隱於荒莽之中安康里舊曰安義縣市欽德里文山石鄭山人居黄尚書裳其路徃謁之八座鄉縣東北二十里觀風里附城今東瀆田東湖嚴髙築城日與西湖同開鑿皆為人猶呼之亦有湖塍之號孝仁里温泉里多湯泉龍窟山髙遷里盤石相傳越王時運米至浮倉此石在湖中因號炭田稷下里北嶺靈山鄉縣東北二十五里越城里立德里懐賢里十國紀年葬夫人任氏于閩縣鳯池山後忠懿王亦葬焉今鳯池寺山也唐同光四年改葬永福山則遵化里蓮華山也後唐賜神道碑張文寳撰王氏在閩者無噍類今惟甥劉氏嵗時祀之寜碁里桑畬北舊記餘善塜在閩縣西十一里今𨽻懐安遵化里桃枝嶺候官鄉縣西北二十五里舊有崇江里後併清泰里北平里靈運里桐口昶偽閩通文四年王奔至梧桐嶺安定里德風里超勝里江陽里承平鄉縣南三十里接下里黄信里順安里孝悌里以上四里跨江南洲黄江安上里移風鄉縣西南四十里長夀里崇福里清善里勻化里楊﨑里以上五里在江南積德鄉縣南五十里恭順里湖襄勝平里仙﨑髙陽里待賔里孝亷里同樂鄉縣北四十里施化里興城里二里界古田閩清羅源龍跡石壽山石淳熙三山志巻三
