body:
  text: 淳熙三山志卷十三宋梁克家撰版籍類四州縣役人衙前八十三人初衙前入役曰鄉戶曰押録曰長名職次曰客司曰通引官優者曰衙職建隆以來並召投名惟鄉戶押録衙前闕即抽差年滿押録里正押録三年里正二年替限內各管重難一次主持管押官物必以有物力者其産業估可二百緡許收繫更重難日久有勞至都知兵馬使試驗其才遣趂闕與補攝雍熙三年本州衙前并使院諸色公人總五百四十一人咸平年福州主户三萬户以上衙前諸色公人夫存留三百五十人內衙前都押衙以下軍將通引官客司㕔子共一百二十人後定衙前以二百五十四人為額內鄉戶隨事立額其主持重難及優輕並三年為界天聖八年吳思等乞依泉州例二年一替至和元年前轉運使蔡襄上言本路差使衙前不均請行重定以産多少均重難分數産錢五百者定入十九分重難以上遞加至三十三分止其鄉戶衙前歲以六十六人為額以十二縣産錢通排共存留九百九十戶仍請罷里正以寬衙前歇役年限治平元年詔遣職方貟外即方嶠等詣州相度裁損衙前舊額定一百五十六人詳定所審奏按令勑以戶口立額福州大藩場務等處所差人數不少其衙前宜以二百二十人為額減放三十四人時府六闕額更不填補餘二十八人於通引官客司下名內減出有㫖見闕六人更不填補止減放二十人於是鄉戶衙前以五十六人為額押録衙前五十五人長名衙前六十人客司通引官五十七人元七十七人减二十人凡二百二十八人為衙前額熙寧三年鄉戶衙前增為七十二人先是治平三年添乾薑千萬斤增十人熙寧二年運海口鹽增六人明年行募法令民出免役錢七年州定長名衙前一百一十七人情願投名不請雇錢雇募衙前三十七人內主押綱運搬請官物三十三人主持館驛四人八年减罷方山太平小若三驛專知三人存留漁溪一驛每歲增支傭錢九年裁減長名二十五人存九十二人元豐三年以募役衙前三十三人併入長名九十二人總一百二十五人均輪優重差使四年免差年滿押録諸縣得替押録舊管幹處令見役人兼管仍輪差貼司其使星館以閩候押録輪兼元祐初罷募法改招稅戶投充是時改雇募為招募鄉戶衙前别立法優假之如公使庫等上京綱運之類並别差使臣將校其髙強户許出助役錢免約重難分數紹聖初復熙寧法建炎元年額减三分之一州一百二十五人減四十二人定八十三人為額五十三人客司內十七人權募或充諸廂虞侯及非泛差使一十人通引官一十人分押衙一十人升職貟吏人一百人建隆四年使州院人吏貟闕並募有田産諳公事人充不足則據數均於屬縣曹司正貟內差補開寶六年諸州主户三萬以上者使院書表司勾院共五十人州司三十人天聖八年朱諫言福州抽差曹司許二年一替因此差役頻併尋下轉運司定奪自後如有闕額及老病不任無子姪可替者建隆勑職級年滿出職許令男姪替與募百姓如委無投充許於中戶以下選差不得更令二年一替八年官嵩等以縣鄉户差替後行不諳書算若令長充胥吏實為難堪以告轉運司乃委官體訪下福州均定抽差復替以二年如縣闕人仍自來體例其後始詔使州院曹吏並許投名取三人以上節級保明充係康定以前勑先是本州使院書表司勾院二百四人州院三十人總二百三十四人至是額內一百六十六人繫有田産投充三十八人外縣輪差治平元年方嶠相度本州主戶九萬八千六百六十六若依條只置五十人然福州大藩獄訟帳目遣發甚繁實難按條立額加以所差外縣人吏不諳行移宜減放歸縣可存留長名一百五十四人為額詳定所審覆恐供應不足增為一百七十人外其州院三十人內一十二人縣差今並減放撥使院後行充填候募到代者熙寧七年吏額仍舊二百人許投名元豐二年州院三十人減二十人內存留四人充填使院闕額實減一十六人元祐初行差役州吏額仍舊一百八十四人三年許不限産稅投充紹聖復募法以一百八十一人為額造帳司在外建炎元年減三之一擇無心力及罪過多者罷州減六十人三年赦諸不徑殘破處減三之一遂再減四十人存八十一人尋以差使不足請於朝乞將已減人數五分增一乃增十九人至今總一百人為額職級二十人舊法孔目官年滿補攝恭軍後未釐正官稱改補攝助教願充僧道者聽前行四十人後行四十人貼司五十人建隆初諸州惟有私名書手在京及監司即置貼司景德二年量私名書手人數立額許正行人吏保明籍定姓名祗應人吏有闕選無過犯者充元豐中始有攢司司書算又吏人不足聽差貼司權行紹興五年州縣貼司每案不得過五人二十七年言者請以吏額之半置貼司本州人吏一百人貼司五十人至今為額造帳司人吏四名建隆以來本州以使院人吏有闕抽諸縣曹司充補治平元年以縣差人率不諸攢造撥放歸縣熙寧四年諸州募能造帳人充合得職名令專主造帳非造帳月分從其便並優與請給以免役錢支仍各立定限酬賞元豐二年本州募四人並給雇錢元祐三年罷給聽於吏人內抽差候滿三年無過轉一資與優輕酬奬一次祗候典四人初諸縣各遣人吏赴州承領文帖付解子達於縣熙寧十年以縣務繁併始募祗候典四人閩候懷安共一名古田閩清永福共一名連江長樂福清共一名長溪寧德羅源共一名紹聖減二人後復四人以使院守闕人充散從官六十六人初諸州有承符散從步奏官追催公事又有人力當直並差稅户或坊郭有行止人二年替雍熙三年本州步奏散從官二百人咸平編勑州三萬户以上節院散從步奏官併雜職總一百人兩使判官人力十五人節察推官各七人照不滿二萬户録事參軍二十五人司法藏司戶事十人嘉祐五年州職曹官人力減半八年散從步奏官州一百人外有雜職治平元年方嶠相度復併雜職為一百人熙寧七年散從官五十人承符三十五人人力增四人司推㕔總二十五人三年改人力承符並為散從官總一百五人四年裁減都鹽務銀器賦羽庫等處承符散從六人元祐一百七人內雜職八人紹聖雜職外九十九人宣和三年減曹官當直散從官建炎元年又減三之一存散從六人至今人數依建炎給錢依元豐左右司理院虞候八十人建隆四年院虞候依承符散從官例以鄉户差其節級自轉充三年替歸農熙寧二年更募法以無投充遂於第四等戶差一年替送接司理許差六人九年改正各差六人元豐至紹聖皆以一百二十人為額並募投名不給産錢政和三年獄子給重祿兩院獄子各六人節級一人半年替當直司獄子四人一季替宣和罷重祿淳熙四年兩院各減二十人令守闕今兩院總八十人雜職十一人差如院虞候法建隆以來三周年替若年滿未願歸農者聽咸平中併散從官步奏官一百人為額嘉祐八年散從官外雜職八人尋撥於復總為一百人熙寧七年散從承符人外雜職六人九年復八人紹興二十年增補二人充補散從一十人淳熙四年額外補一人見管十一人斗子三十一人庫子稱子搯子附國初斗搯等並選下户有行止人充皇祐三年一路遍勑州縣庫稱揀搯倉斗子等元無名額人數但不係創新添置並權存留以後不得添置熙寧本州三十一人並投充不給錢元祐仍熙寧舊紹聖四年召保産五十千以上充今三十人外節級一人揀子七人景祐中軍資庫所𨽻揀子二十人後因婺州奏揀搯人要須轉密諸路委運使裁減本州有留十人熙寧增為十五人投充不給錢紹聖四年召保産如斗子法紹興以來經總制錢𨽻通判㕔自是罕有投充者乾道九年以諸色錢分為六庫有司請補揀子六人淳熙五年增節級一名都轄之三年為界今總七人欄頭三十人至道二年諸州欄頭委轉運使副揀選充填咸平三年始招客户祥符六年陳堯咨奏請於第五等稅户差熙寧七年本州募三十七人元豐以來不給雇直紹聖四年充補如揀子法紹興三十二年轉運判官陳寺丞彌作巡按減十人令二十七人節級三人三年為界諸縣人吏一百三十六人國初押司録事於等第户差選諳吏道者充遇衙前闕即抽差等滿押録建隆以來諸縣曹司主戶二萬户以上三十人一萬户以上二十五人七千戶以上二十人五千户以上十七人三千戶以上十五人一千戶以上十一人不滿一千户十人抽等第戶康定二年施昌言奏縣吏差稅户多不看文書乞依州軍例召有産業人投名不足則差既而諸縣後行各抽充州吏以二年替仍輪上州充祗候典治平元年裁減吏額撥放五十人歸縣熙寧十年募祗候典替縣曹司自是縣吏不復貼差是時諸縣人吏總一百五十九人元祐初減七十九人建炎又減八十人紹興二十七年增上縣三十人下縣二十人今總一百三十六人貼司三百十五人初諸縣人吏正名外不得更置貼司抄狀司景德二年諸官司私名書手並量人數立額元豐著令始籍定姓名不得額外私補人吏有闕與鄉書手以次補充紹興五年縣貼司每案不許過五人二十七年增上縣人吏三十人貼司二十人下縣貼司同人吏今具於左方熙寧一百九十五人貼司在外元祐二百十六人紹聖一百十六十建炎減人貼司在外貼司在外八人閩縣二十人二十人二十人六人人吏十四人貼司三十人連江十七人元豐四年減二人十五人十五人五人人吏十人人貼司三十候官二十人二十人二十人六人人吏十四人貼司三十人長溪十五人二十五人二十五人八人人吏十七人貼司三十人長樂十五人十年增二人十七人十七人五人人吏十二人貼司二十人福清二十人十年增四人二十四人二十四人十人人吏十四人貼司三十人古田十七人八年增三人二十人二十人十人人吏十人人貼司三十永福十五人十五人十五人五人人吏十人人貼司三十閩清十二人十年增元祐初三人減二人十三人十三人三人人吏十人人貼司三十寧德十二人八年增二人十四人十四人六人人吏八人三人貼司二十羅源十二人元豐四年增一人十三人十三人六人人吏七人人貼司二十懷安二十人二十人二十人十人人吏十人人貼司三十弓手八百人國初以中等户揀差專捉盜賊不許别有差使除廣南外不得替建隆四年勑一萬戶以上五十人七千户以上四十人五千戶以上三十人三千戶以上二十五人二千戶以上二十人一千戶以上十五人不滿一千戶十人見咸平編勑祥符七年勑一萬戶以上七十人七千戶以上六十人五千戶以上五十人三千戶以上四十人二千戶以上三十五人一千戶以上三十人不滿千户二十人見慶厯編勑咸平四年本州請依廣南例三年替天聖中除廣南川陜三年替餘不得替明道二年范文正公仲淹請七周年替願留者聽慶厯中除廣南登梓司䕫路三年替餘不替皇祐三年轉運司奏本路與廣南事體不同乞仍舊七年替熙寧初許稅戶投名各破雇錢仍選人材少壯者充元祐元年本路以第一等户差仍以産錢分上中下三等上户七年替中下遞減二年若不足則於次等户差亦三年替紹聖復熙豐法政和中增大縣十五人中縣十人小縣五人為獄子給重祿元豐間縣二千户以下差二人充獄子半年替諸縣各五名節級五名宣和罷重祿建炎元年本路增置大縣三百人中縣二百五十人下縣二百人尋有㫖罷招紹興初十二縣總八百三人今八百人熙寧二百元豐增五十元祐六百紹聖六百政和增一百宣和增三五十人一人减六人十七人二十二人四十一人十七人今閩縣六十人六十人六十人十五人七十五人連江五十人割過里減六